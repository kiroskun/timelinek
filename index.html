// ═══ AI ASSISTANT · 对话视图 ═══
function AssistantView({th,tasks,setTasks,projects,cats,catOf,tags,journals,today,displayName,nextSortKey,showToast,emptyTask,setTrash}){
  const[messages,setMessages]=useState(()=>{
    try{const r=localStorage.getItem("tlk_chat_v1");if(r)return JSON.parse(r);}catch{}
    return[];
  });
  const[input,setInput]=useState("");
  const[loading,setLoading]=useState(false);
  const[attachedFiles,setAttachedFiles]=useState([]); // [{name,text,size}]
  const[parsing,setParsing]=useState(false);
  const[confirmAction,setConfirmAction]=useState(null); // {desc, run, args}
  const fileInputRef=useRef(null);
  const scrollRef=useRef(null);
  
  // 持久化对话 + 通知 MainApp 触发云同步
  useEffect(()=>{
    try{
      localStorage.setItem("tlk_chat_v1",JSON.stringify(messages.slice(-30)));
      window.dispatchEvent(new Event("tlk_chat_changed"));
    }catch{}
  },[messages]);
  
  // 监听云端推过来的最新对话（来自其他设备的更新）
  useEffect(()=>{
    const onSynced=()=>{
      try{
        const r=localStorage.getItem("tlk_chat_v1");
        if(r){
          const cloud=JSON.parse(r);
          // 仅当云端比本地新（消息数更多或最后时间戳更晚）时才覆盖，避免循环
          const localLast=messages.length>0?messages[messages.length-1]?.ts||0:0;
          const cloudLast=cloud.length>0?cloud[cloud.length-1]?.ts||0:0;
          if(cloud.length!==messages.length||cloudLast>localLast){
            setMessages(cloud);
          }
        }
      }catch{}
    };
    window.addEventListener("tlk_chat_synced",onSynced);
    return()=>window.removeEventListener("tlk_chat_synced",onSynced);
  },[messages]);
  
  // 自动滚到底部
  useEffect(()=>{
    if(scrollRef.current)scrollRef.current.scrollTop=scrollRef.current.scrollHeight;
  },[messages,loading]);

  // 工具实现
  const handlers={
    createTask:(args)=>{
      try{
        const dueOk=args.due||today;
        let projId=args.projectId||"";
        // 校验项目：AI 传的 projectId 必须真实存在 + 项目名/关键词必须出现在 title 里
        if(projId){
          const p=projects.find(x=>x.id===projId);
          if(!p)projId="";
          else{
            const cleanName=p.name.replace(/项目|定制|计划|方案|工程/g,"").trim();
            const t=(args.title||"").toLowerCase();
            const matched=t.includes(p.name.toLowerCase())||(cleanName.length>=2&&t.includes(cleanName.toLowerCase()));
            if(!matched)projId=""; // 标题里没提到项目名 → 不归属
          }
        }
        // 分类：先按 id 匹配，再按 name 匹配（AI 可能传中文名）
        let catId="work";
        if(args.category){
          const byId=cats.find(c=>c.id===args.category);
          const byName=cats.find(c=>c.name===args.category);
          if(byId)catId=byId.id;
          else if(byName)catId=byName.id;
        }
        const newT={
          id:Date.now()+Math.floor(Math.random()*1000),
          ...emptyTask,
          title:args.title||"未命名",
          content:args.content||"",
          category:catId,
          priority:args.priority||"中",
          due:dueOk,
          timeStart:args.timeStart||"",
          timeEnd:args.timeEnd||"",
          duration:args.duration?String(args.duration):"",
          projectId:projId,
          sortKey:nextSortKey(),
          createdAt:today,
          done:false,
        };
        setTasks(t=>[...t,newT]);
        return{success:true,taskId:newT.id,message:`任务"${newT.title}"已创建`,task:{id:newT.id,title:newT.title,due:newT.due,timeStart:newT.timeStart,priority:newT.priority,category:cats.find(c=>c.id===catId)?.name||catId}};
      }catch(e){
        return{success:false,message:"创建失败: "+(e.message||"未知错误")};
      }
    },
    updateTask:(args)=>{
      const tid=Number(args.taskId);
      const target=tasks.find(t=>t.id===tid);
      if(!target)return{success:false,message:"任务不存在 id="+tid};
      setTasks(list=>list.map(t=>{
        if(t.id!==tid)return t;
        const next={...t};
        ["title","due","timeStart","timeEnd","priority","content"].forEach(k=>{if(args[k]!==undefined)next[k]=args[k];});
        if(args.duration!==undefined)next.duration=String(args.duration);
        if(args.done!==undefined){next.done=!!args.done;next.progress=args.done?1:0;if(args.done)next.completedAt=today;}
        return next;
      }));
      return{success:true,message:`任务 #${tid} 已更新`};
    },
    deleteTask:(args)=>{
      const tid=Number(args.taskId);
      const target=tasks.find(t=>t.id===tid);
      if(!target)return{success:false,message:"任务不存在 id="+tid};
      setTasks(t=>t.filter(x=>x.id!==tid));
      setTrash&&setTrash(tr=>[...tr,{...target,deletedAt:Date.now()}]);
      return{success:true,message:`任务"${target.title}"已删除（移至回收站）`};
    },
    listTasks:(args)=>{
      const filter=args.filter||"all";
      const limit=Math.min(args.limit||10,30);
      let list=tasks;
      if(filter==="done")list=tasks.filter(t=>t.done);
      else if(filter==="undone")list=tasks.filter(t=>!t.done);
      else if(filter==="overdue")list=tasks.filter(t=>!t.done&&t.due&&t.due<today);
      else if(filter==="today")list=tasks.filter(t=>!t.done&&t.due===today);
      else if(filter==="future")list=tasks.filter(t=>!t.done&&t.due&&t.due>today);
      const items=list.slice(0,limit).map(t=>({
        id:t.id,
        title:t.title,
        due:t.due||"",
        timeStart:t.timeStart||"",
        priority:t.priority,
        category:(catOf(t.category)||{}).name||t.category,
        done:t.done,
      }));
      return{count:list.length,returned:items.length,items};
    },
  };

  // 上传文件解析
  const onFilesPick=async(files)=>{
    if(!files||files.length===0)return;
    setParsing(true);
    const newAttached=[];
    for(const f of Array.from(files)){
      try{
        const txt=await extractFileText(f);
        newAttached.push({name:f.name,text:txt.slice(0,30000),size:f.size});
        showToast(`已附加：${f.name}（${(txt.length/1000).toFixed(1)}k 字）`,"success");
      }catch(e){
        showToast(`${f.name}：${e.message}`,"error");
      }
    }
    setAttachedFiles(a=>[...a,...newAttached]);
    setParsing(false);
    if(fileInputRef.current)fileInputRef.current.value="";
  };

  const sendMsg=async(opts={})=>{
    const text=opts.forceText||input.trim();
    if(!text&&attachedFiles.length===0)return;
    if(loading)return;
    
    const userMsgContent=[];
    if(attachedFiles.length>0){
      userMsgContent.push("📎 附件内容：\n");
      attachedFiles.forEach(f=>{
        userMsgContent.push(`【文件：${f.name}】\n${f.text}\n`);
      });
      userMsgContent.push("---\n");
    }
    userMsgContent.push(text||"请基于附件内容帮助我。");
    const fullText=userMsgContent.join("");
    
    // UI 显示用：保留附件标记
    const displayMsg={role:"user",content:text||"（基于附件提问）",files:attachedFiles.map(f=>f.name),ts:Date.now()};
    const newMessages=[...messages,displayMsg];
    setMessages(newMessages);
    setInput("");
    setAttachedFiles([]);
    setLoading(true);
    
    try{
      const sysPrompt=buildAssistantSystemPrompt({tasks,cats,projects,tags,journals,today,displayName});
      // 只把 user / assistant 类消息发给 API（system_event 是 UI 显示用的，DeepSeek 不认）
      const cleanHistory=newMessages.slice(-10).filter(m=>m.role==="user"||m.role==="assistant");
      const apiMsgs=[
        {role:"system",content:sysPrompt},
        ...cleanHistory.map((m,i)=>{
          if(i===cleanHistory.length-1){
            return{role:"user",content:fullText};
          }
          return{role:m.role,content:m.content||""};
        }),
      ];
      const result=await callAssistantWithTools(apiMsgs,handlers,(progress)=>{
        if(progress.type==="tool_call"){
          setMessages(m=>[...m,{role:"system_event",content:`🔧 调用工具：${progress.name}`,ts:Date.now()}]);
        }
      });
      setMessages(m=>[...m,{role:"assistant",content:result.content,ts:Date.now()}]);
    }catch(err){
      setMessages(m=>[...m,{role:"assistant",content:`❌ ${err.message}`,error:true,ts:Date.now()}]);
    }
    setLoading(false);
  };

  const clearChat=()=>{
    if(!confirm("清空所有对话历史？"))return;
    setMessages([]);
    try{localStorage.removeItem("tlk_chat_v1");}catch{}
    showToast("对话已清空","info");
  };

  // 快捷指令
  const quickActions=[
    "总结我今天的任务",
    "本周哪些任务最重要？",
    "帮我把所有逾期任务列出来",
    "给我一些提升效率的建议",
  ];

  return(
    <div className="fadeIn" style={{display:"flex",flexDirection:"column",height:"calc(100vh - 100px)",maxHeight:900,minHeight:500}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14,paddingBottom:14,borderBottom:`1px solid ${th.glassBorder}`}}>
        <div style={{width:42,height:42,borderRadius:12,background:`linear-gradient(135deg,${th.accent},${th.accent3})`,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 4px 16px ${th.accent}50`}}>
          <span style={{fontSize:20}}>🤖</span>
        </div>
        <div style={{flex:1}}>
          <div className="display" style={{fontSize:22,color:th.ink0,letterSpacing:"-0.02em",fontWeight:700}}>AI 助手</div>
          <div style={{fontSize:11,color:th.ink2,marginTop:1}}>{messages.length>0?`${messages.length} 条对话`:"问我任何关于任务、计划、效率的问题"}</div>
        </div>
        {messages.length>0&&<button onClick={clearChat} className="glass" style={{padding:"7px 12px",borderRadius:9,fontSize:11,color:th.ink2,display:"flex",alignItems:"center",gap:4}}><Ic n="trash" size={11} color={th.ink2}/> 清空</button>}
      </div>

      {/* 消息列表 */}
      <div ref={scrollRef} className="slim-scroll" style={{flex:1,overflowY:"auto",padding:"4px 4px 12px",display:"flex",flexDirection:"column",gap:10}}>
        {messages.length===0&&!loading&&(
          <div style={{textAlign:"center",padding:"40px 20px",color:th.ink2}}>
            <div style={{fontSize:48,marginBottom:14}}>💭</div>
            <div style={{fontSize:14,marginBottom:18,fontWeight:500,color:th.ink1}}>我能帮你做什么？</div>
            <div style={{display:"flex",flexDirection:"column",gap:8,maxWidth:380,margin:"0 auto"}}>
              {quickActions.map((q,i)=>(
                <button key={i} onClick={()=>{setInput(q);setTimeout(()=>sendMsg({forceText:q}),50);}} className="glass hover-lift" style={{padding:"11px 16px",borderRadius:11,fontSize:13,color:th.ink1,textAlign:"left",border:`1px dashed ${th.glassBorder}`}}>
                  💡 {q}
                </button>
              ))}
            </div>
          </div>
        )}
        {messages.map((m,i)=>{
          if(m.role==="user"){
            return(
              <div key={i} style={{display:"flex",justifyContent:"flex-end"}}>
                <div style={{maxWidth:"80%",padding:"10px 14px",background:`linear-gradient(135deg,${th.accent},${th.accent3})`,color:"#fff",borderRadius:"14px 14px 4px 14px",fontSize:13.5,lineHeight:1.55,wordBreak:"break-word",boxShadow:`0 4px 12px ${th.accent}40`}}>
                  {m.files&&m.files.length>0&&<div style={{fontSize:10.5,opacity:0.85,marginBottom:6,letterSpacing:"0.04em"}}>📎 {m.files.join(" · ")}</div>}
                  <div style={{whiteSpace:"pre-wrap"}}>{m.content}</div>
                </div>
              </div>
            );
          }
          if(m.role==="system_event"){
            return(
              <div key={i} style={{textAlign:"center",fontSize:10.5,color:th.ink3,padding:"4px 0",letterSpacing:"0.04em"}}>{m.content}</div>
            );
          }
          // assistant
          return(
            <div key={i} style={{display:"flex",justifyContent:"flex-start",alignItems:"flex-start",gap:8}}>
              <div style={{width:28,height:28,borderRadius:9,background:m.error?"#ff5d7a30":th.glass1,border:`1px solid ${m.error?"#ff5d7a60":th.glassBorder}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:14}}>{m.error?"⚠":"🤖"}</div>
              <div className={m.error?"":"glass"} style={{maxWidth:"82%",padding:"10px 14px",background:m.error?"rgba(255,93,122,0.08)":undefined,color:m.error?"#ff5d7a":th.ink0,borderRadius:"14px 14px 14px 4px",fontSize:13.5,lineHeight:1.6,wordBreak:"break-word",border:m.error?"1px solid rgba(255,93,122,0.25)":undefined,whiteSpace:"pre-wrap"}}>{m.content}</div>
            </div>
          );
        })}
        {loading&&(
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:28,height:28,borderRadius:9,background:th.glass1,border:`1px solid ${th.glassBorder}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>🤖</div>

              思考中…
            </div>
          </div>
        )}
      </div>

      {/* 附件区 */}
      {attachedFiles.length>0&&(
        <div style={{display:"flex",flexWrap:"wrap",gap:6,padding:"8px 0"}}>
          {attachedFiles.map((f,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:6,padding:"5px 10px",background:th.glass1,borderRadius:8,fontSize:11,color:th.ink1,border:`1px solid ${th.glassBorder}`}}>
              📄 {f.name} <span style={{color:th.ink3}}>({(f.text.length/1000).toFixed(1)}k)</span>
              <button onClick={()=>setAttachedFiles(a=>a.filter((_,j)=>j!==i))} style={{padding:0,marginLeft:4,color:th.ink3}}>×</button>
            </div>
          ))}
        </div>
      )}

      {/* 输入区 */}
      <div className="glass" style={{padding:10,borderRadius:14,display:"flex",alignItems:"flex-end",gap:8,border:`1.5px solid ${th.glassBorder}`}}>
        <input ref={fileInputRef} type="file" multiple accept=".txt,.md,.csv,.json,.html,.js,.py,.docx,.xlsx,.xls,.log,.yaml,.yml,.xml" onChange={e=>onFilesPick(e.target.files)} style={{display:"none"}}/>
        <button onClick={()=>fileInputRef.current&&fileInputRef.current.click()} disabled={parsing||loading} title="上传文件" style={{width:34,height:34,borderRadius:9,background:th.glass2,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,opacity:(parsing||loading)?0.5:1}}>
          {parsing?<span className="spin">○</span>:<Ic n="paperclip" size={14} color={th.ink1}/>}
        </button>
        <textarea value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.isComposing||e.keyCode===229)return;if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMsg();}}} placeholder="问我什么…（Enter 发送，Shift+Enter 换行）" rows={1} style={{flex:1,background:"transparent",border:"none",outline:"none",fontSize:13.5,color:th.ink0,resize:"none",lineHeight:1.5,maxHeight:120,padding:"7px 4px",fontFamily:"inherit"}}/>
        <button onClick={()=>sendMsg()} disabled={loading||(!input.trim()&&attachedFiles.length===0)} style={{padding:"9px 14px",borderRadius:9,background:(loading||(!input.trim()&&attachedFiles.length===0))?th.glass2:`linear-gradient(135deg,${th.accent},${th.accent3})`,color:"#fff",fontSize:12,fontWeight:600,flexShrink:0,boxShadow:(loading||(!input.trim()&&attachedFiles.length===0))?"none":`0 4px 12px ${th.accent}50`,opacity:(loading||(!input.trim()&&attachedFiles.length===0))?0.5:1}}>
          {loading?<span className="spin">○</span>:"发送"}
        </button>
      </div>
      <div className="mono" style={{fontSize:9,color:th.ink3,letterSpacing:"0.04em",marginTop:6,textAlign:"center"}}>支持 .txt .md .csv .docx .xlsx 等 · 可创建/修改/删除任务</div>
    </div>
  );
}

const MOOD_OPTIONS=["😊","🙂","😐","😔","😫","🔥","✨","💪","🌱","☕","🌙","🎯"];

function JournalModal({th,today,todayJournal,saveJournal,onClose}){
  const[text,setText]=useState((todayJournal&&todayJournal.wish)||"");
  const[mood,setMood]=useState((todayJournal&&todayJournal.mood)||"");
  const inputRef=useRef(null);
  useEffect(()=>{
    if(inputRef.current)setTimeout(()=>inputRef.current.focus(),300);
  },[]);
  const submit=()=>{
    if(!text.trim())return;
    saveJournal(text,mood);
    onClose();
  };
  const dateLabel=(()=>{
    const d=new Date(today);
    const wd=["日","一","二","三","四","五","六"][d.getDay()];
    return`${d.getMonth()+1}月${d.getDate()}日 · 周${wd}`;
  })();
  const isEditing=!!(todayJournal&&todayJournal.wish);
  return(
    <div className="fadeIn modal-overlay" onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} className="slideUp glass-strong" style={{borderRadius:22,maxWidth:480,width:"100%",padding:"30px 28px 24px",position:"relative",overflow:"hidden"}}>
        {/* 装饰光斑 */}
        <div style={{position:"absolute",top:-60,right:-40,width:160,height:160,borderRadius:"50%",background:`radial-gradient(circle,${th.accent}40 0%,transparent 70%)`,filter:"blur(20px)",pointerEvents:"none"}}/>
        <div style={{position:"absolute",bottom:-50,left:-30,width:120,height:120,borderRadius:"50%",background:`radial-gradient(circle,${th.accent3}30 0%,transparent 70%)`,filter:"blur(20px)",pointerEvents:"none"}}/>
        
        <div style={{position:"relative"}}>
          <div className="mono" style={{fontSize:11,letterSpacing:"0.22em",color:th.ink3,marginBottom:6,fontWeight:600}}>{isEditing?"TODAY · 编辑":"NEW DAY · 一句话日记"}</div>
          <h2 className="display" style={{fontSize:30,color:th.ink0,letterSpacing:"-0.03em",lineHeight:1.05,marginBottom:6}}>
            {isEditing?"今日记录":<>新的<em style={{fontStyle:"italic"}} className="gradient-primary">一天</em></>}
          </h2>
          <div style={{fontSize:13,color:th.ink2,marginBottom:20}}>{dateLabel} · {isEditing?"补充或修改":"为今天写下一句最重要的话"}</div>

          {/* Mood 选择 */}
          <div style={{marginBottom:14}}>
            <div className="mono" style={{fontSize:10,color:th.ink3,letterSpacing:"0.16em",marginBottom:8,fontWeight:600}}>今日心情（可选）</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {MOOD_OPTIONS.map(m=>(
                <button key={m} onClick={()=>setMood(mood===m?"":m)} style={{width:38,height:38,borderRadius:10,border:`1.5px solid ${mood===m?th.accent:th.glassBorder}`,background:mood===m?th.accent+"25":th.glass2,fontSize:18,boxShadow:mood===m?`0 0 12px ${th.accent}80`:"none",transition:"all 0.15s",cursor:"pointer"}}>{m}</button>
              ))}
            </div>
          </div>

          {/* 输入框 */}
          <input
            ref={inputRef}
            value={text}
            onChange={e=>setText(e.target.value)}
            onKeyDown={e=>{if(e.isComposing||e.keyCode===229)return;if(e.key==="Enter"&&text.trim())submit();}}
            placeholder="今天最想做的事 / 一句感悟 / 状态记录…"
            maxLength={140}
            className="inp"
            style={{fontSize:15,padding:"14px 16px",marginBottom:8,fontWeight:500}}
          />
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
            <span className="mono" style={{fontSize:10,color:th.ink3}}>回车保存 · Esc 关闭</span>
            <span className="mono tnum" style={{fontSize:10,color:text.length>120?"#ff5d7a":th.ink3}}>{text.length}/140</span>
          </div>

          <div style={{display:"flex",gap:8}}>
            <button onClick={onClose} style={{padding:"11px 18px",borderRadius:11,background:th.glass2,color:th.ink2,fontSize:13,fontWeight:500}}>{isEditing?"取消":"以后再说"}</button>

          </div>
        </div>
      </div>
    </div>
  );
}

function CmdKPalette({th,setView,setShowCmdK,setShowTaskForm,startPomodoro,setShowSettings,setReviewSub}){
  const[q,setQ]=useState("");
  const[idx,setIdx]=useState(0);
  const onClose=()=>setShowCmdK(false);

  const groups=[
    {g:"ACTIONS",items:[
      {ic:"plus",t:"新建任务",sh:"⌘N",act:()=>{onClose();setShowTaskForm(true);}},
      {ic:"flame",t:"开始专注 · 番茄钟",sh:"",act:()=>{onClose();startPomodoro();}},
      {ic:"settings",t:"打开设置",sh:"",act:()=>{onClose();setShowSettings(true);}},

    {g:"VIEWS",items:[
      {ic:"target",t:"今日视图",sh:"G T",act:()=>{onClose();setView("today");}},
      {ic:"arrowRight",t:"明日视图",sh:"G M",act:()=>{onClose();setView("tomorrow");}},
      {ic:"calendar",t:"本周视图",sh:"G W",act:()=>{onClose();setView("week");}},
      {ic:"grid",t:"月视图",sh:"G M",act:()=>{onClose();setView("month");}},

      {ic:"list",t:"活动流",sh:"G A",act:()=>{onClose();setView("activity");}},
      {ic:"check",t:"近期完成",sh:"G C",act:()=>{onClose();setView("recent");}},
      {ic:"book",t:"一句日记",sh:"G J",act:()=>{onClose();setView("journal");}},
      {ic:"star",t:"复盘",sh:"G R",act:()=>{onClose();setView("review");}},
    ]},
    {g:"REVIEW",items:[
      {ic:"star",t:"今日复盘",sh:"",act:()=>{onClose();setView("review");setReviewSub("today");}},
      {ic:"chart",t:"本周复盘",sh:"",act:()=>{onClose();setView("review");setReviewSub("week");}},
      {ic:"flame",t:"习惯打卡",sh:"",act:()=>{onClose();setView("review");setReviewSub("habits");}},
      {ic:"layers",t:"热力图",sh:"",act:()=>{onClose();setView("review");setReviewSub("heatmap");}},
    ]},
  ];
  const flatVisible=groups.flatMap(g=>g.items.filter(it=>!q||it.t.toLowerCase().includes(q.toLowerCase())));
  useEffect(()=>{
    const h=(e)=>{
      if(e.key==="ArrowDown"){e.preventDefault();setIdx(i=>Math.min(i+1,flatVisible.length-1));}
      if(e.key==="ArrowUp"){e.preventDefault();setIdx(i=>Math.max(i-1,0));}
      if(e.key==="Enter"){e.preventDefault();const it=flatVisible[idx];if(it?.act)it.act();else onClose();}
    };
    window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);
  },[idx,flatVisible]);
  let running=0;
  return(
    <div onClick={onClose} className="fadeIn" style={{position:"fixed",inset:0,zIndex:500,background:"rgba(7,6,13,0.65)",backdropFilter:"blur(12px)",display:"flex",justifyContent:"center",alignItems:"flex-start",paddingTop:"12vh"}}>

          <kbd>esc</kbd>
        </div>
        <div className="slim-scroll" style={{flex:1,overflowY:"auto",padding:"8px 0"}}>
          {groups.map(g=>{
            const vis=g.items.filter(it=>!q||it.t.toLowerCase().includes(q.toLowerCase()));
            if(!vis.length)return null;
            return(
              <div key={g.g} style={{marginBottom:6}}>
                <div className="mono" style={{fontSize:11,letterSpacing:"0.2em",color:th.ink3,padding:"6px 20px 4px",fontWeight:600}}>{g.g}</div>
                {vis.map(it=>{
                  const my=running++;
                  const sel=my===idx;
                  return(
                    <button key={it.t} onClick={()=>it.act?it.act():onClose()} onMouseEnter={()=>setIdx(my)} style={{width:"100%",padding:"10px 20px",display:"flex",alignItems:"center",gap:12,textAlign:"left",background:sel?`linear-gradient(90deg,${th.accent}30,${th.accent}05)`:"transparent",borderLeft:sel?`2px solid ${th.accent}`:"2px solid transparent"}}>
                      <div style={{width:26,height:26,borderRadius:8,background:th.glass2,border:`1px solid ${th.glassBorder}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Ic n={it.ic} size={13} color={th.ink1}/></div>
                      <span style={{flex:1,fontSize:13,color:sel?th.ink0:th.ink1}}>{it.t}</span>
                      {it.sh&&<span className="mono" style={{fontSize:10,color:th.ink3}}>{it.sh}</span>}
                      {sel&&<Ic n="arrow_right" size={12} color={th.accent2}/>}
                    </button>
                  );
                })}
              </div>
            );
          })}
        </div>
        <div style={{padding:"8px 20px",borderTop:`1px solid ${th.glassBorder}`,display:"flex",alignItems:"center",gap:16,fontSize:10,color:th.ink3}}>
          <span className="mono"><kbd>↑↓</kbd> 选择</span>
          <span className="mono"><kbd>⏎</kbd> 执行</span>
          <div style={{flex:1}}/>
          <span className="mono">TIMELINEK · v2.0</span>
        </div>
      </div>
    </div>
  );
}

// ═══ POMODORO FULLSCREEN ═══
function PomodoroFullscreen({th,taskId,runningTask,tasks,nowMin,onClose,toggleTimer,toggleTask,setTasks,catOf}){
  // 优先按 id 查；否则用 runningTask
  const task=taskId?tasks.find(t=>t.id===taskId):(runningTask||tasks.find(t=>!t.done));
  // ⚠️ Hooks 必须在任何 return 之前调用，否则违反 Rules of Hooks
  const pomoEndedRef=useRef(false);
  const dur=Number(task?.duration)||25;
  const elapsed=task?.actualMin||0;
  const rem=Math.max(0,dur-elapsed);
  const isRunning=task&&runningTask&&runningTask.id===task.id;
  useEffect(()=>{
    if(rem<=0&&isRunning&&!pomoEndedRef.current){
      pomoEndedRef.current=true;
      window.__playSound&&window.__playSound("pomoEnd");
    }
    if(rem>0)pomoEndedRef.current=false;
  },[rem,isRunning]);
  // 之后才能 return null
  if(!task){onClose();return null;}
  const c=catOf(task.category);
  const remMin=Math.floor(rem),remSec=Math.floor((rem-remMin)*60);
  const pct=Math.min(elapsed/dur,1);

  const onReset=()=>{
    if(!confirm("重置当前番茄钟？已计时的时长会清零"))return;
    // 若正在跑，先停掉
    if(isRunning)toggleTimer(task.id);
    // 清零 actualMin
    setTasks(list=>list.map(t=>t.id===task.id?{...t,actualMin:0}:t));
  };
  const onComplete=()=>{
    // 若正在跑，先停
    if(isRunning)toggleTimer(task.id);
    if(!task.done)toggleTask(task.id);
    onClose();
  };
  const onPlayPause=()=>{
    if(!isRunning)window.__playSound&&window.__playSound("pomoStart");
    toggleTimer(task.id);
  };

  return(
    <div className="fadeIn" style={{position:"fixed",inset:0,background:"radial-gradient(ellipse at center,#2a1a4a 0%,#0a0818 80%)",color:"#fff",zIndex:700,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <ParticleField count={40}/>
      <div className="tl-aurora"><div className="orb oa" style={{left:"50%",top:"20%",transform:"translateX(-50%)",width:380,height:380,background:`radial-gradient(circle,${th.accent} 0%,transparent 65%)`}}/></div>

      <div style={{padding:"20px 28px 0",display:"flex",justifyContent:"space-between",alignItems:"center",position:"relative",zIndex:10}}>
        <button onClick={onClose} style={{width:38,height:38,borderRadius:"50%",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center"}} title="返回"><Ic n="chevLeft" size={16}/></button>
        <div className="mono" style={{fontSize:10,letterSpacing:"0.3em",color:"rgba(255,255,255,0.5)"}}>POMODORO · 专注</div>
        <button onClick={onClose} style={{width:38,height:38,borderRadius:"50%",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center"}} title="退出（不完成）"><Ic n="close" size={16}/></button>
      </div>

      <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"0 28px",position:"relative",zIndex:10}}>
        <div style={{position:"relative",width:300,height:300,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{position:"absolute",inset:0,borderRadius:"50%",border:"1px solid rgba(109,95,255,0.15)",animation:"ringPulse 4s ease-in-out infinite"}}/>
          <div style={{position:"absolute",inset:-20,borderRadius:"50%",border:"1px solid rgba(109,95,255,0.1)",animation:"ringPulse 4s ease-in-out infinite 0.8s"}}/>
          <div style={{position:"absolute",inset:-40,borderRadius:"50%",border:"1px solid rgba(109,95,255,0.06)",animation:"ringPulse 4s ease-in-out infinite 1.6s"}}/>
          <svg width={280} height={280} style={{transform:"rotate(-90deg)",position:"absolute"}}>
            <defs><linearGradient id="pomo-g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stopColor="#c4b5fd"/><stop offset="50%" stopColor="#6d5fff"/><stop offset="100%" stopColor="#ec4899"/></linearGradient></defs>
            <circle cx={140} cy={140} r={132} stroke="rgba(255,255,255,0.04)" strokeWidth={3} fill="none"/>
            <circle cx={140} cy={140} r={132} stroke="url(#pomo-g)" strokeWidth={3} fill="none" strokeLinecap="round" strokeDasharray={2*Math.PI*132} strokeDashoffset={2*Math.PI*132*(1-pct)} style={{filter:"drop-shadow(0 0 10px rgba(109,95,255,0.7))"}}/>
          </svg>
          <Blob3D size={200} hue={265} style={{position:"relative",animation:"breathe 4s ease-in-out infinite"}}/>
          <div style={{position:"absolute",display:"flex",flexDirection:"column",alignItems:"center",pointerEvents:"none"}}>
            <div className="mono" style={{fontSize:10,letterSpacing:"0.3em",color:"rgba(255,255,255,0.7)",marginBottom:4}}>{isRunning?"REMAINING":"DURATION"}</div>
            <div className="display tnum" style={{fontSize:72,lineHeight:1,letterSpacing:"-0.04em",color:"#fff",textShadow:"0 0 30px rgba(109,95,255,0.6)"}}>
              {String(remMin).padStart(2,"0")}:{String(remSec).padStart(2,"0")}
            </div>
            <div className="mono" style={{fontSize:12,letterSpacing:"0.18em",color:"rgba(255,255,255,0.5)",marginTop:6}}>/ {dur}:00</div>
          </div>

          <h1 className="display" style={{fontSize:26,lineHeight:1.2,letterSpacing:"-0.02em"}}>

          </h1>
        </div>
      </div>

      <div style={{padding:"0 28px 36px",position:"relative",zIndex:10}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:22}}>
          <button onClick={onReset} title="重置计时" style={{width:56,height:56,borderRadius:"50%",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
            <Ic n="repeat" size={20}/>
            <span style={{position:"absolute",bottom:-20,fontSize:10,color:"rgba(255,255,255,0.55)",letterSpacing:"0.08em",whiteSpace:"nowrap"}}>重置</span>
          </button>
          <button onClick={onPlayPause} style={{width:88,height:88,borderRadius:"50%",background:"linear-gradient(135deg,#6d5fff,#ec4899)",boxShadow:"0 10px 40px rgba(109,95,255,0.6),inset 0 2px 0 rgba(255,255,255,0.3)",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
            <Ic n={isRunning?"pause":"play"} size={28}/>
            <span style={{position:"absolute",bottom:-20,fontSize:10,color:"rgba(255,255,255,0.7)",letterSpacing:"0.08em",whiteSpace:"nowrap",fontWeight:500}}>{isRunning?"暂停":"开始"}</span>
          </button>
          <button onClick={onComplete} title="完成任务" style={{width:56,height:56,borderRadius:"50%",background:"linear-gradient(135deg,#10d9a3,#10a376)",border:"1px solid rgba(16,217,163,0.4)",boxShadow:"0 6px 20px rgba(16,217,163,0.4)",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
            <Ic n="check" size={22} sw={2.5}/>
            <span style={{position:"absolute",bottom:-20,fontSize:10,color:"rgba(255,255,255,0.55)",letterSpacing:"0.08em",whiteSpace:"nowrap"}}>完成</span>
          </button>
        </div>
      </div>
    </div>
  );
}

// ═══ TASKS VIEW (today / tomorrow / week) ═══
function TasksView(p){
  const{th,view,filtered,filter,setFilter,cats,quickTitle,setQuickTitle,quickAdd,setShowTaskForm,setShowTemplates,today,tasks,journals,setShowJournalModal,aiLoading,requestAiPlan,smartParseAndAdd,aiParseLoading}=p;
  // week 视图改用按天分组组件；today / tomorrow 走标准分组展示
  if(view==="week"){
    return<WeekGroupedView {...p}/>;
  }
  const{searchedTasks}=p;
  const tomorrow=addDays(today,1);
  // 视图范围：当前视图应该"看到"的所有任务（未按分类过滤，供 pill 计数 + 空态判断）
  // 基于 searchedTasks（搜索过滤后）
  const baseTasks=searchedTasks||tasks;
  let viewRange;
  if(view==="tomorrow"){
    viewRange=baseTasks.filter(t=>t.due===tomorrow);
  }else{
    viewRange=baseTasks.filter(t=>!t.due||t.due===today||(!t.done&&t.due<today));
  }
  // 实际展示列表：视图范围 + 分类过滤 + 排序
  let list=filter==="all"?viewRange:viewRange.filter(t=>t.category===filter);
  // 排序：未完成在前 + sortKey 大的在前
  list=[...list].sort((a,b)=>{
    if(a.done!==b.done)return a.done?1:-1;
    const sa=a.sortKey||0,sb=b.sortKey||0;
    if(sa!==sb)return sb-sa;
    const p={高:0,中:1,低:2};
    if(a.priority!==b.priority)return p[a.priority]-p[b.priority];
    return(a.timeStart||"99:99").localeCompare(b.timeStart||"99:99");
  });
  // 只显示该视图范围内有任务的分类
  const catsWithTasks=cats.filter(c=>viewRange.some(t=>t.category===c.id));

  const quickDueForView=view==="tomorrow"?tomorrow:today;

  return(
    <div className="fadeIn">
      {/* 今日日记条（仅 today 视图，已写显示内容，未写显示提示）*/}
      {view==="today"&&(()=>{
        const todayJ=journals&&journals.find(j=>j.date===today);

          return(
            <div onClick={()=>setShowJournalModal&&setShowJournalModal(true)} className="glass hover-lift" style={{padding:"12px 16px",borderRadius:13,marginBottom:14,display:"flex",alignItems:"center",gap:11,cursor:"pointer",borderLeft:`3px solid ${th.accent}`,background:`linear-gradient(90deg,${th.accent}10,transparent 60%)`}}>
              {todayJ.mood&&<span style={{fontSize:18}}>{todayJ.mood}</span>}
              <div style={{flex:1,minWidth:0}}>
                <div className="mono" style={{fontSize:9,letterSpacing:"0.16em",color:th.ink3,fontWeight:600,marginBottom:2}}>TODAY · 一句</div>
                <div style={{fontSize:13,color:th.ink1,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{todayJ.wish}</div>
              </div>
              <Ic n="edit" size={11} color={th.ink3}/>
            </div>
          );
        }
        // 未写则不显示（弹窗会自动出现）
        return null;
      })()}

      {/* Quick add */}
      <div className="glass hover-lift" style={{padding:"13px 16px",borderRadius:14,marginBottom:14,display:"flex",alignItems:"center",gap:10,border:`1px dashed ${th.glassBorder}`,background:th.glass1}}>
        <div style={{width:26,height:26,borderRadius:8,background:`linear-gradient(135deg,${th.accent},${th.accent3})`,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 0 10px ${th.accent}66`,flexShrink:0}}>
          <Ic n="plus" size={14} color="#fff" sw={2.2}/>
        </div>
        <input value={quickTitle} onChange={e=>setQuickTitle(e.target.value)} onKeyDown={e=>{if(e.isComposing||e.keyCode===229)return;if(e.key==="Enter"){if(e.shiftKey)smartParseAndAdd(quickTitle,quickDueForView);else quickAdd(quickDueForView);}}} placeholder={phAdd} style={{flex:1,background:"transparent",border:"none",outline:"none",fontSize:13,color:th.ink0}}/>
        {quickTitle.trim()&&(
          <>
            <button onClick={()=>smartParseAndAdd(quickTitle,quickDueForView)} disabled={aiParseLoading} title="AI 智能解析（Shift+Enter）" style={{padding:"6px 10px",background:aiParseLoading?th.glass2:`linear-gradient(135deg,${th.accent2},${th.accent})`,color:"#fff",borderRadius:9,fontSize:12,fontWeight:600,display:"flex",alignItems:"center",gap:4,cursor:aiParseLoading?"wait":"pointer"}}>
              {aiParseLoading?<span className="spin">○</span>:"✨"}

          </>
        )}
      </div>

      {/* Filter pills - 数字 = 当前视图范围内该分类的任务数（与下方列表保持一致）*/}
      <div style={{display:"flex",gap:6,overflowX:"auto",marginBottom:12,paddingBottom:4}} className="slim-scroll">
        <button onClick={()=>setFilter("all")} className={`view-tab ${filter==="all"?"active":""}`} style={{flexShrink:0}}>全部 · {viewRange.length}</button>
        {catsWithTasks.length>1&&catsWithTasks.map(c=>{

        <div style={{flex:1,minWidth:0}}/>
        {view==="today"&&(
          <button onClick={requestAiPlan} disabled={aiLoading} className="view-tab" style={{flexShrink:0,background:`linear-gradient(135deg,${th.accent}25,${th.accent3}25)`,color:th.accent2,border:`1px solid ${th.accent}60`,fontWeight:600,boxShadow:aiLoading?"none":`0 0 12px ${th.accent}40`,opacity:aiLoading?0.7:1,cursor:aiLoading?"wait":"pointer"}} title="AI 智能排期">
            {aiLoading?<><span className="spin" style={{display:"inline-block"}}>○</span> 思考中</>:<>✨ 智能排期</>}
          </button>
        )}
        <button onClick={()=>setShowTemplates(true)} className="view-tab" style={{flexShrink:0,background:th.accent+"15",color:th.accent2,border:`1px solid ${th.accent}40`}}>
          <Ic n="sparkles" size={11} color={th.accent2}/> 模板
        </button>
      </div>

      {/* Cards */}
      {list.length===0?(
        <EmptyState th={th} text={emptyText} icon="sparkles"/>
      ):(
        <TaskGroupedList list={list} {...p} allowDrag={view==="today"||view==="tomorrow"}/>
      )}
    </div>
  );
}

// ═══ WEEK GROUPED VIEW · 从上到下展示周一至周日全部事项 ═══
function WeekGroupedView(p){

          <div style={{display:"flex",alignItems:"baseline",gap:8}}>
            <span className="display tnum" style={{fontSize:22,color:th.ink0,letterSpacing:"-0.02em"}}>{doneN}<span style={{color:th.ink3,fontSize:14}}> / {totalN}</span></span>

          {quickTitle.trim()&&<button onClick={()=>quickAdd(today)} style={{padding:"4px 10px",background:`linear-gradient(135deg,${th.accent},${th.accent3})`,color:"#fff",borderRadius:7,fontSize:11,fontWeight:600}}>+</button>}
        </div>
      </div>

      {/* 分类筛选 */}
      {catsWithTasks.length>1&&(
        <div style={{display:"flex",gap:6,overflowX:"auto",marginBottom:14,paddingBottom:4}} className="slim-scroll">
          <button onClick={()=>setFilter("all")} className={`view-tab ${filter==="all"?"active":""}`} style={{flexShrink:0}}>全部 · {thisWeekTasks.length}</button>
          {catsWithTasks.map(c=>{
            const n=thisWeekTasks.filter(t=>t.category===c.id).length;
            if(n===0)return null;
            const act=filter===c.id;
            return<button key={c.id} onClick={()=>setFilter(c.id)} className={`view-tab ${act?"active":""}`} style={{flexShrink:0,background:act?c.color+"30":th.glass1,color:act?c.color:th.ink2,borderLeft:act?`2px solid ${c.color}`:"none"}}>
              <span style={{color:c.color}}>{c.glyph}</span> {c.name} · {n}

            <Ic n="sparkles" size={11} color={th.accent2}/> 模板

      {/* 7 天分组 */}
      <div style={{display:"flex",flexDirection:"column",gap:20}}>
        {days.map(date=>{

                </div>
              </div>
              {/* 任务 */}
              {dayTasks.length===0?null:(
                <div style={{display:"flex",flexDirection:"column",gap:7,paddingLeft:isToday?0:4}}>
                  {todo.map(t=><TaskCard key={t.id} task={t} th={th} {...p}/>)}

            </div>
          );
        })}

    </div>
  );

// ═══ TASK CARD ═══
function TaskCard({task:t,th,catOf,projOf,today,nowMin,poppingId,runningId,toggleTask,toggleTimer,removeTask,startEdit,expanded,setExpanded,updateProgress,selectedIds,toggleSelect,inSelectMode,reorderTask,tagsMap,allowDrag}){
  const c=catOf(t.category);
  const p=t.projectId?projOf(t.projectId):null;
  const overdue=isOverdue(t,today,nowMin,p?[p]:null);
  const isRunning=runningId===t.id;
  const popping=poppingId===t.id;
  const exp=expanded[t.id];
  const isSelected=selectedIds&&selectedIds.has(t.id);
  const taskTags=(t.tagIds||[]).map(tid=>tagsMap&&tagsMap[tid]).filter(Boolean);
  const[dragOver,setDragOver]=useState(null); // 'before' | 'after' | null
  const[isDragging,setIsDragging]=useState(false);
  // 长按检测
  const longPressTimer=useRef(null);
  const startLongPress=()=>{
    if(longPressTimer.current)clearTimeout(longPressTimer.current);
    longPressTimer.current=setTimeout(()=>{
      toggleSelect&&toggleSelect(t.id);
      if(navigator.vibrate)navigator.vibrate(15);
    },420);
  };
  const cancelLongPress=()=>{if(longPressTimer.current){clearTimeout(longPressTimer.current);longPressTimer.current=null;}};
  const onCardClick=(e)=>{
    if(inSelectMode){
      e.stopPropagation();
      toggleSelect&&toggleSelect(t.id);
      return;
    }
    if((e.metaKey||e.ctrlKey)&&toggleSelect){
      e.stopPropagation();
      toggleSelect(t.id);
      return;
    }
  };
  // 拖拽
  const onDragStart=(e)=>{
    if(!allowDrag||t.done)return;
    e.dataTransfer.setData("text/plain",String(t.id));
    e.dataTransfer.effectAllowed="move";
    setIsDragging(true);
  };
  const onDragOver=(e)=>{
    if(!allowDrag||t.done||isDragging)return;
    e.preventDefault();
    const rect=e.currentTarget.getBoundingClientRect();
    const before=(e.clientY-rect.top)<rect.height/2;
    setDragOver(before?"before":"after");
  };
  const onDragLeave=()=>setDragOver(null);
  const onDrop=(e)=>{
    if(!allowDrag||t.done)return;
    e.preventDefault();
    const srcId=Number(e.dataTransfer.getData("text/plain"));
    if(srcId&&srcId!==t.id&&reorderTask){
      reorderTask(srcId,t.id,dragOver==="before");
    }
    setDragOver(null);
  };
  const onDragEnd=()=>{setIsDragging(false);setDragOver(null);};
  return(
    <div draggable={allowDrag&&!t.done&&!inSelectMode} onDragStart={onDragStart} onDragOver={onDragOver} onDragLeave={onDragLeave} onDrop={onDrop} onDragEnd={onDragEnd} onClick={onCardClick} onTouchStart={startLongPress} onTouchEnd={cancelLongPress} onTouchMove={cancelLongPress} onMouseDown={e=>{if(e.button===0&&!inSelectMode)startLongPress();}} onMouseUp={cancelLongPress} onMouseLeave={cancelLongPress} className="task-card glass" style={{padding:"13px 16px",borderRadius:12,borderLeft:`3px solid ${isSelected?th.accent:t.done?"#10d9a3":overdue?"#ff5d7a":c.color}`,borderTop:dragOver==="before"?`2px solid ${th.accent}`:undefined,borderBottom:dragOver==="after"?`2px solid ${th.accent}`:undefined,boxShadow:isSelected?`0 0 0 2px ${th.accent},0 8px 22px ${th.accent}40`:isRunning?`0 8px 24px ${c.color}40,0 0 0 1px ${c.color}40`:undefined,opacity:isDragging?0.4:t.done?0.65:1,cursor:inSelectMode?"pointer":(allowDrag&&!t.done?"grab":"default"),userSelect:"none",transition:"box-shadow 0.15s,opacity 0.15s,border-color 0.1s"}}>
      <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
        <button onClick={e=>{e.stopPropagation();if(inSelectMode){toggleSelect(t.id);}else{toggleTask(t.id);}}} className={popping?"checkAnim":""} style={{flexShrink:0,marginTop:2,width:20,height:20,borderRadius:6,background:isSelected?th.accent:t.done?`linear-gradient(135deg,${c.color},${c.color}aa)`:"transparent",border:isSelected?"none":t.done?"none":`1.5px solid ${th.glassBorderStrong}`,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:isSelected?`0 0 8px ${th.accent}aa`:t.done?`0 0 8px ${c.color}60`:"none"}}>
          {isSelected?<Ic n="check" size={12} color="#fff" sw={2.5}/>:t.done&&<Ic n="check" size={12} color="#fff" sw={2.5}/>}
        </button>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:4}}>
            <span className="mono" style={{fontSize:9,letterSpacing:"0.1em",color:c.color,fontWeight:600}}>{c.glyph} {c.name}</span>
            <span style={{width:3,height:3,borderRadius:"50%",background:PCOLOR[t.priority]}}/>
            <span className="mono" style={{fontSize:9,color:th.ink3}}>{t.priority}</span>
            {p&&<span className="mono" style={{fontSize:9,padding:"2px 6px",borderRadius:6,background:p.color+"20",color:p.color,border:`1px solid ${p.color}40`}}>{p.glyph} {p.name}</span>}
            {taskTags.map(tg=><span key={tg.id} className="mono" style={{fontSize:9,padding:"2px 6px",borderRadius:6,background:tg.color+"20",color:tg.color,border:`1px solid ${tg.color}40`}}>#{tg.name}</span>)}
            {t.repeat&&<Ic n="repeat" size={10} color={th.ink3}/>}
            {t.timeStart&&<span className="mono tnum" style={{fontSize:10,color:overdue?"#ff5d7a":th.ink3,fontWeight:overdue?600:400}}>{t.timeStart}{t.timeEnd?`–${t.timeEnd}`:""}</span>}
            {overdue&&<span className="mono" style={{fontSize:9,color:"#ff5d7a",padding:"1px 6px",borderRadius:5,background:"rgba(255,93,122,0.15)",fontWeight:600}}>逾期</span>}
            {t.due&&t.due!==today&&<span className="mono" style={{fontSize:9,color:th.ink3}}>{t.due.slice(5).replace("-","/")}</span>}
          </div>
          <div style={{fontSize:14,fontWeight:500,color:th.ink0,lineHeight:1.4,textDecoration:t.done?"line-through":"none",cursor:t.content?"pointer":"default"}} onClick={()=>t.content&&setExpanded({...expanded,[t.id]:!exp})}>
            {t.title}
            {t.content&&<span style={{marginLeft:6,color:th.ink3,fontSize:10,verticalAlign:"middle"}}><Ic n={exp?"chevUp":"chevDown"} size={11} color={th.ink3}/></span>}
          </div>
          {t.content&&exp&&<div className="fadeIn" style={{fontSize:12,color:th.ink2,marginTop:6,lineHeight:1.65,whiteSpace:"pre-wrap"}}>{t.content}</div>}

          {/* Progress bar */}
          {!t.done&&(t.progress>0||t.duration)&&(
            <div style={{marginTop:6,display:"flex",alignItems:"center",gap:10}}>
              <div style={{flex:1,padding:"7px 0",cursor:"pointer"}} onClick={e=>{const bar=e.currentTarget.querySelector(".prog-bar");const rect=bar.getBoundingClientRect();const p=(e.clientX-rect.left)/rect.width;updateProgress(t.id,Math.max(0,Math.min(1,p)));}} title="点击调整进度">
                <div className="prog-bar" style={{height:5,borderRadius:3,background:th.glass2,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${(t.progress||0)*100}%`,background:`linear-gradient(90deg,${c.color},${c.color}aa)`,boxShadow:`0 0 6px ${c.color}`,transition:"width 0.3s var(--ease)"}}/>
                </div>
              </div>
              <span className="mono tnum" style={{fontSize:10,color:th.ink3,minWidth:30,textAlign:"right"}}>{Math.round((t.progress||0)*100)}%</span>
            </div>
          )}

          {(t.duration||t.actualMin>0)&&(
            <div style={{marginTop:8,display:"flex",alignItems:"center",gap:8,fontSize:11,color:th.ink3}}>
              {t.duration&&<span className="mono">预计 {t.duration}m</span>}
              {t.actualMin>0&&<span className="mono tnum" style={{color:isRunning?th.accent3:th.ink3,fontWeight:isRunning?600:400}}>{isRunning&&"● "}已用 {fmtMin(t.actualMin)}</span>}
            </div>
          )}
        </div>
        <div className="task-actions" style={{display:"flex",gap:4,flexShrink:0}}>
          {!t.done&&<button onClick={()=>toggleTimer(t.id)} title={isRunning?"暂停":"开始计时"} style={{width:30,height:30,borderRadius:8,background:isRunning?th.accent3+"20":th.glass2,display:"flex",alignItems:"center",justifyContent:"center",color:isRunning?th.accent3:th.ink2}}><Ic n={isRunning?"pause":"play"} size={12} color={isRunning?th.accent3:th.ink2}/></button>}
          <button onClick={()=>startEdit(t)} title="编辑" style={{width:30,height:30,borderRadius:8,background:th.glass2,display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="edit" size={12} color={th.ink2}/></button>
          <button onClick={()=>removeTask(t.id)} title="删除" style={{width:30,height:30,borderRadius:8,background:th.glass2,display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="trash" size={12} color={th.ink2}/></button>
        </div>
      </div>
    </div>
  );
}

// ═══ TASK FORM ═══
function TaskForm({th,cats,projects,tags,addTag,taskForm,setTaskForm,addOrEditTask,cancelForm,editTaskId,today}){
  const ok=taskForm.title.trim();
  const setF=(k,v)=>setTaskForm({...taskForm,[k]:v});
  const dur=calcMin(taskForm.timeStart,taskForm.timeEnd);
  const[catOpen,setCatOpen]=useState(false);
  const[newTagText,setNewTagText]=useState("");
  const selectedTagIds=taskForm.tagIds||[];
  const toggleTaskTag=(id)=>{
    const cur=selectedTagIds;
    setF("tagIds",cur.includes(id)?cur.filter(x=>x!==id):[...cur,id]);
  };
  const handleAddTag=()=>{
    const newTag=addTag&&addTag(newTagText,TAG_COLORS[(tags||[]).length%TAG_COLORS.length]);
    if(newTag){
      setF("tagIds",[...selectedTagIds,newTag.id]);
      setNewTagText("");
    }
  };
  const curCat=cats.find(c=>c.id===taskForm.category)||cats[0];
  return(
    <div className="fadeIn modal-overlay" onClick={cancelForm}>
      <div onClick={e=>e.stopPropagation()} className="slideUp glass-strong" style={{borderRadius:20,maxWidth:560,width:"100%",padding:26,maxHeight:"90vh",overflow:"auto"}} >
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
          <div>
            <div className="mono" style={{fontSize:12,letterSpacing:"0.18em",color:th.ink3,marginBottom:4,fontWeight:600}}>{editTaskId?"EDIT":"NEW TASK"}</div>
            <h2 className="display" style={{fontSize:24,color:th.ink0,letterSpacing:"-0.02em"}}>{editTaskId?"编辑任务":"新建任务"}</h2>
          </div>
          <button onClick={cancelForm} style={{width:34,height:34,borderRadius:10,background:th.glass2,display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="close" size={14} color={th.ink2}/></button>
        </div>
        <input value={taskForm.title} onChange={e=>setF("title",e.target.value)} onKeyDown={e=>{if(e.isComposing||e.keyCode===229)return;if(e.key==="Enter"&&!e.shiftKey&&ok){e.preventDefault();addOrEditTask();}}} placeholder="任务标题…" autoFocus={typeof window!=="undefined"&&window.innerWidth>=900} className="inp" style={{marginBottom:11,fontSize:15,fontWeight:500}}/>
        <textarea value={taskForm.content||""} onChange={e=>setF("content",e.target.value)} placeholder="备注（可选）" rows={2} className="inp" style={{marginBottom:14,resize:"vertical",fontFamily:"inherit"}}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:12}}>
          <div style={{position:"relative"}}>
            <label className="mono" style={{display:"block",fontSize:10,color:th.ink3,marginBottom:5,letterSpacing:"0.15em"}}>分类</label>
            <button type="button" onClick={()=>setCatOpen(o=>!o)} className="inp" style={{padding:"10px 12px",paddingRight:28,textAlign:"left",display:"flex",alignItems:"center",gap:8,width:"100%",cursor:"pointer",position:"relative"}}>
              <span style={{color:curCat.color,fontSize:13}}>{curCat.glyph}</span>
              <span style={{color:th.ink0,flex:1,fontSize:13}}>{curCat.name}</span>
              <span style={{position:"absolute",right:10,top:"50%",transform:`translateY(-50%) rotate(${catOpen?180:0}deg)`,transition:"transform 0.15s",color:th.ink3}}><Ic n="chevDown" size={12} color={th.ink3}/></span>
            </button>
            {catOpen&&(
              <>
                <div onClick={()=>setCatOpen(false)} style={{position:"fixed",inset:0,zIndex:1}}/>
                <div className="slideDown glass-strong" style={{position:"absolute",top:"100%",left:0,right:0,marginTop:4,borderRadius:11,overflow:"hidden",zIndex:10,border:`1px solid ${th.glassBorder}`,boxShadow:`0 12px 28px rgba(0,0,0,0.25)`}}>
                  {cats.map(c=>{
                    const sel=c.id===taskForm.category;
                    return(
                      <button key={c.id} type="button" onClick={()=>{setF("category",c.id);setCatOpen(false);}} style={{padding:"10px 12px",textAlign:"left",display:"flex",alignItems:"center",gap:8,width:"100%",background:sel?c.color+"20":"transparent",color:th.ink0,fontSize:13,cursor:"pointer",borderLeft:sel?`2px solid ${c.color}`:"2px solid transparent"}} onMouseEnter={e=>{if(!sel)e.currentTarget.style.background=th.glass2;}} onMouseLeave={e=>{if(!sel)e.currentTarget.style.background="transparent";}}>
                        <span style={{color:c.color,fontSize:13,width:14,textAlign:"center"}}>{c.glyph}</span>
                        <span style={{flex:1}}>{c.name}</span>
                        {sel&&<Ic n="check" size={11} color={c.color} sw={2.5}/>}
                      </button>
                    );
                  })}
                </div>
              </>
            )}
          </div>
          <div>
            <label className="mono" style={{display:"block",fontSize:10,color:th.ink3,marginBottom:5,letterSpacing:"0.15em"}}>优先级</label>
            <select value={taskForm.priority} onChange={e=>setF("priority",e.target.value)} className="inp" style={{padding:"10px 12px",backgroundImage:`url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='${encodeURIComponent(th.ink3)}' stroke-width='2'><polyline points='6 9 12 15 18 9'/></svg>")`,backgroundRepeat:"no-repeat",backgroundPosition:"right 10px center",backgroundSize:"12px",paddingRight:28}}>
              {PRIORITIES.map(p=><option key={p} value={p} style={{background:th.bg1,color:th.ink0}}>{p} · {p==="高"?"重要紧急":p==="中"?"常规":"空闲"}</option>)}
            </select>
          </div>
          <div>
            <label className="mono" style={{display:"block",fontSize:10,color:th.ink3,marginBottom:5,letterSpacing:"0.15em"}}>日期</label>
            <input type="date" value={taskForm.due||""} onChange={e=>setF("due",e.target.value)} className="inp" style={{padding:"10px 12px",colorScheme:th.isDark?"dark":"light"}}/>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:12}}>
          <div>
            <label className="mono" style={{display:"block",fontSize:10,color:th.ink3,marginBottom:5,letterSpacing:"0.15em"}}>开始</label>
            <input type="time" value={taskForm.timeStart||""} onChange={e=>setF("timeStart",e.target.value)} className="inp" style={{padding:"10px 12px",colorScheme:th.isDark?"dark":"light"}}/>
          </div>
          <div>
            <label className="mono" style={{display:"block",fontSize:10,color:th.ink3,marginBottom:5,letterSpacing:"0.15em"}}>结束</label>
            <input type="time" value={taskForm.timeEnd||""} onChange={e=>setF("timeEnd",e.target.value)} className="inp" style={{padding:"10px 12px",colorScheme:th.isDark?"dark":"light"}}/>
          </div>
          <div>
            <label className="mono" style={{display:"block",fontSize:10,color:th.ink3,marginBottom:5,letterSpacing:"0.15em"}}>时长 (分)</label>
            <input type="number" value={taskForm.duration} onChange={e=>setF("duration",e.target.value)} placeholder={dur?`自动 ${dur}`:"25"} className="inp" style={{padding:"10px 12px"}}/>
          </div>
        </div>
        {projects.length>0&&(
          <div style={{marginBottom:12}}>
            <label className="mono" style={{display:"block",fontSize:10,color:th.ink3,marginBottom:5,letterSpacing:"0.15em"}}>项目</label>
            <select value={taskForm.projectId||""} onChange={e=>setF("projectId",e.target.value)} className="inp" style={{padding:"10px 12px",backgroundImage:`url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='${encodeURIComponent(th.ink3)}' stroke-width='2'><polyline points='6 9 12 15 18 9'/></svg>")`,backgroundRepeat:"no-repeat",backgroundPosition:"right 10px center",backgroundSize:"12px",paddingRight:28}}>
              <option value="" style={{background:th.bg1,color:th.ink0}}>无项目</option>
              {projects.map(p=><option key={p.id} value={p.id} style={{background:th.bg1,color:th.ink0}}>{p.glyph} {p.name}</option>)}
            </select>
          </div>
        )}
        {/* 标签选择 */}
        <div style={{marginBottom:14}}>
          <label className="mono" style={{display:"block",fontSize:10,color:th.ink3,marginBottom:6,letterSpacing:"0.15em"}}>标签 {selectedTagIds.length>0&&<span style={{color:th.accent}}>· 已选 {selectedTagIds.length}</span>}</label>
          {/* 智能推荐区：基于标题关键词匹配 */}
          {(()=>{
            const title=(taskForm.title||"").toLowerCase();
            if(!title.trim())return null;
            const recommendations=[];
            // 推荐标签：标签名出现在标题里
            (tags||[]).forEach(tg=>{
              if(selectedTagIds.includes(tg.id))return;
              const tagName=tg.name.toLowerCase();
              if(tagName.length<2)return;
              if(title.includes(tagName)){
                recommendations.push({type:"tag",tag:tg});
              }
            });
            // 推荐项目：项目名出现在标题里
            (projects||[]).forEach(p=>{
              if(taskForm.projectId===p.id)return;
              const pName=p.name.toLowerCase();
              if(pName.length<2)return;
              if(title.includes(pName)){
                recommendations.push({type:"project",project:p});
              }
            });
            if(recommendations.length===0)return null;
            return(
              <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:8,padding:"7px 10px",background:`linear-gradient(135deg,${th.accent}10,${th.accent3}08)`,borderRadius:9,border:`1px dashed ${th.accent}50`}}>
                <span style={{fontSize:10,color:th.accent2,fontWeight:600,letterSpacing:"0.04em",alignSelf:"center",marginRight:4}}>✨ 推荐：</span>
                {recommendations.map((r,i)=>{
                  if(r.type==="tag"){
                    return<button key={"tg"+r.tag.id} type="button" onClick={()=>toggleTaskTag(r.tag.id)} style={{padding:"4px 9px",borderRadius:6,fontSize:11,fontWeight:500,background:r.tag.color+"30",color:r.tag.color,border:`1px solid ${r.tag.color}60`,display:"flex",alignItems:"center",gap:3}}>
                      <span style={{fontSize:9}}>+</span> #{r.tag.name}
                    </button>;
                  }
                  return<button key={"pj"+r.project.id} type="button" onClick={()=>setF("projectId",r.project.id)} style={{padding:"4px 9px",borderRadius:6,fontSize:11,fontWeight:500,background:r.project.color+"30",color:r.project.color,border:`1px solid ${r.project.color}60`,display:"flex",alignItems:"center",gap:3}}>
                    <span style={{fontSize:9}}>+</span> {r.project.glyph} {r.project.name}
                  </button>;
                })}
              </div>
            );
          })()}
          <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:8}}>
            {(tags||[]).map(tg=>{
              const sel=selectedTagIds.includes(tg.id);
              return(
                <button key={tg.id} type="button" onClick={()=>toggleTaskTag(tg.id)} style={{padding:"5px 10px",borderRadius:7,fontSize:11,fontWeight:500,background:sel?tg.color+"35":th.glass1,color:sel?tg.color:th.ink2,border:`1px solid ${sel?tg.color+"80":th.glassBorder}`,boxShadow:sel?`0 0 8px ${tg.color}40`:"none"}}>
                  #{tg.name}
                </button>
              );
            })}
            {(!tags||tags.length===0)&&<span style={{fontSize:11,color:th.ink3,padding:"5px 4px"}}>暂无标签 · 在下方创建</span>}
          </div>
          <div style={{display:"flex",gap:6}}>
            <input value={newTagText} onChange={e=>setNewTagText(e.target.value)} onKeyDown={e=>{if(e.isComposing||e.keyCode===229)return;if(e.key==="Enter"){e.preventDefault();handleAddTag();}}} placeholder="新建标签…" className="inp" style={{padding:"7px 11px",fontSize:12,flex:1}}/>
            <button type="button" onClick={handleAddTag} disabled={!newTagText.trim()} style={{padding:"7px 14px",borderRadius:9,background:newTagText.trim()?`linear-gradient(135deg,${th.accent},${th.accent3})`:th.glass2,color:newTagText.trim()?"#fff":th.ink3,fontSize:12,fontWeight:600,opacity:newTagText.trim()?1:0.5}}>+ 添加</button>
          </div>
        </div>
        <label className="glass" style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",borderRadius:11,cursor:"pointer",marginBottom:16}}>
          <div onClick={e=>{e.preventDefault();setF("repeat",!taskForm.repeat);}} className="switch" style={{background:taskForm.repeat?`linear-gradient(135deg,${th.accent},${th.accent3})`:th.glass3}}>
            <div className="switch-dot" style={{left:taskForm.repeat?21:3}}/>
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:13,color:th.ink0,fontWeight:500}}>每日重复</div>
            <div style={{fontSize:11,color:th.ink3,marginTop:2}}>每天自动重置完成状态</div>
          </div>
        </label>
        <div style={{display:"flex",gap:10}}>
          <button onClick={cancelForm} className="glass" style={{flex:1,padding:14,borderRadius:12,fontSize:14,color:th.ink2,fontWeight:500}}>取消</button>
          <button onClick={addOrEditTask} disabled={!ok} style={{flex:2,padding:14,background:ok?`linear-gradient(135deg,${th.accent},${th.accent3})`:th.glass2,color:ok?"#fff":th.ink3,borderRadius:12,fontSize:14,fontWeight:600,letterSpacing:"0.04em",boxShadow:ok?`0 8px 24px ${th.accent}66`:"none"}}>{editTaskId?"保 存":"创 建"}</button>
        </div>
      </div>
    </div>
  );
}

// ═══ KANBAN VIEW ═══
function KanbanView({th,tasks:allTasks,searchedTasks,catOf,today,nowMin,toggleTask,startEdit,removeTask,updateProgress}){
  const tasks=searchedTasks||allTasks;
  // 推导列：backlog(无日期且未完成) / today(今日) / doing(progress>0 或正在跑) / review(progress>=0.8未完成) / done(已完成)
  const cols=[
    {id:"backlog",title:"待办",color:"#a8a2c4",match:t=>!t.done&&(!t.due||t.due>today)&&(t.progress||0)<0.1},
    {id:"today",title:"今日",color:"#6d5fff",match:t=>!t.done&&t.due===today&&(t.progress||0)<0.1},
    {id:"doing",title:"进行中",color:"#ec4899",match:t=>!t.done&&(t.progress||0)>=0.1&&(t.progress||0)<0.8},
    {id:"review",title:"待复盘",color:"#f5a524",match:t=>!t.done&&(t.progress||0)>=0.8},
    {id:"done",title:"已完成",color:"#10d9a3",match:t=>t.done},
  ];
  const grouped=cols.map(col=>({...col,cards:tasks.filter(col.match).sort((a,b)=>{const p={高:0,中:1,低:2};return p[a.priority]-p[b.priority];})}));

  return(
    <div className="fadeIn" style={{margin:"-8px -12px 0"}}>
      <div style={{padding:"8px 12px 12px",display:"flex",alignItems:"flex-end",justifyContent:"space-between",marginBottom:14}}>
        <div>
          <div className="mono" style={{fontSize:11,letterSpacing:"0.22em",color:th.ink3,marginBottom:6,fontWeight:600}}>KANBAN · {tasks.length} TASKS</div>
          <h1 className="display" style={{fontSize:38,color:th.ink0,letterSpacing:"-0.03em",lineHeight:1}}>
            <em style={{fontStyle:"italic"}} className="gradient-primary">Kanban</em> · 工作流
          </h1>
        </div>
      </div>

      <div className="slim-scroll" style={{overflowX:"auto",paddingBottom:20,padding:"0 12px 20px"}}>
        <div style={{display:"flex",gap:12,minWidth:"max-content"}}>
          {grouped.map(col=>(
            <div key={col.id} style={{width:260,flexShrink:0,display:"flex",flexDirection:"column"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,padding:"0 4px 12px"}}>
                <span style={{width:8,height:8,borderRadius:"50%",background:col.color,boxShadow:`0 0 6px ${col.color}`}}/>
                <span className="mono" style={{fontSize:11,letterSpacing:"0.18em",color:th.ink0,fontWeight:700}}>{col.title.toUpperCase()}</span>
                <span className="mono tnum" style={{fontSize:10,color:th.ink3,marginLeft:"auto",padding:"2px 7px",borderRadius:10,background:th.glass2}}>{col.cards.length}</span>
              </div>
              <div className="slim-scroll" style={{flex:1,display:"flex",flexDirection:"column",gap:8,paddingBottom:6,minHeight:100}}>
                {col.cards.map(card=>{
                  const c=catOf(card.category);
                  return(
                    <div key={card.id} className="glass task-card" style={{padding:12,borderRadius:12,borderLeft:`3px solid ${card.done?"#10d9a3":c.color}`,boxShadow:`0 4px 10px rgba(0,0,0,0.2)`,opacity:card.done?0.6:1}}>
                      <div style={{display:"flex",alignItems:"flex-start",gap:8,marginBottom:8}}>
                        <button onClick={e=>{e.stopPropagation();toggleTask(card.id);}} style={{flexShrink:0,marginTop:1,width:18,height:18,borderRadius:5,background:card.done?`linear-gradient(135deg,${c.color},${c.color}aa)`:"transparent",border:card.done?"none":`1.5px solid ${th.glassBorderStrong}`,display:"flex",alignItems:"center",justifyContent:"center"}}>
                          {card.done&&<Ic n="check" size={11} color="#fff" sw={2.5}/>}
                        </button>
                        <div style={{flex:1,minWidth:0,cursor:"pointer"}} onClick={()=>startEdit(card)}>
                          <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:3}}>
                            <span className="mono" style={{fontSize:10,letterSpacing:"0.08em",color:c.color,fontWeight:600}}>{c.glyph} {c.name}</span>
                            <span style={{width:3,height:3,borderRadius:"50%",background:PCOLOR[card.priority]}}/>
                            <span className="mono" style={{fontSize:10,color:th.ink3}}>{card.priority}</span>
                          </div>
                          <div style={{fontSize:12,color:card.done?th.ink3:th.ink0,fontWeight:500,lineHeight:1.4,textDecoration:card.done?"line-through":"none"}}>{card.title}</div>
                        </div>
                      </div>
                      {(card.progress||0)>0&&!card.done&&(
                        <div style={{marginLeft:26,height:4,borderRadius:2,background:th.glass2,overflow:"hidden"}}>

                      )}
                      <div style={{display:"flex",alignItems:"center",gap:6,marginTop:8,paddingTop:8,borderTop:`1px solid ${th.glassBorder}`,marginLeft:26}}>
                        {card.duration&&<span className="mono tnum" style={{fontSize:10,color:th.ink2,display:"flex",alignItems:"center",gap:3}}><Ic n="timer" size={10}/> {card.duration}m</span>}
                        {card.timeStart&&<span className="mono tnum" style={{fontSize:10,color:th.ink3}}>{card.timeStart}</span>}
                        {card.due&&<span className="mono tnum" style={{fontSize:10,color:th.ink3}}>{card.due.slice(5).replace("-","/")}</span>}
                        <div style={{flex:1}}/>
                        <button onClick={e=>{e.stopPropagation();startEdit(card);}} style={{width:22,height:22,borderRadius:6,background:th.glass2,display:"flex",alignItems:"center",justifyContent:"center"}} title="编辑"><Ic n="edit" size={10} color={th.ink2}/></button>
                        <button onClick={e=>{e.stopPropagation();if(confirm("删除此任务？"))removeTask(card.id);}} style={{width:22,height:22,borderRadius:6,background:th.glass2,display:"flex",alignItems:"center",justifyContent:"center"}} title="删除"><Ic n="trash" size={10} color={th.ink2}/></button>
                      </div>
                    </div>
                  );
                })}
                {col.cards.length===0&&<div style={{fontSize:11,color:th.ink3,textAlign:"center",padding:"20px 0",opacity:0.5}}>暂无</div>}
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ═══ MONTH VIEW ═══
function MonthView({th,tasks:allTasks,searchedTasks,today,setView,startEdit,catOf,toggleTask,removeTask,setTaskForm,setShowTaskForm}){
  const tasks=searchedTasks||allTasks;
  const[viewMonth,setViewMonth]=useState(()=>today.slice(0,7));
  const[detailDate,setDetailDate]=useState(null);
  const[year,month]=viewMonth.split("-").map(Number);
  const first=new Date(year,month-1,1);
  const daysInMonth=new Date(year,month,0).getDate();
  const startOffset=(first.getDay()+6)%7; // 周一开始
  const cells=[];
  for(let i=0;i<startOffset;i++)cells.push(null);
  for(let d=1;d<=daysInMonth;d++)cells.push(d);
  while(cells.length%7!==0)cells.push(null);
  while(cells.length<35)cells.push(null);

  const tasksByDate=useMemo(()=>{
    const m={};
    tasks.forEach(t=>{if(t.due){m[t.due]=(m[t.due]||[]).concat(t);}});
    return m;
  },[tasks]);

  const monthStart=`${year}-${String(month).padStart(2,"0")}-01`;
  const monthEnd=`${year}-${String(month).padStart(2,"0")}-${String(daysInMonth).padStart(2,"0")}`;
  const monthTasks=tasks.filter(t=>t.due&&t.due>=monthStart&&t.due<=monthEnd);
  const doneN=monthTasks.filter(t=>t.done).length;
  const totalDur=monthTasks.reduce((s,t)=>s+(t.actualMin||0),0);

  const prev=()=>{const d=new Date(year,month-2,1);setViewMonth(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`);};
  const next=()=>{const d=new Date(year,month,1);setViewMonth(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`);};

  return(
    <div className="fadeIn">
      <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",marginBottom:18}}>
        <div>
          <div className="mono" style={{fontSize:11,letterSpacing:"0.22em",color:th.ink3,marginBottom:6,fontWeight:600}}>{year} · {month<=3?"Q1":month<=6?"Q2":month<=9?"Q3":"Q4"}</div>
          <h1 className="display" style={{fontSize:48,color:th.ink0,lineHeight:0.95,letterSpacing:"-0.04em"}}>
            <em style={{fontStyle:"italic"}} className="gradient-primary">{["一月","二月","三月","四月","五月","六月","七月","八月","九月","十月","十一月","十二月"][month-1]}</em>
          </h1>
        </div>
        <div style={{display:"flex",gap:6}}>
          <button onClick={prev} className="glass" style={{width:36,height:36,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="chevLeft" size={14} color={th.ink2}/></button>
          <button onClick={()=>setViewMonth(today.slice(0,7))} className="glass" style={{padding:"0 12px",borderRadius:10,fontSize:12,color:th.ink1}}>本月</button>
          <button onClick={next} className="glass" style={{width:36,height:36,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="chevRight" size={14} color={th.ink2}/></button>
        </div>
      </div>

      {/* Month stats */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:14}}>
        {[["完成任务",doneN,th.accent],["总任务",monthTasks.length,th.accent2],["专注时长",fmtMin(totalDur)||"0",th.accent3],["完成率",monthTasks.length?Math.round(doneN/monthTasks.length*100)+"%":"0%","#10d9a3"]].map(([l,v,c],i)=>(
          <div key={i} className="glass" style={{padding:"11px 14px",borderRadius:11,borderLeft:`2px solid ${c}`}}>
            <div className="mono" style={{fontSize:9,letterSpacing:"0.16em",color:th.ink3,fontWeight:600}}>{l}</div>
            <div className="display tnum" style={{fontSize:22,color:th.ink0,marginTop:2,letterSpacing:"-0.02em"}}>{v}</div>
          </div>
        ))}
      </div>

      {/* Calendar grid */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:6}}>
        {["一","二","三","四","五","六","日"].map(w=>(
          <div key={w} className="mono" style={{textAlign:"center",fontSize:12,letterSpacing:"0.18em",color:th.ink3,padding:"4px 0",fontWeight:600}}>{w}</div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
        {cells.map((d,i)=>{
          if(!d)return<div key={i} style={{background:th.glass1,borderRadius:8,minHeight:78}}/>;
          const dateStr=`${year}-${String(month).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
          const dayTasks=tasksByDate[dateStr]||[];
          const isToday=dateStr===today;
          const density=dayTasks.length;
          return(
            <div key={i} onClick={()=>setDetailDate(dateStr)} style={{padding:8,borderRadius:10,minHeight:78,background:isToday?`linear-gradient(135deg,${th.accent3}40,${th.accent}25)`:density>3?th.accent+"18":density>1?th.accent+"0c":th.glass1,border:isToday?`1.5px solid ${th.accent3}99`:`1px solid ${th.glassBorder}`,boxShadow:isToday?`0 0 20px ${th.accent3}40`:density>3?`0 0 8px ${th.accent}33`:"none",display:"flex",flexDirection:"column",gap:3,cursor:"pointer",position:"relative",overflow:"hidden"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <span className="display tnum" style={{fontSize:15,color:isToday?th.ink0:th.ink1,fontWeight:isToday?700:500}}>{d}</span>
                {isToday&&<span style={{width:5,height:5,borderRadius:"50%",background:th.accent3,boxShadow:`0 0 6px ${th.accent3}`}}/>}
              </div>
              {dayTasks.slice(0,2).map((t,j)=>(
                <div key={j} style={{background:th.accent+"40",color:th.ink0,padding:"1px 5px",borderRadius:3,fontSize:9,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",opacity:t.done?0.5:1,textDecoration:t.done?"line-through":"none"}}>{t.title}</div>
              ))}
              {dayTasks.length>2&&<div className="mono" style={{fontSize:9,color:th.ink3}}>+{dayTasks.length-2}</div>}
            </div>
          );
        })}
      </div>
      {detailDate&&<DayDetailModal th={th} date={detailDate} tasks={tasksByDate[detailDate]||[]} catOf={catOf} toggleTask={toggleTask} removeTask={removeTask} startEdit={task=>{setDetailDate(null);startEdit(task);}} onClose={()=>setDetailDate(null)} onCreate={()=>{setTaskForm({...emptyTask,due:detailDate});setDetailDate(null);setShowTaskForm(true);}}/>}
    </div>
  );
}

                        <span style={{width:3,height:3,borderRadius:"50%",background:PCOLOR[t.priority]}}/>

                    <button onClick={()=>startEdit(t)} style={{width:28,height:28,borderRadius:8,background:th.glass2,display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="edit" size={12} color={th.ink2}/></button>
                    <button onClick={()=>{if(confirm("删除这条任务？"))removeTask(t.id);}} style={{width:28,height:28,borderRadius:8,background:th.glass2,display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="trash" size={12} color={th.ink2}/></button>
                  </div>
                );
              })}

        <div style={{padding:"12px 18px",borderTop:`1px solid ${th.glassBorder}`,display:"flex",gap:10,alignItems:"center"}}>

          <div style={{flex:1}}/>
          <button onClick={onCreate} style={{padding:"9px 16px",background:`linear-gradient(135deg,${th.accent},${th.accent3})`,color:"#fff",borderRadius:10,fontSize:12,fontWeight:600,display:"flex",alignItems:"center",gap:6,boxShadow:`0 4px 14px ${th.accent}66`}}><Ic n="plus" size={12} sw={2.2}/> 添加任务</button>
