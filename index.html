            {aiLoading?<><span className="spin">○</span> 分析中</>:<><Ic n="zap" size={11} sw={2.2} color="#fff"/> 生成报告</>}
          </button>
        </div>
      )}
      {reviewSub==="today"&&<TodayReview th={th} tasks={tasks} catOf={catOf} today={today}/>}
      {reviewSub==="week"&&<RangeReview th={th} tasks={tasks} history={history} catOf={catOf} today={today} days={7} label="本周"/>}
      {reviewSub==="month"&&<RangeReview th={th} tasks={tasks} history={history} catOf={catOf} today={today} days={30} label="本月"/>}
      {reviewSub==="weekly"&&<WeeklyReport th={th} tasks={tasks} history={history} cats={cats} projects={projects} catOf={catOf} today={today}/>}
      {reviewSub==="timeOfDay"&&<TimeOfDayHeatmap th={th} tasks={tasks} history={history} today={today}/>}
      {reviewSub==="burndown"&&<BurndownChart th={th} tasks={tasks} history={history} projects={projects} today={today}/>}
      {reviewSub==="catTime"&&<CategoryTimeAnalysis th={th} tasks={tasks} history={history} cats={cats} catOf={catOf} today={today}/>}
      {reviewSub==="heatmap"&&<HeatmapView th={th} tasks={tasks} history={history} today={today}/>}
      {reviewSub==="habits"&&<HabitsView th={th} tasks={tasks} history={history} catOf={catOf} today={today}/>}
      {reviewSub==="all"&&<AllHistory th={th} tasks={tasks} history={history} catOf={catOf} today={today}/>}
      {aiReport&&<AiReportModal th={th} report={aiReport} onClose={()=>setAiReport(null)}/>}
    </div>
  );
}

// ═══ 1. 周报告（自动生成）═══
function WeeklyReport({th,tasks,history,cats,projects,catOf,today}){
  const data=useMemo(()=>{
    const weekStart=addDays(today,-6); // 近 7 天
    // 收集本周完成的任务
    const completedThisWeek=[];
    tasks.forEach(t=>{
      if(t.done&&(t.completedAt||"")>=weekStart)completedThisWeek.push({...t,_d:t.completedAt});
    });
    const curIds=new Set(tasks.map(t=>t.id));
    (history||[]).forEach(h=>{
      if(h.date<weekStart)return;
      (h.tasks||[]).forEach(ht=>{if(ht.done&&!curIds.has(ht.id))completedThisWeek.push({...ht,_d:h.date});});
    });
    // 上周对比
    const lastWeekStart=addDays(today,-13),lastWeekEnd=addDays(today,-7);
    const completedLastWeek=[];
    tasks.forEach(t=>{
      const d=t.completedAt||"";
      if(t.done&&d>=lastWeekStart&&d<lastWeekEnd)completedLastWeek.push(t);
    });
    (history||[]).forEach(h=>{
      if(h.date<lastWeekStart||h.date>=lastWeekEnd)return;
      (h.tasks||[]).forEach(ht=>{if(ht.done&&!curIds.has(ht.id))completedLastWeek.push(ht);});
    });
    // 按分类汇总
    const byCat={};
    completedThisWeek.forEach(t=>{const k=t.category||"other";byCat[k]=(byCat[k]||0)+1;});
    const topCat=Object.entries(byCat).sort((a,b)=>b[1]-a[1])[0];
    // 总耗时
    const totalMin=completedThisWeek.reduce((s,t)=>s+(t.actualMin||0),0);
    const lastMin=completedLastWeek.reduce((s,t)=>s+(t.actualMin||0),0);
    // 每日完成量
    const daily=Array.from({length:7},(_,i)=>{
      const d=addDays(today,-(6-i));
      const n=completedThisWeek.filter(t=>t._d===d).length;
      return{date:d,count:n,wd:["日","一","二","三","四","五","六"][new Date(d).getDay()]};
    });
    const maxDaily=Math.max(...daily.map(d=>d.count),1);
    // 最高效那天
    const bestDay=[...daily].sort((a,b)=>b.count-a.count)[0];
    // 项目活跃度
    const projN={};
    completedThisWeek.forEach(t=>{if(t.projectId)projN[t.projectId]=(projN[t.projectId]||0)+1;});
    const activeProjects=Object.entries(projN).map(([id,n])=>({proj:projects.find(p=>p.id===id),n})).filter(x=>x.proj).sort((a,b)=>b.n-a.n);
    return{completedThisWeek,completedLastWeek,byCat,topCat,totalMin,lastMin,daily,maxDaily,bestDay,activeProjects};
  },[tasks,history,projects,today]);

  const{completedThisWeek,completedLastWeek,topCat,totalMin,lastMin,daily,maxDaily,bestDay,activeProjects}=data;
  const cur=completedThisWeek.length,prev=completedLastWeek.length;
  const delta=cur-prev,deltaPct=prev>0?Math.round((delta/prev)*100):(cur>0?100:0);
  const minDelta=totalMin-lastMin;

  return(
    <div className="fadeIn">
      {/* 顶部摘要 */}
      <div className="glass" style={{padding:"22px 24px",borderRadius:18,marginBottom:18,position:"relative",overflow:"hidden"}}>
        <Blob3D size={140} hue={260} style={{right:-40,top:-30,opacity:0.25}}/>
        <div style={{position:"relative"}}>
          <div className="mono" style={{fontSize:10,letterSpacing:"0.22em",color:th.ink3,marginBottom:6,fontWeight:600}}>WEEKLY DIGEST · {addDays(today,-6).slice(5)} – {today.slice(5)}</div>
          <div className="display" style={{fontSize:32,color:th.ink0,letterSpacing:"-0.03em",lineHeight:1.05,marginBottom:10}}>
            本周完成了 <em style={{fontStyle:"italic"}} className="gradient-primary">{cur}</em> 项任务
          </div>
          <div style={{fontSize:13,color:th.ink2,lineHeight:1.7}}>
            {cur===0?"本周还没有完成任何任务，新的开始随时可以从一小步迈出。":
              `${totalMin>0?`累计专注时长 ${fmtMin(totalMin)}，`:""}${delta!==0?(delta>0?`比上周多 ${delta} 项 (+${deltaPct}%)`:`比上周少 ${Math.abs(delta)} 项 (${deltaPct}%)`)+"，":""}${bestDay&&bestDay.count>0?`最高效是周${bestDay.wd}（完成 ${bestDay.count} 项）。`:""}${topCat?`主要在「${(catOf(topCat[0]).name)}」类别投入精力。`:""}`
            }
          </div>
        </div>
      </div>

      {/* KPI 卡 */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10,marginBottom:18}}>
        <StatCard th={th} label="完成任务" value={cur} sub={delta>=0?`↑${delta} vs 上周`:`↓${Math.abs(delta)} vs 上周`} color={th.accent}/>
        <StatCard th={th} label="专注时长" value={fmtMin(totalMin)||"—"} sub={minDelta!==0?(minDelta>0?`↑${fmtMin(minDelta)}`:`↓${fmtMin(Math.abs(minDelta))}`):"—"} color={th.accent2}/>
        <StatCard th={th} label="日均完成" value={(cur/7).toFixed(1)} sub="项/天" color={th.accent3}/>
        <StatCard th={th} label="活跃天数" value={daily.filter(d=>d.count>0).length} sub="/ 7 天" color="#10d9a3"/>
      </div>

      {/* 每日柱状 */}
      <div className="glass" style={{padding:18,borderRadius:14,marginBottom:14}}>
        <div className="mono" style={{fontSize:10,letterSpacing:"0.18em",color:th.ink3,marginBottom:14,fontWeight:600}}>每日完成量</div>
        <div style={{display:"flex",alignItems:"flex-end",gap:6,height:120}}>
          {daily.map(d=>{
            const h=d.count===0?6:Math.max(12,(d.count/maxDaily)*100);
            const isToday=d.date===today;
            const isBest=d.count===maxDaily&&d.count>0;
            return(
              <div key={d.date} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
                <div className="mono tnum" style={{fontSize:11,color:isBest?th.accent:th.ink2,fontWeight:isBest?700:500}}>{d.count}</div>
                <div style={{width:"100%",height:`${h}px`,borderRadius:"6px 6px 0 0",background:d.count===0?th.glass2:`linear-gradient(180deg,${isToday?th.accent3:th.accent} 0%,${isBest?th.accent2:th.accent}80 100%)`,boxShadow:isBest?`0 0 12px ${th.accent}80`:undefined,transition:"height 0.6s var(--ease)"}}/>
                <div className="mono" style={{fontSize:9,color:th.ink3,letterSpacing:"0.05em",fontWeight:isToday?700:400}}>{d.wd}</div>
              </div>
            );
          })}
        </div>
      </div>

      {/* 活跃项目 */}
      {activeProjects.length>0&&(
        <div className="glass" style={{padding:18,borderRadius:14,marginBottom:14}}>
          <div className="mono" style={{fontSize:10,letterSpacing:"0.18em",color:th.ink3,marginBottom:12,fontWeight:600}}>活跃项目</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {activeProjects.slice(0,5).map(({proj,n})=>{
              const total=tasks.filter(t=>t.projectId===proj.id).length;
              return(
                <div key={proj.id} style={{display:"flex",alignItems:"center",gap:12}}>
                  <span style={{fontSize:14,color:proj.color,minWidth:18}}>{proj.glyph}</span>
                  <span style={{flex:1,fontSize:13,color:th.ink1,fontWeight:500}}>{proj.name}</span>
                  <div style={{flex:2,height:6,borderRadius:3,background:th.glass2,overflow:"hidden",maxWidth:180}}>
                    <div style={{width:`${(n/cur)*100}%`,height:"100%",background:`linear-gradient(90deg,${proj.color},${proj.color}aa)`,boxShadow:`0 0 6px ${proj.color}`}}/>
                  </div>
                  <span className="mono tnum" style={{fontSize:11,color:th.ink2,minWidth:50,textAlign:"right"}}>{n}<span style={{color:th.ink3}}>/{total}</span></span>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// ═══ 2. 完成时段热力图（24h × 7d）═══
function TimeOfDayHeatmap({th,tasks,history,today}){
  const data=useMemo(()=>{
    // 收集所有"完成时刻"。优先用 timeStart，否则按 hour bucket = 任务日期+12（默认中午）
    const events=[];
    const allDone=[];
    tasks.forEach(t=>{if(t.done&&(t.completedAt||""))allDone.push({date:t.completedAt,timeStart:t.timeStart});});
    const curIds=new Set(tasks.map(t=>t.id));
    (history||[]).forEach(h=>{
      (h.tasks||[]).forEach(ht=>{if(ht.done&&!curIds.has(ht.id))allDone.push({date:h.date,timeStart:ht.timeStart});});
    });
    // 时段分桶 24h × 7（周一-周日）
    const buckets=Array.from({length:7},()=>Array(24).fill(0));
    let total=0;
    allDone.forEach(t=>{
      try{
        const d=new Date(t.date);if(isNaN(d.getTime()))return;
        const wd=(d.getDay()+6)%7; // 周一为 0
        let hour=12;
        if(t.timeStart){const[h]=t.timeStart.split(":").map(Number);if(!isNaN(h))hour=h;}
        buckets[wd][hour]+=1;
        total+=1;
      }catch{}
    });
    let max=0;buckets.forEach(row=>row.forEach(v=>{if(v>max)max=v;}));
    // 找峰值时段
    let peakHour=-1,peakHourCount=0;
    for(let h=0;h<24;h++){let c=0;for(let w=0;w<7;w++)c+=buckets[w][h];if(c>peakHourCount){peakHourCount=c;peakHour=h;}}
    let peakDay=-1,peakDayCount=0;
    for(let w=0;w<7;w++){let c=0;for(let h=0;h<24;h++)c+=buckets[w][h];if(c>peakDayCount){peakDayCount=c;peakDay=w;}}
    return{buckets,max,total,peakHour,peakHourCount,peakDay,peakDayCount};
  },[tasks,history]);

  const{buckets,max,total,peakHour,peakDay}=data;
  const wdNames=["周一","周二","周三","周四","周五","周六","周日"];

  const cellColor=(v)=>{
    if(v===0)return th.glass2;
    const intensity=Math.min(v/max,1);
    // 用 accent 颜色加透明度
    const opacity=Math.round((0.2+intensity*0.8)*255).toString(16).padStart(2,"0");
    return th.accent+opacity;
  };

  if(total===0){
    return<EmptyState th={th} text="还没有足够的完成数据 · 至少需要完成几条带时间的任务" icon="clock"/>;
  }

  return(
    <div className="fadeIn">
      <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap"}}>
        <StatCard th={th} label="高峰时段" value={peakHour>=0?`${String(peakHour).padStart(2,"0")}:00`:"—"} sub="最常完成任务" color={th.accent}/>
        <StatCard th={th} label="高峰日" value={peakDay>=0?wdNames[peakDay]:"—"} sub="最高效的一天" color={th.accent2}/>
        <StatCard th={th} label="总完成" value={total} sub="项任务" color={th.accent3}/>
      </div>
      <div className="glass" style={{padding:"18px 14px",borderRadius:14,marginBottom:14,overflowX:"auto"}}>
        <div className="mono" style={{fontSize:10,letterSpacing:"0.18em",color:th.ink3,marginBottom:14,fontWeight:600,paddingLeft:30}}>完成时段分布 · 24h × 7day</div>
        <div style={{minWidth:520,display:"inline-block"}}>
          {/* 列标签 0/4/8/12/16/20 */}
          <div style={{display:"flex",alignItems:"center",marginBottom:6,paddingLeft:30}}>
            {Array.from({length:24},(_,h)=>(
              <div key={h} style={{flex:1,textAlign:"center"}}>
                {(h%4===0)&&<span className="mono" style={{fontSize:8,color:th.ink3,letterSpacing:"0.05em"}}>{String(h).padStart(2,"0")}</span>}
              </div>
            ))}
          </div>
          {buckets.map((row,wi)=>(
            <div key={wi} style={{display:"flex",alignItems:"center",gap:0,marginBottom:2}}>
              <div className="mono" style={{width:30,fontSize:9,color:th.ink3,fontWeight:wi===peakDay?700:400,letterSpacing:"0.04em"}}>{wdNames[wi]}</div>
              {row.map((v,h)=>{
                const isPeak=v>0&&v===max;
                return(
                  <div key={h} title={`${wdNames[wi]} ${String(h).padStart(2,"0")}:00 · ${v} 项`} style={{flex:1,height:18,margin:"0 1px",borderRadius:3,background:cellColor(v),boxShadow:isPeak?`0 0 6px ${th.accent}`:"none",transition:"transform 0.15s",cursor:"default"}}/>
                );
              })}
            </div>
          ))}
        </div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:th.glass1,borderRadius:10}}>
        <span className="mono" style={{fontSize:10,color:th.ink3,letterSpacing:"0.08em"}}>少</span>
        {[0.2,0.4,0.6,0.8,1].map(o=><div key={o} style={{width:18,height:14,borderRadius:3,background:th.accent+Math.round(o*255).toString(16).padStart(2,"0")}}/>)}
        <span className="mono" style={{fontSize:10,color:th.ink3,letterSpacing:"0.08em"}}>多</span>
        <div style={{flex:1}}/>
        <span className="mono" style={{fontSize:10,color:th.ink3,letterSpacing:"0.08em"}}>悬停单元格查看详情</span>
      </div>
    </div>
  );
}

// ═══ 3. 项目燃尽图 ═══
function BurndownChart({th,tasks,history,projects,today}){
  const[selectedId,setSelectedId]=useState(projects[0]&&projects[0].id);
  const proj=projects.find(p=>p.id===selectedId);

  const data=useMemo(()=>{
    if(!proj)return null;
    const projTasks=tasks.filter(t=>t.projectId===proj.id);
    if(projTasks.length===0)return{empty:true,total:0};
    // 找最早 createdAt 作为起点
    const dates=projTasks.map(t=>t.createdAt).filter(Boolean).sort();
    const startDate=dates[0]||today;
    const totalDays=Math.max(7,Math.ceil((new Date(today)-new Date(startDate))/(24*3600*1000))+1);
    const start=addDays(today,-(totalDays-1));
    // 每天结束时仍未完成的数量
    const points=[];
    const total=projTasks.length;
    for(let i=0;i<totalDays;i++){
      const d=addDays(start,i);
      // 在 d 这天结束时，多少任务已完成？
      const doneByThisDay=projTasks.filter(t=>{
        if(!t.done)return false;
        const ca=t.completedAt||t.due||"";
        return ca&&ca<=d;
      }).length;
      const remaining=total-doneByThisDay;
      // 理想线：线性递减
      const ideal=Math.max(0,total-Math.round((total/(totalDays-1))*i));
      points.push({date:d,remaining,done:doneByThisDay,ideal});
    }
    return{empty:false,points,total,start,totalDays};
  },[proj,tasks,today]);

  if(projects.length===0)return<EmptyState th={th} text="还没有项目 · 创建项目后可以看燃尽图" icon="folder"/>;

  return(
    <div className="fadeIn">
      {/* 项目选择 */}
      <div style={{display:"flex",gap:6,overflowX:"auto",marginBottom:16,paddingBottom:4}} className="slim-scroll">
        {projects.map(p=>{
          const act=p.id===selectedId;
          return<button key={p.id} onClick={()=>setSelectedId(p.id)} className={`view-tab ${act?"active":""}`} style={{flexShrink:0,background:act?p.color+"30":th.glass1,color:act?p.color:th.ink2,borderLeft:act?`2px solid ${p.color}`:"none"}}>
            <span style={{color:p.color}}>{p.glyph}</span> {p.name}
          </button>;
        })}
      </div>

      {!proj?(
        <EmptyState th={th} text="选择一个项目" icon="folder"/>
      ):data.empty?(
        <EmptyState th={th} text={`「${proj.name}」还没有任务`} icon="check"/>
      ):(()=>{
        const{points,total,totalDays}=data;
        const W=600,H=280,PAD={t:30,r:30,b:40,l:46};
        const innerW=W-PAD.l-PAD.r,innerH=H-PAD.t-PAD.b;
        const xStep=innerW/(totalDays-1);
        const yScale=v=>PAD.t+innerH-(v/total)*innerH;
        const xScale=i=>PAD.l+i*xStep;
        const idealPath=points.map((p,i)=>`${i===0?"M":"L"} ${xScale(i)} ${yScale(p.ideal)}`).join(" ");
        const realPath=points.map((p,i)=>`${i===0?"M":"L"} ${xScale(i)} ${yScale(p.remaining)}`).join(" ");
        const realArea=points.map((p,i)=>`${i===0?"M":"L"} ${xScale(i)} ${yScale(p.remaining)}`).join(" ")+` L ${xScale(totalDays-1)} ${PAD.t+innerH} L ${xScale(0)} ${PAD.t+innerH} Z`;
        const lastPoint=points[points.length-1];
        const remaining=lastPoint.remaining;
        const completed=total-remaining;
        const onSchedule=remaining<=lastPoint.ideal;
        const projTasks=tasks.filter(t=>t.projectId===proj.id);
        return(
          <>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:10,marginBottom:14}}>
              <StatCard th={th} label="总任务" value={total} sub="项" color={proj.color}/>
              <StatCard th={th} label="已完成" value={completed} sub={`${Math.round(completed/total*100)}%`} color="#10d9a3"/>
              <StatCard th={th} label="剩余" value={remaining} sub="项" color={remaining===0?"#10d9a3":th.accent3}/>
              <StatCard th={th} label="进度" value={onSchedule?"领先":"滞后"} sub={`vs 理想线`} color={onSchedule?"#10d9a3":"#ff5d7a"}/>
            </div>
            <div className="glass" style={{padding:"18px 14px",borderRadius:14,overflowX:"auto"}}>
              <div className="mono" style={{fontSize:10,letterSpacing:"0.18em",color:th.ink3,marginBottom:8,fontWeight:600,paddingLeft:14}}>燃尽曲线 · {totalDays} 天</div>
              <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",minWidth:520,height:"auto",display:"block"}}>
                {/* 横轴网格 */}
                {[0,0.25,0.5,0.75,1].map(p=>(
                  <line key={p} x1={PAD.l} x2={PAD.l+innerW} y1={PAD.t+innerH*p} y2={PAD.t+innerH*p} stroke={th.glassBorder} strokeWidth="1" strokeDasharray="2,3"/>
                ))}
                {/* Y 轴标签 */}
                {[0,0.5,1].map(p=>(
                  <text key={p} x={PAD.l-8} y={PAD.t+innerH*(1-p)+4} fill={th.ink3} fontSize="10" textAnchor="end" fontFamily="monospace">{Math.round(total*p)}</text>
                ))}
                {/* X 轴标签 */}
                {points.filter((_,i)=>i===0||i===totalDays-1||i===Math.floor(totalDays/2)).map((p,i,arr)=>{
                  const idx=points.indexOf(p);
                  return<text key={idx} x={xScale(idx)} y={PAD.t+innerH+18} fill={th.ink3} fontSize="9" textAnchor="middle" fontFamily="monospace">{p.date.slice(5)}</text>;
                })}
                {/* 理想线 */}
                <path d={idealPath} fill="none" stroke={th.ink3} strokeWidth="1.5" strokeDasharray="4,4" opacity="0.5"/>
                {/* 实际填充 */}
                <path d={realArea} fill={proj.color} opacity="0.15"/>
                {/* 实际线 */}
                <path d={realPath} fill="none" stroke={proj.color} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>
                {/* 数据点 */}
                {points.map((p,i)=>(
                  <circle key={i} cx={xScale(i)} cy={yScale(p.remaining)} r={i===points.length-1?5:3} fill={proj.color} stroke={th.bg1} strokeWidth="1.5">
                    <title>{p.date} · 剩余 {p.remaining} · 已完成 {p.done}</title>
                  </circle>
                ))}
                {/* 图例 */}
                <g transform={`translate(${PAD.l+8},${PAD.t-8})`}>
                  <line x1="0" x2="14" y1="0" y2="0" stroke={proj.color} strokeWidth="2.5"/>
                  <text x="20" y="3" fill={th.ink2} fontSize="10" fontFamily="monospace">实际</text>
                  <line x1="60" x2="74" y1="0" y2="0" stroke={th.ink3} strokeWidth="1.5" strokeDasharray="3,3"/>
                  <text x="80" y="3" fill={th.ink3} fontSize="10" fontFamily="monospace">理想</text>
                </g>
              </svg>
            </div>
            <div style={{marginTop:10,padding:"10px 14px",background:th.glass1,borderRadius:10,fontSize:11,color:th.ink2,lineHeight:1.65}}>
              {onSchedule?`✓ 进度 ${onSchedule?"领先":"符合"}理想节奏`:`⚠ 当前剩余 ${remaining} 项，比理想线多 ${remaining-lastPoint.ideal} 项`}
              {projTasks.filter(t=>t.due&&t.due<today&&!t.done).length>0&&` · ${projTasks.filter(t=>t.due&&t.due<today&&!t.done).length} 项已逾期`}
            </div>
          </>
        );
      })()}
    </div>
  );
}

// ═══ 4. 类目耗时分析 ═══
function CategoryTimeAnalysis({th,tasks,history,cats,catOf,today}){
  const[range,setRange]=useState("30");
  const data=useMemo(()=>{
    const cutoff=range==="all"?"":addDays(today,-parseInt(range));
    // 收集每个分类的耗时
    const byCat={};
    cats.forEach(c=>{byCat[c.id]={cat:c,planned:0,actual:0,done:0,total:0};});
    const considered=[];
    tasks.forEach(t=>{
      if(cutoff&&(t.completedAt||t.createdAt||"")<cutoff)return;
      considered.push(t);
    });
    considered.forEach(t=>{
      const k=t.category;if(!byCat[k])byCat[k]={cat:catOf(k),planned:0,actual:0,done:0,total:0};
      byCat[k].total+=1;
      if(t.done)byCat[k].done+=1;
      byCat[k].planned+=parseInt(t.duration||"0",10)||0;
      byCat[k].actual+=t.actualMin||0;
    });
    const arr=Object.values(byCat).filter(x=>x.total>0).sort((a,b)=>b.actual-a.actual);
    const totalActual=arr.reduce((s,x)=>s+x.actual,0);
    const totalPlanned=arr.reduce((s,x)=>s+x.planned,0);
    return{arr,totalActual,totalPlanned};
  },[tasks,cats,catOf,range,today]);

  const{arr,totalActual,totalPlanned}=data;
  // 饼图分段
  const pieR=70,pieCx=85,pieCy=85;
  let acc=0;
  const slices=arr.map((x,i)=>{
    if(totalActual===0||x.actual===0)return null;
    const start=acc/totalActual*Math.PI*2-Math.PI/2;
    acc+=x.actual;
    const end=acc/totalActual*Math.PI*2-Math.PI/2;
    const x1=pieCx+pieR*Math.cos(start),y1=pieCy+pieR*Math.sin(start);
    const x2=pieCx+pieR*Math.cos(end),y2=pieCy+pieR*Math.sin(end);
    const largeArc=(end-start)>Math.PI?1:0;
    const path=`M ${pieCx} ${pieCy} L ${x1} ${y1} A ${pieR} ${pieR} 0 ${largeArc} 1 ${x2} ${y2} Z`;
    return{path,color:x.cat.color,name:x.cat.name,actual:x.actual,pct:Math.round(x.actual/totalActual*100)};
  }).filter(Boolean);

  return(
    <div className="fadeIn">
      <div style={{display:"flex",gap:6,overflowX:"auto",marginBottom:16,paddingBottom:4}} className="slim-scroll">
        {[["7","近 7 天"],["30","近 30 天"],["90","近 90 天"],["all","全部"]].map(([k,l])=>(
          <button key={k} onClick={()=>setRange(k)} className={`view-tab ${range===k?"active":""}`} style={{flexShrink:0}}>{l}</button>
        ))}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10,marginBottom:16}}>
        <StatCard th={th} label="实际耗时" value={fmtMin(totalActual)||"—"} sub="累计" color={th.accent}/>
        <StatCard th={th} label="预计耗时" value={fmtMin(totalPlanned)||"—"} sub="计划" color={th.accent2}/>
        <StatCard th={th} label="参与分类" value={arr.length} sub={`/${cats.length}`} color={th.accent3}/>
      </div>

      {arr.length===0||totalActual===0?(
        <EmptyState th={th} text="该时间范围内没有耗时记录 · 完成任务时记录实际用时即可分析" icon="clock"/>
      ):(
        <div className="glass" style={{padding:18,borderRadius:14,marginBottom:14}}>
          <div className="mono" style={{fontSize:10,letterSpacing:"0.18em",color:th.ink3,marginBottom:14,fontWeight:600}}>类目耗时占比</div>
          <div style={{display:"flex",gap:24,flexWrap:"wrap",alignItems:"center"}}>
            {/* 饼图 */}
            <svg viewBox="0 0 170 170" style={{width:170,height:170,flexShrink:0}}>
              {slices.map((s,i)=>(
                <path key={i} d={s.path} fill={s.color} stroke={th.bg1} strokeWidth="1.5" opacity="0.92">
                  <title>{s.name} · {fmtMin(s.actual)} · {s.pct}%</title>
                </path>
              ))}
              <circle cx={pieCx} cy={pieCy} r="32" fill={th.bg1}/>
              <text x={pieCx} y={pieCy-2} fill={th.ink0} fontSize="11" textAnchor="middle" fontFamily="serif" fontStyle="italic">{fmtMin(totalActual)}</text>
              <text x={pieCx} y={pieCy+12} fill={th.ink3} fontSize="8" textAnchor="middle" fontFamily="monospace" letterSpacing="0.1em">TOTAL</text>
            </svg>
            {/* 列表 */}
            <div style={{flex:1,minWidth:200,display:"flex",flexDirection:"column",gap:8}}>
              {arr.map(x=>{
                const pct=totalActual>0?(x.actual/totalActual)*100:0;
                const overrun=x.planned>0&&x.actual>x.planned;
                return(
                  <div key={x.cat.id||x.cat.name} style={{display:"flex",alignItems:"center",gap:10}}>
                    <span style={{fontSize:13,color:x.cat.color,minWidth:18}}>{x.cat.glyph}</span>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"baseline",gap:6,marginBottom:3}}>
                        <span style={{fontSize:13,color:th.ink1,fontWeight:500}}>{x.cat.name}</span>
                        <span className="mono tnum" style={{fontSize:10,color:th.ink3,marginLeft:"auto"}}>{x.done}/{x.total}</span>
                        <span className="mono tnum" style={{fontSize:11,color:th.ink0,fontWeight:600,minWidth:48,textAlign:"right"}}>{fmtMin(x.actual)}</span>
                      </div>
                      <div style={{height:5,borderRadius:3,background:th.glass2,overflow:"hidden",position:"relative"}}>
                        <div style={{width:`${pct}%`,height:"100%",background:`linear-gradient(90deg,${x.cat.color},${x.cat.color}aa)`,boxShadow:`0 0 6px ${x.cat.color}80`}}/>
                      </div>
                      {x.planned>0&&(
                        <div className="mono" style={{fontSize:9,color:overrun?"#ff5d7a":th.ink3,marginTop:3,letterSpacing:"0.04em"}}>
                          预计 {fmtMin(x.planned)} → 实际 {fmtMin(x.actual)} {overrun?`· 超出 ${fmtMin(x.actual-x.planned)}`:`· 节省 ${fmtMin(x.planned-x.actual)}`}
                        </div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function StatCard({th,label,value,sub,color}){
  return(
    <div className="glass" style={{padding:"14px 16px",borderRadius:12,borderTop:`2px solid ${color||th.accent}`}}>
      <div className="mono" style={{fontSize:11,letterSpacing:"0.16em",color:th.ink3,fontWeight:600}}>{label.toUpperCase()}</div>
      <div style={{marginTop:4}}>
        <span className="display tnum" style={{fontSize:28,color:th.ink0,letterSpacing:"-0.03em"}}>{value}</span>
        {sub&&<span className="mono" style={{fontSize:11,color:th.ink2,marginLeft:3}}>{sub}</span>}
      </div>
    </div>
  );
}

function TodayReview({th,tasks,catOf,today}){
  const t=tasks.filter(x=>x.due===today);
  const done=t.filter(x=>x.done);
  const undone=t.filter(x=>!x.done);
  const totalDur=t.reduce((s,x)=>s+(x.actualMin||0),0);
  const byCat={};
  t.forEach(x=>{byCat[x.category]=(byCat[x.category]||0)+1;});
  return(
    <div className="fadeIn" style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
        <StatCard th={th} label="任务" value={t.length} color={th.accent}/>
        <StatCard th={th} label="完成" value={done.length} sub={t.length?"/ "+t.length:""} color="#10d9a3"/>
        <StatCard th={th} label="专注" value={fmtMin(totalDur)||"0"} color={th.accent3}/>
        <StatCard th={th} label="完成率" value={t.length?Math.round(done.length/t.length*100):0} sub="%" color="#f5a524"/>
      </div>
      {done.length>0&&(
        <div className="glass" style={{padding:16,borderRadius:14}}>
          <div className="mono" style={{fontSize:12,letterSpacing:"0.18em",color:th.ink3,marginBottom:10,fontWeight:600}}>已完成 · {done.length}</div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {done.map(x=>{const c=catOf(x.category);return(
              <div key={x.id} style={{padding:"8px 10px",borderRadius:9,background:th.glass1,borderLeft:`2px solid ${c.color}`,display:"flex",alignItems:"center",gap:10}}>
                <span className="mono" style={{fontSize:10,color:c.color}}>{c.glyph}</span>
                <span style={{flex:1,fontSize:12,color:th.ink1,textDecoration:"line-through",opacity:0.8}}>{x.title}</span>
                {x.actualMin>0&&<span className="mono tnum" style={{fontSize:10,color:th.ink3}}>{fmtMin(x.actualMin)}</span>}
              </div>
            );})}
          </div>
        </div>
      )}
      {undone.length>0&&(
        <div className="glass" style={{padding:16,borderRadius:14}}>
          <div className="mono" style={{fontSize:12,letterSpacing:"0.18em",color:th.ink3,marginBottom:10,fontWeight:600}}>未完成 · {undone.length}</div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {undone.map(x=>{const c=catOf(x.category);return(
              <div key={x.id} style={{padding:"8px 10px",borderRadius:9,background:th.glass1,borderLeft:`2px solid ${c.color}`,display:"flex",alignItems:"center",gap:10}}>
                <span className="mono" style={{fontSize:10,color:c.color}}>{c.glyph}</span>
                <span style={{flex:1,fontSize:12,color:th.ink0}}>{x.title}</span>
                {(x.progress||0)>0&&<span className="mono tnum" style={{fontSize:10,color:th.ink3}}>{Math.round((x.progress||0)*100)}%</span>}
              </div>
            );})}
          </div>
        </div>
      )}
      {t.length===0&&<EmptyState th={th} text="今天没有任务记录"/>}
    </div>
  );
}

function RangeReview({th,tasks,history,catOf,today,days,label}){
  const start=addDays(today,-(days-1));
  const dates=[];for(let i=0;i<days;i++)dates.push(addDays(start,i));
  let totalDone=0,totalDur=0,totalCount=0;
  const catStats={};
  dates.forEach(d=>{
    const entry=d===today?{tasks:tasks.filter(t=>t.due===today)}:history.find(h=>h.date===d);
    if(!entry)return;
    (entry.tasks||[]).forEach(t=>{
      totalCount++;
      if(t.done){totalDone++;totalDur+=t.actualMin||0;}
      catStats[t.category]=catStats[t.category]||{total:0,done:0,dur:0};
      catStats[t.category].total++;
      if(t.done){catStats[t.category].done++;catStats[t.category].dur+=t.actualMin||0;}
    });
  });
  const dailyDone=dates.map(d=>{const e=d===today?{tasks:tasks.filter(t=>t.due===today)}:history.find(h=>h.date===d);return(e?.tasks||[]).filter(t=>t.done).length;});
  const maxDaily=Math.max(...dailyDone,1);
  return(
    <div className="fadeIn" style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
        <StatCard th={th} label={label+"完成"} value={totalDone} color={th.accent}/>
        <StatCard th={th} label="总任务" value={totalCount} color={th.accent2}/>
        <StatCard th={th} label="专注" value={fmtMin(totalDur)||"0"} color={th.accent3}/>
        <StatCard th={th} label="日均" value={(totalDone/days).toFixed(1)} color="#10d9a3"/>
      </div>
      <div className="glass" style={{padding:16,borderRadius:14}}>
        <div className="mono" style={{fontSize:12,letterSpacing:"0.18em",color:th.ink3,marginBottom:12,fontWeight:600}}>每日完成趋势</div>
        <div style={{display:"flex",alignItems:"flex-end",gap:3,height:70,borderBottom:`1px solid ${th.glassBorder}`,paddingBottom:4}}>
          {dailyDone.map((v,i)=>(
            <div key={i} style={{flex:1,height:`${(v/maxDaily)*100}%`,minHeight:v>0?3:1,background:`linear-gradient(180deg,${th.accent},${th.accent3})`,borderRadius:"3px 3px 0 0",boxShadow:v>0?`0 0 6px ${th.accent}60`:"none",opacity:v>0?1:0.2}} title={`${dates[i]}: ${v}`}/>
          ))}
        </div>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:5,fontSize:9,color:th.ink3}}><span className="mono">{start.slice(5).replace("-","/")}</span><span className="mono">{today.slice(5).replace("-","/")}</span></div>
      </div>
      {Object.keys(catStats).length>0&&(
        <div className="glass" style={{padding:16,borderRadius:14}}>
          <div className="mono" style={{fontSize:12,letterSpacing:"0.18em",color:th.ink3,marginBottom:12,fontWeight:600}}>分类分布</div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {Object.entries(catStats).map(([cid,s])=>{const c=catOf(cid);return(
              <div key={cid}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5,fontSize:12}}>
                  <span style={{color:c.color,fontWeight:600}}>{c.glyph} {c.name}</span>
                  <span className="mono tnum" style={{marginLeft:"auto",color:th.ink2}}>{s.done}/{s.total} · {fmtMin(s.dur)||"0"}</span>
                </div>
                <div style={{height:5,borderRadius:3,background:th.glass2,overflow:"hidden"}}>
                  <div style={{width:`${(s.done/s.total)*100}%`,height:"100%",background:`linear-gradient(90deg,${c.color},${c.color}aa)`,boxShadow:`0 0 6px ${c.color}`}}/>
                </div>
              </div>
            );})}
          </div>
        </div>
      )}
    </div>
  );
}

function HeatmapView({th,tasks,history,today}){
  const weeks=26;
  const days=weeks*7;
  const start=addDays(today,-(days-1));
  const startDay=new Date(start).getDay();
  const padLeading=(startDay+6)%7;
  const allDates=[];
  for(let i=0;i<padLeading;i++)allDates.push(null);
  for(let i=0;i<days;i++)allDates.push(addDays(start,i));
  const dataMap={};
  history.forEach(h=>{dataMap[h.date]=h.tasks.filter(t=>t.done).length;});
  const todayDone=tasks.filter(t=>t.due===today&&t.done).length;
  dataMap[today]=todayDone;
  const max=Math.max(...Object.values(dataMap),1);
  const shade=v=>{if(!v)return th.glass1;const a=Math.min(0.18+(v/max)*0.82,1);return th.isDark?`rgba(${parseInt(th.accent.slice(1,3),16)},${parseInt(th.accent.slice(3,5),16)},${parseInt(th.accent.slice(5,7),16)},${a})`:th.accent+Math.round(a*255).toString(16).padStart(2,"0");};
  const grid=[];for(let w=0;w<Math.ceil(allDates.length/7);w++){const col=[];for(let d=0;d<7;d++)col.push(allDates[w*7+d]);grid.push(col);}
  const totalDone=Object.values(dataMap).reduce((a,b)=>a+b,0);
  const activeDays=Object.keys(dataMap).filter(d=>dataMap[d]>0).length;
  return(
    <div className="fadeIn" style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
        <StatCard th={th} label="半年完成" value={totalDone} color={th.accent}/>
        <StatCard th={th} label="活跃天数" value={activeDays} sub={`/ ${days}`} color="#10d9a3"/>
        <StatCard th={th} label="单日最多" value={max} sub="件" color={th.accent3}/>
      </div>
      <div className="glass" style={{padding:16,borderRadius:14,overflowX:"auto"}}>
        <div className="mono" style={{fontSize:12,letterSpacing:"0.18em",color:th.ink3,marginBottom:14,fontWeight:600}}>活跃热力图 · 近 26 周</div>
        <div style={{display:"flex",gap:3,minWidth:"fit-content",paddingLeft:24,position:"relative"}}>
          <div style={{position:"absolute",left:0,top:0,display:"flex",flexDirection:"column",gap:3,fontSize:8,color:th.ink3,fontFamily:"var(--f-mono)"}}>
            {["","Mon","","Wed","","Fri",""].map((d,i)=><div key={i} style={{height:11,display:"flex",alignItems:"center"}}>{d}</div>)}
          </div>
          {grid.map((col,ci)=>(
            <div key={ci} style={{display:"flex",flexDirection:"column",gap:3}}>
              {col.map((date,ri)=>{
                if(!date)return<div key={ri} style={{width:11,height:11}}/>;
                const v=dataMap[date]||0;
                return<div key={ri} className="hm-cell" title={`${date}: ${v}`} style={{width:11,height:11,borderRadius:2.5,background:shade(v),border:date===today?`1px solid ${th.accent3}`:"none"}}/>;
              })}
            </div>
          ))}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8,marginTop:14,fontSize:10,color:th.ink3}}>
          <span className="mono">少</span>
          {[0,0.25,0.5,0.75,1].map((v,i)=><div key={i} style={{width:11,height:11,borderRadius:2.5,background:shade(v*max)}}/>)}
          <span className="mono">多</span>
        </div>
      </div>
    </div>
  );
}

function HabitsView({th,tasks,history,catOf,today}){
  const habits=tasks.filter(t=>t.repeat);
  const last30=Array.from({length:30},(_,i)=>addDays(today,-i));
  const habitData=habits.map(h=>{
    const dates=last30.map(d=>{
      if(d===today)return h.done;
      const entry=history.find(x=>x.date===d);if(!entry)return false;
      const t=entry.tasks.find(x=>x.title===h.title&&x.repeat);
      return!!t?.done;
    });
    let streak=0;for(let i=0;i<dates.length;i++){if(dates[i])streak++;else break;}
    const total=dates.filter(d=>d).length;
    return{...h,dates,streak,total,rate:total/30};
  });
  if(habitData.length===0)return<EmptyState th={th} text='没有循环任务。在添加任务时开启"每日重复"即可创建习惯。' icon="repeat"/>;
  return(
    <div className="fadeIn" style={{display:"flex",flexDirection:"column",gap:10}}>
      {habitData.map(h=>{
        const c=catOf(h.category);
        return(
          <div key={h.id} className="glass" style={{padding:16,borderRadius:14,borderLeft:`3px solid ${c.color}`}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
              <span className="mono" style={{fontSize:11,color:c.color,fontWeight:600}}>{c.glyph}</span>
              <span style={{fontSize:14,color:th.ink0,fontWeight:600,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{h.title}</span>
              {h.streak>0&&<span className="mono" style={{fontSize:11,color:"#f5a524",padding:"3px 10px",borderRadius:8,background:"rgba(245,165,36,0.1)",fontWeight:700}}>🔥 {h.streak} 天</span>}
              <span className="mono tnum" style={{fontSize:11,color:th.ink2}}>{Math.round(h.rate*100)}%</span>
            </div>
            <div style={{display:"flex",gap:2,flexWrap:"wrap"}}>
              {h.dates.slice().reverse().map((d,i)=>(
                <div key={i} style={{flex:1,minWidth:7,maxWidth:16,aspectRatio:"1",borderRadius:3,background:d?`linear-gradient(135deg,${c.color},${c.color}aa)`:th.glass2,boxShadow:d?`0 0 4px ${c.color}80`:"none"}}/>
              ))}
            </div>
            <div style={{display:"flex",justifyContent:"space-between",marginTop:6,fontSize:9,color:th.ink3}}><span className="mono">30 天前</span><span className="mono">今天</span></div>
          </div>
        );
      })}
    </div>
  );
}

function AllHistory({th,tasks,history,catOf,today}){
  const[q,setQ]=useState("");
  const[open,setOpen]=useState({});
  const todayEntry={date:today,tasks:tasks.filter(t=>t.due===today).map(t=>({...t,duration:t.duration||""}))};
  const merged=[todayEntry,...history.filter(h=>h.date!==today).sort((a,b)=>b.date.localeCompare(a.date))];
  const filtered=merged.map(h=>({...h,tasks:h.tasks.filter(t=>!q||(t.title||"").toLowerCase().includes(q.toLowerCase()))})).filter(h=>h.tasks.length>0);
  return(
    <div className="fadeIn">
      <input value={q} onChange={e=>setQ(e.target.value)} placeholder="🔍 搜索历史任务…" className="inp" style={{marginBottom:14}}/>
      {filtered.length===0?<EmptyState th={th} text={q?"没找到匹配":"还没有历史记录"}/>:(
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {filtered.map(h=>{
            const done=h.tasks.filter(t=>t.done).length;
            const dur=h.tasks.reduce((s,t)=>s+(t.actualMin||0),0);
            const isOpen=open[h.date]!==false;
            return(
              <div key={h.date} className="glass" style={{borderRadius:14}}>
                <button onClick={()=>setOpen({...open,[h.date]:!isOpen})} style={{width:"100%",padding:"13px 16px",display:"flex",alignItems:"center",gap:12,textAlign:"left"}}>
                  <div style={{flex:1}}>
                    <div className="display" style={{fontSize:16,color:th.ink0}}>{h.date===today?"今天":h.date}</div>
                    <div className="mono" style={{fontSize:10,color:th.ink3,marginTop:3,letterSpacing:"0.05em"}}>完成 {done}/{h.tasks.length} · 专注 {fmtMin(dur)||"0"}</div>
                  </div>
                  <Ic n={isOpen?"chevUp":"chevDown"} size={14} color={th.ink3}/>
                </button>
                {isOpen&&(
                  <div style={{padding:"0 16px 13px",display:"flex",flexDirection:"column",gap:5}}>
                    {h.tasks.map((t,i)=>{const c=catOf(t.category);return(
                      <div key={i} style={{padding:"8px 10px",borderRadius:9,background:th.glass1,borderLeft:`2px solid ${c.color}`,display:"flex",alignItems:"center",gap:10}}>
                        <span className="mono" style={{fontSize:9,color:c.color}}>{c.glyph}</span>
                        <span style={{flex:1,fontSize:12,color:t.done?th.ink3:th.ink0,textDecoration:t.done?"line-through":"none"}}>{t.title}</span>
                        {t.actualMin>0&&<span className="mono tnum" style={{fontSize:9,color:th.ink3}}>{fmtMin(t.actualMin)}</span>}
                      </div>
                    );})}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// 邮件转发设置组件
function EmailForwardSettings({th,showToast}){
  const[email,setEmail]=useState(()=>getForwardEmail());
  const[saving,setSaving]=useState(false);
  const valid=!email||/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  const save=()=>{
    if(!valid){showToast&&showToast("邮箱格式不正确","error");return;}
    setForwardEmail(email);
    showToast&&showToast(email?"已开启邮件转发":"已关闭邮件转发","success");
  };
  const test=async()=>{
    if(!email||!valid){showToast&&showToast("请先填写并保存邮箱","error");return;}
    setSaving(true);
    showToast&&showToast("正在发送测试邮件…","info");
    try{
      const sender=senderInfo("coach");
      const testMsg={
        id:"test_"+Date.now(),
        from:"coach",
        type:"test",
        subject:"📧 邮件转发测试",
        preview:"如果你看到这封邮件，说明转发功能工作正常",
        content:{
          greeting:"你好！这是一封测试邮件 ✨",
          observations:[
            {icon:"✅",text:"邮件转发功能配置成功"},
            {icon:"📨",text:"以后 AI 生成的报告 / 洞察 / 复盘都会自动发送到这个邮箱"},
            {icon:"💡",text:"如果想关闭转发，把上面的输入框清空再保存即可"},
          ],
          closing:"祝你拥有高效美好的一天 ☀️",
        },
        tags:["test"],
        createdAt:new Date().toISOString(),
      };
      const html=renderMessageAsHtml(testMsg,sender);
      const text=renderMessageAsPlainText(testMsg,sender);
      const resp=await fetch(EMAIL_API_URL,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({to:email,subject:"[Timelinek] "+testMsg.subject,html,text,fromName:"Timelinek · 教练"}),
      });
      if(resp.ok){
        showToast&&showToast("✓ 已发送，请检查邮箱","success");
      }else{
        const err=await resp.text();
        console.error("[Test Email]",resp.status,err);
        showToast&&showToast("发送失败 ("+resp.status+")，请稍后再试","error");
      }
    }catch(e){
      console.error(e);
      showToast&&showToast("发送失败: "+e.message,"error");
    }
    setSaving(false);
  };
  return(
    <>
      <div className="mono" style={{fontSize:10,letterSpacing:"0.18em",color:th.ink3,marginBottom:10,fontWeight:600}}>邮件转发</div>
      <div className="glass" style={{padding:16,borderRadius:11}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
          <Ic n="mail" size={16} color={email&&valid?"#10d9a3":th.ink2}/>
          <div style={{flex:1}}>
            <div style={{fontSize:12,fontWeight:600,color:th.ink0}}>自动转发到邮箱</div>
            <div style={{fontSize:11,color:th.ink2,marginTop:2,lineHeight:1.6}}>开启后，每封 AI 生成的邮件都会自动转发到你的邮箱。无需手动操作。</div>
          </div>
        </div>
        <div style={{display:"flex",gap:8,marginBottom:8}}>
          <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="example@mail.com（留空关闭转发）" type="email" style={{flex:1,padding:"10px 14px",borderRadius:9,border:`1px solid ${valid?th.glassBorder:"#ef4444"}`,background:th.glass1,color:th.ink0,fontSize:13,outline:"none",fontFamily:"inherit"}}/>
          <button onClick={save} className="hover-lift" style={{padding:"10px 16px",borderRadius:9,background:`linear-gradient(135deg,${th.accent},${th.accent3})`,color:"#fff",fontSize:12,fontWeight:600,letterSpacing:"0.02em"}}>保存</button>
        </div>

// ═══ AI 个人画像设置 ═══
function AiProfileSettings({th,showToast,requestProfileUpdate,requestWeeklyInsight,profileGenerating}){
  const[profile,setProfileState]=useState(()=>getProfile());
  const[insights,setInsightsState]=useState(()=>getInsights());
  const[meta,setMetaState]=useState(()=>getAiMeta());
  const[viewInsight,setViewInsight]=useState(null);
  
  // 监听 profile 变化（手动更新后立即刷新）
  useEffect(()=>{
    const itv=setInterval(()=>{
      const p=getProfile();
      const cur=JSON.stringify(p)!==JSON.stringify(profile);
      if(cur)setProfileState(p);
      const i=getInsights();
      if(i.length!==insights.length)setInsightsState(i);
      const m=getAiMeta();
      if(JSON.stringify(m)!==JSON.stringify(meta))setMetaState(m);
    },1000);
    return()=>clearInterval(itv);
  },[profile,insights,meta]);
  
  const lastProfileText=meta.lastProfileAt?(()=>{
    const days=Math.floor((Date.now()-new Date(meta.lastProfileAt).getTime())/86400000);
    return days===0?"今天":days+" 天前";
  })():"未生成";
  
  const handleUpdate=async()=>{
    await requestProfileUpdate();
    setTimeout(()=>{setProfileState(getProfile());setMetaState(getAiMeta());},500);
  };
  const handleInsight=async()=>{
    await requestWeeklyInsight();
    setTimeout(()=>{setInsightsState(getInsights());setMetaState(getAiMeta());},500);
  };
  const handleClear=()=>{
    if(!confirm("确定清除画像和所有洞察？这会重新从零分析。"))return;
    try{localStorage.removeItem(PROFILE_KEY);localStorage.removeItem(INSIGHTS_KEY);localStorage.removeItem(META_KEY);}catch{}
    setProfileState(null);setInsightsState([]);setMetaState({lastProfileAt:"",lastWeeklyAt:""});
    showToast("已清除","success");
  };
  
  return(
    <div style={{padding:"4px 0"}}>
      {/* 介绍卡 */}
      <div className="glass" style={{padding:"16px 18px",borderRadius:14,marginBottom:14,background:`linear-gradient(135deg,${th.accent}10,${th.accent3}06)`,border:`1px dashed ${th.accent}40`}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
          <span style={{fontSize:22}}>🪞</span>
          <div style={{fontSize:14,fontWeight:700,color:th.ink0,letterSpacing:"0.01em"}}>AI 个人画像</div>
        </div>
        <div style={{fontSize:11.5,color:th.ink2,lineHeight:1.7}}>
          AI 从你过去 30 天的任务、习惯、日记、完成模式中分析"你是谁"。每周一自动更新。所有 AI 对话/排期/报告都会基于画像给出**针对你**的建议。
        </div>
      </div>

      {/* 当前画像展示 */}
      {profile?(
        <div className="glass" style={{padding:18,borderRadius:14,marginBottom:14}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
            <span style={{fontSize:11,padding:"3px 10px",borderRadius:8,background:th.accent+"22",color:th.accent2,fontWeight:600,letterSpacing:"0.04em"}}>v{profile.version||1}</span>
            <span className="mono" style={{fontSize:10,color:th.ink3,letterSpacing:"0.04em"}}>更新于 {lastProfileText}</span>
          </div>
          
          {profile.identity&&(
            <div style={{marginBottom:14,padding:"12px 14px",background:`linear-gradient(135deg,${th.accent}15,${th.accent3}10)`,borderRadius:10,fontSize:13,color:th.ink0,lineHeight:1.65,fontStyle:"italic",borderLeft:`2px solid ${th.accent2}`}}>
              "{profile.identity}"
            </div>
          )}

          {profile.workPattern&&(profile.workPattern.peakTime||profile.workPattern.weekRhythm)&&(
            <Section th={th} icon="⏰" title="工作节奏">
              {profile.workPattern.peakTime&&<KV th={th} k="高效时段" v={profile.workPattern.peakTime}/>}
              {profile.workPattern.lowTime&&<KV th={th} k="低能时段" v={profile.workPattern.lowTime}/>}
              {profile.workPattern.weekRhythm&&<KV th={th} k="一周节奏" v={profile.workPattern.weekRhythm}/>}
            </Section>
          )}
          
          {Array.isArray(profile.strengths)&&profile.strengths.length>0&&(
            <Section th={th} icon="💪" title="优势" color="#10d9a3">
              {profile.strengths.map((s,i)=><Bullet key={i} th={th}>{s}</Bullet>)}
            </Section>
          )}
          
          {Array.isArray(profile.blockers)&&profile.blockers.length>0&&(
            <Section th={th} icon="⚠️" title="阻碍" color="#f5a524">
              {profile.blockers.map((s,i)=><Bullet key={i} th={th}>{s}</Bullet>)}
            </Section>
          )}
          
          {Array.isArray(profile.habits)&&profile.habits.length>0&&(
            <Section th={th} icon="🌱" title="稳定习惯">
              {profile.habits.map((s,i)=><Bullet key={i} th={th}>{s}</Bullet>)}
            </Section>
          )}
          
          {Array.isArray(profile.goals)&&profile.goals.length>0&&(
            <Section th={th} icon="🎯" title="推断的目标">
              {profile.goals.map((s,i)=><Bullet key={i} th={th}>{s}</Bullet>)}
            </Section>
          )}
          
          {Array.isArray(profile.preferences)&&profile.preferences.length>0&&(
            <Section th={th} icon="💡" title="其他特征">
              {profile.preferences.map((s,i)=><Bullet key={i} th={th}>{s}</Bullet>)}
            </Section>
          )}
        </div>
      ):(
        <div style={{padding:"24px 18px",background:th.glass1,borderRadius:13,marginBottom:14,textAlign:"center",border:`1px dashed ${th.glassBorder}`}}>
          <div style={{fontSize:32,marginBottom:10,opacity:.5}}>🌱</div>
          <div style={{fontSize:13,color:th.ink1,fontWeight:500,marginBottom:5}}>还没有画像</div>
          <div style={{fontSize:11,color:th.ink2,lineHeight:1.6}}>使用 7 天后再生成更准确，但现在也可以试试</div>

      {/* 操作按钮 */}

          {profileGenerating?<><span className="spin">○</span> 分析中</>:<><Ic n="zap" size={12} sw={2.2} color="#fff"/> {profile?"重新分析":"开始分析"}</>}
        </button>
        <button onClick={handleInsight} disabled={profileGenerating} className="hover-lift" style={{flex:1,padding:"12px 14px",background:th.glass2,color:th.ink1,borderRadius:11,fontSize:12.5,fontWeight:600,letterSpacing:"0.02em",border:`1px solid ${th.glassBorder}`}}>
          ☀️ 现在生成洞察
        </button>
      </div>

      {/* 历史洞察 */}
      {insights.length>0&&(
        <div style={{marginBottom:14}}>
          <div className="mono" style={{fontSize:10,letterSpacing:"0.18em",color:th.ink3,marginBottom:8,fontWeight:600}}>过往洞察 · {insights.length} 条</div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>

                </div>
                <Ic n="chevRight" size={12} color={th.ink3}/>
              </button>
            ))}
          </div>
        </div>
      )}

      {/* 底部操作 */}
      {profile&&(
        <button onClick={handleClear} style={{width:"100%",padding:"10px 14px",background:"transparent",color:"#ff5d7a",borderRadius:9,fontSize:11,fontWeight:500,border:`1px solid #ff5d7a40`,letterSpacing:"0.02em"}}>清除画像和洞察</button>
      )}
      
      {viewInsight&&<WeeklyInsightModal th={th} insight={viewInsight} profile={profile} onClose={()=>setViewInsight(null)}/>}
    </div>
  );
}

                    </div>
                  </div>
                  <button onClick={installPWA} style={{padding:"8px 14px",background:installState.isStandalone?th.glass2:`linear-gradient(135deg,${th.accent},${th.accent3})`,color:installState.isStandalone?th.ink2:"#fff",borderRadius:9,fontSize:12,fontWeight:600}}>{installState.isStandalone?"已安装":"安装"}</button>
                </div>
              </div>
            </div>
          )}

          {tab==="account"&&(
            <div>
              <div className="glass" style={{padding:18,borderRadius:14,marginBottom:14,display:"flex",alignItems:"center",gap:14}}>
                <div style={{width:52,height:52,borderRadius:"50%",background:`linear-gradient(135deg,${th.accent},${th.accent3})`,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:22,fontWeight:700,boxShadow:`0 4px 14px ${th.accent}66`}}>{(user.user_metadata?.username||user.email||"U")[0].toUpperCase()}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:15,color:th.ink0,fontWeight:600}}>{user.user_metadata?.username||user.email?.split("@")[0]}</div>
                  <div className="mono" style={{fontSize:11,color:th.ink3,marginTop:3}}>ID: {user.id.slice(0,8)}…</div>
                </div>
              </div>
              <button onClick={onSignOut} className="glass" style={{width:"100%",padding:"13px 16px",borderRadius:11,fontSize:13,color:"#ff5d7a",display:"flex",alignItems:"center",justifyContent:"center",gap:8,border:"1px solid rgba(255,93,122,0.2)"}}><Ic n="logout" size={13} color="#ff5d7a"/> 登出</button>
            </div>
          )}

          {tab==="categories"&&(
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <div className="mono" style={{fontSize:12,letterSpacing:"0.18em",color:th.ink3,marginBottom:4,fontWeight:600}}>CATEGORIES · 分类</div>
              {cats.map((c,i)=>(
                <div key={c.id} className="glass" style={{padding:"12px 14px",borderRadius:11,display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:18,color:c.color,textShadow:`0 0 8px ${c.color}80`}}>{c.glyph}</span>
                  <input value={c.name} onChange={e=>{const n=[...cats];n[i]={...n[i],name:e.target.value};setCats(n);}} style={{flex:1,fontSize:13,background:"transparent",border:"none",outline:"none",color:th.ink0,fontWeight:500}}/>
                  <input type="color" value={c.color} onChange={e=>{const n=[...cats];n[i]={...n[i],color:e.target.value};setCats(n);}} style={{width:28,height:28,border:"none",borderRadius:7,cursor:"pointer",background:"transparent"}}/>
                  {!DEFAULT_CATEGORIES.find(d=>d.id===c.id)&&<button onClick={()=>setCats(cats.filter(x=>x.id!==c.id))} style={{color:"#ff5d7a",width:28,height:28,display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="trash" size={12}/></button>}
                </div>
              ))}
              <button onClick={()=>{const name=prompt("分类名称");if(!name)return;const glyph=prompt("图标（一个字符）","◆")||"◆";setCats([...cats,{id:"custom"+Date.now(),name,color:"#a8a2c4",glyph:glyph.slice(0,2)}]);}} className="glass" style={{padding:"11px 14px",borderRadius:11,color:th.ink2,fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",gap:6,border:`1px dashed ${th.glassBorder}`}}><Ic n="plus" size={12}/> 添加分类</button>
            </div>
          )}

          {tab==="tags"&&(
            <div>
              <div style={{marginBottom:14}}>
                <div className="mono" style={{fontSize:11,letterSpacing:"0.18em",color:th.ink3,marginBottom:4,fontWeight:600}}>TAGS · {(tags||[]).length}</div>
                <div style={{fontSize:11,color:th.ink3,lineHeight:1.6}}>标签是分类之外的灵活归类方式 · 一个任务可以挂多个标签</div>
              </div>
              <div style={{display:"flex",gap:6,marginBottom:16}}>
                <input id="tagNewName" placeholder="新建标签…" className="inp" style={{padding:"8px 12px",fontSize:12,flex:1}} onKeyDown={e=>{if(e.isComposing||e.keyCode===229)return;if(e.key==="Enter"){const v=e.target.value;if(v.trim()){addTag(v,TAG_COLORS[(tags||[]).length%TAG_COLORS.length]);e.target.value="";}}}}/>
                <button onClick={()=>{const el=document.getElementById("tagNewName");const v=el.value;if(v.trim()){addTag(v,TAG_COLORS[(tags||[]).length%TAG_COLORS.length]);el.value="";el.focus();}}} style={{padding:"8px 14px",borderRadius:9,background:`linear-gradient(135deg,${th.accent},${th.accent3})`,color:"#fff",fontSize:12,fontWeight:600}}>+ 添加</button>
              </div>
              {(!tags||tags.length===0)?(
                <EmptyState th={th} text="还没有标签 · 在上方输入框创建" icon="hash"/>
              ):(
                <div className="slim-scroll" style={{display:"flex",flexDirection:"column",gap:8,maxHeight:"55vh",overflowY:"auto"}}>
                  {tags.map(tg=>{
                    const taskN=tasks.filter(t=>(t.tagIds||[]).includes(tg.id)).length;
                    return(
                      <div key={tg.id} className="glass" style={{padding:"10px 12px",borderRadius:10,borderLeft:`3px solid ${tg.color}`,display:"flex",flexDirection:"column",gap:8}}>
                        {/* 第一行：名字 + 计数 + 删除 */}
                        <div style={{display:"flex",alignItems:"center",gap:10}}>
                          <input value={tg.name} onChange={e=>updateTag(tg.id,{name:e.target.value})} style={{background:"transparent",border:"none",outline:"none",fontSize:13.5,color:th.ink0,flex:1,fontWeight:500,minWidth:0}}/>
                          <span className="mono tnum" style={{fontSize:10,color:th.ink3,padding:"2px 8px",background:th.glass2,borderRadius:6,letterSpacing:"0.04em"}}>{taskN} 项</span>
                          <button onClick={()=>{if(confirm(`删除标签「${tg.name}」？已使用此标签的 ${taskN} 个任务会取消该标签`))removeTag(tg.id);}} title="删除" style={{width:28,height:28,borderRadius:7,background:th.glass2,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Ic n="trash" size={12} color={th.ink3}/></button>
                        </div>
                        {/* 第二行：色块 */}
                        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                          {TAG_COLORS.map(co=>(
                            <button key={co} onClick={()=>updateTag(tg.id,{color:co})} title={co} style={{width:22,height:22,borderRadius:6,background:co,border:tg.color===co?"2px solid #fff":"2px solid transparent",boxShadow:tg.color===co?`0 0 0 2px ${co}`:`0 1px 2px ${co}40`,cursor:"pointer",flexShrink:0}}/>
                          ))}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          )}

          {tab==="sound"&&<SoundSettings th={th} showToast={showToast} notifPerm={notifPerm} askNotif={askNotif}/>}
          {tab==="review"&&<ReviewSettings th={th} showToast={showToast}/>}
          {tab==="ai"&&<AiProfileSettings th={th} showToast={showToast} requestProfileUpdate={requestProfileUpdate} requestWeeklyInsight={requestWeeklyInsight} profileGenerating={profileGenerating}/>}

          {tab==="trash"&&(
            <div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
                <div>
                  <div className="mono" style={{fontSize:11,letterSpacing:"0.18em",color:th.ink3,marginBottom:4,fontWeight:600}}>RECYCLE BIN · {trash.length} 项</div>
                  <div style={{fontSize:11,color:th.ink3,lineHeight:1.6}}>已删除任务保留 30 天后自动永久删除</div>
                </div>
                {trash.length>0&&<button onClick={emptyTrash} style={{padding:"7px 12px",borderRadius:9,background:"rgba(255,93,122,0.12)",color:"#ff5d7a",fontSize:11,fontWeight:600,border:"1px solid rgba(255,93,122,0.3)"}}>清空</button>}
              </div>
              {trash.length===0?(
                <EmptyState th={th} text="回收站是空的" icon="trash"/>
              ):(
                <div className="slim-scroll" style={{display:"flex",flexDirection:"column",gap:6,maxHeight:"50vh",overflowY:"auto"}}>
                  {[...trash].sort((a,b)=>(b.deletedAt||0)-(a.deletedAt||0)).map(t=>{
                    const c=catOf?catOf(t.category):{name:t.category,color:"#888",glyph:"■"};
                    const days=Math.max(0,30-Math.floor((Date.now()-(t.deletedAt||Date.now()))/(24*60*60*1000)));
                    const deletedAtStr=new Date(t.deletedAt||Date.now()).toLocaleString("zh-CN",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"});
                    return(
                      <div key={t.id} className="glass" style={{padding:"11px 13px",borderRadius:10,borderLeft:`3px solid ${c.color}`,display:"flex",alignItems:"center",gap:10}}>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:13,color:th.ink0,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.title}</div>
                          <div style={{display:"flex",gap:8,marginTop:3,flexWrap:"wrap"}}>
                            <span className="mono" style={{fontSize:10,color:c.color,fontWeight:600}}>{c.glyph} {c.name}</span>
                            <span className="mono" style={{fontSize:10,color:th.ink3}}>· 删于 {deletedAtStr}</span>
                            <span className="mono" style={{fontSize:10,color:days<=3?"#ff5d7a":th.ink3}}>· {days} 天后清理</span>
                          </div>
                        </div>
                        <button onClick={()=>restoreTask(t.id)} title="恢复" style={{padding:"6px 10px",borderRadius:7,background:"rgba(16,217,163,0.12)",color:"#10d9a3",fontSize:11,fontWeight:600,border:"1px solid rgba(16,217,163,0.3)"}}>恢复</button>
                        <button onClick={()=>{if(confirm(`永久删除「${t.title}」？`))purgeTask(t.id);}} title="永久删除" style={{width:28,height:28,borderRadius:7,background:th.glass2,display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="trash" size={11} color={th.ink3}/></button>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          )}

          {tab==="data"&&(
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <button onClick={exportXLSX} className="glass hover-lift" style={{padding:"14px 16px",borderRadius:11,textAlign:"left",display:"flex",alignItems:"center",gap:12}}>
                <div style={{width:38,height:38,borderRadius:10,background:"#10d9a322",display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="download" size={15} color="#10d9a3"/></div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,color:th.ink0,fontWeight:600}}>导出 Excel (.xlsx)</div>
                  <div style={{fontSize:11,color:th.ink3,marginTop:2}}>包含所有任务及分类信息</div>
                </div>
              </button>
              <button onClick={exportJSON} className="glass hover-lift" style={{padding:"14px 16px",borderRadius:11,textAlign:"left",display:"flex",alignItems:"center",gap:12}}>
                <div style={{width:38,height:38,borderRadius:10,background:th.accent+"22",display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="download" size={15} color={th.accent}/></div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,color:th.ink0,fontWeight:600}}>导出 JSON（含全部数据）</div>
                  <div style={{fontSize:11,color:th.ink3,marginTop:2}}>完整备份，可重新导入</div>
                </div>
              </button>
              <label className="glass hover-lift" style={{padding:"14px 16px",borderRadius:11,cursor:"pointer",display:"flex",alignItems:"center",gap:12}}>
                <div style={{width:38,height:38,borderRadius:10,background:"#f5a52422",display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="upload" size={15} color="#f5a524"/></div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,color:th.ink0,fontWeight:600}}>导入 JSON</div>
                  <div style={{fontSize:11,color:th.ink3,marginTop:2}}>合并到现有数据</div>
                </div>
                <input type="file" accept=".json" onChange={importJSON} style={{display:"none"}}/>
              </label>
            </div>
          )}

          {tab==="about"&&(
            <div style={{textAlign:"center",padding:"20px 0"}}>
              <div style={{marginBottom:16,filter:"drop-shadow(0 8px 24px rgba(109,95,255,0.5))",display:"inline-block"}}>
                <svg width="72" height="72" viewBox="0 0 72 72" fill="none"><defs><linearGradient id="abg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stopColor="#6d5fff"/><stop offset="100%" stopColor="#ec4899"/></linearGradient></defs><rect width="72" height="72" rx="18" fill="url(#abg)"/><text x="36" y="52" textAnchor="middle" fontFamily="serif" fontStyle="italic" fontSize="44" fontWeight="700" fill="white">T</text></svg>
              </div>
              <h3 className="display" style={{fontSize:26,color:th.ink0,marginBottom:4,letterSpacing:"-0.02em"}}>Timelinek</h3>
              <div className="mono" style={{fontSize:10,color:th.ink3,marginBottom:14,letterSpacing:"0.3em"}}>v2.0 · 2026</div>
              <div style={{fontSize:12,color:th.ink2,lineHeight:1.75,maxWidth:400,margin:"0 auto"}}>
                任务 · 时间线 · 项目 · 专注 · 云同步<br/>
                Glass morphism · 霓虹极光 · 三套主题<br/>
                <span className="mono" style={{fontSize:10,opacity:0.6}}>Powered by React + Supabase</span>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// 清掉初始 splash（让 React 接管整个 root）
const _splash=document.getElementById("initial-splash");
if(_splash)_splash.remove();
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
