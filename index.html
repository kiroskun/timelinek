// ═══ PROJECTS VIEW ═══
function ProjectsView({th,projects,tasks,catOf,setShowProjectForm,setEditProjectId,removeProject,startEdit,toggleTask,updateProgress,setTaskForm,setShowTaskForm,today,openProjectId,setOpenProjectId}){
  const[selected,setSelected]=useState(null);
  const[showDone,setShowDone]=useState(false);

  // 外部触发跳转（左侧栏点项目时设置 openProjectId）
  useEffect(()=>{
    if(openProjectId){
      setSelected(openProjectId);
      setOpenProjectId&&setOpenProjectId(null); // 消费一次
    }
  },[openProjectId]);

  const projStats=projects.map(p=>{
    const pt=tasks.filter(t=>t.projectId===p.id);
    const done=pt.filter(t=>t.done).length;
    const prog=pt.length?pt.reduce((s,t)=>s+(t.done?1:(t.progress||0)),0)/pt.length:0;
    const dur=pt.reduce((s,t)=>s+(t.actualMin||0),0);
    return{...p,taskN:pt.length,doneN:done,progress:prog,duration:dur};
  });

  // 分桶：进行中 / 未启动 / 已完成（必须在任何早退出 return 之前，遵守 Hooks 规则）
  const grouped=useMemo(()=>{
    const doing=[],idle=[],done=[];
    projStats.forEach(p=>{
      if(p.taskN===0)idle.push(p);
      else if(p.progress>=1)done.push(p);
      else doing.push(p);
    });
    doing.sort((a,b)=>b.progress-a.progress);
    return{doing,idle,done};
  },[projects,tasks]);

  if(selected){
    const p=projStats.find(x=>x.id===selected);if(!p){setSelected(null);return null;}
    const pTasks=tasks.filter(t=>t.projectId===p.id);
    const pTodo=pTasks.filter(t=>!t.done);
    const pDone=pTasks.filter(t=>t.done);
    const pDoing=pTasks.filter(t=>!t.done&&(t.progress||0)>0);
    return(
      <div className="fadeIn">
        <button onClick={()=>setSelected(null)} style={{marginBottom:14,padding:"7px 12px",borderRadius:9,background:th.glass2,color:th.ink2,fontSize:12,display:"inline-flex",alignItems:"center",gap:6}}><Ic n="chevLeft" size={12} color={th.ink2}/> 返回项目</button>
        <div className="glass" style={{padding:24,borderRadius:18,borderLeft:`4px solid ${p.color}`,marginBottom:14,position:"relative",overflow:"hidden"}}>
          <Blob3D size={120} hue={p.color==="#6d5fff"?260:p.color==="#ec4899"?320:p.color==="#22d3ee"?195:p.color==="#10d9a3"?150:p.color==="#f5a524"?38:0} style={{right:-40,top:-30,opacity:0.3}}/>
          <div style={{position:"relative"}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
              <span style={{fontSize:26,color:p.color,textShadow:`0 0 14px ${p.color}`}}>{p.glyph}</span>
              <h1 className="display" style={{fontSize:34,color:th.ink0,letterSpacing:"-0.02em"}}>{p.name}</h1>
            </div>
            {p.description&&<div style={{fontSize:13,color:th.ink2,lineHeight:1.6,marginBottom:16}}>{p.description}</div>}
            {/* 周期信息 */}
            {(p.startDate||p.endDate)&&(()=>{
              const inProgress=p.startDate&&p.endDate&&p.startDate<=today&&today<=p.endDate;
              const finished=p.endDate&&today>p.endDate;
              const notYet=p.startDate&&today<p.startDate;
              const totalDays=p.startDate&&p.endDate?Math.max(1,Math.round((new Date(p.endDate)-new Date(p.startDate))/86400000)+1):null;
              const passedDays=p.startDate?Math.max(0,Math.round((new Date(today)-new Date(p.startDate))/86400000)):null;
              const dayPct=totalDays&&passedDays!=null?Math.min(100,Math.max(0,(passedDays/totalDays)*100)):0;
              return(
                <div style={{padding:"10px 12px",borderRadius:10,background:th.glass1,border:`1px solid ${th.glassBorder}`,marginBottom:12}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                    <Ic n="calendar" size={12} color={p.color}/>
                    <span className="mono" style={{fontSize:11,color:th.ink2,letterSpacing:"0.04em"}}>
                      {p.startDate||"—"} → {p.endDate||"—"}
                    </span>
                    <div style={{flex:1}}/>
                    <span className="mono" style={{fontSize:10,color:inProgress?p.color:finished?"#ff5d7a":th.ink3,fontWeight:600,letterSpacing:"0.06em"}}>
                      {inProgress?"进行中":finished?"已结束":notYet?"未开始":""}
                    </span>
                  </div>
                  {totalDays&&(
                    <div style={{display:"flex",alignItems:"center",gap:8,fontSize:10,color:th.ink3}}>
                      <div style={{flex:1,height:4,borderRadius:2,background:th.glass2,overflow:"hidden"}}>
                        <div style={{width:`${dayPct}%`,height:"100%",background:p.color,boxShadow:`0 0 4px ${p.color}80`}}/>
                      </div>
                      <span className="mono tnum">{passedDays}/{totalDays}d</span>
                    </div>
                  )}
                </div>
              );
            })()}
            <div style={{height:6,borderRadius:3,background:th.glass2,overflow:"hidden",marginBottom:12}}>
              <div style={{width:`${p.progress*100}%`,height:"100%",background:`linear-gradient(90deg,${p.color},${p.color}aa)`,boxShadow:`0 0 8px ${p.color}80`,transition:"width 0.5s var(--ease)"}}/>
            </div>
            <div style={{display:"flex",gap:8,marginTop:8,flexWrap:"wrap"}}>
              <button onClick={()=>{setTaskForm({...emptyTask,projectId:p.id,due:today});setShowTaskForm(true);}} style={{padding:"9px 14px",borderRadius:10,background:`linear-gradient(135deg,${p.color},${p.color}aa)`,color:"#fff",fontSize:12,fontWeight:600,display:"flex",alignItems:"center",gap:6,boxShadow:`0 4px 12px ${p.color}66`}}><Ic n="plus" size={12} sw={2.2}/> 添加任务</button>
              <button onClick={()=>{setEditProjectId(p.id);setShowProjectForm(true);}} className="glass" style={{padding:"9px 14px",borderRadius:10,fontSize:12,color:th.ink1,display:"flex",alignItems:"center",gap:6}}><Ic n="edit" size={12}/> 编辑项目</button>
              <button onClick={()=>{removeProject(p.id);setSelected(null);}} className="glass" style={{padding:"9px 14px",borderRadius:10,fontSize:12,color:"#ff5d7a",display:"flex",alignItems:"center",gap:6}}><Ic n="trash" size={12}/> 删除</button>
            </div>
          </div>
        </div>
        {/* Stats */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:14}}>
          <div className="glass" style={{padding:"12px 14px",borderRadius:11,borderTop:`2px solid ${p.color}`}}>
            <div className="mono" style={{fontSize:11,letterSpacing:"0.16em",color:th.ink3,fontWeight:600}}>总任务</div>
            <div className="display tnum" style={{fontSize:24,color:th.ink0,marginTop:2}}>{pTasks.length}</div>
          </div>
          <div className="glass" style={{padding:"12px 14px",borderRadius:11,borderTop:"2px solid #10d9a3"}}>
            <div className="mono" style={{fontSize:11,letterSpacing:"0.16em",color:th.ink3,fontWeight:600}}>已完成</div>
            <div className="display tnum" style={{fontSize:24,color:th.ink0,marginTop:2}}>{pDone.length}</div>
          </div>
          <div className="glass" style={{padding:"12px 14px",borderRadius:11,borderTop:`2px solid ${th.accent3}`}}>
            <div className="mono" style={{fontSize:11,letterSpacing:"0.16em",color:th.ink3,fontWeight:600}}>进行中</div>
            <div className="display tnum" style={{fontSize:24,color:th.ink0,marginTop:2}}>{pDoing.length}</div>
          </div>
          <div className="glass" style={{padding:"12px 14px",borderRadius:11,borderTop:"2px solid #f5a524"}}>
            <div className="mono" style={{fontSize:11,letterSpacing:"0.16em",color:th.ink3,fontWeight:600}}>专注</div>
            <div className="display tnum" style={{fontSize:18,color:th.ink0,marginTop:2}}>{fmtMin(p.duration)||"0"}</div>
          </div>
        </div>
        <div className="mono" style={{fontSize:12,letterSpacing:"0.18em",color:th.ink3,marginBottom:10,fontWeight:600,display:"flex",alignItems:"center",gap:10}}>
          <span>项目任务 · {pTasks.length}</span>
          <div style={{flex:1,height:1,background:th.glassBorder}}/>
        </div>
        {pTasks.length===0?<EmptyState th={th} text='这个项目还没有任务 · 点击上方"添加任务"开始' icon="folder"/>:(
          <div style={{display:"flex",flexDirection:"column",gap:7}}>
            {[...pTodo,...pDone].map(t=>{
              const c=catOf(t.category);
              return(
                <div key={t.id} className="glass hover-lift" style={{padding:"11px 14px",borderRadius:11,borderLeft:`3px solid ${t.done?"#10d9a3":c.color}`,display:"flex",alignItems:"center",gap:10,opacity:t.done?0.65:1}}>
                  <button onClick={()=>toggleTask(t.id)} style={{flexShrink:0,width:20,height:20,borderRadius:6,background:t.done?`linear-gradient(135deg,${c.color},${c.color}aa)`:"transparent",border:t.done?"none":`1.5px solid ${th.glassBorderStrong}`,display:"flex",alignItems:"center",justifyContent:"center"}}>

                    {!t.done&&(t.progress||0)>0&&(
                      <div style={{marginTop:6,height:3,borderRadius:2,background:th.glass2,overflow:"hidden"}}>
                        <div style={{width:`${(t.progress||0)*100}%`,height:"100%",background:`linear-gradient(90deg,${c.color},${c.color}aa)`}}/>
                      </div>
                    )}
                  </div>
                  <button onClick={()=>startEdit(t)} style={{width:28,height:28,borderRadius:7,background:th.glass2,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Ic n="edit" size={11} color={th.ink2}/></button>
                </div>
              );
            })}
          </div>
        )}
      </div>
    );
  }

  const renderCard=p=>{
    const hue=p.color.startsWith("#")?parseInt(p.color.slice(1,3),16):260;
    const isDone=p.progress>=1&&p.taskN>0;
    return(
      <div key={p.id} onClick={()=>setSelected(p.id)} className="glass hover-lift" style={{padding:20,borderRadius:18,borderLeft:`3px solid ${p.color}`,position:"relative",overflow:"hidden",boxShadow:`0 10px 26px ${p.color}22`,cursor:"pointer",opacity:isDone?0.68:1}}>
        <Blob3D size={80} hue={hue} style={{right:-24,top:-24,opacity:isDone?0.18:0.32}}/>
        {isDone&&<div style={{position:"absolute",top:12,right:12,padding:"3px 9px",borderRadius:999,background:"linear-gradient(135deg,#10d9a3,#10a376)",color:"#fff",fontSize:10,fontWeight:700,letterSpacing:"0.08em",zIndex:2,boxShadow:"0 4px 10px rgba(16,217,163,0.4)"}}>✓ 已完成</div>}

            <div style={{flex:1,minWidth:0,paddingRight:isDone?56:0}}>
              <div className="display" style={{fontSize:19,color:th.ink0,lineHeight:1.1,letterSpacing:"-0.02em",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</div>
              {p.description&&<div style={{fontSize:11,color:th.ink3,marginTop:4,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.description}</div>}
            </div>
          </div>
          <div style={{marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
              <span className="mono" style={{fontSize:9,letterSpacing:"0.14em",color:th.ink3,fontWeight:600}}>进度</span>
              <span className="mono tnum" style={{fontSize:11,color:th.ink0,fontWeight:600}}>{Math.round(p.progress*100)}%</span>
            </div>
            <div style={{height:5,borderRadius:3,background:th.glass2,overflow:"hidden"}}>
              <div style={{width:`${p.progress*100}%`,height:"100%",background:`linear-gradient(90deg,${p.color},${p.color}aa)`,boxShadow:`0 0 8px ${p.color}80`}}/>
            </div>

          <div style={{display:"flex",alignItems:"center",gap:14,fontSize:11,color:th.ink2,paddingTop:12,borderTop:`1px solid ${th.glassBorder}`}}>
            <span className="mono tnum"><strong style={{color:th.ink0,fontWeight:600}}>{p.doneN}</strong>/{p.taskN}</span>
            {p.duration>0&&<span className="mono tnum">⏱ {fmtMin(p.duration)}</span>}
            {p.taskN===0&&<span className="mono" style={{color:th.ink3,opacity:0.7}}>未启动</span>}
          </div>
        </div>
      </div>
    );
  };

  const groupHeader=(label,count,color)=>(
    <div style={{gridColumn:"1/-1",display:"flex",alignItems:"center",gap:10,marginTop:count?4:0}}>
      <span className="mono" style={{fontSize:11,letterSpacing:"0.18em",color:color,fontWeight:600}}>{label} · {count}</span>
      <div style={{flex:1,height:1,background:th.glassBorder}}/>
    </div>
  );

  return(
    <div className="fadeIn">
      <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",marginBottom:18}}>
        <div>
          <div className="mono" style={{fontSize:11,letterSpacing:"0.22em",color:th.ink3,marginBottom:6,fontWeight:600}}>WORKSPACE · {projects.length} PROJECTS · {grouped.doing.length} 进行中</div>
          <h1 className="display" style={{fontSize:44,color:th.ink0,lineHeight:0.95,letterSpacing:"-0.03em"}}>
            <em style={{fontStyle:"italic"}} className="gradient-primary">项目</em>
          </h1>
        </div>
        <button onClick={()=>{setEditProjectId(null);setShowProjectForm(true);}} style={{padding:"11px 18px",borderRadius:12,background:`linear-gradient(135deg,${th.accent},${th.accent3})`,color:"#fff",fontSize:13,fontWeight:600,boxShadow:`0 8px 24px ${th.accent}66`,display:"flex",alignItems:"center",gap:8}}>
          <Ic n="plus" size={13} sw={2.5}/> 新建项目
        </button>
      </div>
      {projects.length===0?<EmptyState th={th} text="还没有项目 · 点击右上角「新建项目」开始" icon="folder"/>:(
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:14}}>
          {grouped.doing.length>0&&(<>
            {groupHeader("进行中",grouped.doing.length,th.accent2)}
            {grouped.doing.map(renderCard)}
          </>)}
          {grouped.idle.length>0&&(<>
            {groupHeader("未启动",grouped.idle.length,th.ink3)}
            {grouped.idle.map(renderCard)}
          </>)}
          {grouped.done.length>0&&(<>
            <div style={{gridColumn:"1/-1",display:"flex",alignItems:"center",gap:10,marginTop:4}}>
              <button onClick={()=>setShowDone(s=>!s)} className="mono" style={{fontSize:11,letterSpacing:"0.18em",color:"#10d9a3",fontWeight:600,display:"flex",alignItems:"center",gap:6,background:"transparent",padding:0,cursor:"pointer"}}>

// ═══ ACTIVITY VIEW ═══
function ActivityView({th,tasks:allTasks,searchedTasks,history,catOf,today}){
  const tasks=searchedTasks||allTasks;
  const[range,setRange]=useState("today"); // today / 7 / 30
  const[filter,setFilter]=useState("all"); // all / done / create / focus

  // 从 tasks + history 派生活动流
  const entries=useMemo(()=>{
    const out=[];
    // 今日
    tasks.forEach(t=>{
      const c=catOf(t.category);
      if(t.done&&t.due===today){
        out.push({date:today,time:t.timeEnd||t.timeStart||"",type:"done",title:t.title,desc:t.actualMin>0?`用时 ${fmtMin(t.actualMin)}`:"",color:"#10d9a3",icon:"check",cat:c});
      }
      if(t.createdAt===today){
        out.push({date:today,time:"",type:"create",title:t.title,desc:`创建 · ${c.name} · ${t.priority}`,color:t.done?th.ink3:th.accent,icon:"plus",cat:c});
      }
      if(t.actualMin>0&&t.due===today){
        out.push({date:today,time:t.timeStart||"",type:"focus",title:t.title,desc:`专注 ${fmtMin(t.actualMin)}`,color:th.accent3,icon:"play",cat:c});
      }
    });
    // 历史
    history.slice(-14).reverse().forEach(h=>{
      if(h.date===today)return;
      h.tasks.forEach(t=>{
        if(t.done){
          const c=catOf(t.category);
          out.push({date:h.date,time:t.timeEnd||t.timeStart||"",type:"done",title:t.title,desc:t.actualMin>0?`用时 ${fmtMin(t.actualMin)}`:"",color:"#10d9a3",icon:"check",cat:c});
        }
      });
    });
    return out.sort((a,b)=>{
      if(a.date!==b.date)return b.date.localeCompare(a.date);
      return(b.time||"").localeCompare(a.time||"");
    });
  },[tasks,history,today,catOf,th.accent,th.accent3,th.ink3]);

  const ranges={today:e=>e.date===today,7:e=>e.date>=addDays(today,-6),30:e=>e.date>=addDays(today,-29)};
  const filters={all:()=>true,done:e=>e.type==="done",create:e=>e.type==="create",focus:e=>e.type==="focus"};
  const filtered=entries.filter(ranges[range]).filter(filters[filter]);
  const byDate={};
  filtered.forEach(e=>{byDate[e.date]=byDate[e.date]||[];byDate[e.date].push(e);});
  const dates=Object.keys(byDate).sort((a,b)=>b.localeCompare(a));

  return(
    <div className="fadeIn" style={{display:"flex",gap:18}}>
      <aside style={{width:180,flexShrink:0}} className="desktop-only">
        <div className="mono" style={{fontSize:12,letterSpacing:"0.2em",color:th.ink3,marginBottom:10,fontWeight:600,padding:"0 4px"}}>筛选</div>
        <div style={{display:"flex",flexDirection:"column",gap:3,marginBottom:16}}>
          {[["all","全部",entries.length,"layers"],["done","已完成",entries.filter(e=>e.type==="done").length,"check"],["create","新建",entries.filter(e=>e.type==="create").length,"plus"],["focus","专注",entries.filter(e=>e.type==="focus").length,"flame"]].map(([k,l,n,ic])=>(
            <button key={k} onClick={()=>setFilter(k)} className={`nav-item ${filter===k?"active":""}`} style={{padding:"8px 10px",fontSize:12}}>
              <Ic n={ic} size={12} color={filter===k?th.accent2:th.ink3}/>
              <span style={{flex:1}}>{l}</span>
              <span className="mono tnum" style={{fontSize:10,color:th.ink3}}>{n}</span>
            </button>
          ))}
        </div>
        <div className="mono" style={{fontSize:12,letterSpacing:"0.2em",color:th.ink3,marginBottom:10,fontWeight:600,padding:"0 4px"}}>时间</div>
        <div style={{display:"flex",flexDirection:"column",gap:3}}>
          {[["today","今天"],["7","最近 7 天"],["30","最近 30 天"]].map(([k,l])=>(
            <button key={k} onClick={()=>setRange(k)} className={`nav-item ${range===k?"active":""}`} style={{padding:"8px 10px",fontSize:12}}>{l}</button>
          ))}
        </div>
      </aside>
      <main style={{flex:1,minWidth:0}}>
        <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",marginBottom:18}}>
          <div>
            <div className="mono" style={{fontSize:11,letterSpacing:"0.22em",color:th.ink3,marginBottom:6,fontWeight:600}}>ACTIVITY · {filtered.length} 件</div>
            <h1 className="display" style={{fontSize:42,color:th.ink0,letterSpacing:"-0.03em",lineHeight:1}}>
              <em style={{fontStyle:"italic"}} className="gradient-primary">活动流</em>
            </h1>
          </div>
        </div>
        {/* mobile tabs */}
        <div className="mobile-only" style={{display:"flex",gap:6,marginBottom:12,overflowX:"auto"}} >
          {[["all","全部"],["done","完成"],["create","新建"],["focus","专注"]].map(([k,l])=>(
            <button key={k} onClick={()=>setFilter(k)} className={`view-tab ${filter===k?"active":""}`} style={{flexShrink:0}}>{l}</button>
          ))}
        </div>

        {dates.length===0?<EmptyState th={th} text="还没有活动记录" icon="list"/>:
          dates.map(date=>(
            <div key={date} style={{marginBottom:20}}>
              <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
                <div style={{flex:1,height:1,background:`linear-gradient(90deg,${th.accent}40,transparent)`}}/>
                <span className="mono" style={{fontSize:12,letterSpacing:"0.18em",color:th.accent2,fontWeight:600}}>
                  {date===today?"TODAY":date===addDays(today,-1)?"YESTERDAY":date.slice(5).replace("-","/")} · {monthName(date)} {parseInt(date.slice(-2))}
                </span>
                <div style={{flex:4,height:1,background:`linear-gradient(90deg,${th.accent}40,transparent)`}}/>
              </div>
              <div style={{position:"relative",paddingLeft:40}}>
                <div style={{position:"absolute",left:14,top:14,bottom:14,width:2,background:`linear-gradient(180deg,${th.accent},${th.accent3},${th.accent2})`}}/>
                {byDate[date].map((e,i)=>(
                  <div key={i} style={{position:"relative",paddingBottom:12}}>
                    <div style={{position:"absolute",left:-34,top:6,width:28,height:28,borderRadius:10,background:e.color+"22",border:`1px solid ${e.color}55`,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 0 10px ${e.color}40`}}>
                      <Ic n={e.icon} size={13} color={e.color}/>
                    </div>
                    <div className="glass" style={{padding:"11px 14px",borderRadius:11}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3,flexWrap:"wrap"}}>
                        {e.time&&<span className="mono tnum" style={{fontSize:10,color:th.ink3,letterSpacing:"0.05em"}}>{e.time}</span>}
                        <span style={{fontSize:12,color:th.ink1}}>
                          <span style={{color:e.color,fontWeight:500}}>{e.title}</span>
                        </span>
                      </div>
                      {e.desc&&<div style={{fontSize:11,color:th.ink2,lineHeight:1.5}}>{e.desc}</div>}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          ))
        }
      </main>
    </div>
  );
}

// ═══ JOURNAL VIEW · 一句话日记历史 ═══
function JournalView({th,journals,today,saveJournal,removeJournal,setShowJournalModal}){
  const[viewMode,setViewMode]=useState("timeline"); // timeline / calendar
  const[editingDate,setEditingDate]=useState(null);
  const[editText,setEditText]=useState("");
  const[editMood,setEditMood]=useState("");

  const todayJournal=journals.find(j=>j.date===today);

  // 一年前的日期（自动归档分界）
  const archiveCutoff=useMemo(()=>{
    const d=new Date(today);d.setFullYear(d.getFullYear()-1);
    return d.toISOString().slice(0,10);
  },[today]);

  // 排序 + 分组
  const sortedJournals=useMemo(()=>[...journals].sort((a,b)=>b.date.localeCompare(a.date)),[journals]);
  const recent=sortedJournals.filter(j=>j.date>=archiveCutoff);
  const archived=sortedJournals.filter(j=>j.date<archiveCutoff);

  // 按月份分组
  const groupedByMonth=useMemo(()=>{
    const g={};
    recent.forEach(j=>{
      const ym=j.date.slice(0,7); // YYYY-MM
      if(!g[ym])g[ym]=[];
      g[ym].push(j);
    });
    return Object.keys(g).sort().reverse().map(ym=>({ym,items:g[ym]}));
  },[recent]);

  // 统计
  const stats=useMemo(()=>{
    // 连续天数
    let streak=0;
    for(let i=0;i<365;i++){
      const d=addDays(today,-i);
      const has=journals.some(j=>j.date===d);
      if(has)streak++;else if(i>0)break;
    }
    // 本月已写
    const thisMonth=today.slice(0,7);
    const monthCount=journals.filter(j=>j.date.startsWith(thisMonth)).length;
    return{streak,total:journals.length,monthCount};
  },[journals,today]);

  // 日历模式数据：本月每天有没有写
  const calendarData=useMemo(()=>{
    const d=new Date(today);
    const year=d.getFullYear(),month=d.getMonth();
    const firstDay=new Date(year,month,1);
    const lastDay=new Date(year,month+1,0);
    const startWd=(firstDay.getDay()+6)%7; // 周一为 0
    const days=lastDay.getDate();
    const cells=[];
    for(let i=0;i<startWd;i++)cells.push(null);
    for(let day=1;day<=days;day++){
      const dStr=`${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
      const j=journals.find(x=>x.date===dStr);
      cells.push({date:dStr,day,journal:j,isToday:dStr===today,isFuture:dStr>today});
    }
    return{cells,monthLabel:`${year} 年 ${month+1} 月`};
  },[journals,today]);

  const startEdit=(j)=>{
    setEditingDate(j.date);
    setEditText(j.wish||"");
    setEditMood(j.mood||"");
  };
  const saveEdit=()=>{
    if(!editText.trim())return;
    saveJournal(editText.trim(),editMood,editingDate);
    setEditingDate(null);
  };

  const cancelEdit=()=>{setEditingDate(null);setEditText("");setEditMood("");};

  const monthLabel=(ym)=>{
    const[y,m]=ym.split("-");
    return`${parseInt(m)} 月 ${y}`;
  };
  const dateLabel=(d)=>{
    if(d===today)return"今天";
    if(d===addDays(today,-1))return"昨天";
    if(d===addDays(today,-2))return"前天";
    const dt=new Date(d);
    return`${dt.getDate()} 日 · 周${["日","一","二","三","四","五","六"][dt.getDay()]}`;
  };

  return(
    <div className="fadeIn">
      <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",marginBottom:18,flexWrap:"wrap",gap:12}}>
        <div>
          <div className="mono" style={{fontSize:11,letterSpacing:"0.22em",color:th.ink3,marginBottom:6,fontWeight:600}}>JOURNAL · {journals.length} 篇</div>
          <h1 className="display" style={{fontSize:44,color:th.ink0,lineHeight:0.95,letterSpacing:"-0.03em"}}>
            <em style={{fontStyle:"italic"}} className="gradient-primary">一句日记</em>
          </h1>
        </div>

// ═══ RECENT VIEW · 近期完成 ═══
function RecentView({th,tasks,catOf,projOf,tags,tagsMap,today,history,cats}){
  const[range,setRange]=useState("30"); // 7 / 30 / 90 / all
  const[catFilter,setCatFilter]=useState("all");
  const[tagFilter,setTagFilter]=useState("all"); // 'all' or tag id

  // 收集所有已完成任务（来自当前 tasks 列表 + history 中已完成且当前已不在 tasks 的）
  const completedItems=useMemo(()=>{
    const items=[];
    // 1. 当前 tasks 列表里 done=true 的
    tasks.forEach(t=>{
      if(!t.done)return;
      // completedAt 兜底：用 due 或 today
      const ca=t.completedAt||t.due||today;
      items.push({...t,completedAt:ca,_source:"current"});
    });
    // 2. history 里每天的快照中 done=true 但当前 tasks 里已经没有（说明被重置或删除）的
    const curIds=new Set(tasks.map(t=>t.id));
    (history||[]).forEach(h=>{
      (h.tasks||[]).forEach(ht=>{
        if(!ht.done)return;
        if(curIds.has(ht.id))return; // 当前列表里已统计过
        items.push({...ht,completedAt:h.date,_source:"history"});
      });
    });
    return items;
  },[tasks,history,today]);

  // 时间范围过滤
  const cutoffDate=useMemo(()=>{
    if(range==="all")return null;
    const days=parseInt(range,10);
    return addDays(today,-days);
  },[range,today]);

  // 应用所有筛选
  const filtered=useMemo(()=>{
    let arr=completedItems;
    if(cutoffDate)arr=arr.filter(t=>(t.completedAt||"")>=cutoffDate);
    if(catFilter!=="all")arr=arr.filter(t=>t.category===catFilter);
    if(tagFilter!=="all")arr=arr.filter(t=>(t.tagIds||[]).includes(tagFilter));
    // 按完成日期降序，同一天内按 timeStart 降序
    arr=[...arr].sort((a,b)=>{
      const ad=a.completedAt||"",bd=b.completedAt||"";
      if(ad!==bd)return bd.localeCompare(ad);
      return(b.timeStart||"").localeCompare(a.timeStart||"");
    });
    return arr;
  },[completedItems,cutoffDate,catFilter,tagFilter]);

  // 按日期分组
  const grouped=useMemo(()=>{
    const g={};
    filtered.forEach(t=>{
      const d=t.completedAt||today;
      if(!g[d])g[d]=[];
      g[d].push(t);
    });
    return Object.keys(g).sort().reverse().map(d=>({date:d,tasks:g[d]}));
  },[filtered,today]);

  // 顶部成就统计
  const stats=useMemo(()=>{
    const w7=addDays(today,-7),w30=addDays(today,-30);
    const last7=completedItems.filter(t=>(t.completedAt||"")>=w7).length;
    const last30=completedItems.filter(t=>(t.completedAt||"")>=w30).length;
    // 连续天数：从 today 往回看，每天必须有完成
    let streak=0;
    for(let i=0;i<365;i++){
      const d=addDays(today,-i);
      const hasDone=completedItems.some(t=>(t.completedAt||"")===d);
      if(hasDone)streak++;else if(i>0)break;else continue; // 今天没完成也允许（可能还没到结束时间）
    }
    return{last7,last30,total:completedItems.length,streak};
  },[completedItems,today]);

  const dateLabel=(d)=>{
    if(d===today)return"今天";
    if(d===addDays(today,-1))return"昨天";
    if(d===addDays(today,-2))return"前天";
    const diff=Math.round((new Date(today)-new Date(d))/(24*3600*1000));
    if(diff>=3&&diff<=6)return`${diff} 天前`;
    return d;
  };
  const weekday=(d)=>{
    try{return["日","一","二","三","四","五","六"][new Date(d).getDay()];}catch{return"";}
  };

  return(
    <div className="fadeIn">
      <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:12}}>
        <div>
          <div className="mono" style={{fontSize:11,letterSpacing:"0.22em",color:th.ink3,marginBottom:6,fontWeight:600}}>RECENT · {filtered.length} 项</div>
          <h1 className="display" style={{fontSize:44,color:th.ink0,lineHeight:0.95,letterSpacing:"-0.03em"}}>
            <em style={{fontStyle:"italic"}} className="gradient-primary">近期完成</em>
          </h1>
        </div>
      </div>

      {/* 成就统计 */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:18}}>
        {[
          {label:"近 7 天",val:stats.last7,sub:"项",color:th.accent},
          {label:"近 30 天",val:stats.last30,sub:"项",color:th.accent2},
          {label:"累计",val:stats.total,sub:"项",color:th.accent3},
          {label:"连续",val:stats.streak,sub:"天",color:"#10d9a3"},
        ].map(s=>(
          <div key={s.label} className="glass" style={{padding:"14px 14px",borderRadius:13,borderTop:`2px solid ${s.color}`,boxShadow:`0 0 0 1px ${s.color}20`}}>
            <div className="mono" style={{fontSize:9,color:th.ink3,letterSpacing:"0.14em",fontWeight:600,marginBottom:4}}>{s.label}</div>
            <div style={{display:"flex",alignItems:"baseline",gap:4}}>
              <span className="display tnum" style={{fontSize:26,color:s.color,letterSpacing:"-0.04em",lineHeight:1}}>{s.val}</span>
              <span className="mono" style={{fontSize:10,color:th.ink3}}>{s.sub}</span>
            </div>
          </div>
        ))}
      </div>

      {/* 筛选区 */}
      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:18}}>
        <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:4}} className="slim-scroll">
          {[["7","近 7 天"],["30","近 30 天"],["90","近 90 天"],["all","全部"]].map(([k,l])=>(
            <button key={k} onClick={()=>setRange(k)} className={`view-tab ${range===k?"active":""}`} style={{flexShrink:0}}>{l}</button>
          ))}
        </div>
        {/* 分类 */}
        <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:4}} className="slim-scroll">
          <button onClick={()=>setCatFilter("all")} className={`view-tab ${catFilter==="all"?"active":""}`} style={{flexShrink:0}}>全部分类</button>
          {cats.map(c=>{
            const n=completedItems.filter(t=>t.category===c.id).length;
            if(n===0)return null;
            const act=catFilter===c.id;
            return<button key={c.id} onClick={()=>setCatFilter(c.id)} className={`view-tab ${act?"active":""}`} style={{flexShrink:0,background:act?c.color+"30":th.glass1,color:act?c.color:th.ink2,borderLeft:act?`2px solid ${c.color}`:"none"}}><span style={{color:c.color}}>{c.glyph}</span> {c.name} · {n}</button>;
          })}
        </div>
        {/* 标签筛选 */}
        {tags&&tags.length>0&&(
          <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:4}} className="slim-scroll">
            <button onClick={()=>setTagFilter("all")} className={`view-tab ${tagFilter==="all"?"active":""}`} style={{flexShrink:0}}>全部标签</button>
            {tags.map(tg=>{
              const n=completedItems.filter(t=>(t.tagIds||[]).includes(tg.id)).length;
              if(n===0)return null;
              const act=tagFilter===tg.id;
              return<button key={tg.id} onClick={()=>setTagFilter(tg.id)} className="view-tab" style={{flexShrink:0,background:act?tg.color+"35":th.glass1,color:act?tg.color:th.ink2,border:`1px solid ${act?tg.color+"80":th.glassBorder}`,boxShadow:act?`0 0 8px ${tg.color}40`:"none"}}>#{tg.name} · {n}</button>;
            })}
          </div>
        )}
      </div>

      {/* 分组列表 */}
      {grouped.length===0?(
        <EmptyState th={th} text={range==="all"?"还没有完成任何任务":"该时间范围内没有完成的任务"} icon="check"/>
      ):(
        <div style={{display:"flex",flexDirection:"column",gap:18}}>
          {grouped.map(({date,tasks:dayTasks})=>{
            const totalMin=dayTasks.reduce((s,t)=>s+(t.actualMin||0),0);
            return(
              <div key={date}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                  <span className="display" style={{fontSize:18,color:th.ink0,letterSpacing:"-0.02em"}}>{dateLabel(date)}</span>
                  <span className="mono" style={{fontSize:10,color:th.ink3,letterSpacing:"0.1em"}}>· 周{weekday(date)} · {date.slice(5).replace("-","/")}</span>
                  <div style={{flex:1,height:1,background:th.glassBorder}}/>
                  <span className="mono tnum" style={{fontSize:11,color:th.ink2,fontWeight:600}}>✓ {dayTasks.length}{totalMin>0?` · ${fmtMin(totalMin)}`:""}</span>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:5}}>
                  {dayTasks.map((t,i)=>{
                    const c=catOf(t.category);
                    const proj=t.projectId&&projOf?projOf(t.projectId):null;
                    const itemTags=(t.tagIds||[]).map(tid=>tagsMap&&tagsMap[tid]).filter(Boolean);
                    return(
                      <div key={t.id+"-"+date+"-"+i} className="glass hover-lift" style={{padding:"10px 14px",borderRadius:10,borderLeft:`2px solid ${c.color}`,display:"flex",alignItems:"center",gap:10,opacity:0.92}}>
                        <div style={{width:16,height:16,borderRadius:5,background:`linear-gradient(135deg,${c.color},${c.color}aa)`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,boxShadow:`0 0 6px ${c.color}60`}}>
                          <Ic n="check" size={9} color="#fff" sw={2.5}/>
                        </div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:13,color:th.ink1,textDecoration:"line-through",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontWeight:500}}>{t.title}</div>
                          <div style={{display:"flex",gap:6,marginTop:3,flexWrap:"wrap",alignItems:"center"}}>
                            <span className="mono" style={{fontSize:9,color:c.color,fontWeight:600}}>{c.glyph} {c.name}</span>
                            {proj&&<span className="mono" style={{fontSize:9,color:proj.color}}>· {proj.glyph} {proj.name}</span>}
                            {itemTags.map(tg=><span key={tg.id} className="mono" style={{fontSize:9,padding:"1px 6px",borderRadius:5,background:tg.color+"20",color:tg.color}}>#{tg.name}</span>)}
                            {t.actualMin>0&&<span className="mono tnum" style={{fontSize:9,color:th.ink3}}>· ⏱ {fmtMin(t.actualMin)}</span>}
                            {t.timeStart&&<span className="mono tnum" style={{fontSize:9,color:th.ink3}}>· {t.timeStart}</span>}
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ═══ REVIEW VIEW ═══
function ReviewView({th,reviewSub,setReviewSub,tasks,history,cats,projects,catOf,today,projOf,journals,showToast}){
  const tabs=[["today","今日"],["week","本周"],["month","本月"],["weekly","周报告"],["timeOfDay","时段"],["burndown","燃尽"],["catTime","耗时"],["heatmap","热力图"],["habits","习惯"],["all","历史"]];
  const[aiReport,setAiReport]=useState(null); // {type:"daily"|"weekly", data, date(s)}
  const[aiLoading,setAiLoading]=useState(false);
  const generateDailyReport=async(date)=>{
    if(aiLoading)return;
    setAiLoading(true);
    try{
      const data=await aiDailyReport({date,tasks,history,catOf,projOf:projOf||(id=>projects.find(p=>p.id===id)),journals});
      setAiReport({type:"daily",data,date});
    }catch(e){showToast&&showToast("AI 报告失败: "+e.message,"error");}
    setAiLoading(false);
  };
  const generateWeeklyReport=async(start,end)=>{
    if(aiLoading)return;
    setAiLoading(true);
    try{
      const data=await aiWeeklyReport({startDate:start,endDate:end,history,tasks,catOf,projOf:projOf||(id=>projects.find(p=>p.id===id)),journals});
      setAiReport({type:"weekly",data,startDate:start,endDate:end});
    }catch(e){showToast&&showToast("AI 周报告失败: "+e.message,"error");}
    setAiLoading(false);
  };
  return(
    <div className="fadeIn">
      <div style={{marginBottom:16}}>
        <div className="mono" style={{fontSize:11,letterSpacing:"0.22em",color:th.ink3,marginBottom:6,fontWeight:600}}>REVIEW · 复盘分析</div>
        <h1 className="display" style={{fontSize:38,color:th.ink0,letterSpacing:"-0.03em",lineHeight:1}}>
          <em style={{fontStyle:"italic"}} className="gradient-primary">复盘</em>
        </h1>
      </div>
      <div style={{display:"flex",gap:5,overflowX:"auto",marginBottom:18,paddingBottom:4}} className="slim-scroll">
        {tabs.map(([k,l])=>(
          <button key={k} onClick={()=>setReviewSub(k)} className={`view-tab ${reviewSub===k?"active":""}`} style={{flexShrink:0}}>{l}</button>
        ))}
      </div>
      {/* AI 报告生成区 — 仅在 today / week 标签显示 */}
      {(reviewSub==="today"||reviewSub==="week")&&(
        <div className="glass" style={{padding:"12px 16px",borderRadius:13,marginBottom:14,display:"flex",alignItems:"center",gap:12,border:`1px dashed ${th.accent}50`,background:`linear-gradient(135deg,${th.accent}08,${th.accent3}06)`}}>
          <div style={{width:36,height:36,borderRadius:9,background:`linear-gradient(135deg,${th.accent},${th.accent3})`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <span style={{fontSize:18}}>✨</span>
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:13,fontWeight:600,color:th.ink0}}>AI {reviewSub==="today"?"今日复盘":"本周报告"}</div>
            <div style={{fontSize:11,color:th.ink2,marginTop:1}}>由 DeepSeek 分析{reviewSub==="today"?"今日":"本周"}数据，生成深度洞察</div>
          </div>
          <button onClick={()=>{
            if(reviewSub==="today")generateDailyReport(today);
            else generateWeeklyReport(addDays(today,-6),today);
          }} disabled={aiLoading} style={{padding:"8px 14px",borderRadius:9,background:aiLoading?th.glass2:`linear-gradient(135deg,${th.accent},${th.accent3})`,color:aiLoading?th.ink3:"#fff",fontSize:12,fontWeight:600,boxShadow:aiLoading?"none":`0 4px 12px ${th.accent}50`,display:"flex",alignItems:"center",gap:6,cursor:aiLoading?"wait":"pointer"}}>
            {aiLoading?<><span className="spin">○</span> 分析中</>:<><Ic n="zap" size={11} sw={2.2} color="#fff"/> 生成报告</>}
          </button>
        </div>
      )}
      {reviewSub==="today"&&<TodayReview th={th} tasks={tasks} catOf={catOf} today={today}/>}
      {reviewSub==="week"&&<RangeReview th={th} tasks={tasks} history={history} catOf={catOf} today={today} days={7} label="本周"/>}
      {reviewSub==="month"&&<RangeReview th={th} tasks={tasks} history={history} catOf={catOf} today={today} days={30} label="本月"/>}
      {reviewSub==="weekly"&&<WeeklyReport th={th} tasks={tasks} history={history} cats={cats} projects={projects} catOf={catOf} today={today}/>}
      {reviewSub==="timeOfDay"&&<TimeOfDayHeatmap th={th} tasks={tasks} history={history} today={today}/>}
      {reviewSub==="burndown"&&<BurndownChart th={th} tasks={tasks} history={history} projects={projects} today={today}/>}
      {reviewSub==="catTime"&&<CategoryTimeAnalysis th={th} tasks={tasks} history={history} cats={cats} catOf={catOf} today={today}/>}
      {reviewSub==="heatmap"&&<HeatmapView th={th} tasks={tasks} history={history} today={today}/>}
      {reviewSub==="habits"&&<HabitsView th={th} tasks={tasks} history={history} catOf={catOf} today={today}/>}
      {reviewSub==="all"&&<AllHistory th={th} tasks={tasks} history={history} catOf={catOf} today={today}/>}
      {aiReport&&<AiReportModal th={th} report={aiReport} onClose={()=>setAiReport(null)}/>}
    </div>
  );
}

// ═══ 1. 周报告（自动生成）═══
function WeeklyReport({th,tasks,history,cats,projects,catOf,today}){
  const data=useMemo(()=>{
    const weekStart=addDays(today,-6); // 近 7 天
    // 收集本周完成的任务
    const completedThisWeek=[];
    tasks.forEach(t=>{
      if(t.done&&(t.completedAt||"")>=weekStart)completedThisWeek.push({...t,_d:t.completedAt});
    });
    const curIds=new Set(tasks.map(t=>t.id));
    (history||[]).forEach(h=>{
      if(h.date<weekStart)return;
      (h.tasks||[]).forEach(ht=>{if(ht.done&&!curIds.has(ht.id))completedThisWeek.push({...ht,_d:h.date});});
    });
    // 上周对比
    const lastWeekStart=addDays(today,-13),lastWeekEnd=addDays(today,-7);
    const completedLastWeek=[];
    tasks.forEach(t=>{
      const d=t.completedAt||"";
      if(t.done&&d>=lastWeekStart&&d<lastWeekEnd)completedLastWeek.push(t);
    });
    (history||[]).forEach(h=>{
      if(h.date<lastWeekStart||h.date>=lastWeekEnd)return;
      (h.tasks||[]).forEach(ht=>{if(ht.done&&!curIds.has(ht.id))completedLastWeek.push(ht);});
    });
    // 按分类汇总
    const byCat={};
    completedThisWeek.forEach(t=>{const k=t.category||"other";byCat[k]=(byCat[k]||0)+1;});
    const topCat=Object.entries(byCat).sort((a,b)=>b[1]-a[1])[0];
    // 总耗时
    const totalMin=completedThisWeek.reduce((s,t)=>s+(t.actualMin||0),0);
    const lastMin=completedLastWeek.reduce((s,t)=>s+(t.actualMin||0),0);
    // 每日完成量
    const daily=Array.from({length:7},(_,i)=>{
      const d=addDays(today,-(6-i));
      const n=completedThisWeek.filter(t=>t._d===d).length;
      return{date:d,count:n,wd:["日","一","二","三","四","五","六"][new Date(d).getDay()]};
    });
    const maxDaily=Math.max(...daily.map(d=>d.count),1);
    // 最高效那天
    const bestDay=[...daily].sort((a,b)=>b.count-a.count)[0];
    // 项目活跃度
    const projN={};
    completedThisWeek.forEach(t=>{if(t.projectId)projN[t.projectId]=(projN[t.projectId]||0)+1;});
    const activeProjects=Object.entries(projN).map(([id,n])=>({proj:projects.find(p=>p.id===id),n})).filter(x=>x.proj).sort((a,b)=>b.n-a.n);
    return{completedThisWeek,completedLastWeek,byCat,topCat,totalMin,lastMin,daily,maxDaily,bestDay,activeProjects};
  },[tasks,history,projects,today]);

  const{completedThisWeek,completedLastWeek,topCat,totalMin,lastMin,daily,maxDaily,bestDay,activeProjects}=data;
  const cur=completedThisWeek.length,prev=completedLastWeek.length;
  const delta=cur-prev,deltaPct=prev>0?Math.round((delta/prev)*100):(cur>0?100:0);
  const minDelta=totalMin-lastMin;

  return(
    <div className="fadeIn">
      {/* 顶部摘要 */}
      <div className="glass" style={{padding:"22px 24px",borderRadius:18,marginBottom:18,position:"relative",overflow:"hidden"}}>
        <Blob3D size={140} hue={260} style={{right:-40,top:-30,opacity:0.25}}/>
        <div style={{position:"relative"}}>
          <div className="mono" style={{fontSize:10,letterSpacing:"0.22em",color:th.ink3,marginBottom:6,fontWeight:600}}>WEEKLY DIGEST · {addDays(today,-6).slice(5)} – {today.slice(5)}</div>
          <div className="display" style={{fontSize:32,color:th.ink0,letterSpacing:"-0.03em",lineHeight:1.05,marginBottom:10}}>
            本周完成了 <em style={{fontStyle:"italic"}} className="gradient-primary">{cur}</em> 项任务
          </div>
          <div style={{fontSize:13,color:th.ink2,lineHeight:1.7}}>
            {cur===0?"本周还没有完成任何任务，新的开始随时可以从一小步迈出。":
              `${totalMin>0?`累计专注时长 ${fmtMin(totalMin)}，`:""}${delta!==0?(delta>0?`比上周多 ${delta} 项 (+${deltaPct}%)`:`比上周少 ${Math.abs(delta)} 项 (${deltaPct}%)`)+"，":""}${bestDay&&bestDay.count>0?`最高效是周${bestDay.wd}（完成 ${bestDay.count} 项）。`:""}${topCat?`主要在「${(catOf(topCat[0]).name)}」类别投入精力。`:""}`
            }
          </div>
        </div>
      </div>

      {/* KPI 卡 */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10,marginBottom:18}}>
        <StatCard th={th} label="完成任务" value={cur} sub={delta>=0?`↑${delta} vs 上周`:`↓${Math.abs(delta)} vs 上周`} color={th.accent}/>
        <StatCard th={th} label="专注时长" value={fmtMin(totalMin)||"—"} sub={minDelta!==0?(minDelta>0?`↑${fmtMin(minDelta)}`:`↓${fmtMin(Math.abs(minDelta))}`):"—"} color={th.accent2}/>
        <StatCard th={th} label="日均完成" value={(cur/7).toFixed(1)} sub="项/天" color={th.accent3}/>
        <StatCard th={th} label="活跃天数" value={daily.filter(d=>d.count>0).length} sub="/ 7 天" color="#10d9a3"/>
      </div>

      {/* 每日柱状 */}
      <div className="glass" style={{padding:18,borderRadius:14,marginBottom:14}}>
        <div className="mono" style={{fontSize:10,letterSpacing:"0.18em",color:th.ink3,marginBottom:14,fontWeight:600}}>每日完成量</div>
        <div style={{display:"flex",alignItems:"flex-end",gap:6,height:120}}>
          {daily.map(d=>{
            const h=d.count===0?6:Math.max(12,(d.count/maxDaily)*100);
            const isToday=d.date===today;
            const isBest=d.count===maxDaily&&d.count>0;
            return(
              <div key={d.date} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
                <div className="mono tnum" style={{fontSize:11,color:isBest?th.accent:th.ink2,fontWeight:isBest?700:500}}>{d.count}</div>
                <div style={{width:"100%",height:`${h}px`,borderRadius:"6px 6px 0 0",background:d.count===0?th.glass2:`linear-gradient(180deg,${isToday?th.accent3:th.accent} 0%,${isBest?th.accent2:th.accent}80 100%)`,boxShadow:isBest?`0 0 12px ${th.accent}80`:undefined,transition:"height 0.6s var(--ease)"}}/>
                <div className="mono" style={{fontSize:9,color:th.ink3,letterSpacing:"0.05em",fontWeight:isToday?700:400}}>{d.wd}</div>
              </div>
            );
          })}
        </div>
      </div>

      {/* 活跃项目 */}
      {activeProjects.length>0&&(
        <div className="glass" style={{padding:18,borderRadius:14,marginBottom:14}}>
          <div className="mono" style={{fontSize:10,letterSpacing:"0.18em",color:th.ink3,marginBottom:12,fontWeight:600}}>活跃项目</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {activeProjects.slice(0,5).map(({proj,n})=>{
              const total=tasks.filter(t=>t.projectId===proj.id).length;
              return(
                <div key={proj.id} style={{display:"flex",alignItems:"center",gap:12}}>
                  <span style={{fontSize:14,color:proj.color,minWidth:18}}>{proj.glyph}</span>
                  <span style={{flex:1,fontSize:13,color:th.ink1,fontWeight:500}}>{proj.name}</span>
                  <div style={{flex:2,height:6,borderRadius:3,background:th.glass2,overflow:"hidden",maxWidth:180}}>
                    <div style={{width:`${(n/cur)*100}%`,height:"100%",background:`linear-gradient(90deg,${proj.color},${proj.color}aa)`,boxShadow:`0 0 6px ${proj.color}`}}/>
                  </div>
                  <span className="mono tnum" style={{fontSize:11,color:th.ink2,minWidth:50,textAlign:"right"}}>{n}<span style={{color:th.ink3}}>/{total}</span></span>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// ═══ 2. 完成时段热力图（24h × 7d）═══
function TimeOfDayHeatmap({th,tasks,history,today}){
  const data=useMemo(()=>{
    // 收集所有"完成时刻"。优先用 timeStart，否则按 hour bucket = 任务日期+12（默认中午）
    const events=[];
    const allDone=[];
    tasks.forEach(t=>{if(t.done&&(t.completedAt||""))allDone.push({date:t.completedAt,timeStart:t.timeStart});});
    const curIds=new Set(tasks.map(t=>t.id));
    (history||[]).forEach(h=>{
      (h.tasks||[]).forEach(ht=>{if(ht.done&&!curIds.has(ht.id))allDone.push({date:h.date,timeStart:ht.timeStart});});
    });
    // 时段分桶 24h × 7（周一-周日）
    const buckets=Array.from({length:7},()=>Array(24).fill(0));
    let total=0;
    allDone.forEach(t=>{
      try{
        const d=new Date(t.date);if(isNaN(d.getTime()))return;
        const wd=(d.getDay()+6)%7; // 周一为 0
        let hour=12;
        if(t.timeStart){const[h]=t.timeStart.split(":").map(Number);if(!isNaN(h))hour=h;}
        buckets[wd][hour]+=1;
        total+=1;
      }catch{}
    });
    let max=0;buckets.forEach(row=>row.forEach(v=>{if(v>max)max=v;}));
    // 找峰值时段
    let peakHour=-1,peakHourCount=0;
    for(let h=0;h<24;h++){let c=0;for(let w=0;w<7;w++)c+=buckets[w][h];if(c>peakHourCount){peakHourCount=c;peakHour=h;}}
    let peakDay=-1,peakDayCount=0;
    for(let w=0;w<7;w++){let c=0;for(let h=0;h<24;h++)c+=buckets[w][h];if(c>peakDayCount){peakDayCount=c;peakDay=w;}}
    return{buckets,max,total,peakHour,peakHourCount,peakDay,peakDayCount};
  },[tasks,history]);

  const{buckets,max,total,peakHour,peakDay}=data;
  const wdNames=["周一","周二","周三","周四","周五","周六","周日"];

  const cellColor=(v)=>{
    if(v===0)return th.glass2;
    const intensity=Math.min(v/max,1);
    // 用 accent 颜色加透明度
    const opacity=Math.round((0.2+intensity*0.8)*255).toString(16).padStart(2,"0");
    return th.accent+opacity;
  };

  if(total===0){
    return<EmptyState th={th} text="还没有足够的完成数据 · 至少需要完成几条带时间的任务" icon="clock"/>;
  }

  return(
    <div className="fadeIn">
      <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap"}}>
        <StatCard th={th} label="高峰时段" value={peakHour>=0?`${String(peakHour).padStart(2,"0")}:00`:"—"} sub="最常完成任务" color={th.accent}/>
        <StatCard th={th} label="高峰日" value={peakDay>=0?wdNames[peakDay]:"—"} sub="最高效的一天" color={th.accent2}/>
        <StatCard th={th} label="总完成" value={total} sub="项任务" color={th.accent3}/>
      </div>
      <div className="glass" style={{padding:"18px 14px",borderRadius:14,marginBottom:14,overflowX:"auto"}}>
        <div className="mono" style={{fontSize:10,letterSpacing:"0.18em",color:th.ink3,marginBottom:14,fontWeight:600,paddingLeft:30}}>完成时段分布 · 24h × 7day</div>
        <div style={{minWidth:520,display:"inline-block"}}>
          {/* 列标签 0/4/8/12/16/20 */}
          <div style={{display:"flex",alignItems:"center",marginBottom:6,paddingLeft:30}}>
            {Array.from({length:24},(_,h)=>(
              <div key={h} style={{flex:1,textAlign:"center"}}>
                {(h%4===0)&&<span className="mono" style={{fontSize:8,color:th.ink3,letterSpacing:"0.05em"}}>{String(h).padStart(2,"0")}</span>}
              </div>
            ))}
          </div>
          {buckets.map((row,wi)=>(
            <div key={wi} style={{display:"flex",alignItems:"center",gap:0,marginBottom:2}}>
              <div className="mono" style={{width:30,fontSize:9,color:th.ink3,fontWeight:wi===peakDay?700:400,letterSpacing:"0.04em"}}>{wdNames[wi]}</div>
              {row.map((v,h)=>{
                const isPeak=v>0&&v===max;
                return(
                  <div key={h} title={`${wdNames[wi]} ${String(h).padStart(2,"0")}:00 · ${v} 项`} style={{flex:1,height:18,margin:"0 1px",borderRadius:3,background:cellColor(v),boxShadow:isPeak?`0 0 6px ${th.accent}`:"none",transition:"transform 0.15s",cursor:"default"}}/>
                );
              })}
            </div>
          ))}
        </div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:th.glass1,borderRadius:10}}>
        <span className="mono" style={{fontSize:10,color:th.ink3,letterSpacing:"0.08em"}}>少</span>
        {[0.2,0.4,0.6,0.8,1].map(o=><div key={o} style={{width:18,height:14,borderRadius:3,background:th.accent+Math.round(o*255).toString(16).padStart(2,"0")}}/>)}
        <span className="mono" style={{fontSize:10,color:th.ink3,letterSpacing:"0.08em"}}>多</span>
        <div style={{flex:1}}/>
        <span className="mono" style={{fontSize:10,color:th.ink3,letterSpacing:"0.08em"}}>悬停单元格查看详情</span>
      </div>
    </div>
  );
}

// ═══ 3. 项目燃尽图 ═══
function BurndownChart({th,tasks,history,projects,today}){
  const[selectedId,setSelectedId]=useState(projects[0]&&projects[0].id);
  const proj=projects.find(p=>p.id===selectedId);

  const data=useMemo(()=>{
    if(!proj)return null;
    const projTasks=tasks.filter(t=>t.projectId===proj.id);
    if(projTasks.length===0)return{empty:true,total:0};
    // 找最早 createdAt 作为起点
    const dates=projTasks.map(t=>t.createdAt).filter(Boolean).sort();
    const startDate=dates[0]||today;
    const totalDays=Math.max(7,Math.ceil((new Date(today)-new Date(startDate))/(24*3600*1000))+1);
    const start=addDays(today,-(totalDays-1));
    // 每天结束时仍未完成的数量
    const points=[];
    const total=projTasks.length;
    for(let i=0;i<totalDays;i++){
      const d=addDays(start,i);
      // 在 d 这天结束时，多少任务已完成？
      const doneByThisDay=projTasks.filter(t=>{
        if(!t.done)return false;
        const ca=t.completedAt||t.due||"";
        return ca&&ca<=d;
      }).length;
      const remaining=total-doneByThisDay;
      // 理想线：线性递减
      const ideal=Math.max(0,total-Math.round((total/(totalDays-1))*i));
      points.push({date:d,remaining,done:doneByThisDay,ideal});
    }
    return{empty:false,points,total,start,totalDays};
  },[proj,tasks,today]);

  if(projects.length===0)return<EmptyState th={th} text="还没有项目 · 创建项目后可以看燃尽图" icon="folder"/>;

  return(
    <div className="fadeIn">
      {/* 项目选择 */}
      <div style={{display:"flex",gap:6,overflowX:"auto",marginBottom:16,paddingBottom:4}} className="slim-scroll">
        {projects.map(p=>{
          const act=p.id===selectedId;
          return<button key={p.id} onClick={()=>setSelectedId(p.id)} className={`view-tab ${act?"active":""}`} style={{flexShrink:0,background:act?p.color+"30":th.glass1,color:act?p.color:th.ink2,borderLeft:act?`2px solid ${p.color}`:"none"}}>
            <span style={{color:p.color}}>{p.glyph}</span> {p.name}
          </button>;
        })}
      </div>

      {!proj?(
        <EmptyState th={th} text="选择一个项目" icon="folder"/>
      ):data.empty?(
        <EmptyState th={th} text={`「${proj.name}」还没有任务`} icon="check"/>
      ):(()=>{
        const{points,total,totalDays}=data;
        const W=600,H=280,PAD={t:30,r:30,b:40,l:46};
        const innerW=W-PAD.l-PAD.r,innerH=H-PAD.t-PAD.b;
        const xStep=innerW/(totalDays-1);
        const yScale=v=>PAD.t+innerH-(v/total)*innerH;
        const xScale=i=>PAD.l+i*xStep;
        const idealPath=points.map((p,i)=>`${i===0?"M":"L"} ${xScale(i)} ${yScale(p.ideal)}`).join(" ");
        const realPath=points.map((p,i)=>`${i===0?"M":"L"} ${xScale(i)} ${yScale(p.remaining)}`).join(" ");
        const realArea=points.map((p,i)=>`${i===0?"M":"L"} ${xScale(i)} ${yScale(p.remaining)}`).join(" ")+` L ${xScale(totalDays-1)} ${PAD.t+innerH} L ${xScale(0)} ${PAD.t+innerH} Z`;
        const lastPoint=points[points.length-1];
        const remaining=lastPoint.remaining;
        const completed=total-remaining;
        const onSchedule=remaining<=lastPoint.ideal;
        const projTasks=tasks.filter(t=>t.projectId===proj.id);
        return(
          <>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:10,marginBottom:14}}>
              <StatCard th={th} label="总任务" value={total} sub="项" color={proj.color}/>
              <StatCard th={th} label="已完成" value={completed} sub={`${Math.round(completed/total*100)}%`} color="#10d9a3"/>
              <StatCard th={th} label="剩余" value={remaining} sub="项" color={remaining===0?"#10d9a3":th.accent3}/>
              <StatCard th={th} label="进度" value={onSchedule?"领先":"滞后"} sub={`vs 理想线`} color={onSchedule?"#10d9a3":"#ff5d7a"}/>
            </div>
            <div className="glass" style={{padding:"18px 14px",borderRadius:14,overflowX:"auto"}}>
              <div className="mono" style={{fontSize:10,letterSpacing:"0.18em",color:th.ink3,marginBottom:8,fontWeight:600,paddingLeft:14}}>燃尽曲线 · {totalDays} 天</div>
              <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",minWidth:520,height:"auto",display:"block"}}>
                {/* 横轴网格 */}
                {[0,0.25,0.5,0.75,1].map(p=>(
                  <line key={p} x1={PAD.l} x2={PAD.l+innerW} y1={PAD.t+innerH*p} y2={PAD.t+innerH*p} stroke={th.glassBorder} strokeWidth="1" strokeDasharray="2,3"/>
                ))}
                {/* Y 轴标签 */}
                {[0,0.5,1].map(p=>(
                  <text key={p} x={PAD.l-8} y={PAD.t+innerH*(1-p)+4} fill={th.ink3} fontSize="10" textAnchor="end" fontFamily="monospace">{Math.round(total*p)}</text>
                ))}
                {/* X 轴标签 */}
                {points.filter((_,i)=>i===0||i===totalDays-1||i===Math.floor(totalDays/2)).map((p,i,arr)=>{
                  const idx=points.indexOf(p);
                  return<text key={idx} x={xScale(idx)} y={PAD.t+innerH+18} fill={th.ink3} fontSize="9" textAnchor="middle" fontFamily="monospace">{p.date.slice(5)}</text>;
                })}
                {/* 理想线 */}
                <path d={idealPath} fill="none" stroke={th.ink3} strokeWidth="1.5" strokeDasharray="4,4" opacity="0.5"/>
                {/* 实际填充 */}
                <path d={realArea} fill={proj.color} opacity="0.15"/>
                {/* 实际线 */}
                <path d={realPath} fill="none" stroke={proj.color} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>
                {/* 数据点 */}
                {points.map((p,i)=>(
                  <circle key={i} cx={xScale(i)} cy={yScale(p.remaining)} r={i===points.length-1?5:3} fill={proj.color} stroke={th.bg1} strokeWidth="1.5">
                    <title>{p.date} · 剩余 {p.remaining} · 已完成 {p.done}</title>
                  </circle>
                ))}
                {/* 图例 */}
                <g transform={`translate(${PAD.l+8},${PAD.t-8})`}>
                  <line x1="0" x2="14" y1="0" y2="0" stroke={proj.color} strokeWidth="2.5"/>
                  <text x="20" y="3" fill={th.ink2} fontSize="10" fontFamily="monospace">实际</text>
                  <line x1="60" x2="74" y1="0" y2="0" stroke={th.ink3} strokeWidth="1.5" strokeDasharray="3,3"/>
                  <text x="80" y="3" fill={th.ink3} fontSize="10" fontFamily="monospace">理想</text>
                </g>
              </svg>
            </div>
            <div style={{marginTop:10,padding:"10px 14px",background:th.glass1,borderRadius:10,fontSize:11,color:th.ink2,lineHeight:1.65}}>
              {onSchedule?`✓ 进度 ${onSchedule?"领先":"符合"}理想节奏`:`⚠ 当前剩余 ${remaining} 项，比理想线多 ${remaining-lastPoint.ideal} 项`}
              {projTasks.filter(t=>t.due&&t.due<today&&!t.done).length>0&&` · ${projTasks.filter(t=>t.due&&t.due<today&&!t.done).length} 项已逾期`}
            </div>
          </>
        );
      })()}
    </div>
  );
}

// ═══ 4. 类目耗时分析 ═══
function CategoryTimeAnalysis({th,tasks,history,cats,catOf,today}){
  const[range,setRange]=useState("30");
  const data=useMemo(()=>{
    const cutoff=range==="all"?"":addDays(today,-parseInt(range));
    // 收集每个分类的耗时
    const byCat={};
    cats.forEach(c=>{byCat[c.id]={cat:c,planned:0,actual:0,done:0,total:0};});
    const considered=[];
    tasks.forEach(t=>{
      if(cutoff&&(t.completedAt||t.createdAt||"")<cutoff)return;
      considered.push(t);
    });
    considered.forEach(t=>{
      const k=t.category;if(!byCat[k])byCat[k]={cat:catOf(k),planned:0,actual:0,done:0,total:0};
      byCat[k].total+=1;
      if(t.done)byCat[k].done+=1;
      byCat[k].planned+=parseInt(t.duration||"0",10)||0;
      byCat[k].actual+=t.actualMin||0;
    });
    const arr=Object.values(byCat).filter(x=>x.total>0).sort((a,b)=>b.actual-a.actual);
    const totalActual=arr.reduce((s,x)=>s+x.actual,0);
    const totalPlanned=arr.reduce((s,x)=>s+x.planned,0);
    return{arr,totalActual,totalPlanned};
  },[tasks,cats,catOf,range,today]);

  const{arr,totalActual,totalPlanned}=data;
  // 饼图分段
  const pieR=70,pieCx=85,pieCy=85;
  let acc=0;
  const slices=arr.map((x,i)=>{
    if(totalActual===0||x.actual===0)return null;
    const start=acc/totalActual*Math.PI*2-Math.PI/2;
    acc+=x.actual;
    const end=acc/totalActual*Math.PI*2-Math.PI/2;
    const x1=pieCx+pieR*Math.cos(start),y1=pieCy+pieR*Math.sin(start);
    const x2=pieCx+pieR*Math.cos(end),y2=pieCy+pieR*Math.sin(end);
    const largeArc=(end-start)>Math.PI?1:0;
    const path=`M ${pieCx} ${pieCy} L ${x1} ${y1} A ${pieR} ${pieR} 0 ${largeArc} 1 ${x2} ${y2} Z`;
    return{path,color:x.cat.color,name:x.cat.name,actual:x.actual,pct:Math.round(x.actual/totalActual*100)};
  }).filter(Boolean);

  return(
    <div className="fadeIn">
      <div style={{display:"flex",gap:6,overflowX:"auto",marginBottom:16,paddingBottom:4}} className="slim-scroll">
        {[["7","近 7 天"],["30","近 30 天"],["90","近 90 天"],["all","全部"]].map(([k,l])=>(
          <button key={k} onClick={()=>setRange(k)} className={`view-tab ${range===k?"active":""}`} style={{flexShrink:0}}>{l}</button>
        ))}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10,marginBottom:16}}>
        <StatCard th={th} label="实际耗时" value={fmtMin(totalActual)||"—"} sub="累计" color={th.accent}/>
        <StatCard th={th} label="预计耗时" value={fmtMin(totalPlanned)||"—"} sub="计划" color={th.accent2}/>
        <StatCard th={th} label="参与分类" value={arr.length} sub={`/${cats.length}`} color={th.accent3}/>
      </div>

      {arr.length===0||totalActual===0?(
        <EmptyState th={th} text="该时间范围内没有耗时记录 · 完成任务时记录实际用时即可分析" icon="clock"/>
      ):(
        <div className="glass" style={{padding:18,borderRadius:14,marginBottom:14}}>
          <div className="mono" style={{fontSize:10,letterSpacing:"0.18em",color:th.ink3,marginBottom:14,fontWeight:600}}>类目耗时占比</div>
          <div style={{display:"flex",gap:24,flexWrap:"wrap",alignItems:"center"}}>
            {/* 饼图 */}
            <svg viewBox="0 0 170 170" style={{width:170,height:170,flexShrink:0}}>
              {slices.map((s,i)=>(
                <path key={i} d={s.path} fill={s.color} stroke={th.bg1} strokeWidth="1.5" opacity="0.92">
                  <title>{s.name} · {fmtMin(s.actual)} · {s.pct}%</title>
                </path>
              ))}
              <circle cx={pieCx} cy={pieCy} r="32" fill={th.bg1}/>
              <text x={pieCx} y={pieCy-2} fill={th.ink0} fontSize="11" textAnchor="middle" fontFamily="serif" fontStyle="italic">{fmtMin(totalActual)}</text>
              <text x={pieCx} y={pieCy+12} fill={th.ink3} fontSize="8" textAnchor="middle" fontFamily="monospace" letterSpacing="0.1em">TOTAL</text>
            </svg>
            {/* 列表 */}
            <div style={{flex:1,minWidth:200,display:"flex",flexDirection:"column",gap:8}}>
              {arr.map(x=>{
                const pct=totalActual>0?(x.actual/totalActual)*100:0;
                const overrun=x.planned>0&&x.actual>x.planned;
                return(
                  <div key={x.cat.id||x.cat.name} style={{display:"flex",alignItems:"center",gap:10}}>
                    <span style={{fontSize:13,color:x.cat.color,minWidth:18}}>{x.cat.glyph}</span>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"baseline",gap:6,marginBottom:3}}>
                        <span style={{fontSize:13,color:th.ink1,fontWeight:500}}>{x.cat.name}</span>
                        <span className="mono tnum" style={{fontSize:10,color:th.ink3,marginLeft:"auto"}}>{x.done}/{x.total}</span>
                        <span className="mono tnum" style={{fontSize:11,color:th.ink0,fontWeight:600,minWidth:48,textAlign:"right"}}>{fmtMin(x.actual)}</span>
                      </div>
                      <div style={{height:5,borderRadius:3,background:th.glass2,overflow:"hidden",position:"relative"}}>
                        <div style={{width:`${pct}%`,height:"100%",background:`linear-gradient(90deg,${x.cat.color},${x.cat.color}aa)`,boxShadow:`0 0 6px ${x.cat.color}80`}}/>
                      </div>
                      {x.planned>0&&(
                        <div className="mono" style={{fontSize:9,color:overrun?"#ff5d7a":th.ink3,marginTop:3,letterSpacing:"0.04em"}}>
                          预计 {fmtMin(x.planned)} → 实际 {fmtMin(x.actual)} {overrun?`· 超出 ${fmtMin(x.actual-x.planned)}`:`· 节省 ${fmtMin(x.planned-x.actual)}`}
                        </div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

        {sub&&<span className="mono" style={{fontSize:11,color:th.ink2,marginLeft:3}}>{sub}</span>}

}

function TodayReview({th,tasks,catOf,today}){
  const t=tasks.filter(x=>x.due===today);
  const done=t.filter(x=>x.done);
  const undone=t.filter(x=>!x.done);
  const totalDur=t.reduce((s,x)=>s+(x.actualMin||0),0);
  const byCat={};
  t.forEach(x=>{byCat[x.category]=(byCat[x.category]||0)+1;});
  return(
    <div className="fadeIn" style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
        <StatCard th={th} label="任务" value={t.length} color={th.accent}/>
        <StatCard th={th} label="完成" value={done.length} sub={t.length?"/ "+t.length:""} color="#10d9a3"/>
        <StatCard th={th} label="专注" value={fmtMin(totalDur)||"0"} color={th.accent3}/>
        <StatCard th={th} label="完成率" value={t.length?Math.round(done.length/t.length*100):0} sub="%" color="#f5a524"/>
      </div>
      {done.length>0&&(
        <div className="glass" style={{padding:16,borderRadius:14}}>
          <div className="mono" style={{fontSize:12,letterSpacing:"0.18em",color:th.ink3,marginBottom:10,fontWeight:600}}>已完成 · {done.length}</div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {done.map(x=>{const c=catOf(x.category);return(
              <div key={x.id} style={{padding:"8px 10px",borderRadius:9,background:th.glass1,borderLeft:`2px solid ${c.color}`,display:"flex",alignItems:"center",gap:10}}>
                <span className="mono" style={{fontSize:10,color:c.color}}>{c.glyph}</span>
                <span style={{flex:1,fontSize:12,color:th.ink1,textDecoration:"line-through",opacity:0.8}}>{x.title}</span>
                {x.actualMin>0&&<span className="mono tnum" style={{fontSize:10,color:th.ink3}}>{fmtMin(x.actualMin)}</span>}
              </div>
            );})}
          </div>
        </div>
      )}
      {undone.length>0&&(
        <div className="glass" style={{padding:16,borderRadius:14}}>
          <div className="mono" style={{fontSize:12,letterSpacing:"0.18em",color:th.ink3,marginBottom:10,fontWeight:600}}>未完成 · {undone.length}</div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {undone.map(x=>{const c=catOf(x.category);return(
              <div key={x.id} style={{padding:"8px 10px",borderRadius:9,background:th.glass1,borderLeft:`2px solid ${c.color}`,display:"flex",alignItems:"center",gap:10}}>
                <span className="mono" style={{fontSize:10,color:c.color}}>{c.glyph}</span>
                <span style={{flex:1,fontSize:12,color:th.ink0}}>{x.title}</span>
                {(x.progress||0)>0&&<span className="mono tnum" style={{fontSize:10,color:th.ink3}}>{Math.round((x.progress||0)*100)}%</span>}
              </div>
            );})}
          </div>
        </div>
      )}
      {t.length===0&&<EmptyState th={th} text="今天没有任务记录"/>}
    </div>
  );
}

function RangeReview({th,tasks,history,catOf,today,days,label}){
  const start=addDays(today,-(days-1));
  const dates=[];for(let i=0;i<days;i++)dates.push(addDays(start,i));
  let totalDone=0,totalDur=0,totalCount=0;
  const catStats={};
  dates.forEach(d=>{
    const entry=d===today?{tasks:tasks.filter(t=>t.due===today)}:history.find(h=>h.date===d);
    if(!entry)return;
    (entry.tasks||[]).forEach(t=>{
      totalCount++;
      if(t.done){totalDone++;totalDur+=t.actualMin||0;}
      catStats[t.category]=catStats[t.category]||{total:0,done:0,dur:0};
      catStats[t.category].total++;
      if(t.done){catStats[t.category].done++;catStats[t.category].dur+=t.actualMin||0;}
    });
  });
  const dailyDone=dates.map(d=>{const e=d===today?{tasks:tasks.filter(t=>t.due===today)}:history.find(h=>h.date===d);return(e?.tasks||[]).filter(t=>t.done).length;});
  const maxDaily=Math.max(...dailyDone,1);
  return(
    <div className="fadeIn" style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
        <StatCard th={th} label={label+"完成"} value={totalDone} color={th.accent}/>
        <StatCard th={th} label="总任务" value={totalCount} color={th.accent2}/>
        <StatCard th={th} label="专注" value={fmtMin(totalDur)||"0"} color={th.accent3}/>
        <StatCard th={th} label="日均" value={(totalDone/days).toFixed(1)} color="#10d9a3"/>
      </div>
      <div className="glass" style={{padding:16,borderRadius:14}}>
        <div className="mono" style={{fontSize:12,letterSpacing:"0.18em",color:th.ink3,marginBottom:12,fontWeight:600}}>每日完成趋势</div>
        <div style={{display:"flex",alignItems:"flex-end",gap:3,height:70,borderBottom:`1px solid ${th.glassBorder}`,paddingBottom:4}}>
          {dailyDone.map((v,i)=>(
            <div key={i} style={{flex:1,height:`${(v/maxDaily)*100}%`,minHeight:v>0?3:1,background:`linear-gradient(180deg,${th.accent},${th.accent3})`,borderRadius:"3px 3px 0 0",boxShadow:v>0?`0 0 6px ${th.accent}60`:"none",opacity:v>0?1:0.2}} title={`${dates[i]}: ${v}`}/>
          ))}
        </div>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:5,fontSize:9,color:th.ink3}}><span className="mono">{start.slice(5).replace("-","/")}</span><span className="mono">{today.slice(5).replace("-","/")}</span></div>
      </div>
      {Object.keys(catStats).length>0&&(
        <div className="glass" style={{padding:16,borderRadius:14}}>
          <div className="mono" style={{fontSize:12,letterSpacing:"0.18em",color:th.ink3,marginBottom:12,fontWeight:600}}>分类分布</div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {Object.entries(catStats).map(([cid,s])=>{const c=catOf(cid);return(
              <div key={cid}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5,fontSize:12}}>
                  <span style={{color:c.color,fontWeight:600}}>{c.glyph} {c.name}</span>
                  <span className="mono tnum" style={{marginLeft:"auto",color:th.ink2}}>{s.done}/{s.total} · {fmtMin(s.dur)||"0"}</span>
                </div>
                <div style={{height:5,borderRadius:3,background:th.glass2,overflow:"hidden"}}>
                  <div style={{width:`${(s.done/s.total)*100}%`,height:"100%",background:`linear-gradient(90deg,${c.color},${c.color}aa)`,boxShadow:`0 0 6px ${c.color}`}}/>
                </div>
              </div>
            );})}
          </div>
        </div>
      )}
    </div>
  );
}

function HeatmapView({th,tasks,history,today}){
  const weeks=26;
  const days=weeks*7;
  const start=addDays(today,-(days-1));
  const startDay=new Date(start).getDay();
  const padLeading=(startDay+6)%7;
  const allDates=[];
  for(let i=0;i<padLeading;i++)allDates.push(null);
  for(let i=0;i<days;i++)allDates.push(addDays(start,i));
  const dataMap={};
  history.forEach(h=>{dataMap[h.date]=h.tasks.filter(t=>t.done).length;});
  const todayDone=tasks.filter(t=>t.due===today&&t.done).length;
  dataMap[today]=todayDone;
  const max=Math.max(...Object.values(dataMap),1);
  const shade=v=>{if(!v)return th.glass1;const a=Math.min(0.18+(v/max)*0.82,1);return th.isDark?`rgba(${parseInt(th.accent.slice(1,3),16)},${parseInt(th.accent.slice(3,5),16)},${parseInt(th.accent.slice(5,7),16)},${a})`:th.accent+Math.round(a*255).toString(16).padStart(2,"0");};
  const grid=[];for(let w=0;w<Math.ceil(allDates.length/7);w++){const col=[];for(let d=0;d<7;d++)col.push(allDates[w*7+d]);grid.push(col);}
  const totalDone=Object.values(dataMap).reduce((a,b)=>a+b,0);
  const activeDays=Object.keys(dataMap).filter(d=>dataMap[d]>0).length;
  return(
    <div className="fadeIn" style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
        <StatCard th={th} label="半年完成" value={totalDone} color={th.accent}/>
        <StatCard th={th} label="活跃天数" value={activeDays} sub={`/ ${days}`} color="#10d9a3"/>
        <StatCard th={th} label="单日最多" value={max} sub="件" color={th.accent3}/>
      </div>
      <div className="glass" style={{padding:16,borderRadius:14,overflowX:"auto"}}>
        <div className="mono" style={{fontSize:12,letterSpacing:"0.18em",color:th.ink3,marginBottom:14,fontWeight:600}}>活跃热力图 · 近 26 周</div>
        <div style={{display:"flex",gap:3,minWidth:"fit-content",paddingLeft:24,position:"relative"}}>
          <div style={{position:"absolute",left:0,top:0,display:"flex",flexDirection:"column",gap:3,fontSize:8,color:th.ink3,fontFamily:"var(--f-mono)"}}>
            {["","Mon","","Wed","","Fri",""].map((d,i)=><div key={i} style={{height:11,display:"flex",alignItems:"center"}}>{d}</div>)}
          </div>
          {grid.map((col,ci)=>(
            <div key={ci} style={{display:"flex",flexDirection:"column",gap:3}}>
              {col.map((date,ri)=>{
                if(!date)return<div key={ri} style={{width:11,height:11}}/>;
                const v=dataMap[date]||0;
                return<div key={ri} className="hm-cell" title={`${date}: ${v}`} style={{width:11,height:11,borderRadius:2.5,background:shade(v),border:date===today?`1px solid ${th.accent3}`:"none"}}/>;
              })}
            </div>
          ))}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8,marginTop:14,fontSize:10,color:th.ink3}}>
          <span className="mono">少</span>
          {[0,0.25,0.5,0.75,1].map((v,i)=><div key={i} style={{width:11,height:11,borderRadius:2.5,background:shade(v*max)}}/>)}
          <span className="mono">多</span>
        </div>
      </div>
    </div>
  );
}

function HabitsView({th,tasks,history,catOf,today}){
  const habits=tasks.filter(t=>t.repeat);
  const last30=Array.from({length:30},(_,i)=>addDays(today,-i));
  const habitData=habits.map(h=>{
    const dates=last30.map(d=>{
      if(d===today)return h.done;
      const entry=history.find(x=>x.date===d);if(!entry)return false;
      const t=entry.tasks.find(x=>x.title===h.title&&x.repeat);
      return!!t?.done;
    });
    let streak=0;for(let i=0;i<dates.length;i++){if(dates[i])streak++;else break;}
    const total=dates.filter(d=>d).length;
    return{...h,dates,streak,total,rate:total/30};
  });
  if(habitData.length===0)return<EmptyState th={th} text='没有循环任务。在添加任务时开启"每日重复"即可创建习惯。' icon="repeat"/>;
  return(
    <div className="fadeIn" style={{display:"flex",flexDirection:"column",gap:10}}>
      {habitData.map(h=>{
        const c=catOf(h.category);
        return(
          <div key={h.id} className="glass" style={{padding:16,borderRadius:14,borderLeft:`3px solid ${c.color}`}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
              <span className="mono" style={{fontSize:11,color:c.color,fontWeight:600}}>{c.glyph}</span>
              <span style={{fontSize:14,color:th.ink0,fontWeight:600,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{h.title}</span>
              {h.streak>0&&<span className="mono" style={{fontSize:11,color:"#f5a524",padding:"3px 10px",borderRadius:8,background:"rgba(245,165,36,0.1)",fontWeight:700}}>🔥 {h.streak} 天</span>}
              <span className="mono tnum" style={{fontSize:11,color:th.ink2}}>{Math.round(h.rate*100)}%</span>
            </div>
            <div style={{display:"flex",gap:2,flexWrap:"wrap"}}>
              {h.dates.slice().reverse().map((d,i)=>(
                <div key={i} style={{flex:1,minWidth:7,maxWidth:16,aspectRatio:"1",borderRadius:3,background:d?`linear-gradient(135deg,${c.color},${c.color}aa)`:th.glass2,boxShadow:d?`0 0 4px ${c.color}80`:"none"}}/>
              ))}
            </div>
            <div style={{display:"flex",justifyContent:"space-between",marginTop:6,fontSize:9,color:th.ink3}}><span className="mono">30 天前</span><span className="mono">今天</span></div>
          </div>
        );
      })}
    </div>
  );
}

  const todayEntry={date:today,tasks:tasks.filter(t=>t.due===today).map(t=>({...t,duration:t.duration||""}))};
  const merged=[todayEntry,...history.filter(h=>h.date!==today).sort((a,b)=>b.date.localeCompare(a.date))];
  const filtered=merged.map(h=>({...h,tasks:h.tasks.filter(t=>!q||(t.title||"").toLowerCase().includes(q.toLowerCase()))})).filter(h=>h.tasks.length>0);
  return(
    <div className="fadeIn">

        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {filtered.map(h=>{

                  <div style={{flex:1}}>
                    <div className="display" style={{fontSize:16,color:th.ink0}}>{h.date===today?"今天":h.date}</div>
                    <div className="mono" style={{fontSize:10,color:th.ink3,marginTop:3,letterSpacing:"0.05em"}}>完成 {done}/{h.tasks.length} · 专注 {fmtMin(dur)||"0"}</div>
                  </div>
                  <Ic n={isOpen?"chevUp":"chevDown"} size={14} color={th.ink3}/>
                </button>
                {isOpen&&(
                  <div style={{padding:"0 16px 13px",display:"flex",flexDirection:"column",gap:5}}>
                    {h.tasks.map((t,i)=>{const c=catOf(t.category);return(
                      <div key={i} style={{padding:"8px 10px",borderRadius:9,background:th.glass1,borderLeft:`2px solid ${c.color}`,display:"flex",alignItems:"center",gap:10}}>
                        <span className="mono" style={{fontSize:9,color:c.color}}>{c.glyph}</span>
                        <span style={{flex:1,fontSize:12,color:t.done?th.ink3:th.ink0,textDecoration:t.done?"line-through":"none"}}>{t.title}</span>
                        {t.actualMin>0&&<span className="mono tnum" style={{fontSize:9,color:th.ink3}}>{fmtMin(t.actualMin)}</span>}
                      </div>
                    );})}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}
