// 解析项目名→ID（支持模糊匹配 + ID 直传）
function resolveProjectIdForVoice(input,projects){
  if(!input)return "";
  if(!Array.isArray(projects))return input;
  // 1. ID 完全匹配
  const byId=projects.find(p=>String(p.id)===String(input));
  if(byId)return byId.id;
  // 2. 名称完全匹配
  const byName=projects.find(p=>p.name===input);
  if(byName)return byName.id;
  // 3. 模糊匹配（去掉"项目/定制/计划"等修饰）
  const clean=String(input).replace(/项目|定制|计划|方案/g,"").trim();
  if(!clean)return "";
  const fuzzy=projects.find(p=>{
    const pn=p.name.replace(/项目|定制|计划|方案/g,"").trim();
    return pn.includes(clean)||clean.includes(pn);
  });
  return fuzzy?fuzzy.id:"";
}

function calcSafeSlots(){
  const W=window.innerWidth,H=window.innerHeight;
  const slots=[];const padding=80;
  for(let r=0;r<3;r++){
    for(let c=0;c<4;c++){
      const x=padding+(c+0.5)*(W-padding*2)/4;
      const y=padding+(r+0.5)*(H-padding*2)/3;
      slots.push({x,y,score:100});
    }
  }
  try{
    document.querySelectorAll("input:focus,textarea:focus,[role='dialog']").forEach(el=>{
      const rect=el.getBoundingClientRect();
      slots.forEach(s=>{
        if(s.x>rect.left-50&&s.x<rect.right+50&&s.y>rect.top-50&&s.y<rect.bottom+50){s.score-=60;}
      });
    });
  }catch{}
  return slots.filter(s=>s.score>40);
}

function throttleMove(fn,wait){
  let last=0;let queued=null;
  return(...args)=>{
    const now=Date.now();
    if(now-last>wait){last=now;fn(...args);queued=null;}
    else if(!queued){queued=setTimeout(()=>{last=Date.now();fn(...args);queued=null;},wait);}
  };
}

function FloatingOrb({tasks,setTasks,projects,cats,catOf,tags,journals,history,today,displayName,nextSortKey,emptyTask,setTrash,onOpenAssistant,showToast,user}){
  const[cfg,setCfg]=useState(()=>getCompanionConfig());
  const[briefings,setBriefings]=useState(()=>getBriefings().filter(b=>!b.read&&!b.dismissed));
  const[expanded,setExpanded]=useState(false);
  const[pos,setPos]=useState({x:typeof window!=="undefined"?window.innerWidth-100:1000,y:typeof window!=="undefined"?window.innerHeight-120:600});
  const[state,setState]=useState("idle");
  const[caption,setCaption]=useState("");
  const speakCtrlRef=useRef(null);
  const wanderTimerRef=useRef(null);
  const isDraggingRef=useRef(false);
  const dragStartRef=useRef(null);

  useEffect(()=>{
    if(!cfg.enabled||cfg.wanderMode!=="wander"||expanded)return;
    const moveNext=()=>{
      if(document.hidden||isDraggingRef.current)return scheduleNext();
      const slots=calcSafeSlots();
      if(slots.length===0)return scheduleNext();
      const r=Math.random();
      let target;
      if(r<0.6){
        const sorted=slots.map(s=>({...s,dist:Math.hypot(s.x-pos.x,s.y-pos.y)})).sort((a,b)=>b.dist-a.dist);
        target=sorted[Math.floor(Math.random()*Math.min(3,sorted.length))];
      }else if(r<0.85){
        const sorted=slots.map(s=>({...s,dist:Math.hypot(s.x-pos.x,s.y-pos.y)})).sort((a,b)=>a.dist-b.dist);
        target=sorted[Math.floor(Math.random()*Math.min(3,sorted.length))]||sorted[0];
      }else{target=slots[Math.floor(Math.random()*slots.length)];}
      if(target)setPos({x:target.x,y:target.y});
      scheduleNext();
    };
    const scheduleNext=()=>{
      const delay=8000+Math.random()*7000;
      wanderTimerRef.current=setTimeout(moveNext,delay);
    };
    scheduleNext();
    return()=>{if(wanderTimerRef.current)clearTimeout(wanderTimerRef.current);};
  },[cfg.enabled,cfg.wanderMode,expanded,pos.x,pos.y]);

  useEffect(()=>{
    if(!cfg.enabled||expanded)return;
    const onMove=(e)=>{
      const dist=Math.hypot(e.clientX-pos.x,e.clientY-pos.y);
      if(dist<100&&!isDraggingRef.current){
        setState("shy");
        const ang=Math.atan2(pos.y-e.clientY,pos.x-e.clientX);
        const flee=40;
        setPos(p=>({x:Math.max(40,Math.min(window.innerWidth-40,p.x+Math.cos(ang)*flee)),y:Math.max(40,Math.min(window.innerHeight-40,p.y+Math.sin(ang)*flee))}));
      }
    };
    const throttled=throttleMove(onMove,80);
    window.addEventListener("mousemove",throttled);
    return()=>window.removeEventListener("mousemove",throttled);
  },[cfg.enabled,pos.x,pos.y,expanded]);

  useEffect(()=>{
    if(state==="shy"){const t=setTimeout(()=>setState("idle"),1200);return()=>clearTimeout(t);}
  },[state]);

  useEffect(()=>{
    const update=()=>{
      const fresh=getBriefings().filter(b=>!b.read&&!b.dismissed);
      setBriefings(prev=>{
        if(fresh.length>prev.length){setState("excited");setTimeout(()=>setState("idle"),3000);}
        return fresh;
      });
    };
    window.addEventListener("tlk-briefings-changed",update);
    const poll=setInterval(update,5000);
    return()=>{window.removeEventListener("tlk-briefings-changed",update);clearInterval(poll);};
  },[]);

  const handleClick=()=>{
    if(isDraggingRef.current)return;
    setExpanded(e=>!e);
    setState("excited");
    setTimeout(()=>setState("idle"),400);
  };

  const handleDragStart=(e)=>{
    const cx=e.clientX||(e.touches&&e.touches[0].clientX);
    const cy=e.clientY||(e.touches&&e.touches[0].clientY);
    if(cx==null)return;
    dragStartRef.current={mouseX:cx,mouseY:cy,orbX:pos.x,orbY:pos.y};
    const onMove=(ev)=>{
      const mx=ev.clientX||(ev.touches&&ev.touches[0].clientX);
      const my=ev.clientY||(ev.touches&&ev.touches[0].clientY);
      if(mx==null)return;
      const dx=mx-dragStartRef.current.mouseX;
      const dy=my-dragStartRef.current.mouseY;
      if(Math.hypot(dx,dy)>5)isDraggingRef.current=true;
      if(isDraggingRef.current)setPos({x:dragStartRef.current.orbX+dx,y:dragStartRef.current.orbY+dy});
    };
    const onUp=()=>{
      window.removeEventListener("mousemove",onMove);
      window.removeEventListener("mouseup",onUp);
      window.removeEventListener("touchmove",onMove);
      window.removeEventListener("touchend",onUp);
      setTimeout(()=>{isDraggingRef.current=false;},100);
    };
    window.addEventListener("mousemove",onMove);
    window.addEventListener("mouseup",onUp);
    window.addEventListener("touchmove",onMove,{passive:true});
    window.addEventListener("touchend",onUp);
  };

  const speak=async(text)=>{
    if(!cfg.voiceEnabled)return;
    if(speakCtrlRef.current)speakCtrlRef.current.stop();
    setState("speaking");setCaption(text);
    speakCtrlRef.current=await speakBriefing(text,cfg.voiceProfile,{
      volume:cfg.volume,
      onProgress:(p)=>setCaption(p.full),
      onEnd:()=>{setState("idle");setTimeout(()=>setCaption(""),3000);},
    });
  };
  
  // ─── 用户对光球说话：语音识别 + AI 响应 ───
  const recognizerRef=useRef(null);
  const[listening,setListening]=useState(false);
  const[heardText,setHeardText]=useState("");
  const[thinking,setThinking]=useState(false);
  
  const startListening=()=>{
    if(listening||thinking)return;
    if(speakCtrlRef.current)speakCtrlRef.current.stop(); // 用户说话时停止 AI 当前说话
    setListening(true);
    setHeardText("");
    setState("listening");
    setCaption("🎤 我在听...");
    
    recognizerRef.current=createSpeechRecognizer({
      continuous:false,
      onInterim:(text)=>{setHeardText(text);setCaption("🎤 "+text);},
      onFinal:(text)=>{setHeardText(text);},
      onError:(err)=>{
        console.warn("[ASR]",err.message);
        setListening(false);
        setState("idle");
        setCaption("");
        if(err.message&&err.message.includes("not-allowed")){
          showToast&&showToast("请允许麦克风权限","warn");
        }else if(err.message&&err.message.includes("no-speech")){
          showToast&&showToast("没听清，再试一次","info");
        }
      },
      onEnd:(finalText)=>{
        setListening(false);
        if(finalText&&finalText.trim()){
          processUserSpeech(finalText.trim());
        }else{
          setState("idle");
          setCaption("");
        }
      },
    });
    if(!recognizerRef.current){
      setListening(false);
      setState("idle");
      setCaption("");
      showToast&&showToast("浏览器不支持语音识别，请用 Chrome / Edge","warn");
      return;
    }
    recognizerRef.current.start();
  };
  
  const stopListening=()=>{
    if(recognizerRef.current){
      recognizerRef.current.stop();
    }
  };
  
  // 用 ref 保存最近 10 轮对话历史（用户语音→AI 回复）
  const voiceConvoRef=useRef([]);
  
  // 处理用户说的话 — 用完整 AI 工具链（跟 AssistantView 同等能力）
  const processUserSpeech=async(userText)=>{
    setThinking(true);
    setState("thinking");
    setCaption("💭 思考中：「"+userText+"」");
    
    try{
      // ─── 1. 构造完整上下文 system prompt（复用 AI 助手页的逻辑）───
      const baseSys=buildAssistantSystemPrompt({tasks,cats,projects,tags,journals,today,displayName});
      // 追加"语音对话"特定指令
      const voiceSuffix=`\n\n## 当前对话场景\n用户正在通过语音和你对话（光球伴侣模式）。\n\n## 语音回复规则（非常重要）\n1. **回复长度**：50-120 字，不能太长（用户要听完）\n2. **绝对不能用** Markdown、列表、代码块、表格 — 因为这些会被 TTS 读出符号\n3. **口语化自然表达**，像跟朋友聊天\n4. **如果调用了工具**（建任务/改任务等），用一句话告诉用户做了什么\n5. **不要说"我"或"作为 AI"**，要用 Linek 第一人称\n6. **末尾不问"还有什么可以帮你"** 这种废话`;
      const sysPrompt=baseSys+voiceSuffix;
      
      // ─── 2. 构造历史消息（最近 10 轮）───
      voiceConvoRef.current.push({role:"user",content:userText});
      if(voiceConvoRef.current.length>20)voiceConvoRef.current=voiceConvoRef.current.slice(-20);
      
      const apiMsgs=[
        {role:"system",content:sysPrompt},
        ...voiceConvoRef.current,
      ];
      
      // ─── 3. 构造工具 handlers（跟 AssistantView 完全一致）───
      const handlers={
        createTask:(args)=>{
          const dueOk=args.due||today;
          const projectMatched=resolveProjectIdForVoice(args.projectId,projects);
          const newTask={
            id:Date.now()+Math.floor(Math.random()*1000),
            ...emptyTask,
            title:args.title,
            content:args.content||"",
            due:dueOk,
            timeStart:args.timeStart||"",
            timeEnd:args.timeEnd||"",
            duration:args.duration||"",
            priority:args.priority||"中",
            category:args.category||"work",
            projectId:projectMatched,
            sortKey:nextSortKey(),
            createdAt:today,
            done:false,
          };
          setTasks(t=>[...t,newTask]);
          return{ok:true,task:newTask};
        },
        listTasks:(args)=>{
          let list=tasks;
          if(args.filter==="today")list=list.filter(t=>!t.done&&t.due===today);
          else if(args.filter==="overdue")list=list.filter(t=>!t.done&&t.due&&t.due<today);
          else if(args.filter==="done")list=list.filter(t=>t.done);
          else if(args.filter==="all")list=list.filter(t=>!t.done);
          else list=list.filter(t=>!t.done);
          if(args.project){
            const pid=resolveProjectIdForVoice(args.project,projects);
            if(pid)list=list.filter(t=>t.projectId===pid);
          }
          return{tasks:list.slice(0,20).map(t=>({id:t.id,title:t.title,due:t.due,timeStart:t.timeStart,priority:t.priority,projectId:t.projectId}))};
        },
        updateTask:(args)=>{
          if(!args.id)return{ok:false,error:"缺少 id"};
          const idMatch=tasks.find(t=>String(t.id)===String(args.id))||tasks.find(t=>t.title===args.id)||tasks.find(t=>t.title.includes(args.id));
          if(!idMatch)return{ok:false,error:"找不到任务"};
          const updates={};
          ["title","due","timeStart","timeEnd","priority","content","done"].forEach(k=>{if(args[k]!==undefined)updates[k]=args[k];});
          setTasks(t=>t.map(x=>x.id===idMatch.id?{...x,...updates}:x));
          return{ok:true,updates};
        },
        deleteTask:(args)=>{
          if(!args.id)return{ok:false,error:"缺少 id"};
          const idMatch=tasks.find(t=>String(t.id)===String(args.id))||tasks.find(t=>t.title===args.id)||tasks.find(t=>t.title.includes(args.id));
          if(!idMatch)return{ok:false,error:"找不到任务"};
          setTasks(t=>t.filter(x=>x.id!==idMatch.id));
          setTrash&&setTrash(list=>[...list,{...idMatch,deletedAt:Date.now()}]);
          return{ok:true};
        },
      };
      
      // ─── 4. 调用 AssistantWithTools（流式 + 工具）───
      const result=await callAssistantWithTools(apiMsgs,handlers,(progress)=>{
        if(progress.type==="tool_call"){
          setCaption(`🔧 ${progress.name}...`);
        }else if(progress.type==="content_delta"){
          // 实时显示生成中文本
          setCaption(progress.full||userText);
        }
      });
      
      const replyText=(result.content||"嗯，我听到了").trim();
      voiceConvoRef.current.push({role:"assistant",content:replyText});
      
      setThinking(false);
      
      // ─── 5. 让光球说出来 ───
      await speak(replyText);
    }catch(e){
      console.warn("[Linek 对话]",e);
      setThinking(false);
      setState("idle");
      setCaption("");
      showToast&&showToast("AI 响应失败："+e.message,"warn");
    }
  };

  useEffect(()=>{
    window.__linekSpeak=speak;
    window.__linekListen=startListening;
    return()=>{delete window.__linekSpeak;delete window.__linekListen;};
  },[cfg.voiceEnabled,cfg.voiceProfile,cfg.volume,listening,thinking]);
  
  // ─── 全局快捷键：按住空格说话（非输入框场景）───
  useEffect(()=>{
    let spacePressed=false;
    const onKeyDown=(e)=>{
      if(e.code!=="Space")return;
      // 忽略输入框场景
      const tag=document.activeElement?.tagName;
      if(tag==="INPUT"||tag==="TEXTAREA"||document.activeElement?.isContentEditable)return;
      if(spacePressed)return; // 防止 keydown 重复触发
      spacePressed=true;
      e.preventDefault();
      startListening();
    };
    const onKeyUp=(e)=>{
      if(e.code!=="Space")return;
      const tag=document.activeElement?.tagName;
      if(tag==="INPUT"||tag==="TEXTAREA"||document.activeElement?.isContentEditable)return;
      if(!spacePressed)return;
      spacePressed=false;
      stopListening();
    };
    window.addEventListener("keydown",onKeyDown);
    window.addEventListener("keyup",onKeyUp);
    return()=>{
      window.removeEventListener("keydown",onKeyDown);
      window.removeEventListener("keyup",onKeyUp);
    };
  },[listening,thinking]);

  if(!cfg.enabled)return null;

  const stateColors={
    idle:["#6d5fff","#a855f7","#ec4899"],
    excited:["#22d3ee","#a855f7","#ec4899"],
    shy:["#9333ea","#ec4899","#fb923c"],
    speaking:["#10d9a3","#22d3ee","#6d5fff"],
    listening:["#ef4444","#f97316","#fbbf24"], // 红橙黄：表示正在听
    thinking:["#a855f7","#6366f1","#06b6d4"], // 紫蓝青：思考中
    celebrating:["#fbbf24","#ec4899","#22d3ee"],
  };
  const colors=stateColors[state]||stateColors.idle;
  const unread=briefings.length;

  return(
    <>
      <div onClick={handleClick} onMouseDown={handleDragStart} onTouchStart={handleDragStart} style={{position:"fixed",left:pos.x-30,top:pos.y-30,width:60,height:60,zIndex:9000,cursor:isDraggingRef.current?"grabbing":"pointer",transition:isDraggingRef.current?"none":"left 2.4s cubic-bezier(0.65,0,0.35,1),top 2.4s cubic-bezier(0.65,0,0.35,1)",touchAction:"none"}}>
        {unread>0&&<div style={{position:"absolute",inset:-8,borderRadius:"50%",background:`conic-gradient(from 0deg,${colors[0]},${colors[1]},${colors[2]},${colors[0]})`,opacity:0.4,animation:"orbPulse 2s ease-in-out infinite",filter:"blur(8px)"}}/>}
        <div style={{position:"relative",width:"100%",height:"100%",borderRadius:"50%",background:`conic-gradient(from 0deg,${colors[0]},${colors[1]},${colors[2]},${colors[0]})`,boxShadow:`0 8px 32px ${colors[0]}66, 0 2px 8px ${colors[1]}44, inset 0 2px 8px rgba(255,255,255,0.4)`,backdropFilter:"blur(10px)",animation:`orbRotate 8s linear infinite, orbBreath 4s ease-in-out infinite`}}>
          <div style={{position:"absolute",inset:6,borderRadius:"50%",background:`radial-gradient(circle at 35% 30%,rgba(255,255,255,0.95),${colors[1]}88 40%,${colors[2]}66)`,mixBlendMode:"screen"}}/>
          <div style={{position:"absolute",top:8,left:14,width:18,height:14,borderRadius:"50%",background:"radial-gradient(circle,rgba(255,255,255,0.85),transparent 70%)",pointerEvents:"none"}}/>
          {state==="speaking"&&<>
            <div style={{position:"absolute",inset:0,borderRadius:"50%",border:"2px solid rgba(16,217,163,0.4)",animation:"orbWave 1.2s ease-out infinite"}}/>
            <div style={{position:"absolute",inset:0,borderRadius:"50%",border:"2px solid rgba(34,211,238,0.3)",animation:"orbWave 1.2s ease-out infinite 0.4s"}}/>
          </>}
        </div>
        {unread>0&&<div style={{position:"absolute",top:-4,right:-4,minWidth:18,height:18,padding:"0 5px",borderRadius:9,background:"linear-gradient(135deg,#ef4444,#ec4899)",color:"#fff",fontSize:11,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 2px 8px rgba(239,68,68,0.5)"}}>{unread>9?"9+":unread}</div>}
      </div>

      {caption&&<div style={{position:"fixed",left:"50%",bottom:30,transform:"translateX(-50%)",maxWidth:"min(90vw,560px)",padding:"10px 18px",background:"rgba(20,18,38,0.92)",color:"#fff",borderRadius:14,fontSize:14,lineHeight:1.55,zIndex:8999,boxShadow:"0 12px 36px rgba(0,0,0,0.3)",backdropFilter:"blur(20px)",border:"1px solid rgba(255,255,255,0.12)",animation:"fadeInUp 0.3s ease",textAlign:"center"}}>
        <div style={{fontSize:9,color:"#a78bfa",letterSpacing:"0.18em",marginBottom:4,fontWeight:600}}>LINEK SPEAKING</div>
        <div>{caption}</div>
      </div>}

      {expanded&&<OrbBriefingCard briefings={briefings} orbPos={pos} onClose={()=>setExpanded(false)} onOpenAssistant={onOpenAssistant} onAccept={(b)=>handleBriefingAccept(b,setBriefings,showToast)} onDismiss={(b)=>handleBriefingDismiss(b,setBriefings)}/>}
    </>
  );
}

function OrbBriefingCard({briefings,orbPos,onClose,onOpenAssistant,onAccept,onDismiss}){
  const W=window.innerWidth,H=window.innerHeight;
  const cardWidth=Math.min(360,W-32);
  const cardHeight=Math.min(420,H-100);
  let cardX=orbPos.x-cardWidth-20;
  let cardY=orbPos.y-cardHeight/2;
  if(cardX<10)cardX=orbPos.x+50;
  if(cardX+cardWidth>W-10)cardX=W-cardWidth-10;
  if(cardY<10)cardY=10;
  if(cardY+cardHeight>H-10)cardY=H-cardHeight-10;
  const hasItems=briefings&&briefings.length>0;
  return(
    <>
      <div onClick={onClose} style={{position:"fixed",inset:0,zIndex:8998,background:"transparent"}}/>
      <div style={{position:"fixed",left:cardX,top:cardY,width:cardWidth,maxHeight:cardHeight,background:"rgba(255,255,255,0.98)",borderRadius:18,boxShadow:"0 24px 64px rgba(109,95,255,0.25),0 8px 24px rgba(0,0,0,0.08)",border:"1px solid rgba(167,139,250,0.2)",backdropFilter:"blur(20px)",zIndex:9001,display:"flex",flexDirection:"column",overflow:"hidden",animation:"orbCardEnter 0.35s cubic-bezier(0.34,1.56,0.64,1)",fontFamily:"inherit"}}>
        <div style={{padding:"14px 16px 10px",borderBottom:"1px solid rgba(167,139,250,0.12)",display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:24,height:24,borderRadius:"50%",background:"conic-gradient(from 0deg,#6d5fff,#a855f7,#ec4899,#6d5fff)",boxShadow:"0 2px 8px rgba(109,95,255,0.4)"}}/>
          <div style={{flex:1}}>
            <div style={{fontSize:14,fontWeight:700,color:"#1a1530",lineHeight:1.2}}>Linek</div>
            <div className="mono" style={{fontSize:9,color:"#7a73a3",letterSpacing:"0.16em",marginTop:2}}>{hasItems?`${briefings.length} 条新消息`:"按 🎤 或长按空格说话"}</div>
          </div>
          <button onClick={onClose} style={{padding:"4px 8px",fontSize:11,color:"#7a73a3",background:"transparent",borderRadius:6,cursor:"pointer"}}>✕</button>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"6px 8px 8px"}}>
          {hasItems?briefings.slice(0,5).map((b)=>(
            <BriefingItem key={b.id} brief={b} onAccept={()=>onAccept(b)} onDismiss={()=>onDismiss(b)}/>
          )):(
            <div style={{padding:"40px 20px",textAlign:"center",color:"#7a73a3"}}>
              <div style={{fontSize:32,marginBottom:10,opacity:0.5}}>✨</div>
              <div style={{fontSize:13,fontWeight:600,color:"#1a1530",marginBottom:4}}>暂时没有新消息</div>
              <div style={{fontSize:12,lineHeight:1.6}}>我会在关键节点主动联系你</div>
            </div>
          )}
        </div>
        <div style={{padding:"10px 14px",borderTop:"1px solid rgba(167,139,250,0.12)",display:"flex",gap:8,alignItems:"center"}}>
          <button 
            onMouseDown={()=>{onClose();setTimeout(()=>window.__linekListen&&window.__linekListen(),200);}} 
            onTouchStart={()=>{onClose();setTimeout(()=>window.__linekListen&&window.__linekListen(),200);}}
            title="按住和 Linek 说话（或按住空格键）"
            style={{width:38,height:38,padding:0,borderRadius:"50%",background:"linear-gradient(135deg,#ef4444,#f97316)",color:"#fff",fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 14px rgba(239,68,68,0.35)",flexShrink:0}}
          >🎤</button>
          <button onClick={()=>{onClose();onOpenAssistant&&onOpenAssistant(briefings);}} style={{flex:1,padding:"9px 12px",background:"linear-gradient(135deg,#6d5fff,#a855f7,#ec4899)",color:"#fff",borderRadius:9,fontSize:12,fontWeight:700,letterSpacing:"0.04em",cursor:"pointer",boxShadow:"0 4px 14px rgba(109,95,255,0.3)"}}>打开 AI 助手</button>
        </div>
      </div>
    </>
  );
}

function BriefingItem({brief,onAccept,onDismiss}){
  const senderColors={coach:"#10d9a3",strategist:"#6d5fff",mentor:"#ec4899",celebrate:"#fbbf24"};
  const sColor=senderColors[brief.sender]||"#6d5fff";
  return(
    <div style={{padding:"12px 12px",borderRadius:11,background:"rgba(244,242,255,0.5)",marginBottom:6,border:"1px solid rgba(167,139,250,0.12)"}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
        <span style={{width:6,height:6,borderRadius:"50%",background:sColor,boxShadow:`0 0 8px ${sColor}66`}}/>
        <span className="mono" style={{fontSize:9,color:sColor,letterSpacing:"0.16em",fontWeight:700,textTransform:"uppercase"}}>{brief.title||brief.type||"消息"}</span>
      </div>
      <div style={{fontSize:13,color:"#1a1530",lineHeight:1.6,marginBottom:8}}>{brief.message}</div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        {Array.isArray(brief.actions)&&brief.actions.slice(0,3).map((a,i)=>(
          <button key={i} onClick={()=>onAccept({...brief,_action:a})} style={{padding:"5px 11px",fontSize:11,fontWeight:600,background:i===0?"linear-gradient(135deg,#6d5fff,#a855f7)":"rgba(167,139,250,0.12)",color:i===0?"#fff":"#6d5fff",borderRadius:7,cursor:"pointer"}}>{a.label}</button>
        ))}
        <button onClick={onDismiss} style={{padding:"5px 11px",fontSize:11,fontWeight:500,background:"transparent",color:"#a8a0d6",borderRadius:7,cursor:"pointer",marginLeft:"auto"}}>稍后</button>
      </div>
    </div>
  );
}

function handleBriefingAccept(brief,setBriefings,showToast){
  const action=brief._action;
  if(!action){showToast&&showToast("操作未定义","warn");return;}
  const all=getBriefings().map(b=>b.id===brief.id?{...b,read:true,accepted:true,acceptedAt:Date.now()}:b);
  setBriefingsStorage(all);
  setBriefings(all.filter(b=>!b.read&&!b.dismissed));
  recordBriefAccept(brief.type);
  window.dispatchEvent(new CustomEvent("tlk-brief-action",{detail:{brief,action}}));
  showToast&&showToast("好的，已处理 ✓","success");
}

function handleBriefingDismiss(brief,setBriefings){
  const all=getBriefings().map(b=>b.id===brief.id?{...b,read:true,dismissed:true}:b);
  setBriefingsStorage(all);
  setBriefings(all.filter(b=>!b.read&&!b.dismissed));
  recordBriefDismiss(brief.type);
}

function AssistantView({th,tasks,setTasks,projects,cats,catOf,tags,journals,today,displayName,nextSortKey,showToast,emptyTask,setTrash,user}){
  const[messages,setMessages]=useState(()=>{
    try{
      const r=localStorage.getItem("tlk_chat_v1");
      if(r){
        const arr=JSON.parse(r);
        console.log("[AssistantView] 初始化：从 localStorage 读到",arr.length,"条消息");
        return arr;
      }
    }catch(e){console.warn("[AssistantView] 初始化读 localStorage 失败",e);}
    console.log("[AssistantView] 初始化：localStorage 为空");
    return[];
  });
  const[input,setInput]=useState("");
  const[loading,setLoading]=useState(false);
  const[attachedFiles,setAttachedFiles]=useState([]); // [{name,text,size}]
  const[parsing,setParsing]=useState(false);
  const[syncing,setSyncing]=useState(false);
  const[confirmAction,setConfirmAction]=useState(null); // {desc, run, args}
  const fileInputRef=useRef(null);
  const scrollRef=useRef(null);
  // 防循环：标记是不是从云端 sync 过来的写入（这种写入不应该再触发上传）
  const fromCloudRef=useRef(false);
  
  // 持久化对话 + 通知 MainApp 触发云同步
  useEffect(()=>{
    if(fromCloudRef.current){
      // 来自云端的更新，不再上传
      fromCloudRef.current=false;
      console.log("[AssistantView] 从云端的写入，跳过本地→云上传");
      return;
    }
    try{
      const data=messages.slice(-30);
      localStorage.setItem("tlk_chat_v1",JSON.stringify(data));
      window.dispatchEvent(new Event("tlk_chat_changed"));
      console.log("[AssistantView] 写入 localStorage："+data.length+" 条 → 触发 tlk_chat_changed");
    }catch(e){console.warn("[AssistantView] 写入 localStorage 失败",e);}
  },[messages]);
  
  // 监听云端推过来的最新对话（来自其他设备的更新）
  useEffect(()=>{
    const onSynced=()=>{
      try{
        const r=localStorage.getItem("tlk_chat_v1");
        if(r){
          const cloud=JSON.parse(r);
          // 仅当云端比本地新（消息数更多或最后时间戳更晚）时才覆盖，避免循环
          const localLast=messages.length>0?messages[messages.length-1]?.ts||0:0;
          const cloudLast=cloud.length>0?cloud[cloud.length-1]?.ts||0:0;
          if(cloud.length!==messages.length||cloudLast>localLast){
            console.log("[AssistantView] 收到 tlk_chat_synced，云端比本地新，更新："+cloud.length+" 条");
            fromCloudRef.current=true; // 防循环
            setMessages(cloud);
          }else{
            console.log("[AssistantView] 收到 tlk_chat_synced，但本地更新或一致，跳过");
          }
        }
      }catch(e){console.warn("[AssistantView] onSynced 失败",e);}
    };
    window.addEventListener("tlk_chat_synced",onSynced);
    return()=>window.removeEventListener("tlk_chat_synced",onSynced);
  },[messages]);
  
  // 手动同步：从云端拉最新对话
  const manualSync=async()=>{
    if(!user||syncing)return;
    setSyncing(true);
    showToast&&showToast("正在拉取云端对话...","info");
    try{
      const cloud=await cloudLoad(user.id);
      console.log("[AssistantView] 手动同步：cloudLoad 返回",cloud?{has:true,chatLen:cloud.chat_messages?.length||0,updatedAt:cloud.updated_at}:"null");
      if(!cloud){
        showToast&&showToast("云端无数据","info");
      }else if(!Array.isArray(cloud.chat_messages)){
        showToast&&showToast("云端 chat 字段未启用","error");
      }else{
        const cloudArr=cloud.chat_messages;
        const cloudLastTs=cloudArr.length>0?(cloudArr[cloudArr.length-1]?.ts||0):0;
        const localLastTs=messages.length>0?(messages[messages.length-1]?.ts||0):0;
        console.log("[AssistantView] 比较：本地",messages.length,"条 lastTs=",localLastTs,"vs 云端",cloudArr.length,"条 lastTs=",cloudLastTs);
        if(cloudArr.length===0&&messages.length===0){
          showToast&&showToast("两边都是空的","info");
        }else if(cloudLastTs>localLastTs||cloudArr.length>messages.length){
          fromCloudRef.current=true;
          setMessages(cloudArr);
          localStorage.setItem("tlk_chat_v1",JSON.stringify(cloudArr));
          showToast&&showToast(`✓ 拉到 ${cloudArr.length} 条对话`,"success");
        }else if(cloudArr.length<messages.length){
          showToast&&showToast(`本地已更新（本地 ${messages.length} > 云端 ${cloudArr.length}）`,"info");
        }else{
          showToast&&showToast("已是最新","success");
        }
      }
    }catch(e){
      console.error("[AssistantView] 手动同步失败",e);
      showToast&&showToast("同步失败: "+e.message,"error");
    }
    setSyncing(false);
  };
  
  // 自动滚到底部
  useEffect(()=>{
    if(scrollRef.current)scrollRef.current.scrollTop=scrollRef.current.scrollHeight;
  },[messages,loading]);

  // 工具实现
  const handlers={
    createTask:(args)=>{
      try{
        const dueOk=args.due||today;
        let projId=args.projectId||"";
        // 校验项目：AI 传的 projectId 必须真实存在 + 项目名/关键词必须出现在 title 里
        if(projId){
          const p=projects.find(x=>x.id===projId);
          if(!p)projId="";
          else{
            const cleanName=p.name.replace(/项目|定制|计划|方案|工程/g,"").trim();
            const t=(args.title||"").toLowerCase();
            const matched=t.includes(p.name.toLowerCase())||(cleanName.length>=2&&t.includes(cleanName.toLowerCase()));
            if(!matched)projId=""; // 标题里没提到项目名 → 不归属
          }
        }
        // 分类：先按 id 匹配，再按 name 匹配（AI 可能传中文名）
        let catId="work";
        if(args.category){
          const byId=cats.find(c=>c.id===args.category);
          const byName=cats.find(c=>c.name===args.category);
          if(byId)catId=byId.id;
          else if(byName)catId=byName.id;
        }
        const newT={
          id:Date.now()+Math.floor(Math.random()*1000),
          ...emptyTask,
          title:args.title||"未命名",
          content:args.content||"",
          category:catId,
          priority:args.priority||"中",
          due:dueOk,
          timeStart:args.timeStart||"",
          timeEnd:args.timeEnd||"",
          duration:args.duration?String(args.duration):"",
          projectId:projId,
          sortKey:nextSortKey(),
          createdAt:today,
          done:false,
        };
        setTasks(t=>[...t,newT]);
        return{success:true,taskId:newT.id,message:`任务"${newT.title}"已创建`,task:{id:newT.id,title:newT.title,due:newT.due,timeStart:newT.timeStart,priority:newT.priority,category:cats.find(c=>c.id===catId)?.name||catId}};
      }catch(e){
        return{success:false,message:"创建失败: "+(e.message||"未知错误")};
      }
    },
    updateTask:(args)=>{
      const tid=Number(args.taskId);
      const target=tasks.find(t=>t.id===tid);
      if(!target)return{success:false,message:"任务不存在 id="+tid};
      setTasks(list=>list.map(t=>{
        if(t.id!==tid)return t;
        const next={...t};
        ["title","due","timeStart","timeEnd","priority","content"].forEach(k=>{if(args[k]!==undefined)next[k]=args[k];});
        if(args.duration!==undefined)next.duration=String(args.duration);
        if(args.done!==undefined){next.done=!!args.done;next.progress=args.done?1:0;if(args.done)next.completedAt=today;}
        return next;
      }));
      return{success:true,message:`任务 #${tid} 已更新`};
    },
    deleteTask:(args)=>{
      const tid=Number(args.taskId);
      const target=tasks.find(t=>t.id===tid);
      if(!target)return{success:false,message:"任务不存在 id="+tid};
      setTasks(t=>t.filter(x=>x.id!==tid));
      setTrash&&setTrash(tr=>[...tr,{...target,deletedAt:Date.now()}]);
      return{success:true,message:`任务"${target.title}"已删除（移至回收站）`};
    },
    listTasks:(args)=>{
      const filter=args.filter||"all";
      const limit=Math.min(args.limit||10,30);
      let list=tasks;
      if(filter==="done")list=tasks.filter(t=>t.done);
      else if(filter==="undone")list=tasks.filter(t=>!t.done);
      else if(filter==="overdue")list=tasks.filter(t=>!t.done&&t.due&&t.due<today);
      else if(filter==="today")list=tasks.filter(t=>!t.done&&t.due===today);
      else if(filter==="future")list=tasks.filter(t=>!t.done&&t.due&&t.due>today);
      const items=list.slice(0,limit).map(t=>({
        id:t.id,
        title:t.title,
        due:t.due||"",
        timeStart:t.timeStart||"",
        priority:t.priority,
        category:(catOf(t.category)||{}).name||t.category,
        done:t.done,
      }));
      return{count:list.length,returned:items.length,items};
    },
  };

  // 上传文件解析
  const onFilesPick=async(files)=>{
    if(!files||files.length===0)return;
    setParsing(true);
    const newAttached=[];
    for(const f of Array.from(files)){
      try{
        const txt=await extractFileText(f);
        newAttached.push({name:f.name,text:txt.slice(0,30000),size:f.size});
        showToast(`已附加：${f.name}（${(txt.length/1000).toFixed(1)}k 字）`,"success");
      }catch(e){
        showToast(`${f.name}：${e.message}`,"error");
      }
    }
    setAttachedFiles(a=>[...a,...newAttached]);
    setParsing(false);
    if(fileInputRef.current)fileInputRef.current.value="";
  };

  const sendMsg=async(opts={})=>{
    const text=opts.forceText||input.trim();
    if(!text&&attachedFiles.length===0)return;
    if(loading)return;
    
    const userMsgContent=[];
    if(attachedFiles.length>0){
      userMsgContent.push("📎 附件内容：\n");
      attachedFiles.forEach(f=>{
        userMsgContent.push(`【文件：${f.name}】\n${f.text}\n`);
      });
      userMsgContent.push("---\n");
    }
    userMsgContent.push(text||"请基于附件内容帮助我。");
    const fullText=userMsgContent.join("");
    
    // UI 显示用：保留附件标记
    const displayMsg={role:"user",content:text||"（基于附件提问）",files:attachedFiles.map(f=>f.name),ts:Date.now()};
    const newMessages=[...messages,displayMsg];
    setMessages(newMessages);
    setInput("");
    setAttachedFiles([]);
    setLoading(true);
    
    try{
      const sysPrompt=buildAssistantSystemPrompt({tasks,cats,projects,tags,journals,today,displayName});
      // 只把 user / assistant 类消息发给 API（system_event 是 UI 显示用的，DeepSeek 不认）
      const cleanHistory=newMessages.slice(-10).filter(m=>m.role==="user"||m.role==="assistant");
      const apiMsgs=[
        {role:"system",content:sysPrompt},
        ...cleanHistory.map((m,i)=>{
          if(i===cleanHistory.length-1){
            return{role:"user",content:fullText};
          }
          return{role:m.role,content:m.content||""};
        }),
      ];
      const result=await callAssistantWithTools(apiMsgs,handlers,(progress)=>{
        if(progress.type==="tool_call"){
          setMessages(m=>[...m,{role:"system_event",content:`🔧 调用工具：${progress.name}`,ts:Date.now()}]);
        }
      });
      setMessages(m=>[...m,{role:"assistant",content:result.content,ts:Date.now()}]);
    }catch(err){
      setMessages(m=>[...m,{role:"assistant",content:`❌ ${err.message}`,error:true,ts:Date.now()}]);
    }
    setLoading(false);
  };

  const clearChat=()=>{
    if(!confirm("清空所有对话历史？"))return;
    setMessages([]);
    try{localStorage.removeItem("tlk_chat_v1");}catch{}
    showToast("对话已清空","info");
  };

  // 快捷指令
  const quickActions=[
    "总结我今天的任务",
    "本周哪些任务最重要？",
    "帮我把所有逾期任务列出来",
    "给我一些提升效率的建议",
  ];

  return(
    <div className="fadeIn" style={{display:"flex",flexDirection:"column",height:"calc(100vh - 100px)",maxHeight:900,minHeight:500}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14,paddingBottom:14,borderBottom:`1px solid ${th.glassBorder}`}}>
        <div style={{width:42,height:42,borderRadius:12,background:`linear-gradient(135deg,${th.accent},${th.accent3})`,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 4px 16px ${th.accent}50`}}>
          <span style={{fontSize:20}}>🤖</span>
        </div>
        <div style={{flex:1}}>
          <div className="display" style={{fontSize:22,color:th.ink0,letterSpacing:"-0.02em",fontWeight:700}}>AI 助手</div>
          <div style={{fontSize:11,color:th.ink2,marginTop:1}}>{messages.length>0?`${messages.length} 条对话`:"问我任何关于任务、计划、效率的问题"}</div>
        </div>
        <button onClick={manualSync} disabled={syncing} className="glass" title="从云端拉取最新对话" style={{padding:"7px 12px",borderRadius:9,fontSize:11,color:th.ink2,display:"flex",alignItems:"center",gap:4,opacity:syncing?0.5:1}}>
          {syncing?<span className="spin">○</span>:<Ic n="repeat" size={11} color={th.ink2}/>} 同步
        </button>
        {messages.length>0&&<button onClick={clearChat} className="glass" style={{padding:"7px 12px",borderRadius:9,fontSize:11,color:th.ink2,display:"flex",alignItems:"center",gap:4}}><Ic n="trash" size={11} color={th.ink2}/> 清空</button>}
      </div>

      {/* 消息列表 */}
      <div ref={scrollRef} className="slim-scroll" style={{flex:1,overflowY:"auto",padding:"4px 4px 12px",display:"flex",flexDirection:"column",gap:10}}>
        {messages.length===0&&!loading&&(
          <div style={{textAlign:"center",padding:"40px 20px",color:th.ink2}}>
            <div style={{fontSize:48,marginBottom:14}}>💭</div>
            <div style={{fontSize:14,marginBottom:18,fontWeight:500,color:th.ink1}}>我能帮你做什么？</div>
            <div style={{display:"flex",flexDirection:"column",gap:8,maxWidth:380,margin:"0 auto"}}>
              {quickActions.map((q,i)=>(
                <button key={i} onClick={()=>{setInput(q);setTimeout(()=>sendMsg({forceText:q}),50);}} className="glass hover-lift" style={{padding:"11px 16px",borderRadius:11,fontSize:13,color:th.ink1,textAlign:"left",border:`1px dashed ${th.glassBorder}`}}>
                  💡 {q}
                </button>
              ))}
            </div>
          </div>
        )}
        {messages.map((m,i)=>{
          if(m.role==="user"){
            return(
              <div key={i} style={{display:"flex",justifyContent:"flex-end"}}>
                <div style={{maxWidth:"80%",padding:"10px 14px",background:`linear-gradient(135deg,${th.accent},${th.accent3})`,color:"#fff",borderRadius:"14px 14px 4px 14px",fontSize:13.5,lineHeight:1.55,wordBreak:"break-word",boxShadow:`0 4px 12px ${th.accent}40`}}>
                  {m.files&&m.files.length>0&&<div style={{fontSize:10.5,opacity:0.85,marginBottom:6,letterSpacing:"0.04em"}}>📎 {m.files.join(" · ")}</div>}
                  <div style={{whiteSpace:"pre-wrap"}}>{m.content}</div>
                </div>
              </div>
            );
          }
          if(m.role==="system_event"){
            return(
              <div key={i} style={{textAlign:"center",fontSize:10.5,color:th.ink3,padding:"4px 0",letterSpacing:"0.04em"}}>{m.content}</div>
            );
          }
          // assistant
          return(
            <div key={i} style={{display:"flex",justifyContent:"flex-start",alignItems:"flex-start",gap:8}}>
              <div style={{width:28,height:28,borderRadius:9,background:m.error?"#ff5d7a30":th.glass1,border:`1px solid ${m.error?"#ff5d7a60":th.glassBorder}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:14}}>{m.error?"⚠":"🤖"}</div>
              <div className={m.error?"":"glass"} style={{maxWidth:"82%",padding:"11px 15px",background:m.error?"rgba(255,93,122,0.08)":undefined,color:m.error?"#ff5d7a":th.ink0,borderRadius:"14px 14px 14px 4px",fontSize:14,lineHeight:1.7,wordBreak:"break-word",border:m.error?"1px solid rgba(255,93,122,0.25)":undefined,fontFamily:"var(--f-sans)",letterSpacing:"0.01em"}}>
                {m.error?<div style={{whiteSpace:"pre-wrap"}}>{m.content}</div>:<MarkdownText text={m.content} th={th}/>}
              </div>
            </div>
          );
        })}
        {loading&&(
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:28,height:28,borderRadius:9,background:th.glass1,border:`1px solid ${th.glassBorder}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>🤖</div>
            <div className="glass" style={{padding:"10px 14px",borderRadius:"14px 14px 14px 4px",fontSize:13,color:th.ink2,display:"flex",alignItems:"center",gap:8}}>
              <span className="spin" style={{display:"inline-block"}}>○</span>
              思考中…
            </div>
          </div>
        )}
      </div>

      {/* 附件区 */}
      {attachedFiles.length>0&&(
        <div style={{display:"flex",flexWrap:"wrap",gap:6,padding:"8px 0"}}>
          {attachedFiles.map((f,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:6,padding:"5px 10px",background:th.glass1,borderRadius:8,fontSize:11,color:th.ink1,border:`1px solid ${th.glassBorder}`}}>
              📄 {f.name} <span style={{color:th.ink3}}>({(f.text.length/1000).toFixed(1)}k)</span>
              <button onClick={()=>setAttachedFiles(a=>a.filter((_,j)=>j!==i))} style={{padding:0,marginLeft:4,color:th.ink3}}>×</button>
            </div>
          ))}
        </div>
      )}

      {/* 输入区 */}
      <div className="glass" style={{padding:10,borderRadius:14,display:"flex",alignItems:"flex-end",gap:8,border:`1.5px solid ${th.glassBorder}`}}>
        <input ref={fileInputRef} type="file" multiple accept=".txt,.md,.csv,.json,.html,.js,.py,.docx,.xlsx,.xls,.log,.yaml,.yml,.xml" onChange={e=>onFilesPick(e.target.files)} style={{display:"none"}}/>
        <button onClick={()=>fileInputRef.current&&fileInputRef.current.click()} disabled={parsing||loading} title="上传文件" style={{width:34,height:34,borderRadius:9,background:th.glass2,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,opacity:(parsing||loading)?0.5:1}}>
          {parsing?<span className="spin">○</span>:<Ic n="paperclip" size={14} color={th.ink1}/>}
        </button>

const MOOD_OPTIONS=["😊","🙂","😐","😔","😫","🔥","✨","💪","🌱","☕","🌙","🎯"];

function JournalModal({th,today,todayJournal,saveJournal,onClose}){
  const[text,setText]=useState((todayJournal&&todayJournal.wish)||"");

  const inputRef=useRef(null);
  useEffect(()=>{
    if(inputRef.current)setTimeout(()=>inputRef.current.focus(),300);
  },[]);
  const submit=()=>{
    if(!text.trim())return;
    saveJournal(text,mood);
    onClose();
  };
  const dateLabel=(()=>{
    const d=new Date(today);
    const wd=["日","一","二","三","四","五","六"][d.getDay()];
    return`${d.getMonth()+1}月${d.getDate()}日 · 周${wd}`;
  })();
  const isEditing=!!(todayJournal&&todayJournal.wish);
  return(
    <div className="fadeIn modal-overlay" onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} className="slideUp glass-strong" style={{borderRadius:22,maxWidth:480,width:"100%",padding:"30px 28px 24px",position:"relative",overflow:"hidden"}}>

        <div style={{position:"absolute",top:-60,right:-40,width:160,height:160,borderRadius:"50%",background:`radial-gradient(circle,${th.accent}40 0%,transparent 70%)`,filter:"blur(20px)",pointerEvents:"none"}}/>
        <div style={{position:"absolute",bottom:-50,left:-30,width:120,height:120,borderRadius:"50%",background:`radial-gradient(circle,${th.accent3}30 0%,transparent 70%)`,filter:"blur(20px)",pointerEvents:"none"}}/>
        
        <div style={{position:"relative"}}>
          <div className="mono" style={{fontSize:11,letterSpacing:"0.22em",color:th.ink3,marginBottom:6,fontWeight:600}}>{isEditing?"TODAY · 编辑":"NEW DAY · 一句话日记"}</div>
          <h2 className="display" style={{fontSize:30,color:th.ink0,letterSpacing:"-0.03em",lineHeight:1.05,marginBottom:6}}>
            {isEditing?"今日记录":<>新的<em style={{fontStyle:"italic"}} className="gradient-primary">一天</em></>}
          </h2>
          <div style={{fontSize:13,color:th.ink2,marginBottom:20}}>{dateLabel} · {isEditing?"补充或修改":"为今天写下一句最重要的话"}</div>

          {/* Mood 选择 */}
          <div style={{marginBottom:14}}>
            <div className="mono" style={{fontSize:10,color:th.ink3,letterSpacing:"0.16em",marginBottom:8,fontWeight:600}}>今日心情（可选）</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {MOOD_OPTIONS.map(m=>(
                <button key={m} onClick={()=>setMood(mood===m?"":m)} style={{width:38,height:38,borderRadius:10,border:`1.5px solid ${mood===m?th.accent:th.glassBorder}`,background:mood===m?th.accent+"25":th.glass2,fontSize:18,boxShadow:mood===m?`0 0 12px ${th.accent}80`:"none",transition:"all 0.15s",cursor:"pointer"}}>{m}</button>
              ))}
            </div>
          </div>

          {/* 输入框 */}
          <input
            ref={inputRef}
            value={text}
            onChange={e=>setText(e.target.value)}
            onKeyDown={e=>{if(e.isComposing||e.keyCode===229)return;if(e.key==="Enter"&&text.trim())submit();}}
            placeholder="今天最想做的事 / 一句感悟 / 状态记录…"
            maxLength={140}
            className="inp"
            style={{fontSize:15,padding:"14px 16px",marginBottom:8,fontWeight:500}}
          />
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
            <span className="mono" style={{fontSize:10,color:th.ink3}}>回车保存 · Esc 关闭</span>
            <span className="mono tnum" style={{fontSize:10,color:text.length>120?"#ff5d7a":th.ink3}}>{text.length}/140</span>
          </div>

          <div style={{display:"flex",gap:8}}>
            <button onClick={onClose} style={{padding:"11px 18px",borderRadius:11,background:th.glass2,color:th.ink2,fontSize:13,fontWeight:500}}>{isEditing?"取消":"以后再说"}</button>

          </div>
        </div>
      </div>
    </div>
  );
}

function CmdKPalette({th,setView,setShowCmdK,setShowTaskForm,startPomodoro,setShowSettings,setReviewSub}){
  const[q,setQ]=useState("");
  const[idx,setIdx]=useState(0);
  const onClose=()=>setShowCmdK(false);

  const groups=[
    {g:"ACTIONS",items:[
      {ic:"plus",t:"新建任务",sh:"⌘N",act:()=>{onClose();setShowTaskForm(true);}},
      {ic:"flame",t:"开始专注 · 番茄钟",sh:"",act:()=>{onClose();startPomodoro();}},

    ]},
    {g:"VIEWS",items:[

      {ic:"arrowRight",t:"明日视图",sh:"G M",act:()=>{onClose();setView("tomorrow");}},
      {ic:"calendar",t:"本周视图",sh:"G W",act:()=>{onClose();setView("week");}},
      {ic:"grid",t:"月视图",sh:"G M",act:()=>{onClose();setView("month");}},
      {ic:"layers",t:"看板视图",sh:"G K",act:()=>{onClose();setView("kanban");}},
      {ic:"folder",t:"项目",sh:"G P",act:()=>{onClose();setView("projects");}},
      {ic:"list",t:"活动流",sh:"G A",act:()=>{onClose();setView("activity");}},
      {ic:"check",t:"近期完成",sh:"G C",act:()=>{onClose();setView("recent");}},
      {ic:"book",t:"一句日记",sh:"G J",act:()=>{onClose();setView("journal");}},
      {ic:"star",t:"复盘",sh:"G R",act:()=>{onClose();setView("review");}},
    ]},
    {g:"REVIEW",items:[
      {ic:"star",t:"今日复盘",sh:"",act:()=>{onClose();setView("review");setReviewSub("today");}},
      {ic:"chart",t:"本周复盘",sh:"",act:()=>{onClose();setView("review");setReviewSub("week");}},
      {ic:"flame",t:"习惯打卡",sh:"",act:()=>{onClose();setView("review");setReviewSub("habits");}},
      {ic:"layers",t:"热力图",sh:"",act:()=>{onClose();setView("review");setReviewSub("heatmap");}},
    ]},
  ];
  const flatVisible=groups.flatMap(g=>g.items.filter(it=>!q||it.t.toLowerCase().includes(q.toLowerCase())));
  useEffect(()=>{
    const h=(e)=>{
      if(e.key==="ArrowDown"){e.preventDefault();setIdx(i=>Math.min(i+1,flatVisible.length-1));}
      if(e.key==="ArrowUp"){e.preventDefault();setIdx(i=>Math.max(i-1,0));}
      if(e.key==="Enter"){e.preventDefault();const it=flatVisible[idx];if(it?.act)it.act();else onClose();}
    };
    window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);
  },[idx,flatVisible]);
  let running=0;
  return(
    <div onClick={onClose} className="fadeIn" style={{position:"fixed",inset:0,zIndex:500,background:"rgba(7,6,13,0.65)",backdropFilter:"blur(12px)",display:"flex",justifyContent:"center",alignItems:"flex-start",paddingTop:"12vh"}}>
      <div onClick={e=>e.stopPropagation()} className="glass-strong" style={{width:620,maxWidth:"92vw",maxHeight:540,borderRadius:18,overflow:"hidden",boxShadow:`0 32px 80px rgba(0,0,0,0.6),0 0 0 1px ${th.accent}33,0 0 40px ${th.accent}40`,display:"flex",flexDirection:"column"}}>
        <div style={{padding:"16px 20px",display:"flex",alignItems:"center",gap:12,borderBottom:`1px solid ${th.glassBorder}`}}>
          <Ic n="search" size={16} color={th.ink2}/>
          <input autoFocus={typeof window!=="undefined"&&window.innerWidth>=900} value={q} onChange={e=>{setQ(e.target.value);setIdx(0);}} placeholder="输入命令、搜索任务、跳转…" style={{flex:1,background:"transparent",border:"none",outline:"none",fontSize:15,color:th.ink0}}/>
          <kbd>esc</kbd>
        </div>
        <div className="slim-scroll" style={{flex:1,overflowY:"auto",padding:"8px 0"}}>
          {groups.map(g=>{
            const vis=g.items.filter(it=>!q||it.t.toLowerCase().includes(q.toLowerCase()));
            if(!vis.length)return null;
            return(
              <div key={g.g} style={{marginBottom:6}}>
                <div className="mono" style={{fontSize:11,letterSpacing:"0.2em",color:th.ink3,padding:"6px 20px 4px",fontWeight:600}}>{g.g}</div>
                {vis.map(it=>{
                  const my=running++;
                  const sel=my===idx;
                  return(
                    <button key={it.t} onClick={()=>it.act?it.act():onClose()} onMouseEnter={()=>setIdx(my)} style={{width:"100%",padding:"10px 20px",display:"flex",alignItems:"center",gap:12,textAlign:"left",background:sel?`linear-gradient(90deg,${th.accent}30,${th.accent}05)`:"transparent",borderLeft:sel?`2px solid ${th.accent}`:"2px solid transparent"}}>
                      <div style={{width:26,height:26,borderRadius:8,background:th.glass2,border:`1px solid ${th.glassBorder}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Ic n={it.ic} size={13} color={th.ink1}/></div>
                      <span style={{flex:1,fontSize:13,color:sel?th.ink0:th.ink1}}>{it.t}</span>
                      {it.sh&&<span className="mono" style={{fontSize:10,color:th.ink3}}>{it.sh}</span>}
                      {sel&&<Ic n="arrow_right" size={12} color={th.accent2}/>}
                    </button>
                  );
                })}
              </div>
            );
          })}
        </div>
        <div style={{padding:"8px 20px",borderTop:`1px solid ${th.glassBorder}`,display:"flex",alignItems:"center",gap:16,fontSize:10,color:th.ink3}}>
          <span className="mono"><kbd>↑↓</kbd> 选择</span>
          <span className="mono"><kbd>⏎</kbd> 执行</span>
          <div style={{flex:1}}/>
          <span className="mono">TIMELINEK · v2.0</span>
        </div>
      </div>
    </div>
  );
}

// ═══ POMODORO PICKER (选择任务 + 时长) ═══
function PomodoroPicker({th,tasks,today,catOf,onClose,onPick,setShowTaskForm}){
  const[selId,setSelId]=useState(null);
  const[dur,setDur]=useState(25);
  const[customOn,setCustomOn]=useState(false);
  const available=tasks.filter(t=>!t.done).sort((a,b)=>{
    const aToday=a.due===today?0:1,bToday=b.due===today?0:1;
    if(aToday!==bToday)return aToday-bToday;
    const p={高:0,中:1,低:2};
    return p[a.priority]-p[b.priority];
  });
  const presets=[15,25,45,60];
  const ok=selId&&dur>0;
  return(
    <div className="fadeIn modal-overlay" onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} className="slideUp glass-strong" style={{borderRadius:20,maxWidth:480,width:"100%",maxHeight:"88vh",display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <div style={{padding:"20px 22px",borderBottom:`1px solid ${th.glassBorder}`,display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:38,height:38,borderRadius:11,background:`linear-gradient(135deg,${th.accent3},${th.accent})`,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 6px 18px ${th.accent3}60`}}>
            <Ic n="flame" size={18} color="#fff"/>
          </div>
          <div style={{flex:1}}>
            <div className="mono" style={{fontSize:11,letterSpacing:"0.2em",color:th.ink3,marginBottom:3,fontWeight:600}}>POMODORO</div>
            <h2 className="display" style={{fontSize:22,color:th.ink0,letterSpacing:"-0.02em"}}>开始专注</h2>
          </div>
          <button onClick={onClose} style={{width:32,height:32,borderRadius:10,background:th.glass2,display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="close" size={14} color={th.ink2}/></button>
        </div>

        {/* 时长选择 */}
        <div style={{padding:"16px 22px 8px"}}>
          <div className="mono" style={{fontSize:11,letterSpacing:"0.18em",color:th.ink3,marginBottom:10,fontWeight:600}}>时长 · DURATION</div>
          <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
            {presets.map(m=>(

                return(
                  <button key={t.id} onClick={()=>setSelId(t.id)} style={{padding:"10px 12px",borderRadius:10,background:sel?c.color+"25":th.glass1,border:sel?`1px solid ${c.color}80`:`1px solid ${th.glassBorder}`,textAlign:"left",display:"flex",alignItems:"center",gap:10,transition:"all 0.15s",boxShadow:sel?`0 4px 12px ${c.color}30`:"none"}}>

                    <div style={{flex:1,minWidth:0}}>

                        <span className="mono" style={{fontSize:10,color:PCOLOR[t.priority]}}>· {t.priority}</span>
                        {isToday&&<span className="mono" style={{fontSize:10,color:th.accent2}}>· 今天</span>}

          <button onClick={()=>ok&&onPick(selId,dur)} disabled={!ok} style={{flex:2,padding:12,background:ok?`linear-gradient(135deg,${th.accent},${th.accent3})`:th.glass2,color:ok?"#fff":th.ink3,borderRadius:11,fontSize:13,fontWeight:700,letterSpacing:"0.06em",boxShadow:ok?`0 8px 22px ${th.accent}66`:"none",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}><Ic n="flame" size={13} color={ok?"#fff":th.ink3}/> 开始专注 · {dur} 分钟</button>
        </div>
      </div>
    </div>
  );
}

// ═══ POMODORO FULLSCREEN ═══
function PomodoroFullscreen({th,taskId,runningTask,tasks,nowMin,onClose,toggleTimer,toggleTask,setTasks,catOf}){
  // 优先按 id 查；否则用 runningTask
  const task=taskId?tasks.find(t=>t.id===taskId):(runningTask||tasks.find(t=>!t.done));
  // ⚠️ Hooks 必须在任何 return 之前调用，否则违反 Rules of Hooks
  const pomoEndedRef=useRef(false);
  const dur=Number(task?.duration)||25;
  const elapsed=task?.actualMin||0;
  const rem=Math.max(0,dur-elapsed);
  const isRunning=task&&runningTask&&runningTask.id===task.id;
  useEffect(()=>{
    if(rem<=0&&isRunning&&!pomoEndedRef.current){
      pomoEndedRef.current=true;
      window.__playSound&&window.__playSound("pomoEnd");
    }
    if(rem>0)pomoEndedRef.current=false;
  },[rem,isRunning]);
  // 之后才能 return null
  if(!task){onClose();return null;}
  const c=catOf(task.category);
  const remMin=Math.floor(rem),remSec=Math.floor((rem-remMin)*60);
  const pct=Math.min(elapsed/dur,1);

  const onReset=()=>{
    if(!confirm("重置当前番茄钟？已计时的时长会清零"))return;
    // 若正在跑，先停掉
    if(isRunning)toggleTimer(task.id);
    // 清零 actualMin
    setTasks(list=>list.map(t=>t.id===task.id?{...t,actualMin:0}:t));
  };
  const onComplete=()=>{
    // 若正在跑，先停
    if(isRunning)toggleTimer(task.id);
    if(!task.done)toggleTask(task.id);
    onClose();
  };
  const onPlayPause=()=>{
    if(!isRunning)window.__playSound&&window.__playSound("pomoStart");
    toggleTimer(task.id);
  };

  return(
    <div className="fadeIn" style={{position:"fixed",inset:0,background:"radial-gradient(ellipse at center,#2a1a4a 0%,#0a0818 80%)",color:"#fff",zIndex:700,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <ParticleField count={40}/>
      <div className="tl-aurora"><div className="orb oa" style={{left:"50%",top:"20%",transform:"translateX(-50%)",width:380,height:380,background:`radial-gradient(circle,${th.accent} 0%,transparent 65%)`}}/></div>

      <div style={{padding:"20px 28px 0",display:"flex",justifyContent:"space-between",alignItems:"center",position:"relative",zIndex:10}}>
        <button onClick={onClose} style={{width:38,height:38,borderRadius:"50%",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center"}} title="返回"><Ic n="chevLeft" size={16}/></button>
        <div className="mono" style={{fontSize:10,letterSpacing:"0.3em",color:"rgba(255,255,255,0.5)"}}>POMODORO · 专注</div>
        <button onClick={onClose} style={{width:38,height:38,borderRadius:"50%",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center"}} title="退出（不完成）"><Ic n="close" size={16}/></button>
      </div>

      <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"0 28px",position:"relative",zIndex:10}}>
        <div style={{position:"relative",width:300,height:300,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{position:"absolute",inset:0,borderRadius:"50%",border:"1px solid rgba(109,95,255,0.15)",animation:"ringPulse 4s ease-in-out infinite"}}/>
          <div style={{position:"absolute",inset:-20,borderRadius:"50%",border:"1px solid rgba(109,95,255,0.1)",animation:"ringPulse 4s ease-in-out infinite 0.8s"}}/>
          <div style={{position:"absolute",inset:-40,borderRadius:"50%",border:"1px solid rgba(109,95,255,0.06)",animation:"ringPulse 4s ease-in-out infinite 1.6s"}}/>
          <svg width={280} height={280} style={{transform:"rotate(-90deg)",position:"absolute"}}>
            <defs><linearGradient id="pomo-g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stopColor="#c4b5fd"/><stop offset="50%" stopColor="#6d5fff"/><stop offset="100%" stopColor="#ec4899"/></linearGradient></defs>
            <circle cx={140} cy={140} r={132} stroke="rgba(255,255,255,0.04)" strokeWidth={3} fill="none"/>
            <circle cx={140} cy={140} r={132} stroke="url(#pomo-g)" strokeWidth={3} fill="none" strokeLinecap="round" strokeDasharray={2*Math.PI*132} strokeDashoffset={2*Math.PI*132*(1-pct)} style={{filter:"drop-shadow(0 0 10px rgba(109,95,255,0.7))"}}/>
          </svg>
          <Blob3D size={200} hue={265} style={{position:"relative",animation:"breathe 4s ease-in-out infinite"}}/>
          <div style={{position:"absolute",display:"flex",flexDirection:"column",alignItems:"center",pointerEvents:"none"}}>
            <div className="mono" style={{fontSize:10,letterSpacing:"0.3em",color:"rgba(255,255,255,0.7)",marginBottom:4}}>{isRunning?"REMAINING":"DURATION"}</div>
            <div className="display tnum" style={{fontSize:72,lineHeight:1,letterSpacing:"-0.04em",color:"#fff",textShadow:"0 0 30px rgba(109,95,255,0.6)"}}>
              {String(remMin).padStart(2,"0")}:{String(remSec).padStart(2,"0")}
            </div>
            <div className="mono" style={{fontSize:12,letterSpacing:"0.18em",color:"rgba(255,255,255,0.5)",marginTop:6}}>/ {dur}:00</div>
          </div>
        </div>

        <div style={{textAlign:"center",marginTop:40,maxWidth:400}}>
          <div className="mono" style={{fontSize:12,letterSpacing:"0.18em",color:c.color,marginBottom:8}}>{c.glyph} {c.name} · {task.priority}</div>
          <h1 className="display" style={{fontSize:26,lineHeight:1.2,letterSpacing:"-0.02em"}}>
            {task.title.split(" ").map((w,i,arr)=>i===arr.length-1?<em key={i} style={{fontStyle:"italic",color:"#f9a8d4"}}>{w}</em>:<span key={i}>{w} </span>)}
          </h1>
        </div>
      </div>

      <div style={{padding:"0 28px 36px",position:"relative",zIndex:10}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:22}}>
          <button onClick={onReset} title="重置计时" style={{width:56,height:56,borderRadius:"50%",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
            <Ic n="repeat" size={20}/>
            <span style={{position:"absolute",bottom:-20,fontSize:10,color:"rgba(255,255,255,0.55)",letterSpacing:"0.08em",whiteSpace:"nowrap"}}>重置</span>
          </button>
          <button onClick={onPlayPause} style={{width:88,height:88,borderRadius:"50%",background:"linear-gradient(135deg,#6d5fff,#ec4899)",boxShadow:"0 10px 40px rgba(109,95,255,0.6),inset 0 2px 0 rgba(255,255,255,0.3)",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
            <Ic n={isRunning?"pause":"play"} size={28}/>
            <span style={{position:"absolute",bottom:-20,fontSize:10,color:"rgba(255,255,255,0.7)",letterSpacing:"0.08em",whiteSpace:"nowrap",fontWeight:500}}>{isRunning?"暂停":"开始"}</span>
          </button>
          <button onClick={onComplete} title="完成任务" style={{width:56,height:56,borderRadius:"50%",background:"linear-gradient(135deg,#10d9a3,#10a376)",border:"1px solid rgba(16,217,163,0.4)",boxShadow:"0 6px 20px rgba(16,217,163,0.4)",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
            <Ic n="check" size={22} sw={2.5}/>
            <span style={{position:"absolute",bottom:-20,fontSize:10,color:"rgba(255,255,255,0.55)",letterSpacing:"0.08em",whiteSpace:"nowrap"}}>完成</span>
          </button>
        </div>
      </div>
    </div>
  );
}

// ═══ TASKS VIEW (today / tomorrow / week) ═══
function TasksView(p){
  const{th,view,filtered,filter,setFilter,cats,quickTitle,setQuickTitle,quickAdd,setShowTaskForm,setShowTemplates,today,tasks,journals,setShowJournalModal,aiLoading,requestAiPlan,smartParseAndAdd,aiParseLoading}=p;
  // week 视图改用按天分组组件；today / tomorrow 走标准分组展示
  if(view==="week"){
    return<WeekGroupedView {...p}/>;
  }
  const{searchedTasks}=p;
  const tomorrow=addDays(today,1);
  // 视图范围：当前视图应该"看到"的所有任务（未按分类过滤，供 pill 计数 + 空态判断）
  // 基于 searchedTasks（搜索过滤后）
  const baseTasks=searchedTasks||tasks;
  let viewRange;
  if(view==="tomorrow"){
    viewRange=baseTasks.filter(t=>t.due===tomorrow);
  }else{
    viewRange=baseTasks.filter(t=>!t.due||t.due===today||(!t.done&&t.due<today));
  }
  // 实际展示列表：视图范围 + 分类过滤 + 排序
  let list=filter==="all"?viewRange:viewRange.filter(t=>t.category===filter);
  // 排序：未完成在前 + sortKey 大的在前
  list=[...list].sort((a,b)=>{
    if(a.done!==b.done)return a.done?1:-1;
    const sa=a.sortKey||0,sb=b.sortKey||0;
    if(sa!==sb)return sb-sa;
    const p={高:0,中:1,低:2};
    if(a.priority!==b.priority)return p[a.priority]-p[b.priority];
    return(a.timeStart||"99:99").localeCompare(b.timeStart||"99:99");
  });
  // 只显示该视图范围内有任务的分类
  const catsWithTasks=cats.filter(c=>viewRange.some(t=>t.category===c.id));
  const emptyText=view==="tomorrow"?"明天暂无安排 · 新建一条提前规划":"今天没有任务 · 享受这份轻松";
  const quickDueForView=view==="tomorrow"?tomorrow:today;
  const phAdd=view==="tomorrow"?"为明天添加…试试「下午3点开会30分钟」或点 ✨ AI 智能解析":"快速添加…试试「明天9点写周报」或点 ✨ AI 智能解析";

  return(
    <div className="fadeIn">
      {/* 今日日记条（仅 today 视图，已写显示内容，未写显示提示）*/}
      {view==="today"&&(()=>{
        const todayJ=journals&&journals.find(j=>j.date===today);
        if(todayJ&&todayJ.wish){
          return(
            <div onClick={()=>setShowJournalModal&&setShowJournalModal(true)} className="glass hover-lift" style={{padding:"12px 16px",borderRadius:13,marginBottom:14,display:"flex",alignItems:"center",gap:11,cursor:"pointer",borderLeft:`3px solid ${th.accent}`,background:`linear-gradient(90deg,${th.accent}10,transparent 60%)`}}>
              {todayJ.mood&&<span style={{fontSize:18}}>{todayJ.mood}</span>}
              <div style={{flex:1,minWidth:0}}>
                <div className="mono" style={{fontSize:9,letterSpacing:"0.16em",color:th.ink3,fontWeight:600,marginBottom:2}}>TODAY · 一句</div>
                <div style={{fontSize:13,color:th.ink1,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{todayJ.wish}</div>
              </div>
              <Ic n="edit" size={11} color={th.ink3}/>
            </div>
          );
        }
        // 未写则不显示（弹窗会自动出现）
        return null;
      })()}

      {/* Quick add */}
      <div className="glass hover-lift" style={{padding:"13px 16px",borderRadius:14,marginBottom:14,display:"flex",alignItems:"center",gap:10,border:`1px dashed ${th.glassBorder}`,background:th.glass1}}>
        <div style={{width:26,height:26,borderRadius:8,background:`linear-gradient(135deg,${th.accent},${th.accent3})`,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 0 10px ${th.accent}66`,flexShrink:0}}>
          <Ic n="plus" size={14} color="#fff" sw={2.2}/>
        </div>
        <input value={quickTitle} onChange={e=>setQuickTitle(e.target.value)} onKeyDown={e=>{if(e.isComposing||e.keyCode===229)return;if(e.key==="Enter"){if(e.shiftKey)smartParseAndAdd(quickTitle,quickDueForView);else quickAdd(quickDueForView);}}} placeholder={phAdd} style={{flex:1,background:"transparent",border:"none",outline:"none",fontSize:13,color:th.ink0}}/>
        {quickTitle.trim()&&(
          <>
            <button onClick={()=>smartParseAndAdd(quickTitle,quickDueForView)} disabled={aiParseLoading} title="AI 智能解析（Shift+Enter）" style={{padding:"6px 10px",background:aiParseLoading?th.glass2:`linear-gradient(135deg,${th.accent2},${th.accent})`,color:"#fff",borderRadius:9,fontSize:12,fontWeight:600,display:"flex",alignItems:"center",gap:4,cursor:aiParseLoading?"wait":"pointer"}}>
              {aiParseLoading?<span className="spin">○</span>:"✨"}
            </button>
            <button onClick={()=>quickAdd(quickDueForView)} style={{padding:"6px 14px",background:`linear-gradient(135deg,${th.accent},${th.accent3})`,color:"#fff",borderRadius:9,fontSize:12,fontWeight:600}}>添加</button>
          </>
        )}
      </div>

      {/* Filter pills - 数字 = 当前视图范围内该分类的任务数（与下方列表保持一致）*/}
      <div style={{display:"flex",gap:6,overflowX:"auto",marginBottom:12,paddingBottom:4}} className="slim-scroll">
        <button onClick={()=>setFilter("all")} className={`view-tab ${filter==="all"?"active":""}`} style={{flexShrink:0}}>全部 · {viewRange.length}</button>
        {catsWithTasks.length>1&&catsWithTasks.map(c=>{
          const n=viewRange.filter(t=>t.category===c.id).length;
          const act=filter===c.id;
          return<button key={c.id} onClick={()=>setFilter(c.id)} className={`view-tab ${act?"active":""}`} style={{flexShrink:0,background:act?c.color+"30":th.glass1,color:act?c.color:th.ink2,borderLeft:act?`2px solid ${c.color}`:"none"}}>
            <span style={{color:c.color}}>{c.glyph}</span> {c.name} · {n}
          </button>;
        })}
        <div style={{flex:1,minWidth:0}}/>
        {view==="today"&&(
          <button onClick={requestAiPlan} disabled={aiLoading} className="view-tab" style={{flexShrink:0,background:`linear-gradient(135deg,${th.accent}25,${th.accent3}25)`,color:th.accent2,border:`1px solid ${th.accent}60`,fontWeight:600,boxShadow:aiLoading?"none":`0 0 12px ${th.accent}40`,opacity:aiLoading?0.7:1,cursor:aiLoading?"wait":"pointer"}} title="AI 智能排期">
            {aiLoading?<><span className="spin" style={{display:"inline-block"}}>○</span> 思考中</>:<>✨ 智能排期</>}
          </button>
        )}
        <button onClick={()=>setShowTemplates(true)} className="view-tab" style={{flexShrink:0,background:th.accent+"15",color:th.accent2,border:`1px solid ${th.accent}40`}}>
          <Ic n="sparkles" size={11} color={th.accent2}/> 模板
        </button>
      </div>

      {/* Cards */}
      {list.length===0?(
        <EmptyState th={th} text={emptyText} icon="sparkles"/>
      ):(
        <TaskGroupedList list={list} {...p} allowDrag={view==="today"||view==="tomorrow"}/>
      )}
    </div>
  );
}

// ═══ WEEK GROUPED VIEW · 从上到下展示周一至周日全部事项 ═══
function WeekGroupedView(p){
  const{th,filtered,today,setShowTaskForm,setTaskForm,tasks,cats,filter,setFilter,quickTitle,setQuickTitle,quickAdd,setShowTemplates}=p;
  // 定位本周周一
  const now=new Date(today);
  const dow=(now.getDay()+6)%7; // 周一 = 0
  const monday=addDays(today,-dow);
  const days=Array.from({length:7},(_,i)=>addDays(monday,i));
  const thisWeekTasks=filtered.filter(t=>t.due&&t.due>=monday&&t.due<=days[6]);
  const catsWithTasks=cats.filter(c=>tasks.some(t=>t.category===c.id));
  // 按天分组
  const byDay={};days.forEach(d=>{byDay[d]=[];});
  thisWeekTasks.forEach(t=>{if(byDay[t.due])byDay[t.due].push(t);});

  const weekN=Math.ceil((now.getDate()+new Date(now.getFullYear(),0,1).getDay())/7);
  const totalN=thisWeekTasks.length;
  const doneN=thisWeekTasks.filter(t=>t.done).length;

  return(
    <div className="fadeIn">
      {/* 顶部统计 + 快速添加 */}
      <div className="glass" style={{padding:"14px 18px",borderRadius:14,marginBottom:14,display:"flex",alignItems:"center",justifyContent:"space-between",gap:14,flexWrap:"wrap"}}>
        <div>
          <div className="mono" style={{fontSize:11,letterSpacing:"0.18em",color:th.ink3,marginBottom:4,fontWeight:600}}>WEEK {weekN} · {monday.slice(5).replace("-","/")} – {days[6].slice(5).replace("-","/")}</div>
          <div style={{display:"flex",alignItems:"baseline",gap:8}}>
            <span className="display tnum" style={{fontSize:22,color:th.ink0,letterSpacing:"-0.02em"}}>{doneN}<span style={{color:th.ink3,fontSize:14}}> / {totalN}</span></span>
            <span style={{fontSize:12,color:th.ink2}}>· 本周任务</span>
            {totalN>0&&<span className="mono" style={{fontSize:11,color:th.accent2,fontWeight:600}}>· {Math.round(doneN/totalN*100)}%</span>}
          </div>
        </div>
        <div className="glass hover-lift" style={{padding:"9px 14px",borderRadius:12,display:"flex",alignItems:"center",gap:8,border:`1px dashed ${th.glassBorder}`,background:th.glass1,minWidth:260}}>
          <div style={{width:22,height:22,borderRadius:7,background:`linear-gradient(135deg,${th.accent},${th.accent3})`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Ic n="plus" size={12} color="#fff" sw={2.2}/></div>
          <input value={quickTitle} onChange={e=>setQuickTitle(e.target.value)} onKeyDown={e=>{if(e.isComposing||e.keyCode===229)return;if(e.key==="Enter")quickAdd(today);}} placeholder="快速添加到今天…" style={{flex:1,background:"transparent",border:"none",outline:"none",fontSize:12,color:th.ink0}}/>
          {quickTitle.trim()&&<button onClick={()=>quickAdd(today)} style={{padding:"4px 10px",background:`linear-gradient(135deg,${th.accent},${th.accent3})`,color:"#fff",borderRadius:7,fontSize:11,fontWeight:600}}>+</button>}
        </div>
      </div>

      {/* 分类筛选 */}
      {catsWithTasks.length>1&&(
        <div style={{display:"flex",gap:6,overflowX:"auto",marginBottom:14,paddingBottom:4}} className="slim-scroll">
          <button onClick={()=>setFilter("all")} className={`view-tab ${filter==="all"?"active":""}`} style={{flexShrink:0}}>全部 · {thisWeekTasks.length}</button>
          {catsWithTasks.map(c=>{
            const n=thisWeekTasks.filter(t=>t.category===c.id).length;
            if(n===0)return null;
            const act=filter===c.id;
            return<button key={c.id} onClick={()=>setFilter(c.id)} className={`view-tab ${act?"active":""}`} style={{flexShrink:0,background:act?c.color+"30":th.glass1,color:act?c.color:th.ink2,borderLeft:act?`2px solid ${c.color}`:"none"}}>
              <span style={{color:c.color}}>{c.glyph}</span> {c.name} · {n}
            </button>;
          })}
          <button onClick={()=>setShowTemplates(true)} className="view-tab" style={{flexShrink:0,background:th.accent+"15",color:th.accent2,border:`1px solid ${th.accent}40`,marginLeft:"auto"}}>
            <Ic n="sparkles" size={11} color={th.accent2}/> 模板
          </button>
        </div>
      )}

      {/* 7 天分组 */}
      <div style={{display:"flex",flexDirection:"column",gap:20}}>
        {days.map(date=>{
          const dayTasks=byDay[date]||[];
          const isToday=date===today;
          const isPast=date<today;
          const todo=dayTasks.filter(t=>!t.done);
          const done=dayTasks.filter(t=>t.done);
          const weekLabel=weekdayCN(date);
          return(
            <div key={date} className={isToday?"glass":""} style={isToday?{padding:16,borderRadius:14,border:`1.5px solid ${th.accent}40`,boxShadow:`0 0 22px ${th.accent}20`,background:`linear-gradient(135deg,${th.accent}06,transparent)`}:{padding:"0 2px"}}>
              {/* 日期标题 */}
              <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
                <div style={{display:"flex",alignItems:"baseline",gap:8}}>
                  <span className="display tnum" style={{fontSize:isToday?26:22,color:isToday?th.ink0:(isPast?th.ink3:th.ink1),letterSpacing:"-0.02em",fontWeight:isToday?700:500}}>{date.slice(8)}</span>
                  <span className="mono" style={{fontSize:11,color:isToday?th.accent2:th.ink3,letterSpacing:"0.14em",fontWeight:600}}>{weekLabel}{isToday?" · 今天":""}</span>
                </div>
                <div style={{flex:1,height:1,background:th.glassBorder}}/>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  {dayTasks.length>0?<span className="mono" style={{fontSize:10,color:th.ink3,letterSpacing:"0.08em"}}>{done.length}/{dayTasks.length}</span>:<span className="mono" style={{fontSize:10,color:th.ink3,letterSpacing:"0.08em",opacity:0.6}}>无安排</span>}
                  <button onClick={()=>{setTaskForm({...emptyTask,due:date});setShowTaskForm(true);}} title="添加到这一天" style={{width:22,height:22,borderRadius:7,background:th.glass2,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Ic n="plus" size={11} color={th.ink2}/></button>
                </div>
              </div>
              {/* 任务 */}
              {dayTasks.length===0?null:(
                <div style={{display:"flex",flexDirection:"column",gap:7,paddingLeft:isToday?0:4}}>
                  {todo.map(t=><TaskCard key={t.id} task={t} th={th} {...p}/>)}
                  {done.length>0&&todo.length>0&&<div style={{display:"flex",alignItems:"center",gap:8,margin:"3px 0"}}><span className="mono" style={{fontSize:9,color:th.ink3,letterSpacing:"0.12em",opacity:0.7}}>已完成 · {done.length}</span><div style={{flex:1,height:1,background:th.glassBorder,opacity:0.6}}/></div>}
                  {done.map(t=><TaskCard key={t.id} task={t} th={th} {...p}/>)}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ═══ 分组的任务列表（待办在上 · 已完成在下）═══
function TaskGroupedList({list,th,...rest}){
  const todo=list.filter(t=>!t.done);
  const done=list.filter(t=>t.done);
  return(
    <>
      {todo.length>0&&(
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:done.length>0?16:0}}>
          {todo.map(t=><TaskCard key={t.id} task={t} th={th} {...rest}/>)}
        </div>
      )}
      {done.length>0&&(
        <>
          <div style={{display:"flex",alignItems:"center",gap:10,margin:"6px 0 10px"}}>
            <span className="mono" style={{fontSize:11,color:th.ink3,letterSpacing:"0.16em",fontWeight:600}}>已完成 · {done.length}</span>
            <div style={{flex:1,height:1,background:th.glassBorder}}/>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
