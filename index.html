// ═══ TASK CARD ═══
function TaskCard({task:t,th,catOf,projOf,today,nowMin,poppingId,runningId,toggleTask,toggleTimer,removeTask,startEdit,expanded,setExpanded,updateProgress,selectedIds,toggleSelect,inSelectMode}){
  const c=catOf(t.category);
  const p=t.projectId?projOf(t.projectId):null;
  const overdue=isOverdue(t,today,nowMin);
  const isRunning=runningId===t.id;
  const popping=poppingId===t.id;
  const exp=expanded[t.id];
  const isSelected=selectedIds&&selectedIds.has(t.id);
  // 长按检测
  const longPressTimer=useRef(null);
  const startLongPress=()=>{
    if(longPressTimer.current)clearTimeout(longPressTimer.current);
    longPressTimer.current=setTimeout(()=>{
      toggleSelect&&toggleSelect(t.id);
      // 触发触觉反馈
      if(navigator.vibrate)navigator.vibrate(15);
    },420);
  };
  const cancelLongPress=()=>{if(longPressTimer.current){clearTimeout(longPressTimer.current);longPressTimer.current=null;}};
  // 主要点击行为：选中模式下点卡片切换选中
  const onCardClick=(e)=>{
    if(inSelectMode){
      e.stopPropagation();
      toggleSelect&&toggleSelect(t.id);
      return;
    }
    // Cmd / Ctrl + click 进多选（桌面）
    if((e.metaKey||e.ctrlKey)&&toggleSelect){
      e.stopPropagation();
      toggleSelect(t.id);
      return;
    }
  };
  return(
    <div onClick={onCardClick} onTouchStart={startLongPress} onTouchEnd={cancelLongPress} onTouchMove={cancelLongPress} onMouseDown={e=>{if(e.button===0&&!inSelectMode)startLongPress();}} onMouseUp={cancelLongPress} onMouseLeave={cancelLongPress} className="task-card glass" style={{padding:"13px 16px",borderRadius:12,borderLeft:`3px solid ${isSelected?th.accent:t.done?"#10d9a3":overdue?"#ff5d7a":c.color}`,boxShadow:isSelected?`0 0 0 2px ${th.accent},0 8px 22px ${th.accent}40`:isRunning?`0 8px 24px ${c.color}40,0 0 0 1px ${c.color}40`:undefined,opacity:t.done?0.65:1,cursor:inSelectMode?"pointer":"default",userSelect:"none"}}>
      <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
        <button onClick={e=>{e.stopPropagation();if(inSelectMode){toggleSelect(t.id);}else{toggleTask(t.id);}}} className={popping?"checkAnim":""} style={{flexShrink:0,marginTop:2,width:20,height:20,borderRadius:6,background:isSelected?th.accent:t.done?`linear-gradient(135deg,${c.color},${c.color}aa)`:"transparent",border:isSelected?"none":t.done?"none":`1.5px solid ${th.glassBorderStrong}`,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:isSelected?`0 0 8px ${th.accent}aa`:t.done?`0 0 8px ${c.color}60`:"none"}}>
          {isSelected?<Ic n="check" size={12} color="#fff" sw={2.5}/>:t.done&&<Ic n="check" size={12} color="#fff" sw={2.5}/>}
        </button>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:4}}>
            <span className="mono" style={{fontSize:9,letterSpacing:"0.1em",color:c.color,fontWeight:600}}>{c.glyph} {c.name}</span>
            <span style={{width:3,height:3,borderRadius:"50%",background:PCOLOR[t.priority]}}/>
            <span className="mono" style={{fontSize:9,color:th.ink3}}>{t.priority}</span>
            {p&&<span className="mono" style={{fontSize:9,padding:"2px 6px",borderRadius:6,background:p.color+"20",color:p.color,border:`1px solid ${p.color}40`}}>{p.glyph} {p.name}</span>}
            {t.repeat&&<Ic n="repeat" size={10} color={th.ink3}/>}
            {t.timeStart&&<span className="mono tnum" style={{fontSize:10,color:overdue?"#ff5d7a":th.ink3,fontWeight:overdue?600:400}}>{t.timeStart}{t.timeEnd?`–${t.timeEnd}`:""}</span>}
            {overdue&&<span className="mono" style={{fontSize:9,color:"#ff5d7a",padding:"1px 6px",borderRadius:5,background:"rgba(255,93,122,0.15)",fontWeight:600}}>逾期</span>}
            {t.due&&t.due!==today&&<span className="mono" style={{fontSize:9,color:th.ink3}}>{t.due.slice(5).replace("-","/")}</span>}
          </div>
          <div style={{fontSize:14,fontWeight:500,color:th.ink0,lineHeight:1.4,textDecoration:t.done?"line-through":"none",cursor:t.content?"pointer":"default"}} onClick={()=>t.content&&setExpanded({...expanded,[t.id]:!exp})}>
            {t.title}
            {t.content&&<span style={{marginLeft:6,color:th.ink3,fontSize:10,verticalAlign:"middle"}}><Ic n={exp?"chevUp":"chevDown"} size={11} color={th.ink3}/></span>}
          </div>
          {t.content&&exp&&<div className="fadeIn" style={{fontSize:12,color:th.ink2,marginTop:6,lineHeight:1.65,whiteSpace:"pre-wrap"}}>{t.content}</div>}

          {/* Progress bar */}
          {!t.done&&(t.progress>0||t.duration)&&(
            <div style={{marginTop:6,display:"flex",alignItems:"center",gap:10}}>
              <div style={{flex:1,padding:"7px 0",cursor:"pointer"}} onClick={e=>{const bar=e.currentTarget.querySelector(".prog-bar");const rect=bar.getBoundingClientRect();const p=(e.clientX-rect.left)/rect.width;updateProgress(t.id,Math.max(0,Math.min(1,p)));}} title="点击调整进度">
                <div className="prog-bar" style={{height:5,borderRadius:3,background:th.glass2,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${(t.progress||0)*100}%`,background:`linear-gradient(90deg,${c.color},${c.color}aa)`,boxShadow:`0 0 6px ${c.color}`,transition:"width 0.3s var(--ease)"}}/>
                </div>
              </div>
              <span className="mono tnum" style={{fontSize:10,color:th.ink3,minWidth:30,textAlign:"right"}}>{Math.round((t.progress||0)*100)}%</span>
            </div>
          )}

          {(t.duration||t.actualMin>0)&&(
            <div style={{marginTop:8,display:"flex",alignItems:"center",gap:8,fontSize:11,color:th.ink3}}>
              {t.duration&&<span className="mono">预计 {t.duration}m</span>}
              {t.actualMin>0&&<span className="mono tnum" style={{color:isRunning?th.accent3:th.ink3,fontWeight:isRunning?600:400}}>{isRunning&&"● "}已用 {fmtMin(t.actualMin)}</span>}
            </div>
          )}
        </div>
        <div className="task-actions" style={{display:"flex",gap:4,flexShrink:0}}>
          {!t.done&&<button onClick={()=>toggleTimer(t.id)} title={isRunning?"暂停":"开始计时"} style={{width:30,height:30,borderRadius:8,background:isRunning?th.accent3+"20":th.glass2,display:"flex",alignItems:"center",justifyContent:"center",color:isRunning?th.accent3:th.ink2}}><Ic n={isRunning?"pause":"play"} size={12} color={isRunning?th.accent3:th.ink2}/></button>}
          <button onClick={()=>startEdit(t)} title="编辑" style={{width:30,height:30,borderRadius:8,background:th.glass2,display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="edit" size={12} color={th.ink2}/></button>
          <button onClick={()=>removeTask(t.id)} title="删除" style={{width:30,height:30,borderRadius:8,background:th.glass2,display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="trash" size={12} color={th.ink2}/></button>
        </div>
      </div>
    </div>
  );
}

// ═══ KANBAN VIEW ═══
function KanbanView({th,tasks:allTasks,searchedTasks,catOf,today,nowMin,toggleTask,startEdit,removeTask,updateProgress}){
  const tasks=searchedTasks||allTasks;
  // 推导列：backlog(无日期且未完成) / today(今日) / doing(progress>0 或正在跑) / review(progress>=0.8未完成) / done(已完成)
  const cols=[
    {id:"backlog",title:"待办",color:"#a8a2c4",match:t=>!t.done&&(!t.due||t.due>today)&&(t.progress||0)<0.1},
    {id:"today",title:"今日",color:"#6d5fff",match:t=>!t.done&&t.due===today&&(t.progress||0)<0.1},
    {id:"doing",title:"进行中",color:"#ec4899",match:t=>!t.done&&(t.progress||0)>=0.1&&(t.progress||0)<0.8},
    {id:"review",title:"待复盘",color:"#f5a524",match:t=>!t.done&&(t.progress||0)>=0.8},
    {id:"done",title:"已完成",color:"#10d9a3",match:t=>t.done},
  ];
  const grouped=cols.map(col=>({...col,cards:tasks.filter(col.match).sort((a,b)=>{const p={高:0,中:1,低:2};return p[a.priority]-p[b.priority];})}));

  return(
    <div className="fadeIn" style={{margin:"-8px -12px 0"}}>
      <div style={{padding:"8px 12px 12px",display:"flex",alignItems:"flex-end",justifyContent:"space-between",marginBottom:14}}>
        <div>
          <div className="mono" style={{fontSize:11,letterSpacing:"0.22em",color:th.ink3,marginBottom:6,fontWeight:600}}>KANBAN · {tasks.length} TASKS</div>
          <h1 className="display" style={{fontSize:38,color:th.ink0,letterSpacing:"-0.03em",lineHeight:1}}>
            <em style={{fontStyle:"italic"}} className="gradient-primary">Kanban</em> · 工作流
          </h1>
        </div>
      </div>

      <div className="slim-scroll" style={{overflowX:"auto",paddingBottom:20,padding:"0 12px 20px"}}>
        <div style={{display:"flex",gap:12,minWidth:"max-content"}}>
          {grouped.map(col=>(
            <div key={col.id} style={{width:260,flexShrink:0,display:"flex",flexDirection:"column"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,padding:"0 4px 12px"}}>
                <span style={{width:8,height:8,borderRadius:"50%",background:col.color,boxShadow:`0 0 6px ${col.color}`}}/>
                <span className="mono" style={{fontSize:11,letterSpacing:"0.18em",color:th.ink0,fontWeight:700}}>{col.title.toUpperCase()}</span>
                <span className="mono tnum" style={{fontSize:10,color:th.ink3,marginLeft:"auto",padding:"2px 7px",borderRadius:10,background:th.glass2}}>{col.cards.length}</span>
              </div>
              <div className="slim-scroll" style={{flex:1,display:"flex",flexDirection:"column",gap:8,paddingBottom:6,minHeight:100}}>
                {col.cards.map(card=>{
                  const c=catOf(card.category);
                  return(
                    <div key={card.id} className="glass task-card" style={{padding:12,borderRadius:12,borderLeft:`3px solid ${card.done?"#10d9a3":c.color}`,boxShadow:`0 4px 10px rgba(0,0,0,0.2)`,opacity:card.done?0.6:1}}>
                      <div style={{display:"flex",alignItems:"flex-start",gap:8,marginBottom:8}}>
                        <button onClick={e=>{e.stopPropagation();toggleTask(card.id);}} style={{flexShrink:0,marginTop:1,width:18,height:18,borderRadius:5,background:card.done?`linear-gradient(135deg,${c.color},${c.color}aa)`:"transparent",border:card.done?"none":`1.5px solid ${th.glassBorderStrong}`,display:"flex",alignItems:"center",justifyContent:"center"}}>
                          {card.done&&<Ic n="check" size={11} color="#fff" sw={2.5}/>}
                        </button>
                        <div style={{flex:1,minWidth:0,cursor:"pointer"}} onClick={()=>startEdit(card)}>
                          <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:3}}>
                            <span className="mono" style={{fontSize:10,letterSpacing:"0.08em",color:c.color,fontWeight:600}}>{c.glyph} {c.name}</span>
                            <span style={{width:3,height:3,borderRadius:"50%",background:PCOLOR[card.priority]}}/>
                            <span className="mono" style={{fontSize:10,color:th.ink3}}>{card.priority}</span>
                          </div>
                          <div style={{fontSize:12,color:card.done?th.ink3:th.ink0,fontWeight:500,lineHeight:1.4,textDecoration:card.done?"line-through":"none"}}>{card.title}</div>
                        </div>
                      </div>
                      {(card.progress||0)>0&&!card.done&&(
                        <div style={{marginLeft:26,height:4,borderRadius:2,background:th.glass2,overflow:"hidden"}}>
                          <div style={{width:`${(card.progress||0)*100}%`,height:"100%",background:`linear-gradient(90deg,${c.color},${c.color}aa)`,boxShadow:`0 0 6px ${c.color}`}}/>
                        </div>
                      )}
                      <div style={{display:"flex",alignItems:"center",gap:6,marginTop:8,paddingTop:8,borderTop:`1px solid ${th.glassBorder}`,marginLeft:26}}>
                        {card.duration&&<span className="mono tnum" style={{fontSize:10,color:th.ink2,display:"flex",alignItems:"center",gap:3}}><Ic n="timer" size={10}/> {card.duration}m</span>}
                        {card.timeStart&&<span className="mono tnum" style={{fontSize:10,color:th.ink3}}>{card.timeStart}</span>}
                        {card.due&&<span className="mono tnum" style={{fontSize:10,color:th.ink3}}>{card.due.slice(5).replace("-","/")}</span>}
                        <div style={{flex:1}}/>
                        <button onClick={e=>{e.stopPropagation();startEdit(card);}} style={{width:22,height:22,borderRadius:6,background:th.glass2,display:"flex",alignItems:"center",justifyContent:"center"}} title="编辑"><Ic n="edit" size={10} color={th.ink2}/></button>
                        <button onClick={e=>{e.stopPropagation();if(confirm("删除此任务？"))removeTask(card.id);}} style={{width:22,height:22,borderRadius:6,background:th.glass2,display:"flex",alignItems:"center",justifyContent:"center"}} title="删除"><Ic n="trash" size={10} color={th.ink2}/></button>
                      </div>
                    </div>
                  );
                })}
                {col.cards.length===0&&<div style={{fontSize:11,color:th.ink3,textAlign:"center",padding:"20px 0",opacity:0.5}}>暂无</div>}
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ═══ MONTH VIEW ═══
function MonthView({th,tasks:allTasks,searchedTasks,today,setView,startEdit,catOf,toggleTask,removeTask,setTaskForm,setShowTaskForm}){
  const tasks=searchedTasks||allTasks;
  const[viewMonth,setViewMonth]=useState(()=>today.slice(0,7));
  const[detailDate,setDetailDate]=useState(null);
  const[year,month]=viewMonth.split("-").map(Number);
  const first=new Date(year,month-1,1);
  const daysInMonth=new Date(year,month,0).getDate();
  const startOffset=(first.getDay()+6)%7; // 周一开始
  const cells=[];
  for(let i=0;i<startOffset;i++)cells.push(null);
  for(let d=1;d<=daysInMonth;d++)cells.push(d);
  while(cells.length%7!==0)cells.push(null);
  while(cells.length<35)cells.push(null);

  const tasksByDate=useMemo(()=>{
    const m={};
    tasks.forEach(t=>{if(t.due){m[t.due]=(m[t.due]||[]).concat(t);}});
    return m;
  },[tasks]);

  const monthStart=`${year}-${String(month).padStart(2,"0")}-01`;
  const monthEnd=`${year}-${String(month).padStart(2,"0")}-${String(daysInMonth).padStart(2,"0")}`;
  const monthTasks=tasks.filter(t=>t.due&&t.due>=monthStart&&t.due<=monthEnd);
  const doneN=monthTasks.filter(t=>t.done).length;
  const totalDur=monthTasks.reduce((s,t)=>s+(t.actualMin||0),0);

  const prev=()=>{const d=new Date(year,month-2,1);setViewMonth(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`);};
  const next=()=>{const d=new Date(year,month,1);setViewMonth(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`);};

  return(
    <div className="fadeIn">
      <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",marginBottom:18}}>
        <div>
          <div className="mono" style={{fontSize:11,letterSpacing:"0.22em",color:th.ink3,marginBottom:6,fontWeight:600}}>{year} · {month<=3?"Q1":month<=6?"Q2":month<=9?"Q3":"Q4"}</div>
          <h1 className="display" style={{fontSize:48,color:th.ink0,lineHeight:0.95,letterSpacing:"-0.04em"}}>
            <em style={{fontStyle:"italic"}} className="gradient-primary">{["一月","二月","三月","四月","五月","六月","七月","八月","九月","十月","十一月","十二月"][month-1]}</em>
          </h1>
        </div>
        <div style={{display:"flex",gap:6}}>
          <button onClick={prev} className="glass" style={{width:36,height:36,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="chevLeft" size={14} color={th.ink2}/></button>
          <button onClick={()=>setViewMonth(today.slice(0,7))} className="glass" style={{padding:"0 12px",borderRadius:10,fontSize:12,color:th.ink1}}>本月</button>
          <button onClick={next} className="glass" style={{width:36,height:36,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="chevRight" size={14} color={th.ink2}/></button>
        </div>
      </div>

      {/* Month stats */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:14}}>
        {[["完成任务",doneN,th.accent],["总任务",monthTasks.length,th.accent2],["专注时长",fmtMin(totalDur)||"0",th.accent3],["完成率",monthTasks.length?Math.round(doneN/monthTasks.length*100)+"%":"0%","#10d9a3"]].map(([l,v,c],i)=>(
          <div key={i} className="glass" style={{padding:"11px 14px",borderRadius:11,borderLeft:`2px solid ${c}`}}>
            <div className="mono" style={{fontSize:9,letterSpacing:"0.16em",color:th.ink3,fontWeight:600}}>{l}</div>
            <div className="display tnum" style={{fontSize:22,color:th.ink0,marginTop:2,letterSpacing:"-0.02em"}}>{v}</div>
          </div>
        ))}
      </div>

      {/* Calendar grid */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:6}}>
        {["一","二","三","四","五","六","日"].map(w=>(
          <div key={w} className="mono" style={{textAlign:"center",fontSize:12,letterSpacing:"0.18em",color:th.ink3,padding:"4px 0",fontWeight:600}}>{w}</div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
        {cells.map((d,i)=>{
          if(!d)return<div key={i} style={{background:th.glass1,borderRadius:8,minHeight:78}}/>;
          const dateStr=`${year}-${String(month).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
          const dayTasks=tasksByDate[dateStr]||[];
          const isToday=dateStr===today;
          const density=dayTasks.length;
          return(
            <div key={i} onClick={()=>setDetailDate(dateStr)} style={{padding:8,borderRadius:10,minHeight:78,background:isToday?`linear-gradient(135deg,${th.accent3}40,${th.accent}25)`:density>3?th.accent+"18":density>1?th.accent+"0c":th.glass1,border:isToday?`1.5px solid ${th.accent3}99`:`1px solid ${th.glassBorder}`,boxShadow:isToday?`0 0 20px ${th.accent3}40`:density>3?`0 0 8px ${th.accent}33`:"none",display:"flex",flexDirection:"column",gap:3,cursor:"pointer",position:"relative",overflow:"hidden"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <span className="display tnum" style={{fontSize:15,color:isToday?th.ink0:th.ink1,fontWeight:isToday?700:500}}>{d}</span>
                {isToday&&<span style={{width:5,height:5,borderRadius:"50%",background:th.accent3,boxShadow:`0 0 6px ${th.accent3}`}}/>}
              </div>
              {dayTasks.slice(0,2).map((t,j)=>(
                <div key={j} style={{background:th.accent+"40",color:th.ink0,padding:"1px 5px",borderRadius:3,fontSize:9,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",opacity:t.done?0.5:1,textDecoration:t.done?"line-through":"none"}}>{t.title}</div>
              ))}
              {dayTasks.length>2&&<div className="mono" style={{fontSize:9,color:th.ink3}}>+{dayTasks.length-2}</div>}
            </div>
          );
        })}
      </div>
      {detailDate&&<DayDetailModal th={th} date={detailDate} tasks={tasksByDate[detailDate]||[]} catOf={catOf} toggleTask={toggleTask} removeTask={removeTask} startEdit={task=>{setDetailDate(null);startEdit(task);}} onClose={()=>setDetailDate(null)} onCreate={()=>{setTaskForm({...emptyTask,due:detailDate});setDetailDate(null);setShowTaskForm(true);}}/>}
    </div>
  );
}

                    <button onClick={()=>toggleTask(t.id)} style={{flexShrink:0,width:20,height:20,borderRadius:6,background:t.done?`linear-gradient(135deg,${c.color},${c.color}aa)`:"transparent",border:t.done?"none":`1.5px solid ${th.glassBorderStrong}`,display:"flex",alignItems:"center",justifyContent:"center"}}>
                      {t.done&&<Ic n="check" size={12} color="#fff" sw={2.5}/>}

                      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3,flexWrap:"wrap"}}>
                        <span className="mono" style={{fontSize:10,color:c.color,fontWeight:600}}>{c.glyph} {c.name}</span>
                        <span style={{width:3,height:3,borderRadius:"50%",background:PCOLOR[t.priority]}}/>
                        <span className="mono" style={{fontSize:10,color:th.ink3}}>{t.priority}</span>
                        {t.timeStart&&<span className="mono tnum" style={{fontSize:10,color:th.ink3}}>{t.timeStart}{t.timeEnd?`–${t.timeEnd}`:""}</span>}
                      </div>
                      <div style={{fontSize:13,color:th.ink0,fontWeight:500,textDecoration:t.done?"line-through":"none"}}>{t.title}</div>
                    </div>
                    <button onClick={()=>startEdit(t)} style={{width:28,height:28,borderRadius:8,background:th.glass2,display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="edit" size={12} color={th.ink2}/></button>
                    <button onClick={()=>{if(confirm("删除这条任务？"))removeTask(t.id);}} style={{width:28,height:28,borderRadius:8,background:th.glass2,display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="trash" size={12} color={th.ink2}/></button>
                  </div>
                );
              })}

          )}

        <div style={{padding:"12px 18px",borderTop:`1px solid ${th.glassBorder}`,display:"flex",gap:10,alignItems:"center"}}>
          {tasks.length>0&&<span className="mono" style={{fontSize:11,color:th.ink3}}>完成 {done}/{tasks.length}</span>}
          <div style={{flex:1}}/>
          <button onClick={onCreate} style={{padding:"9px 16px",background:`linear-gradient(135deg,${th.accent},${th.accent3})`,color:"#fff",borderRadius:10,fontSize:12,fontWeight:600,display:"flex",alignItems:"center",gap:6,boxShadow:`0 4px 14px ${th.accent}66`}}><Ic n="plus" size={12} sw={2.2}/> 添加任务</button>

// ═══ PROJECTS VIEW ═══
function ProjectsView({th,projects,tasks,catOf,setShowProjectForm,setEditProjectId,removeProject,startEdit,toggleTask,updateProgress,setTaskForm,setShowTaskForm,today,openProjectId,setOpenProjectId}){
  const[selected,setSelected]=useState(null);
  const[showDone,setShowDone]=useState(false);

  // 外部触发跳转（左侧栏点项目时设置 openProjectId）
  useEffect(()=>{
    if(openProjectId){
      setSelected(openProjectId);
      setOpenProjectId&&setOpenProjectId(null); // 消费一次
    }
  },[openProjectId]);

  const projStats=projects.map(p=>{
    const pt=tasks.filter(t=>t.projectId===p.id);
    const done=pt.filter(t=>t.done).length;
    const prog=pt.length?pt.reduce((s,t)=>s+(t.done?1:(t.progress||0)),0)/pt.length:0;
    const dur=pt.reduce((s,t)=>s+(t.actualMin||0),0);
    return{...p,taskN:pt.length,doneN:done,progress:prog,duration:dur};
  });

  // 分桶：进行中 / 未启动 / 已完成（必须在任何早退出 return 之前，遵守 Hooks 规则）
  const grouped=useMemo(()=>{
    const doing=[],idle=[],done=[];
    projStats.forEach(p=>{
      if(p.taskN===0)idle.push(p);
      else if(p.progress>=1)done.push(p);
      else doing.push(p);
    });
    doing.sort((a,b)=>b.progress-a.progress);
    return{doing,idle,done};
  },[projects,tasks]);

  if(selected){
    const p=projStats.find(x=>x.id===selected);if(!p){setSelected(null);return null;}
    const pTasks=tasks.filter(t=>t.projectId===p.id);
    const pTodo=pTasks.filter(t=>!t.done);
    const pDone=pTasks.filter(t=>t.done);
    const pDoing=pTasks.filter(t=>!t.done&&(t.progress||0)>0);
    return(
      <div className="fadeIn">
        <button onClick={()=>setSelected(null)} style={{marginBottom:14,padding:"7px 12px",borderRadius:9,background:th.glass2,color:th.ink2,fontSize:12,display:"inline-flex",alignItems:"center",gap:6}}><Ic n="chevLeft" size={12} color={th.ink2}/> 返回项目</button>
        <div className="glass" style={{padding:24,borderRadius:18,borderLeft:`4px solid ${p.color}`,marginBottom:14,position:"relative",overflow:"hidden"}}>
          <Blob3D size={120} hue={p.color==="#6d5fff"?260:p.color==="#ec4899"?320:p.color==="#22d3ee"?195:p.color==="#10d9a3"?150:p.color==="#f5a524"?38:0} style={{right:-40,top:-30,opacity:0.3}}/>
          <div style={{position:"relative"}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
              <span style={{fontSize:26,color:p.color,textShadow:`0 0 14px ${p.color}`}}>{p.glyph}</span>
              <h1 className="display" style={{fontSize:34,color:th.ink0,letterSpacing:"-0.02em"}}>{p.name}</h1>
            </div>
            {p.description&&<div style={{fontSize:13,color:th.ink2,lineHeight:1.6,marginBottom:16}}>{p.description}</div>}
            <div style={{height:6,borderRadius:3,background:th.glass2,overflow:"hidden",marginBottom:12}}>
              <div style={{width:`${p.progress*100}%`,height:"100%",background:`linear-gradient(90deg,${p.color},${p.color}aa)`,boxShadow:`0 0 8px ${p.color}80`,transition:"width 0.5s var(--ease)"}}/>
            </div>
            <div style={{display:"flex",gap:8,marginTop:8,flexWrap:"wrap"}}>
              <button onClick={()=>{setTaskForm({...emptyTask,projectId:p.id,due:today});setShowTaskForm(true);}} style={{padding:"9px 14px",borderRadius:10,background:`linear-gradient(135deg,${p.color},${p.color}aa)`,color:"#fff",fontSize:12,fontWeight:600,display:"flex",alignItems:"center",gap:6,boxShadow:`0 4px 12px ${p.color}66`}}><Ic n="plus" size={12} sw={2.2}/> 添加任务</button>
              <button onClick={()=>{setEditProjectId(p.id);setShowProjectForm(true);}} className="glass" style={{padding:"9px 14px",borderRadius:10,fontSize:12,color:th.ink1,display:"flex",alignItems:"center",gap:6}}><Ic n="edit" size={12}/> 编辑项目</button>
              <button onClick={()=>{removeProject(p.id);setSelected(null);}} className="glass" style={{padding:"9px 14px",borderRadius:10,fontSize:12,color:"#ff5d7a",display:"flex",alignItems:"center",gap:6}}><Ic n="trash" size={12}/> 删除</button>
            </div>
          </div>
        </div>
        {/* Stats */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:14}}>
          <div className="glass" style={{padding:"12px 14px",borderRadius:11,borderTop:`2px solid ${p.color}`}}>
            <div className="mono" style={{fontSize:11,letterSpacing:"0.16em",color:th.ink3,fontWeight:600}}>总任务</div>
            <div className="display tnum" style={{fontSize:24,color:th.ink0,marginTop:2}}>{pTasks.length}</div>
          </div>
          <div className="glass" style={{padding:"12px 14px",borderRadius:11,borderTop:"2px solid #10d9a3"}}>
            <div className="mono" style={{fontSize:11,letterSpacing:"0.16em",color:th.ink3,fontWeight:600}}>已完成</div>
            <div className="display tnum" style={{fontSize:24,color:th.ink0,marginTop:2}}>{pDone.length}</div>
          </div>
          <div className="glass" style={{padding:"12px 14px",borderRadius:11,borderTop:`2px solid ${th.accent3}`}}>
            <div className="mono" style={{fontSize:11,letterSpacing:"0.16em",color:th.ink3,fontWeight:600}}>进行中</div>
            <div className="display tnum" style={{fontSize:24,color:th.ink0,marginTop:2}}>{pDoing.length}</div>
          </div>
          <div className="glass" style={{padding:"12px 14px",borderRadius:11,borderTop:"2px solid #f5a524"}}>
            <div className="mono" style={{fontSize:11,letterSpacing:"0.16em",color:th.ink3,fontWeight:600}}>专注</div>
            <div className="display tnum" style={{fontSize:18,color:th.ink0,marginTop:2}}>{fmtMin(p.duration)||"0"}</div>
          </div>
        </div>
        <div className="mono" style={{fontSize:12,letterSpacing:"0.18em",color:th.ink3,marginBottom:10,fontWeight:600,display:"flex",alignItems:"center",gap:10}}>
          <span>项目任务 · {pTasks.length}</span>
          <div style={{flex:1,height:1,background:th.glassBorder}}/>
        </div>
        {pTasks.length===0?<EmptyState th={th} text='这个项目还没有任务 · 点击上方"添加任务"开始' icon="folder"/>:(
          <div style={{display:"flex",flexDirection:"column",gap:7}}>
            {[...pTodo,...pDone].map(t=>{
              const c=catOf(t.category);
              return(
                <div key={t.id} className="glass hover-lift" style={{padding:"11px 14px",borderRadius:11,borderLeft:`3px solid ${t.done?"#10d9a3":c.color}`,display:"flex",alignItems:"center",gap:10,opacity:t.done?0.65:1}}>
                  <button onClick={()=>toggleTask(t.id)} style={{flexShrink:0,width:20,height:20,borderRadius:6,background:t.done?`linear-gradient(135deg,${c.color},${c.color}aa)`:"transparent",border:t.done?"none":`1.5px solid ${th.glassBorderStrong}`,display:"flex",alignItems:"center",justifyContent:"center"}}>
                    {t.done&&<Ic n="check" size={12} color="#fff" sw={2.5}/>}
                  </button>
                  <div style={{flex:1,minWidth:0,cursor:"pointer"}} onClick={()=>startEdit(t)}>
                    <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:2}}>
                      <span className="mono" style={{fontSize:10,color:c.color,fontWeight:600}}>{c.glyph} {c.name}</span>
                      <span className="mono" style={{fontSize:10,color:PCOLOR[t.priority]}}>· {t.priority}</span>
                      {t.due&&<span className="mono tnum" style={{fontSize:10,color:th.ink3}}>· {t.due.slice(5).replace("-","/")}</span>}
                      {!t.done&&(t.progress||0)>0&&<span className="mono tnum" style={{fontSize:10,color:th.accent2}}>· {Math.round((t.progress||0)*100)}%</span>}
                    </div>
                    <div style={{fontSize:13,color:th.ink0,fontWeight:500,textDecoration:t.done?"line-through":"none"}}>{t.title}</div>
                    {!t.done&&(t.progress||0)>0&&(
                      <div style={{marginTop:6,height:3,borderRadius:2,background:th.glass2,overflow:"hidden"}}>
                        <div style={{width:`${(t.progress||0)*100}%`,height:"100%",background:`linear-gradient(90deg,${c.color},${c.color}aa)`}}/>
                      </div>
                    )}
                  </div>
                  <button onClick={()=>startEdit(t)} style={{width:28,height:28,borderRadius:7,background:th.glass2,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Ic n="edit" size={11} color={th.ink2}/></button>
                </div>
              );
            })}
          </div>
        )}
      </div>
    );
  }

  const renderCard=p=>{
    const hue=p.color.startsWith("#")?parseInt(p.color.slice(1,3),16):260;
    const isDone=p.progress>=1&&p.taskN>0;
    return(
      <div key={p.id} onClick={()=>setSelected(p.id)} className="glass hover-lift" style={{padding:20,borderRadius:18,borderLeft:`3px solid ${p.color}`,position:"relative",overflow:"hidden",boxShadow:`0 10px 26px ${p.color}22`,cursor:"pointer",opacity:isDone?0.68:1}}>
        <Blob3D size={80} hue={hue} style={{right:-24,top:-24,opacity:isDone?0.18:0.32}}/>
        {isDone&&<div style={{position:"absolute",top:12,right:12,padding:"3px 9px",borderRadius:999,background:"linear-gradient(135deg,#10d9a3,#10a376)",color:"#fff",fontSize:10,fontWeight:700,letterSpacing:"0.08em",zIndex:2,boxShadow:"0 4px 10px rgba(16,217,163,0.4)"}}>✓ 已完成</div>}
        <div style={{position:"relative"}}>
          <div style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:14}}>
            <span style={{fontSize:20,color:p.color,textShadow:`0 0 10px ${p.color}`,flexShrink:0,marginTop:2}}>{p.glyph}</span>
            <div style={{flex:1,minWidth:0,paddingRight:isDone?56:0}}>
              <div className="display" style={{fontSize:19,color:th.ink0,lineHeight:1.1,letterSpacing:"-0.02em",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</div>
              {p.description&&<div style={{fontSize:11,color:th.ink3,marginTop:4,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.description}</div>}
            </div>
          </div>
          <div style={{marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
              <span className="mono" style={{fontSize:9,letterSpacing:"0.14em",color:th.ink3,fontWeight:600}}>进度</span>
              <span className="mono tnum" style={{fontSize:11,color:th.ink0,fontWeight:600}}>{Math.round(p.progress*100)}%</span>
            </div>
            <div style={{height:5,borderRadius:3,background:th.glass2,overflow:"hidden"}}>
              <div style={{width:`${p.progress*100}%`,height:"100%",background:`linear-gradient(90deg,${p.color},${p.color}aa)`,boxShadow:`0 0 8px ${p.color}80`}}/>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:14,fontSize:11,color:th.ink2,paddingTop:12,borderTop:`1px solid ${th.glassBorder}`}}>
            <span className="mono tnum"><strong style={{color:th.ink0,fontWeight:600}}>{p.doneN}</strong>/{p.taskN}</span>
            {p.duration>0&&<span className="mono tnum">⏱ {fmtMin(p.duration)}</span>}
            {p.taskN===0&&<span className="mono" style={{color:th.ink3,opacity:0.7}}>未启动</span>}
          </div>
        </div>
      </div>
    );
  };

  const groupHeader=(label,count,color)=>(
    <div style={{gridColumn:"1/-1",display:"flex",alignItems:"center",gap:10,marginTop:count?4:0}}>
      <span className="mono" style={{fontSize:11,letterSpacing:"0.18em",color:color,fontWeight:600}}>{label} · {count}</span>
      <div style={{flex:1,height:1,background:th.glassBorder}}/>
    </div>
  );

  return(
    <div className="fadeIn">
      <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",marginBottom:18}}>
        <div>
          <div className="mono" style={{fontSize:11,letterSpacing:"0.22em",color:th.ink3,marginBottom:6,fontWeight:600}}>WORKSPACE · {projects.length} PROJECTS · {grouped.doing.length} 进行中</div>
          <h1 className="display" style={{fontSize:44,color:th.ink0,lineHeight:0.95,letterSpacing:"-0.03em"}}>
            <em style={{fontStyle:"italic"}} className="gradient-primary">项目</em>
          </h1>
        </div>
        <button onClick={()=>{setEditProjectId(null);setShowProjectForm(true);}} style={{padding:"11px 18px",borderRadius:12,background:`linear-gradient(135deg,${th.accent},${th.accent3})`,color:"#fff",fontSize:13,fontWeight:600,boxShadow:`0 8px 24px ${th.accent}66`,display:"flex",alignItems:"center",gap:8}}>
          <Ic n="plus" size={13} sw={2.5}/> 新建项目
        </button>
      </div>
      {projects.length===0?<EmptyState th={th} text="还没有项目 · 点击右上角「新建项目」开始" icon="folder"/>:(
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:14}}>
          {grouped.doing.length>0&&(<>
            {groupHeader("进行中",grouped.doing.length,th.accent2)}
            {grouped.doing.map(renderCard)}
          </>)}
          {grouped.idle.length>0&&(<>
            {groupHeader("未启动",grouped.idle.length,th.ink3)}
            {grouped.idle.map(renderCard)}
          </>)}
          {grouped.done.length>0&&(<>
            <div style={{gridColumn:"1/-1",display:"flex",alignItems:"center",gap:10,marginTop:4}}>
              <button onClick={()=>setShowDone(s=>!s)} className="mono" style={{fontSize:11,letterSpacing:"0.18em",color:"#10d9a3",fontWeight:600,display:"flex",alignItems:"center",gap:6,background:"transparent",padding:0,cursor:"pointer"}}>
                <Ic n={showDone?"chevDown":"chevRight"} size={11} color="#10d9a3"/> 已完成 · {grouped.done.length}
              </button>
              <div style={{flex:1,height:1,background:th.glassBorder}}/>
            </div>
            {showDone&&grouped.done.map(renderCard)}
          </>)}
        </div>
      )}
    </div>
  );
}

          ))}
        </div>
        <label className="mono" style={{display:"block",fontSize:10,color:th.ink3,marginBottom:8,letterSpacing:"0.15em",fontWeight:600}}>图标</label>
        <div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap"}}>
          {glyphs.map(g=>(
            <button key={g} onClick={()=>setF("glyph",g)} className={form.glyph===g?"":"glass"} style={{width:38,height:38,borderRadius:10,background:form.glyph===g?form.color+"25":th.glass2,border:form.glyph===g?`1px solid ${form.color}80`:`1px solid ${th.glassBorder}`,color:form.glyph===g?form.color:th.ink1,fontSize:18,textShadow:form.glyph===g?`0 0 10px ${form.color}`:"none"}}>{g}</button>

}

// ═══ ACTIVITY VIEW ═══
function ActivityView({th,tasks:allTasks,searchedTasks,history,catOf,today}){
  const tasks=searchedTasks||allTasks;
  const[range,setRange]=useState("today"); // today / 7 / 30
  const[filter,setFilter]=useState("all"); // all / done / create / focus

  // 从 tasks + history 派生活动流
  const entries=useMemo(()=>{
    const out=[];
    // 今日
    tasks.forEach(t=>{
      const c=catOf(t.category);
      if(t.done&&t.due===today){
        out.push({date:today,time:t.timeEnd||t.timeStart||"",type:"done",title:t.title,desc:t.actualMin>0?`用时 ${fmtMin(t.actualMin)}`:"",color:"#10d9a3",icon:"check",cat:c});
      }
      if(t.createdAt===today){
        out.push({date:today,time:"",type:"create",title:t.title,desc:`创建 · ${c.name} · ${t.priority}`,color:t.done?th.ink3:th.accent,icon:"plus",cat:c});
      }
      if(t.actualMin>0&&t.due===today){
        out.push({date:today,time:t.timeStart||"",type:"focus",title:t.title,desc:`专注 ${fmtMin(t.actualMin)}`,color:th.accent3,icon:"play",cat:c});
      }
    });
    // 历史
    history.slice(-14).reverse().forEach(h=>{
      if(h.date===today)return;
      h.tasks.forEach(t=>{
        if(t.done){
          const c=catOf(t.category);
          out.push({date:h.date,time:t.timeEnd||t.timeStart||"",type:"done",title:t.title,desc:t.actualMin>0?`用时 ${fmtMin(t.actualMin)}`:"",color:"#10d9a3",icon:"check",cat:c});
        }
      });
    });
    return out.sort((a,b)=>{
      if(a.date!==b.date)return b.date.localeCompare(a.date);
      return(b.time||"").localeCompare(a.time||"");
    });
  },[tasks,history,today,catOf,th.accent,th.accent3,th.ink3]);

  const ranges={today:e=>e.date===today,7:e=>e.date>=addDays(today,-6),30:e=>e.date>=addDays(today,-29)};
  const filters={all:()=>true,done:e=>e.type==="done",create:e=>e.type==="create",focus:e=>e.type==="focus"};
  const filtered=entries.filter(ranges[range]).filter(filters[filter]);
  const byDate={};
  filtered.forEach(e=>{byDate[e.date]=byDate[e.date]||[];byDate[e.date].push(e);});
  const dates=Object.keys(byDate).sort((a,b)=>b.localeCompare(a));

  return(
    <div className="fadeIn" style={{display:"flex",gap:18}}>
      <aside style={{width:180,flexShrink:0}} className="desktop-only">
        <div className="mono" style={{fontSize:12,letterSpacing:"0.2em",color:th.ink3,marginBottom:10,fontWeight:600,padding:"0 4px"}}>筛选</div>
        <div style={{display:"flex",flexDirection:"column",gap:3,marginBottom:16}}>
          {[["all","全部",entries.length,"layers"],["done","已完成",entries.filter(e=>e.type==="done").length,"check"],["create","新建",entries.filter(e=>e.type==="create").length,"plus"],["focus","专注",entries.filter(e=>e.type==="focus").length,"flame"]].map(([k,l,n,ic])=>(
            <button key={k} onClick={()=>setFilter(k)} className={`nav-item ${filter===k?"active":""}`} style={{padding:"8px 10px",fontSize:12}}>
              <Ic n={ic} size={12} color={filter===k?th.accent2:th.ink3}/>
              <span style={{flex:1}}>{l}</span>
              <span className="mono tnum" style={{fontSize:10,color:th.ink3}}>{n}</span>
            </button>
          ))}
        </div>
        <div className="mono" style={{fontSize:12,letterSpacing:"0.2em",color:th.ink3,marginBottom:10,fontWeight:600,padding:"0 4px"}}>时间</div>
        <div style={{display:"flex",flexDirection:"column",gap:3}}>
          {[["today","今天"],["7","最近 7 天"],["30","最近 30 天"]].map(([k,l])=>(
            <button key={k} onClick={()=>setRange(k)} className={`nav-item ${range===k?"active":""}`} style={{padding:"8px 10px",fontSize:12}}>{l}</button>
          ))}
        </div>
      </aside>
      <main style={{flex:1,minWidth:0}}>
        <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",marginBottom:18}}>
          <div>
            <div className="mono" style={{fontSize:11,letterSpacing:"0.22em",color:th.ink3,marginBottom:6,fontWeight:600}}>ACTIVITY · {filtered.length} 件</div>
            <h1 className="display" style={{fontSize:42,color:th.ink0,letterSpacing:"-0.03em",lineHeight:1}}>
              <em style={{fontStyle:"italic"}} className="gradient-primary">活动流</em>
            </h1>
          </div>
        </div>
        {/* mobile tabs */}
        <div className="mobile-only" style={{display:"flex",gap:6,marginBottom:12,overflowX:"auto"}} >
          {[["all","全部"],["done","完成"],["create","新建"],["focus","专注"]].map(([k,l])=>(
            <button key={k} onClick={()=>setFilter(k)} className={`view-tab ${filter===k?"active":""}`} style={{flexShrink:0}}>{l}</button>
          ))}
        </div>

        {dates.length===0?<EmptyState th={th} text="还没有活动记录" icon="list"/>:
          dates.map(date=>(
            <div key={date} style={{marginBottom:20}}>
              <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
                <div style={{flex:1,height:1,background:`linear-gradient(90deg,${th.accent}40,transparent)`}}/>
                <span className="mono" style={{fontSize:12,letterSpacing:"0.18em",color:th.accent2,fontWeight:600}}>
                  {date===today?"TODAY":date===addDays(today,-1)?"YESTERDAY":date.slice(5).replace("-","/")} · {monthName(date)} {parseInt(date.slice(-2))}
                </span>
                <div style={{flex:4,height:1,background:`linear-gradient(90deg,${th.accent}40,transparent)`}}/>
              </div>
              <div style={{position:"relative",paddingLeft:40}}>
                <div style={{position:"absolute",left:14,top:14,bottom:14,width:2,background:`linear-gradient(180deg,${th.accent},${th.accent3},${th.accent2})`}}/>
                {byDate[date].map((e,i)=>(
                  <div key={i} style={{position:"relative",paddingBottom:12}}>
                    <div style={{position:"absolute",left:-34,top:6,width:28,height:28,borderRadius:10,background:e.color+"22",border:`1px solid ${e.color}55`,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 0 10px ${e.color}40`}}>
                      <Ic n={e.icon} size={13} color={e.color}/>
                    </div>
                    <div className="glass" style={{padding:"11px 14px",borderRadius:11}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3,flexWrap:"wrap"}}>
                        {e.time&&<span className="mono tnum" style={{fontSize:10,color:th.ink3,letterSpacing:"0.05em"}}>{e.time}</span>}
                        <span style={{fontSize:12,color:th.ink1}}>
                          <span style={{color:e.color,fontWeight:500}}>{e.title}</span>
                        </span>
                      </div>
                      {e.desc&&<div style={{fontSize:11,color:th.ink2,lineHeight:1.5}}>{e.desc}</div>}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          ))
        }
      </main>
    </div>
  );
}

function StatCard({th,label,value,sub,color}){
  return(
    <div className="glass" style={{padding:"14px 16px",borderRadius:12,borderTop:`2px solid ${color||th.accent}`}}>
      <div className="mono" style={{fontSize:11,letterSpacing:"0.16em",color:th.ink3,fontWeight:600}}>{label.toUpperCase()}</div>
      <div style={{marginTop:4}}>
        <span className="display tnum" style={{fontSize:28,color:th.ink0,letterSpacing:"-0.03em"}}>{value}</span>
        {sub&&<span className="mono" style={{fontSize:11,color:th.ink2,marginLeft:3}}>{sub}</span>}
      </div>
    </div>
  );
}

function TodayReview({th,tasks,catOf,today}){
  const t=tasks.filter(x=>x.due===today);
  const done=t.filter(x=>x.done);
  const undone=t.filter(x=>!x.done);
  const totalDur=t.reduce((s,x)=>s+(x.actualMin||0),0);
  const byCat={};
  t.forEach(x=>{byCat[x.category]=(byCat[x.category]||0)+1;});
  return(
    <div className="fadeIn" style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
        <StatCard th={th} label="任务" value={t.length} color={th.accent}/>
        <StatCard th={th} label="完成" value={done.length} sub={t.length?"/ "+t.length:""} color="#10d9a3"/>
        <StatCard th={th} label="专注" value={fmtMin(totalDur)||"0"} color={th.accent3}/>
        <StatCard th={th} label="完成率" value={t.length?Math.round(done.length/t.length*100):0} sub="%" color="#f5a524"/>
      </div>
      {done.length>0&&(
        <div className="glass" style={{padding:16,borderRadius:14}}>
          <div className="mono" style={{fontSize:12,letterSpacing:"0.18em",color:th.ink3,marginBottom:10,fontWeight:600}}>已完成 · {done.length}</div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {done.map(x=>{const c=catOf(x.category);return(
              <div key={x.id} style={{padding:"8px 10px",borderRadius:9,background:th.glass1,borderLeft:`2px solid ${c.color}`,display:"flex",alignItems:"center",gap:10}}>
                <span className="mono" style={{fontSize:10,color:c.color}}>{c.glyph}</span>
                <span style={{flex:1,fontSize:12,color:th.ink1,textDecoration:"line-through",opacity:0.8}}>{x.title}</span>

function RangeReview({th,tasks,history,catOf,today,days,label}){
  const start=addDays(today,-(days-1));
  const dates=[];for(let i=0;i<days;i++)dates.push(addDays(start,i));
  let totalDone=0,totalDur=0,totalCount=0;
  const catStats={};
  dates.forEach(d=>{
    const entry=d===today?{tasks:tasks.filter(t=>t.due===today)}:history.find(h=>h.date===d);
    if(!entry)return;
    (entry.tasks||[]).forEach(t=>{
      totalCount++;
      if(t.done){totalDone++;totalDur+=t.actualMin||0;}
      catStats[t.category]=catStats[t.category]||{total:0,done:0,dur:0};
      catStats[t.category].total++;
      if(t.done){catStats[t.category].done++;catStats[t.category].dur+=t.actualMin||0;}
    });
  });
  const dailyDone=dates.map(d=>{const e=d===today?{tasks:tasks.filter(t=>t.due===today)}:history.find(h=>h.date===d);return(e?.tasks||[]).filter(t=>t.done).length;});
  const maxDaily=Math.max(...dailyDone,1);
  return(
    <div className="fadeIn" style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
        <StatCard th={th} label={label+"完成"} value={totalDone} color={th.accent}/>
        <StatCard th={th} label="总任务" value={totalCount} color={th.accent2}/>
        <StatCard th={th} label="专注" value={fmtMin(totalDur)||"0"} color={th.accent3}/>
        <StatCard th={th} label="日均" value={(totalDone/days).toFixed(1)} color="#10d9a3"/>
      </div>
      <div className="glass" style={{padding:16,borderRadius:14}}>
        <div className="mono" style={{fontSize:12,letterSpacing:"0.18em",color:th.ink3,marginBottom:12,fontWeight:600}}>每日完成趋势</div>
        <div style={{display:"flex",alignItems:"flex-end",gap:3,height:70,borderBottom:`1px solid ${th.glassBorder}`,paddingBottom:4}}>
          {dailyDone.map((v,i)=>(
            <div key={i} style={{flex:1,height:`${(v/maxDaily)*100}%`,minHeight:v>0?3:1,background:`linear-gradient(180deg,${th.accent},${th.accent3})`,borderRadius:"3px 3px 0 0",boxShadow:v>0?`0 0 6px ${th.accent}60`:"none",opacity:v>0?1:0.2}} title={`${dates[i]}: ${v}`}/>
          ))}
        </div>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:5,fontSize:9,color:th.ink3}}><span className="mono">{start.slice(5).replace("-","/")}</span><span className="mono">{today.slice(5).replace("-","/")}</span></div>
      </div>
      {Object.keys(catStats).length>0&&(
        <div className="glass" style={{padding:16,borderRadius:14}}>
          <div className="mono" style={{fontSize:12,letterSpacing:"0.18em",color:th.ink3,marginBottom:12,fontWeight:600}}>分类分布</div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {Object.entries(catStats).map(([cid,s])=>{const c=catOf(cid);return(
              <div key={cid}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5,fontSize:12}}>
                  <span style={{color:c.color,fontWeight:600}}>{c.glyph} {c.name}</span>
                  <span className="mono tnum" style={{marginLeft:"auto",color:th.ink2}}>{s.done}/{s.total} · {fmtMin(s.dur)||"0"}</span>
                </div>
                <div style={{height:5,borderRadius:3,background:th.glass2,overflow:"hidden"}}>
                  <div style={{width:`${(s.done/s.total)*100}%`,height:"100%",background:`linear-gradient(90deg,${c.color},${c.color}aa)`,boxShadow:`0 0 6px ${c.color}`}}/>
                </div>
              </div>
            );})}
          </div>
        </div>
      )}
    </div>
  );
}

function HeatmapView({th,tasks,history,today}){
  const weeks=26;
  const days=weeks*7;
  const start=addDays(today,-(days-1));
  const startDay=new Date(start).getDay();
  const padLeading=(startDay+6)%7;
  const allDates=[];
  for(let i=0;i<padLeading;i++)allDates.push(null);
  for(let i=0;i<days;i++)allDates.push(addDays(start,i));
  const dataMap={};
  history.forEach(h=>{dataMap[h.date]=h.tasks.filter(t=>t.done).length;});
  const todayDone=tasks.filter(t=>t.due===today&&t.done).length;
  dataMap[today]=todayDone;
  const max=Math.max(...Object.values(dataMap),1);
  const shade=v=>{if(!v)return th.glass1;const a=Math.min(0.18+(v/max)*0.82,1);return th.isDark?`rgba(${parseInt(th.accent.slice(1,3),16)},${parseInt(th.accent.slice(3,5),16)},${parseInt(th.accent.slice(5,7),16)},${a})`:th.accent+Math.round(a*255).toString(16).padStart(2,"0");};
  const grid=[];for(let w=0;w<Math.ceil(allDates.length/7);w++){const col=[];for(let d=0;d<7;d++)col.push(allDates[w*7+d]);grid.push(col);}
  const totalDone=Object.values(dataMap).reduce((a,b)=>a+b,0);
  const activeDays=Object.keys(dataMap).filter(d=>dataMap[d]>0).length;
  return(
    <div className="fadeIn" style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
        <StatCard th={th} label="半年完成" value={totalDone} color={th.accent}/>
        <StatCard th={th} label="活跃天数" value={activeDays} sub={`/ ${days}`} color="#10d9a3"/>
        <StatCard th={th} label="单日最多" value={max} sub="件" color={th.accent3}/>
      </div>
      <div className="glass" style={{padding:16,borderRadius:14,overflowX:"auto"}}>
        <div className="mono" style={{fontSize:12,letterSpacing:"0.18em",color:th.ink3,marginBottom:14,fontWeight:600}}>活跃热力图 · 近 26 周</div>
        <div style={{display:"flex",gap:3,minWidth:"fit-content",paddingLeft:24,position:"relative"}}>
          <div style={{position:"absolute",left:0,top:0,display:"flex",flexDirection:"column",gap:3,fontSize:8,color:th.ink3,fontFamily:"var(--f-mono)"}}>
            {["","Mon","","Wed","","Fri",""].map((d,i)=><div key={i} style={{height:11,display:"flex",alignItems:"center"}}>{d}</div>)}
          </div>
          {grid.map((col,ci)=>(
            <div key={ci} style={{display:"flex",flexDirection:"column",gap:3}}>
              {col.map((date,ri)=>{
                if(!date)return<div key={ri} style={{width:11,height:11}}/>;
                const v=dataMap[date]||0;
                return<div key={ri} className="hm-cell" title={`${date}: ${v}`} style={{width:11,height:11,borderRadius:2.5,background:shade(v),border:date===today?`1px solid ${th.accent3}`:"none"}}/>;
              })}
            </div>
          ))}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8,marginTop:14,fontSize:10,color:th.ink3}}>
          <span className="mono">少</span>
          {[0,0.25,0.5,0.75,1].map((v,i)=><div key={i} style={{width:11,height:11,borderRadius:2.5,background:shade(v*max)}}/>)}
          <span className="mono">多</span>
        </div>
      </div>
    </div>
  );
}

function HabitsView({th,tasks,history,catOf,today}){
  const habits=tasks.filter(t=>t.repeat);
  const last30=Array.from({length:30},(_,i)=>addDays(today,-i));
  const habitData=habits.map(h=>{
    const dates=last30.map(d=>{
      if(d===today)return h.done;
      const entry=history.find(x=>x.date===d);if(!entry)return false;
      const t=entry.tasks.find(x=>x.title===h.title&&x.repeat);
      return!!t?.done;
    });
    let streak=0;for(let i=0;i<dates.length;i++){if(dates[i])streak++;else break;}
    const total=dates.filter(d=>d).length;
    return{...h,dates,streak,total,rate:total/30};
  });
  if(habitData.length===0)return<EmptyState th={th} text='没有循环任务。在添加任务时开启"每日重复"即可创建习惯。' icon="repeat"/>;
  return(
    <div className="fadeIn" style={{display:"flex",flexDirection:"column",gap:10}}>
      {habitData.map(h=>{
        const c=catOf(h.category);
        return(
          <div key={h.id} className="glass" style={{padding:16,borderRadius:14,borderLeft:`3px solid ${c.color}`}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
              <span className="mono" style={{fontSize:11,color:c.color,fontWeight:600}}>{c.glyph}</span>
              <span style={{fontSize:14,color:th.ink0,fontWeight:600,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{h.title}</span>
              {h.streak>0&&<span className="mono" style={{fontSize:11,color:"#f5a524",padding:"3px 10px",borderRadius:8,background:"rgba(245,165,36,0.1)",fontWeight:700}}>🔥 {h.streak} 天</span>}
              <span className="mono tnum" style={{fontSize:11,color:th.ink2}}>{Math.round(h.rate*100)}%</span>
            </div>
            <div style={{display:"flex",gap:2,flexWrap:"wrap"}}>
              {h.dates.slice().reverse().map((d,i)=>(
                <div key={i} style={{flex:1,minWidth:7,maxWidth:16,aspectRatio:"1",borderRadius:3,background:d?`linear-gradient(135deg,${c.color},${c.color}aa)`:th.glass2,boxShadow:d?`0 0 4px ${c.color}80`:"none"}}/>
              ))}
            </div>
            <div style={{display:"flex",justifyContent:"space-between",marginTop:6,fontSize:9,color:th.ink3}}><span className="mono">30 天前</span><span className="mono">今天</span></div>
          </div>
        );
      })}
    </div>
  );
}

function AllHistory({th,tasks,history,catOf,today}){
  const[q,setQ]=useState("");
  const[open,setOpen]=useState({});
  const todayEntry={date:today,tasks:tasks.filter(t=>t.due===today).map(t=>({...t,duration:t.duration||""}))};
  const merged=[todayEntry,...history.filter(h=>h.date!==today).sort((a,b)=>b.date.localeCompare(a.date))];
  const filtered=merged.map(h=>({...h,tasks:h.tasks.filter(t=>!q||(t.title||"").toLowerCase().includes(q.toLowerCase()))})).filter(h=>h.tasks.length>0);
  return(
    <div className="fadeIn">
      <input value={q} onChange={e=>setQ(e.target.value)} placeholder="🔍 搜索历史任务…" className="inp" style={{marginBottom:14}}/>
      {filtered.length===0?<EmptyState th={th} text={q?"没找到匹配":"还没有历史记录"}/>:(
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {filtered.map(h=>{
            const done=h.tasks.filter(t=>t.done).length;
            const dur=h.tasks.reduce((s,t)=>s+(t.actualMin||0),0);
            const isOpen=open[h.date]!==false;
            return(
              <div key={h.date} className="glass" style={{borderRadius:14}}>
                <button onClick={()=>setOpen({...open,[h.date]:!isOpen})} style={{width:"100%",padding:"13px 16px",display:"flex",alignItems:"center",gap:12,textAlign:"left"}}>
                  <div style={{flex:1}}>
                    <div className="display" style={{fontSize:16,color:th.ink0}}>{h.date===today?"今天":h.date}</div>
                    <div className="mono" style={{fontSize:10,color:th.ink3,marginTop:3,letterSpacing:"0.05em"}}>完成 {done}/{h.tasks.length} · 专注 {fmtMin(dur)||"0"}</div>
                  </div>
                  <Ic n={isOpen?"chevUp":"chevDown"} size={14} color={th.ink3}/>
                </button>
                {isOpen&&(
                  <div style={{padding:"0 16px 13px",display:"flex",flexDirection:"column",gap:5}}>
                    {h.tasks.map((t,i)=>{const c=catOf(t.category);return(
                      <div key={i} style={{padding:"8px 10px",borderRadius:9,background:th.glass1,borderLeft:`2px solid ${c.color}`,display:"flex",alignItems:"center",gap:10}}>
                        <span className="mono" style={{fontSize:9,color:c.color}}>{c.glyph}</span>
                        <span style={{flex:1,fontSize:12,color:t.done?th.ink3:th.ink0,textDecoration:t.done?"line-through":"none"}}>{t.title}</span>
                        {t.actualMin>0&&<span className="mono tnum" style={{fontSize:9,color:th.ink3}}>{fmtMin(t.actualMin)}</span>}
                      </div>
                    );})}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

          {tab==="account"&&(
            <div>
              <div className="glass" style={{padding:18,borderRadius:14,marginBottom:14,display:"flex",alignItems:"center",gap:14}}>
                <div style={{width:52,height:52,borderRadius:"50%",background:`linear-gradient(135deg,${th.accent},${th.accent3})`,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:22,fontWeight:700,boxShadow:`0 4px 14px ${th.accent}66`}}>{(user.user_metadata?.username||user.email||"U")[0].toUpperCase()}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:15,color:th.ink0,fontWeight:600}}>{user.user_metadata?.username||user.email?.split("@")[0]}</div>
                  <div className="mono" style={{fontSize:11,color:th.ink3,marginTop:3}}>ID: {user.id.slice(0,8)}…</div>
                </div>
              </div>
              <button onClick={onSignOut} className="glass" style={{width:"100%",padding:"13px 16px",borderRadius:11,fontSize:13,color:"#ff5d7a",display:"flex",alignItems:"center",justifyContent:"center",gap:8,border:"1px solid rgba(255,93,122,0.2)"}}><Ic n="logout" size={13} color="#ff5d7a"/> 登出</button>
            </div>
          )}

          {tab==="categories"&&(
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <div className="mono" style={{fontSize:12,letterSpacing:"0.18em",color:th.ink3,marginBottom:4,fontWeight:600}}>CATEGORIES · 分类</div>
              {cats.map((c,i)=>(
                <div key={c.id} className="glass" style={{padding:"12px 14px",borderRadius:11,display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:18,color:c.color,textShadow:`0 0 8px ${c.color}80`}}>{c.glyph}</span>
                  <input value={c.name} onChange={e=>{const n=[...cats];n[i]={...n[i],name:e.target.value};setCats(n);}} style={{flex:1,fontSize:13,background:"transparent",border:"none",outline:"none",color:th.ink0,fontWeight:500}}/>
                  <input type="color" value={c.color} onChange={e=>{const n=[...cats];n[i]={...n[i],color:e.target.value};setCats(n);}} style={{width:28,height:28,border:"none",borderRadius:7,cursor:"pointer",background:"transparent"}}/>
                  {!DEFAULT_CATEGORIES.find(d=>d.id===c.id)&&<button onClick={()=>setCats(cats.filter(x=>x.id!==c.id))} style={{color:"#ff5d7a",width:28,height:28,display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="trash" size={12}/></button>}
                </div>
              ))}
              <button onClick={()=>{const name=prompt("分类名称");if(!name)return;const glyph=prompt("图标（一个字符）","◆")||"◆";setCats([...cats,{id:"custom"+Date.now(),name,color:"#a8a2c4",glyph:glyph.slice(0,2)}]);}} className="glass" style={{padding:"11px 14px",borderRadius:11,color:th.ink2,fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",gap:6,border:`1px dashed ${th.glassBorder}`}}><Ic n="plus" size={12}/> 添加分类</button>
            </div>
          )}

          {tab==="trash"&&(
            <div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
                <div>
                  <div className="mono" style={{fontSize:11,letterSpacing:"0.18em",color:th.ink3,marginBottom:4,fontWeight:600}}>RECYCLE BIN · {trash.length} 项</div>
                  <div style={{fontSize:11,color:th.ink3,lineHeight:1.6}}>已删除任务保留 30 天后自动永久删除</div>
                </div>
                {trash.length>0&&<button onClick={emptyTrash} style={{padding:"7px 12px",borderRadius:9,background:"rgba(255,93,122,0.12)",color:"#ff5d7a",fontSize:11,fontWeight:600,border:"1px solid rgba(255,93,122,0.3)"}}>清空</button>}
              </div>
              {trash.length===0?(
                <EmptyState th={th} text="回收站是空的" icon="trash"/>
              ):(
                <div className="slim-scroll" style={{display:"flex",flexDirection:"column",gap:6,maxHeight:"50vh",overflowY:"auto"}}>
                  {[...trash].sort((a,b)=>(b.deletedAt||0)-(a.deletedAt||0)).map(t=>{
                    const c=catOf?catOf(t.category):{name:t.category,color:"#888",glyph:"■"};
                    const days=Math.max(0,30-Math.floor((Date.now()-(t.deletedAt||Date.now()))/(24*60*60*1000)));
                    const deletedAtStr=new Date(t.deletedAt||Date.now()).toLocaleString("zh-CN",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"});
                    return(
                      <div key={t.id} className="glass" style={{padding:"11px 13px",borderRadius:10,borderLeft:`3px solid ${c.color}`,display:"flex",alignItems:"center",gap:10}}>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:13,color:th.ink0,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.title}</div>
                          <div style={{display:"flex",gap:8,marginTop:3,flexWrap:"wrap"}}>
                            <span className="mono" style={{fontSize:10,color:c.color,fontWeight:600}}>{c.glyph} {c.name}</span>
                            <span className="mono" style={{fontSize:10,color:th.ink3}}>· 删于 {deletedAtStr}</span>
                            <span className="mono" style={{fontSize:10,color:days<=3?"#ff5d7a":th.ink3}}>· {days} 天后清理</span>
                          </div>
                        </div>
                        <button onClick={()=>restoreTask(t.id)} title="恢复" style={{padding:"6px 10px",borderRadius:7,background:"rgba(16,217,163,0.12)",color:"#10d9a3",fontSize:11,fontWeight:600,border:"1px solid rgba(16,217,163,0.3)"}}>恢复</button>
                        <button onClick={()=>{if(confirm(`永久删除「${t.title}」？`))purgeTask(t.id);}} title="永久删除" style={{width:28,height:28,borderRadius:7,background:th.glass2,display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="trash" size={11} color={th.ink3}/></button>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          )}

          {tab==="data"&&(
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <button onClick={exportXLSX} className="glass hover-lift" style={{padding:"14px 16px",borderRadius:11,textAlign:"left",display:"flex",alignItems:"center",gap:12}}>
                <div style={{width:38,height:38,borderRadius:10,background:"#10d9a322",display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="download" size={15} color="#10d9a3"/></div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,color:th.ink0,fontWeight:600}}>导出 Excel (.xlsx)</div>
                  <div style={{fontSize:11,color:th.ink3,marginTop:2}}>包含所有任务及分类信息</div>
                </div>
              </button>
              <button onClick={exportJSON} className="glass hover-lift" style={{padding:"14px 16px",borderRadius:11,textAlign:"left",display:"flex",alignItems:"center",gap:12}}>
                <div style={{width:38,height:38,borderRadius:10,background:th.accent+"22",display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="download" size={15} color={th.accent}/></div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,color:th.ink0,fontWeight:600}}>导出 JSON（含全部数据）</div>
                  <div style={{fontSize:11,color:th.ink3,marginTop:2}}>完整备份，可重新导入</div>
                </div>
              </button>
              <label className="glass hover-lift" style={{padding:"14px 16px",borderRadius:11,cursor:"pointer",display:"flex",alignItems:"center",gap:12}}>
                <div style={{width:38,height:38,borderRadius:10,background:"#f5a52422",display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="upload" size={15} color="#f5a524"/></div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,color:th.ink0,fontWeight:600}}>导入 JSON</div>
                  <div style={{fontSize:11,color:th.ink3,marginTop:2}}>合并到现有数据</div>
                </div>
                <input type="file" accept=".json" onChange={importJSON} style={{display:"none"}}/>
              </label>
            </div>
          )}

          {tab==="about"&&(
            <div style={{textAlign:"center",padding:"20px 0"}}>
              <div style={{marginBottom:16,filter:"drop-shadow(0 8px 24px rgba(109,95,255,0.5))",display:"inline-block"}}>
                <svg width="72" height="72" viewBox="0 0 72 72" fill="none"><defs><linearGradient id="abg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stopColor="#6d5fff"/><stop offset="100%" stopColor="#ec4899"/></linearGradient></defs><rect width="72" height="72" rx="18" fill="url(#abg)"/><text x="36" y="52" textAnchor="middle" fontFamily="serif" fontStyle="italic" fontSize="44" fontWeight="700" fill="white">T</text></svg>
              </div>
              <h3 className="display" style={{fontSize:26,color:th.ink0,marginBottom:4,letterSpacing:"-0.02em"}}>Timelinek</h3>
              <div className="mono" style={{fontSize:10,color:th.ink3,marginBottom:14,letterSpacing:"0.3em"}}>v2.0 · 2026</div>
              <div style={{fontSize:12,color:th.ink2,lineHeight:1.75,maxWidth:400,margin:"0 auto"}}>
                任务 · 时间线 · 项目 · 专注 · 云同步<br/>
                Glass morphism · 霓虹极光 · 三套主题<br/>
                <span className="mono" style={{fontSize:10,opacity:0.6}}>Powered by React + Supabase</span>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
