}

// ═══ TASK CARD ═══
function TaskCard({task:t,th,catOf,projOf,today,nowMin,poppingId,runningId,toggleTask,toggleTimer,removeTask,startEdit,expanded,setExpanded,updateProgress,selectedIds,toggleSelect,inSelectMode,reorderTask,tagsMap,allowDrag}){
  const c=catOf(t.category);
  const p=t.projectId?projOf(t.projectId):null;
  const overdue=isOverdue(t,today,nowMin,p?[p]:null);
  const isRunning=runningId===t.id;
  const popping=poppingId===t.id;
  const exp=expanded[t.id];
  const isSelected=selectedIds&&selectedIds.has(t.id);
  const taskTags=(t.tagIds||[]).map(tid=>tagsMap&&tagsMap[tid]).filter(Boolean);
  const[dragOver,setDragOver]=useState(null); // 'before' | 'after' | null
  const[isDragging,setIsDragging]=useState(false);
  // 长按检测
  const longPressTimer=useRef(null);
  const startLongPress=()=>{
    if(longPressTimer.current)clearTimeout(longPressTimer.current);
    longPressTimer.current=setTimeout(()=>{
      toggleSelect&&toggleSelect(t.id);
      if(navigator.vibrate)navigator.vibrate(15);
    },420);
  };
  const cancelLongPress=()=>{if(longPressTimer.current){clearTimeout(longPressTimer.current);longPressTimer.current=null;}};
  const onCardClick=(e)=>{
    if(inSelectMode){
      e.stopPropagation();
      toggleSelect&&toggleSelect(t.id);
      return;
    }
    if((e.metaKey||e.ctrlKey)&&toggleSelect){
      e.stopPropagation();
      toggleSelect(t.id);
      return;
    }
  };
  // 拖拽
  const onDragStart=(e)=>{
    if(!allowDrag||t.done)return;
    e.dataTransfer.setData("text/plain",String(t.id));
    e.dataTransfer.effectAllowed="move";
    setIsDragging(true);
  };
  const onDragOver=(e)=>{
    if(!allowDrag||t.done||isDragging)return;
    e.preventDefault();
    const rect=e.currentTarget.getBoundingClientRect();
    const before=(e.clientY-rect.top)<rect.height/2;
    setDragOver(before?"before":"after");
  };
  const onDragLeave=()=>setDragOver(null);
  const onDrop=(e)=>{
    if(!allowDrag||t.done)return;
    e.preventDefault();
    const srcId=Number(e.dataTransfer.getData("text/plain"));
    if(srcId&&srcId!==t.id&&reorderTask){
      reorderTask(srcId,t.id,dragOver==="before");
    }
    setDragOver(null);
  };
  const onDragEnd=()=>{setIsDragging(false);setDragOver(null);};
  return(
    <div draggable={allowDrag&&!t.done&&!inSelectMode} onDragStart={onDragStart} onDragOver={onDragOver} onDragLeave={onDragLeave} onDrop={onDrop} onDragEnd={onDragEnd} onClick={onCardClick} onTouchStart={startLongPress} onTouchEnd={cancelLongPress} onTouchMove={cancelLongPress} onMouseDown={e=>{if(e.button===0&&!inSelectMode)startLongPress();}} onMouseUp={cancelLongPress} onMouseLeave={cancelLongPress} className="task-card glass" style={{padding:"13px 16px",borderRadius:12,borderLeft:`3px solid ${isSelected?th.accent:t.done?"#10d9a3":overdue?"#ff5d7a":c.color}`,borderTop:dragOver==="before"?`2px solid ${th.accent}`:undefined,borderBottom:dragOver==="after"?`2px solid ${th.accent}`:undefined,boxShadow:isSelected?`0 0 0 2px ${th.accent},0 8px 22px ${th.accent}40`:isRunning?`0 8px 24px ${c.color}40,0 0 0 1px ${c.color}40`:undefined,opacity:isDragging?0.4:t.done?0.65:1,cursor:inSelectMode?"pointer":(allowDrag&&!t.done?"grab":"default"),userSelect:"none",transition:"box-shadow 0.15s,opacity 0.15s,border-color 0.1s"}}>
      <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
        <button onClick={e=>{e.stopPropagation();if(inSelectMode){toggleSelect(t.id);}else{toggleTask(t.id);}}} className={popping?"checkAnim":""} style={{flexShrink:0,marginTop:2,width:20,height:20,borderRadius:6,background:isSelected?th.accent:t.done?`linear-gradient(135deg,${c.color},${c.color}aa)`:"transparent",border:isSelected?"none":t.done?"none":`1.5px solid ${th.glassBorderStrong}`,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:isSelected?`0 0 8px ${th.accent}aa`:t.done?`0 0 8px ${c.color}60`:"none"}}>
          {isSelected?<Ic n="check" size={12} color="#fff" sw={2.5}/>:t.done&&<Ic n="check" size={12} color="#fff" sw={2.5}/>}
        </button>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:4}}>
            <span className="mono" style={{fontSize:9,letterSpacing:"0.1em",color:c.color,fontWeight:600}}>{c.glyph} {c.name}</span>
            <span style={{width:3,height:3,borderRadius:"50%",background:PCOLOR[t.priority]}}/>
            <span className="mono" style={{fontSize:9,color:th.ink3}}>{t.priority}</span>
            {p&&<span className="mono" style={{fontSize:9,padding:"2px 6px",borderRadius:6,background:p.color+"20",color:p.color,border:`1px solid ${p.color}40`}}>{p.glyph} {p.name}</span>}
            {taskTags.map(tg=><span key={tg.id} className="mono" style={{fontSize:9,padding:"2px 6px",borderRadius:6,background:tg.color+"20",color:tg.color,border:`1px solid ${tg.color}40`}}>#{tg.name}</span>)}
            {t.repeat&&<Ic n="repeat" size={10} color={th.ink3}/>}
            {t.timeStart&&<span className="mono tnum" style={{fontSize:10,color:overdue?"#ff5d7a":th.ink3,fontWeight:overdue?600:400}}>{t.timeStart}{t.timeEnd?`–${t.timeEnd}`:""}</span>}
            {overdue&&<span className="mono" style={{fontSize:9,color:"#ff5d7a",padding:"1px 6px",borderRadius:5,background:"rgba(255,93,122,0.15)",fontWeight:600}}>逾期</span>}
            {t.due&&t.due!==today&&<span className="mono" style={{fontSize:9,color:th.ink3}}>{t.due.slice(5).replace("-","/")}</span>}
          </div>
          <div style={{fontSize:14,fontWeight:500,color:th.ink0,lineHeight:1.4,textDecoration:t.done?"line-through":"none",cursor:t.content?"pointer":"default"}} onClick={()=>t.content&&setExpanded({...expanded,[t.id]:!exp})}>
            {t.title}
            {t.content&&<span style={{marginLeft:6,color:th.ink3,fontSize:10,verticalAlign:"middle"}}><Ic n={exp?"chevUp":"chevDown"} size={11} color={th.ink3}/></span>}
          </div>
          {t.content&&exp&&<div className="fadeIn" style={{fontSize:12,color:th.ink2,marginTop:6,lineHeight:1.65,whiteSpace:"pre-wrap"}}>{t.content}</div>}

          {/* Progress bar */}
          {!t.done&&(t.progress>0||t.duration)&&(
            <div style={{marginTop:6,display:"flex",alignItems:"center",gap:10}}>
              <div style={{flex:1,padding:"7px 0",cursor:"pointer"}} onClick={e=>{const bar=e.currentTarget.querySelector(".prog-bar");const rect=bar.getBoundingClientRect();const p=(e.clientX-rect.left)/rect.width;updateProgress(t.id,Math.max(0,Math.min(1,p)));}} title="点击调整进度">
                <div className="prog-bar" style={{height:5,borderRadius:3,background:th.glass2,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${(t.progress||0)*100}%`,background:`linear-gradient(90deg,${c.color},${c.color}aa)`,boxShadow:`0 0 6px ${c.color}`,transition:"width 0.3s var(--ease)"}}/>
                </div>
              </div>
              <span className="mono tnum" style={{fontSize:10,color:th.ink3,minWidth:30,textAlign:"right"}}>{Math.round((t.progress||0)*100)}%</span>
            </div>
          )}

          {(t.duration||t.actualMin>0)&&(
            <div style={{marginTop:8,display:"flex",alignItems:"center",gap:8,fontSize:11,color:th.ink3}}>
              {t.duration&&<span className="mono">预计 {t.duration}m</span>}
              {t.actualMin>0&&<span className="mono tnum" style={{color:isRunning?th.accent3:th.ink3,fontWeight:isRunning?600:400}}>{isRunning&&"● "}已用 {fmtMin(t.actualMin)}</span>}
            </div>
          )}
        </div>
        <div className="task-actions" style={{display:"flex",gap:4,flexShrink:0}}>
          {!t.done&&<button onClick={()=>toggleTimer(t.id)} title={isRunning?"暂停":"开始计时"} style={{width:30,height:30,borderRadius:8,background:isRunning?th.accent3+"20":th.glass2,display:"flex",alignItems:"center",justifyContent:"center",color:isRunning?th.accent3:th.ink2}}><Ic n={isRunning?"pause":"play"} size={12} color={isRunning?th.accent3:th.ink2}/></button>}
          <button onClick={()=>startEdit(t)} title="编辑" style={{width:30,height:30,borderRadius:8,background:th.glass2,display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="edit" size={12} color={th.ink2}/></button>
          <button onClick={()=>removeTask(t.id)} title="删除" style={{width:30,height:30,borderRadius:8,background:th.glass2,display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="trash" size={12} color={th.ink2}/></button>
        </div>
      </div>
    </div>
  );
}

// ═══ TASK FORM ═══

    const cur=selectedTagIds;
    setF("tagIds",cur.includes(id)?cur.filter(x=>x!==id):[...cur,id]);

  const handleAddTag=()=>{
    const newTag=addTag&&addTag(newTagText,TAG_COLORS[(tags||[]).length%TAG_COLORS.length]);

      setF("tagIds",[...selectedTagIds,newTag.id]);

          </div>

        </div>
        <input value={taskForm.title} onChange={e=>setF("title",e.target.value)} onKeyDown={e=>{if(e.isComposing||e.keyCode===229)return;if(e.key==="Enter"&&!e.shiftKey&&ok){e.preventDefault();addOrEditTask();}}} placeholder="任务标题…" autoFocus={typeof window!=="undefined"&&window.innerWidth>=900} className="inp" style={{marginBottom:11,fontSize:15,fontWeight:500}}/>
        <textarea value={taskForm.content||""} onChange={e=>setF("content",e.target.value)} placeholder="备注（可选）" rows={2} className="inp" style={{marginBottom:14,resize:"vertical",fontFamily:"inherit"}}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:12}}>

              <span style={{color:curCat.color,fontSize:13}}>{curCat.glyph}</span>

              <span style={{position:"absolute",right:10,top:"50%",transform:`translateY(-50%) rotate(${catOpen?180:0}deg)`,transition:"transform 0.15s",color:th.ink3}}><Ic n="chevDown" size={12} color={th.ink3}/></span>
            </button>
            {catOpen&&(
              <>
                <div onClick={()=>setCatOpen(false)} style={{position:"fixed",inset:0,zIndex:1}}/>

        {/* 标签选择 */}
        <div style={{marginBottom:14}}>
          <label className="mono" style={{display:"block",fontSize:10,color:th.ink3,marginBottom:6,letterSpacing:"0.15em"}}>标签 {selectedTagIds.length>0&&<span style={{color:th.accent}}>· 已选 {selectedTagIds.length}</span>}</label>
          {/* 智能推荐区：基于标题关键词匹配 */}
          {(()=>{
            const title=(taskForm.title||"").toLowerCase();
            if(!title.trim())return null;
            const recommendations=[];
            // 推荐标签：标签名出现在标题里
            (tags||[]).forEach(tg=>{
              if(selectedTagIds.includes(tg.id))return;
              const tagName=tg.name.toLowerCase();
              if(tagName.length<2)return;
              if(title.includes(tagName)){
                recommendations.push({type:"tag",tag:tg});
              }
            });
            // 推荐项目：项目名出现在标题里
            (projects||[]).forEach(p=>{
              if(taskForm.projectId===p.id)return;
              const pName=p.name.toLowerCase();
              if(pName.length<2)return;
              if(title.includes(pName)){
                recommendations.push({type:"project",project:p});
              }
            });
            if(recommendations.length===0)return null;
            return(
              <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:8,padding:"7px 10px",background:`linear-gradient(135deg,${th.accent}10,${th.accent3}08)`,borderRadius:9,border:`1px dashed ${th.accent}50`}}>
                <span style={{fontSize:10,color:th.accent2,fontWeight:600,letterSpacing:"0.04em",alignSelf:"center",marginRight:4}}>✨ 推荐：</span>
                {recommendations.map((r,i)=>{
                  if(r.type==="tag"){
                    return<button key={"tg"+r.tag.id} type="button" onClick={()=>toggleTaskTag(r.tag.id)} style={{padding:"4px 9px",borderRadius:6,fontSize:11,fontWeight:500,background:r.tag.color+"30",color:r.tag.color,border:`1px solid ${r.tag.color}60`,display:"flex",alignItems:"center",gap:3}}>
                      <span style={{fontSize:9}}>+</span> #{r.tag.name}
                    </button>;
                  }
                  return<button key={"pj"+r.project.id} type="button" onClick={()=>setF("projectId",r.project.id)} style={{padding:"4px 9px",borderRadius:6,fontSize:11,fontWeight:500,background:r.project.color+"30",color:r.project.color,border:`1px solid ${r.project.color}60`,display:"flex",alignItems:"center",gap:3}}>
                    <span style={{fontSize:9}}>+</span> {r.project.glyph} {r.project.name}
                  </button>;
                })}
              </div>
            );
          })()}
          <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:8}}>
            {(tags||[]).map(tg=>{
              const sel=selectedTagIds.includes(tg.id);
              return(
                <button key={tg.id} type="button" onClick={()=>toggleTaskTag(tg.id)} style={{padding:"5px 10px",borderRadius:7,fontSize:11,fontWeight:500,background:sel?tg.color+"35":th.glass1,color:sel?tg.color:th.ink2,border:`1px solid ${sel?tg.color+"80":th.glassBorder}`,boxShadow:sel?`0 0 8px ${tg.color}40`:"none"}}>
                  #{tg.name}
                </button>
              );
            })}
            {(!tags||tags.length===0)&&<span style={{fontSize:11,color:th.ink3,padding:"5px 4px"}}>暂无标签 · 在下方创建</span>}
          </div>
          <div style={{display:"flex",gap:6}}>
            <input value={newTagText} onChange={e=>setNewTagText(e.target.value)} onKeyDown={e=>{if(e.isComposing||e.keyCode===229)return;if(e.key==="Enter"){e.preventDefault();handleAddTag();}}} placeholder="新建标签…" className="inp" style={{padding:"7px 11px",fontSize:12,flex:1}}/>
            <button type="button" onClick={handleAddTag} disabled={!newTagText.trim()} style={{padding:"7px 14px",borderRadius:9,background:newTagText.trim()?`linear-gradient(135deg,${th.accent},${th.accent3})`:th.glass2,color:newTagText.trim()?"#fff":th.ink3,fontSize:12,fontWeight:600,opacity:newTagText.trim()?1:0.5}}>+ 添加</button>
          </div>
        </div>
        <label className="glass" style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",borderRadius:11,cursor:"pointer",marginBottom:16}}>
          <div onClick={e=>{e.preventDefault();setF("repeat",!taskForm.repeat);}} className="switch" style={{background:taskForm.repeat?`linear-gradient(135deg,${th.accent},${th.accent3})`:th.glass3}}>
            <div className="switch-dot" style={{left:taskForm.repeat?21:3}}/>
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:13,color:th.ink0,fontWeight:500}}>每日重复</div>
            <div style={{fontSize:11,color:th.ink3,marginTop:2}}>每天自动重置完成状态</div>
          </div>
        </label>
        <div style={{display:"flex",gap:10}}>
          <button onClick={cancelForm} className="glass" style={{flex:1,padding:14,borderRadius:12,fontSize:14,color:th.ink2,fontWeight:500}}>取消</button>
          <button onClick={addOrEditTask} disabled={!ok} style={{flex:2,padding:14,background:ok?`linear-gradient(135deg,${th.accent},${th.accent3})`:th.glass2,color:ok?"#fff":th.ink3,borderRadius:12,fontSize:14,fontWeight:600,letterSpacing:"0.04em",boxShadow:ok?`0 8px 24px ${th.accent}66`:"none"}}>{editTaskId?"保 存":"创 建"}</button>
        </div>
      </div>
    </div>
  );
}

// ═══ KANBAN VIEW ═══
function KanbanView({th,tasks:allTasks,searchedTasks,catOf,today,nowMin,toggleTask,startEdit,removeTask,updateProgress}){
  const tasks=searchedTasks||allTasks;
  // 推导列：backlog(无日期且未完成) / today(今日) / doing(progress>0 或正在跑) / review(progress>=0.8未完成) / done(已完成)
  const cols=[
    {id:"backlog",title:"待办",color:"#a8a2c4",match:t=>!t.done&&(!t.due||t.due>today)&&(t.progress||0)<0.1},
    {id:"today",title:"今日",color:"#6d5fff",match:t=>!t.done&&t.due===today&&(t.progress||0)<0.1},
    {id:"doing",title:"进行中",color:"#ec4899",match:t=>!t.done&&(t.progress||0)>=0.1&&(t.progress||0)<0.8},
    {id:"review",title:"待复盘",color:"#f5a524",match:t=>!t.done&&(t.progress||0)>=0.8},
    {id:"done",title:"已完成",color:"#10d9a3",match:t=>t.done},
  ];
  const grouped=cols.map(col=>({...col,cards:tasks.filter(col.match).sort((a,b)=>{const p={高:0,中:1,低:2};return p[a.priority]-p[b.priority];})}));

  return(
    <div className="fadeIn" style={{margin:"-8px -12px 0"}}>
      <div style={{padding:"8px 12px 12px",display:"flex",alignItems:"flex-end",justifyContent:"space-between",marginBottom:14}}>
        <div>
          <div className="mono" style={{fontSize:11,letterSpacing:"0.22em",color:th.ink3,marginBottom:6,fontWeight:600}}>KANBAN · {tasks.length} TASKS</div>
          <h1 className="display" style={{fontSize:38,color:th.ink0,letterSpacing:"-0.03em",lineHeight:1}}>
            <em style={{fontStyle:"italic"}} className="gradient-primary">Kanban</em> · 工作流
          </h1>
        </div>
      </div>

      <div className="slim-scroll" style={{overflowX:"auto",paddingBottom:20,padding:"0 12px 20px"}}>
        <div style={{display:"flex",gap:12,minWidth:"max-content"}}>
          {grouped.map(col=>(
            <div key={col.id} style={{width:260,flexShrink:0,display:"flex",flexDirection:"column"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,padding:"0 4px 12px"}}>
                <span style={{width:8,height:8,borderRadius:"50%",background:col.color,boxShadow:`0 0 6px ${col.color}`}}/>
                <span className="mono" style={{fontSize:11,letterSpacing:"0.18em",color:th.ink0,fontWeight:700}}>{col.title.toUpperCase()}</span>
                <span className="mono tnum" style={{fontSize:10,color:th.ink3,marginLeft:"auto",padding:"2px 7px",borderRadius:10,background:th.glass2}}>{col.cards.length}</span>
              </div>
              <div className="slim-scroll" style={{flex:1,display:"flex",flexDirection:"column",gap:8,paddingBottom:6,minHeight:100}}>
                {col.cards.map(card=>{
                  const c=catOf(card.category);
                  return(
                    <div key={card.id} className="glass task-card" style={{padding:12,borderRadius:12,borderLeft:`3px solid ${card.done?"#10d9a3":c.color}`,boxShadow:`0 4px 10px rgba(0,0,0,0.2)`,opacity:card.done?0.6:1}}>
                      <div style={{display:"flex",alignItems:"flex-start",gap:8,marginBottom:8}}>
                        <button onClick={e=>{e.stopPropagation();toggleTask(card.id);}} style={{flexShrink:0,marginTop:1,width:18,height:18,borderRadius:5,background:card.done?`linear-gradient(135deg,${c.color},${c.color}aa)`:"transparent",border:card.done?"none":`1.5px solid ${th.glassBorderStrong}`,display:"flex",alignItems:"center",justifyContent:"center"}}>
                          {card.done&&<Ic n="check" size={11} color="#fff" sw={2.5}/>}
                        </button>
                        <div style={{flex:1,minWidth:0,cursor:"pointer"}} onClick={()=>startEdit(card)}>
                          <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:3}}>
                            <span className="mono" style={{fontSize:10,letterSpacing:"0.08em",color:c.color,fontWeight:600}}>{c.glyph} {c.name}</span>
                            <span style={{width:3,height:3,borderRadius:"50%",background:PCOLOR[card.priority]}}/>
                            <span className="mono" style={{fontSize:10,color:th.ink3}}>{card.priority}</span>
                          </div>
                          <div style={{fontSize:12,color:card.done?th.ink3:th.ink0,fontWeight:500,lineHeight:1.4,textDecoration:card.done?"line-through":"none"}}>{card.title}</div>
                        </div>
                      </div>
                      {(card.progress||0)>0&&!card.done&&(
                        <div style={{marginLeft:26,height:4,borderRadius:2,background:th.glass2,overflow:"hidden"}}>
                          <div style={{width:`${(card.progress||0)*100}%`,height:"100%",background:`linear-gradient(90deg,${c.color},${c.color}aa)`,boxShadow:`0 0 6px ${c.color}`}}/>
                        </div>
                      )}
                      <div style={{display:"flex",alignItems:"center",gap:6,marginTop:8,paddingTop:8,borderTop:`1px solid ${th.glassBorder}`,marginLeft:26}}>
                        {card.duration&&<span className="mono tnum" style={{fontSize:10,color:th.ink2,display:"flex",alignItems:"center",gap:3}}><Ic n="timer" size={10}/> {card.duration}m</span>}
                        {card.timeStart&&<span className="mono tnum" style={{fontSize:10,color:th.ink3}}>{card.timeStart}</span>}
                        {card.due&&<span className="mono tnum" style={{fontSize:10,color:th.ink3}}>{card.due.slice(5).replace("-","/")}</span>}
                        <div style={{flex:1}}/>
                        <button onClick={e=>{e.stopPropagation();startEdit(card);}} style={{width:22,height:22,borderRadius:6,background:th.glass2,display:"flex",alignItems:"center",justifyContent:"center"}} title="编辑"><Ic n="edit" size={10} color={th.ink2}/></button>
                        <button onClick={e=>{e.stopPropagation();if(confirm("删除此任务？"))removeTask(card.id);}} style={{width:22,height:22,borderRadius:6,background:th.glass2,display:"flex",alignItems:"center",justifyContent:"center"}} title="删除"><Ic n="trash" size={10} color={th.ink2}/></button>
                      </div>
                    </div>
                  );
                })}
                {col.cards.length===0&&<div style={{fontSize:11,color:th.ink3,textAlign:"center",padding:"20px 0",opacity:0.5}}>暂无</div>}
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ═══ MONTH VIEW ═══
function MonthView({th,tasks:allTasks,searchedTasks,today,setView,startEdit,catOf,toggleTask,removeTask,setTaskForm,setShowTaskForm}){
  const tasks=searchedTasks||allTasks;
  const[viewMonth,setViewMonth]=useState(()=>today.slice(0,7));
  const[detailDate,setDetailDate]=useState(null);
  const[year,month]=viewMonth.split("-").map(Number);
  const first=new Date(year,month-1,1);
  const daysInMonth=new Date(year,month,0).getDate();
  const startOffset=(first.getDay()+6)%7; // 周一开始
  const cells=[];
  for(let i=0;i<startOffset;i++)cells.push(null);
  for(let d=1;d<=daysInMonth;d++)cells.push(d);
  while(cells.length%7!==0)cells.push(null);
  while(cells.length<35)cells.push(null);

  const tasksByDate=useMemo(()=>{
    const m={};
    tasks.forEach(t=>{if(t.due){m[t.due]=(m[t.due]||[]).concat(t);}});
    return m;
  },[tasks]);

  const monthStart=`${year}-${String(month).padStart(2,"0")}-01`;
  const monthEnd=`${year}-${String(month).padStart(2,"0")}-${String(daysInMonth).padStart(2,"0")}`;
  const monthTasks=tasks.filter(t=>t.due&&t.due>=monthStart&&t.due<=monthEnd);
  const doneN=monthTasks.filter(t=>t.done).length;
  const totalDur=monthTasks.reduce((s,t)=>s+(t.actualMin||0),0);

  const prev=()=>{const d=new Date(year,month-2,1);setViewMonth(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`);};
  const next=()=>{const d=new Date(year,month,1);setViewMonth(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`);};

  return(
    <div className="fadeIn">
      <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",marginBottom:18}}>
        <div>
          <div className="mono" style={{fontSize:11,letterSpacing:"0.22em",color:th.ink3,marginBottom:6,fontWeight:600}}>{year} · {month<=3?"Q1":month<=6?"Q2":month<=9?"Q3":"Q4"}</div>
          <h1 className="display" style={{fontSize:48,color:th.ink0,lineHeight:0.95,letterSpacing:"-0.04em"}}>
            <em style={{fontStyle:"italic"}} className="gradient-primary">{["一月","二月","三月","四月","五月","六月","七月","八月","九月","十月","十一月","十二月"][month-1]}</em>
          </h1>
        </div>
        <div style={{display:"flex",gap:6}}>
          <button onClick={prev} className="glass" style={{width:36,height:36,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="chevLeft" size={14} color={th.ink2}/></button>
          <button onClick={()=>setViewMonth(today.slice(0,7))} className="glass" style={{padding:"0 12px",borderRadius:10,fontSize:12,color:th.ink1}}>本月</button>
          <button onClick={next} className="glass" style={{width:36,height:36,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="chevRight" size={14} color={th.ink2}/></button>
        </div>
      </div>

      {/* Month stats */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:14}}>
        {[["完成任务",doneN,th.accent],["总任务",monthTasks.length,th.accent2],["专注时长",fmtMin(totalDur)||"0",th.accent3],["完成率",monthTasks.length?Math.round(doneN/monthTasks.length*100)+"%":"0%","#10d9a3"]].map(([l,v,c],i)=>(
          <div key={i} className="glass" style={{padding:"11px 14px",borderRadius:11,borderLeft:`2px solid ${c}`}}>
            <div className="mono" style={{fontSize:9,letterSpacing:"0.16em",color:th.ink3,fontWeight:600}}>{l}</div>
            <div className="display tnum" style={{fontSize:22,color:th.ink0,marginTop:2,letterSpacing:"-0.02em"}}>{v}</div>
          </div>
        ))}
      </div>

      {/* Calendar grid */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:6}}>
        {["一","二","三","四","五","六","日"].map(w=>(
          <div key={w} className="mono" style={{textAlign:"center",fontSize:12,letterSpacing:"0.18em",color:th.ink3,padding:"4px 0",fontWeight:600}}>{w}</div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
        {cells.map((d,i)=>{
          if(!d)return<div key={i} style={{background:th.glass1,borderRadius:8,minHeight:78}}/>;
          const dateStr=`${year}-${String(month).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
          const dayTasks=tasksByDate[dateStr]||[];
          const isToday=dateStr===today;
          const density=dayTasks.length;
          return(
            <div key={i} onClick={()=>setDetailDate(dateStr)} style={{padding:8,borderRadius:10,minHeight:78,background:isToday?`linear-gradient(135deg,${th.accent3}40,${th.accent}25)`:density>3?th.accent+"18":density>1?th.accent+"0c":th.glass1,border:isToday?`1.5px solid ${th.accent3}99`:`1px solid ${th.glassBorder}`,boxShadow:isToday?`0 0 20px ${th.accent3}40`:density>3?`0 0 8px ${th.accent}33`:"none",display:"flex",flexDirection:"column",gap:3,cursor:"pointer",position:"relative",overflow:"hidden"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <span className="display tnum" style={{fontSize:15,color:isToday?th.ink0:th.ink1,fontWeight:isToday?700:500}}>{d}</span>
                {isToday&&<span style={{width:5,height:5,borderRadius:"50%",background:th.accent3,boxShadow:`0 0 6px ${th.accent3}`}}/>}
              </div>
              {dayTasks.slice(0,2).map((t,j)=>(
                <div key={j} style={{background:th.accent+"40",color:th.ink0,padding:"1px 5px",borderRadius:3,fontSize:9,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",opacity:t.done?0.5:1,textDecoration:t.done?"line-through":"none"}}>{t.title}</div>
              ))}
              {dayTasks.length>2&&<div className="mono" style={{fontSize:9,color:th.ink3}}>+{dayTasks.length-2}</div>}
            </div>
          );
        })}
      </div>
      {detailDate&&<DayDetailModal th={th} date={detailDate} tasks={tasksByDate[detailDate]||[]} catOf={catOf} toggleTask={toggleTask} removeTask={removeTask} startEdit={task=>{setDetailDate(null);startEdit(task);}} onClose={()=>setDetailDate(null)} onCreate={()=>{setTaskForm({...emptyTask,due:detailDate});setDetailDate(null);setShowTaskForm(true);}}/>}
    </div>
  );
}

                      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3,flexWrap:"wrap"}}>
                        <span className="mono" style={{fontSize:10,color:c.color,fontWeight:600}}>{c.glyph} {c.name}</span>
                        <span style={{width:3,height:3,borderRadius:"50%",background:PCOLOR[t.priority]}}/>
                        <span className="mono" style={{fontSize:10,color:th.ink3}}>{t.priority}</span>
                        {t.timeStart&&<span className="mono tnum" style={{fontSize:10,color:th.ink3}}>{t.timeStart}{t.timeEnd?`–${t.timeEnd}`:""}</span>}
                      </div>
                      <div style={{fontSize:13,color:th.ink0,fontWeight:500,textDecoration:t.done?"line-through":"none"}}>{t.title}</div>
                    </div>
                    <button onClick={()=>startEdit(t)} style={{width:28,height:28,borderRadius:8,background:th.glass2,display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="edit" size={12} color={th.ink2}/></button>
                    <button onClick={()=>{if(confirm("删除这条任务？"))removeTask(t.id);}} style={{width:28,height:28,borderRadius:8,background:th.glass2,display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="trash" size={12} color={th.ink2}/></button>
                  </div>
                );
              })}
            </div>
          )}
        </div>
        <div style={{padding:"12px 18px",borderTop:`1px solid ${th.glassBorder}`,display:"flex",gap:10,alignItems:"center"}}>
          {tasks.length>0&&<span className="mono" style={{fontSize:11,color:th.ink3}}>完成 {done}/{tasks.length}</span>}
          <div style={{flex:1}}/>
          <button onClick={onCreate} style={{padding:"9px 16px",background:`linear-gradient(135deg,${th.accent},${th.accent3})`,color:"#fff",borderRadius:10,fontSize:12,fontWeight:600,display:"flex",alignItems:"center",gap:6,boxShadow:`0 4px 14px ${th.accent}66`}}><Ic n="plus" size={12} sw={2.2}/> 添加任务</button>
        </div>
      </div>
    </div>
  );
}

// ═══ PROJECTS VIEW ═══
function ProjectsView({th,projects,tasks,catOf,setShowProjectForm,setEditProjectId,removeProject,startEdit,toggleTask,updateProgress,setTaskForm,setShowTaskForm,today,openProjectId,setOpenProjectId}){
  const[selected,setSelected]=useState(null);
  const[showDone,setShowDone]=useState(false);

  // 外部触发跳转（左侧栏点项目时设置 openProjectId）
  useEffect(()=>{
    if(openProjectId){
      setSelected(openProjectId);
      setOpenProjectId&&setOpenProjectId(null); // 消费一次
    }
  },[openProjectId]);

  const projStats=projects.map(p=>{
    const pt=tasks.filter(t=>t.projectId===p.id);
    const done=pt.filter(t=>t.done).length;
    const prog=pt.length?pt.reduce((s,t)=>s+(t.done?1:(t.progress||0)),0)/pt.length:0;
    const dur=pt.reduce((s,t)=>s+(t.actualMin||0),0);
    return{...p,taskN:pt.length,doneN:done,progress:prog,duration:dur};
  });

  // 分桶：进行中 / 未启动 / 已完成（必须在任何早退出 return 之前，遵守 Hooks 规则）
  const grouped=useMemo(()=>{
    const doing=[],idle=[],done=[];
    projStats.forEach(p=>{
      if(p.taskN===0)idle.push(p);
      else if(p.progress>=1)done.push(p);
      else doing.push(p);
    });
    doing.sort((a,b)=>b.progress-a.progress);
    return{doing,idle,done};
  },[projects,tasks]);

  if(selected){
    const p=projStats.find(x=>x.id===selected);if(!p){setSelected(null);return null;}
    const pTasks=tasks.filter(t=>t.projectId===p.id);
    const pTodo=pTasks.filter(t=>!t.done);
    const pDone=pTasks.filter(t=>t.done);
    const pDoing=pTasks.filter(t=>!t.done&&(t.progress||0)>0);
    return(
      <div className="fadeIn">
        <button onClick={()=>setSelected(null)} style={{marginBottom:14,padding:"7px 12px",borderRadius:9,background:th.glass2,color:th.ink2,fontSize:12,display:"inline-flex",alignItems:"center",gap:6}}><Ic n="chevLeft" size={12} color={th.ink2}/> 返回项目</button>
        <div className="glass" style={{padding:24,borderRadius:18,borderLeft:`4px solid ${p.color}`,marginBottom:14,position:"relative",overflow:"hidden"}}>
          <Blob3D size={120} hue={p.color==="#6d5fff"?260:p.color==="#ec4899"?320:p.color==="#22d3ee"?195:p.color==="#10d9a3"?150:p.color==="#f5a524"?38:0} style={{right:-40,top:-30,opacity:0.3}}/>
          <div style={{position:"relative"}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
              <span style={{fontSize:26,color:p.color,textShadow:`0 0 14px ${p.color}`}}>{p.glyph}</span>
              <h1 className="display" style={{fontSize:34,color:th.ink0,letterSpacing:"-0.02em"}}>{p.name}</h1>
            </div>
            {p.description&&<div style={{fontSize:13,color:th.ink2,lineHeight:1.6,marginBottom:16}}>{p.description}</div>}
            {/* 周期信息 */}
            {(p.startDate||p.endDate)&&(()=>{
              const inProgress=p.startDate&&p.endDate&&p.startDate<=today&&today<=p.endDate;
              const finished=p.endDate&&today>p.endDate;
              const notYet=p.startDate&&today<p.startDate;
              const totalDays=p.startDate&&p.endDate?Math.max(1,Math.round((new Date(p.endDate)-new Date(p.startDate))/86400000)+1):null;
              const passedDays=p.startDate?Math.max(0,Math.round((new Date(today)-new Date(p.startDate))/86400000)):null;
              const dayPct=totalDays&&passedDays!=null?Math.min(100,Math.max(0,(passedDays/totalDays)*100)):0;
              return(
                <div style={{padding:"10px 12px",borderRadius:10,background:th.glass1,border:`1px solid ${th.glassBorder}`,marginBottom:12}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                    <Ic n="calendar" size={12} color={p.color}/>
                    <span className="mono" style={{fontSize:11,color:th.ink2,letterSpacing:"0.04em"}}>
                      {p.startDate||"—"} → {p.endDate||"—"}
                    </span>
                    <div style={{flex:1}}/>
                    <span className="mono" style={{fontSize:10,color:inProgress?p.color:finished?"#ff5d7a":th.ink3,fontWeight:600,letterSpacing:"0.06em"}}>
                      {inProgress?"进行中":finished?"已结束":notYet?"未开始":""}
                    </span>
                  </div>
                  {totalDays&&(
                    <div style={{display:"flex",alignItems:"center",gap:8,fontSize:10,color:th.ink3}}>
                      <div style={{flex:1,height:4,borderRadius:2,background:th.glass2,overflow:"hidden"}}>
                        <div style={{width:`${dayPct}%`,height:"100%",background:p.color,boxShadow:`0 0 4px ${p.color}80`}}/>
                      </div>
                      <span className="mono tnum">{passedDays}/{totalDays}d</span>
                    </div>
                  )}
                </div>
              );
            })()}
            <div style={{height:6,borderRadius:3,background:th.glass2,overflow:"hidden",marginBottom:12}}>
              <div style={{width:`${p.progress*100}%`,height:"100%",background:`linear-gradient(90deg,${p.color},${p.color}aa)`,boxShadow:`0 0 8px ${p.color}80`,transition:"width 0.5s var(--ease)"}}/>
            </div>
            <div style={{display:"flex",gap:8,marginTop:8,flexWrap:"wrap"}}>
              <button onClick={()=>{setTaskForm({...emptyTask,projectId:p.id,due:today});setShowTaskForm(true);}} style={{padding:"9px 14px",borderRadius:10,background:`linear-gradient(135deg,${p.color},${p.color}aa)`,color:"#fff",fontSize:12,fontWeight:600,display:"flex",alignItems:"center",gap:6,boxShadow:`0 4px 12px ${p.color}66`}}><Ic n="plus" size={12} sw={2.2}/> 添加任务</button>
              <button onClick={()=>{setEditProjectId(p.id);setShowProjectForm(true);}} className="glass" style={{padding:"9px 14px",borderRadius:10,fontSize:12,color:th.ink1,display:"flex",alignItems:"center",gap:6}}><Ic n="edit" size={12}/> 编辑项目</button>
              <button onClick={()=>{removeProject(p.id);setSelected(null);}} className="glass" style={{padding:"9px 14px",borderRadius:10,fontSize:12,color:"#ff5d7a",display:"flex",alignItems:"center",gap:6}}><Ic n="trash" size={12}/> 删除</button>
            </div>
          </div>
        </div>
        {/* Stats */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:14}}>
          <div className="glass" style={{padding:"12px 14px",borderRadius:11,borderTop:`2px solid ${p.color}`}}>
            <div className="mono" style={{fontSize:11,letterSpacing:"0.16em",color:th.ink3,fontWeight:600}}>总任务</div>
            <div className="display tnum" style={{fontSize:24,color:th.ink0,marginTop:2}}>{pTasks.length}</div>
          </div>
          <div className="glass" style={{padding:"12px 14px",borderRadius:11,borderTop:"2px solid #10d9a3"}}>
            <div className="mono" style={{fontSize:11,letterSpacing:"0.16em",color:th.ink3,fontWeight:600}}>已完成</div>
            <div className="display tnum" style={{fontSize:24,color:th.ink0,marginTop:2}}>{pDone.length}</div>
          </div>
          <div className="glass" style={{padding:"12px 14px",borderRadius:11,borderTop:`2px solid ${th.accent3}`}}>
            <div className="mono" style={{fontSize:11,letterSpacing:"0.16em",color:th.ink3,fontWeight:600}}>进行中</div>
            <div className="display tnum" style={{fontSize:24,color:th.ink0,marginTop:2}}>{pDoing.length}</div>
          </div>
          <div className="glass" style={{padding:"12px 14px",borderRadius:11,borderTop:"2px solid #f5a524"}}>
            <div className="mono" style={{fontSize:11,letterSpacing:"0.16em",color:th.ink3,fontWeight:600}}>专注</div>
            <div className="display tnum" style={{fontSize:18,color:th.ink0,marginTop:2}}>{fmtMin(p.duration)||"0"}</div>
          </div>
        </div>
        <div className="mono" style={{fontSize:12,letterSpacing:"0.18em",color:th.ink3,marginBottom:10,fontWeight:600,display:"flex",alignItems:"center",gap:10}}>
          <span>项目任务 · {pTasks.length}</span>
          <div style={{flex:1,height:1,background:th.glassBorder}}/>
        </div>
        {pTasks.length===0?<EmptyState th={th} text='这个项目还没有任务 · 点击上方"添加任务"开始' icon="folder"/>:(
          <div style={{display:"flex",flexDirection:"column",gap:7}}>
            {[...pTodo,...pDone].map(t=>{
              const c=catOf(t.category);
              return(
                <div key={t.id} className="glass hover-lift" style={{padding:"11px 14px",borderRadius:11,borderLeft:`3px solid ${t.done?"#10d9a3":c.color}`,display:"flex",alignItems:"center",gap:10,opacity:t.done?0.65:1}}>
                  <button onClick={()=>toggleTask(t.id)} style={{flexShrink:0,width:20,height:20,borderRadius:6,background:t.done?`linear-gradient(135deg,${c.color},${c.color}aa)`:"transparent",border:t.done?"none":`1.5px solid ${th.glassBorderStrong}`,display:"flex",alignItems:"center",justifyContent:"center"}}>
                    {t.done&&<Ic n="check" size={12} color="#fff" sw={2.5}/>}
                  </button>
                  <div style={{flex:1,minWidth:0,cursor:"pointer"}} onClick={()=>startEdit(t)}>
                    <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:2}}>
                      <span className="mono" style={{fontSize:10,color:c.color,fontWeight:600}}>{c.glyph} {c.name}</span>
                      <span className="mono" style={{fontSize:10,color:PCOLOR[t.priority]}}>· {t.priority}</span>
                      {t.due&&<span className="mono tnum" style={{fontSize:10,color:th.ink3}}>· {t.due.slice(5).replace("-","/")}</span>}
                      {!t.done&&(t.progress||0)>0&&<span className="mono tnum" style={{fontSize:10,color:th.accent2}}>· {Math.round((t.progress||0)*100)}%</span>}
                    </div>
                    <div style={{fontSize:13,color:th.ink0,fontWeight:500,textDecoration:t.done?"line-through":"none"}}>{t.title}</div>
                    {!t.done&&(t.progress||0)>0&&(
                      <div style={{marginTop:6,height:3,borderRadius:2,background:th.glass2,overflow:"hidden"}}>
                        <div style={{width:`${(t.progress||0)*100}%`,height:"100%",background:`linear-gradient(90deg,${c.color},${c.color}aa)`}}/>
                      </div>
                    )}
                  </div>
                  <button onClick={()=>startEdit(t)} style={{width:28,height:28,borderRadius:7,background:th.glass2,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Ic n="edit" size={11} color={th.ink2}/></button>
                </div>
              );
            })}
          </div>
        )}
      </div>
    );
  }

  const renderCard=p=>{
    const hue=p.color.startsWith("#")?parseInt(p.color.slice(1,3),16):260;
    const isDone=p.progress>=1&&p.taskN>0;
    return(
      <div key={p.id} onClick={()=>setSelected(p.id)} className="glass hover-lift" style={{padding:20,borderRadius:18,borderLeft:`3px solid ${p.color}`,position:"relative",overflow:"hidden",boxShadow:`0 10px 26px ${p.color}22`,cursor:"pointer",opacity:isDone?0.68:1}}>
        <Blob3D size={80} hue={hue} style={{right:-24,top:-24,opacity:isDone?0.18:0.32}}/>
        {isDone&&<div style={{position:"absolute",top:12,right:12,padding:"3px 9px",borderRadius:999,background:"linear-gradient(135deg,#10d9a3,#10a376)",color:"#fff",fontSize:10,fontWeight:700,letterSpacing:"0.08em",zIndex:2,boxShadow:"0 4px 10px rgba(16,217,163,0.4)"}}>✓ 已完成</div>}
        <div style={{position:"relative"}}>
          <div style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:14}}>
            <span style={{fontSize:20,color:p.color,textShadow:`0 0 10px ${p.color}`,flexShrink:0,marginTop:2}}>{p.glyph}</span>
            <div style={{flex:1,minWidth:0,paddingRight:isDone?56:0}}>
              <div className="display" style={{fontSize:19,color:th.ink0,lineHeight:1.1,letterSpacing:"-0.02em",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</div>
              {p.description&&<div style={{fontSize:11,color:th.ink3,marginTop:4,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.description}</div>}
            </div>
          </div>
          <div style={{marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
              <span className="mono" style={{fontSize:9,letterSpacing:"0.14em",color:th.ink3,fontWeight:600}}>进度</span>
              <span className="mono tnum" style={{fontSize:11,color:th.ink0,fontWeight:600}}>{Math.round(p.progress*100)}%</span>
            </div>
            <div style={{height:5,borderRadius:3,background:th.glass2,overflow:"hidden"}}>
              <div style={{width:`${p.progress*100}%`,height:"100%",background:`linear-gradient(90deg,${p.color},${p.color}aa)`,boxShadow:`0 0 8px ${p.color}80`}}/>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:14,fontSize:11,color:th.ink2,paddingTop:12,borderTop:`1px solid ${th.glassBorder}`}}>
            <span className="mono tnum"><strong style={{color:th.ink0,fontWeight:600}}>{p.doneN}</strong>/{p.taskN}</span>
            {p.duration>0&&<span className="mono tnum">⏱ {fmtMin(p.duration)}</span>}
            {p.taskN===0&&<span className="mono" style={{color:th.ink3,opacity:0.7}}>未启动</span>}
          </div>
        </div>
      </div>
    );
  };

  const groupHeader=(label,count,color)=>(
    <div style={{gridColumn:"1/-1",display:"flex",alignItems:"center",gap:10,marginTop:count?4:0}}>
      <span className="mono" style={{fontSize:11,letterSpacing:"0.18em",color:color,fontWeight:600}}>{label} · {count}</span>
      <div style={{flex:1,height:1,background:th.glassBorder}}/>
    </div>
  );

  return(
    <div className="fadeIn">
      <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",marginBottom:18}}>
        <div>
          <div className="mono" style={{fontSize:11,letterSpacing:"0.22em",color:th.ink3,marginBottom:6,fontWeight:600}}>WORKSPACE · {projects.length} PROJECTS · {grouped.doing.length} 进行中</div>
          <h1 className="display" style={{fontSize:44,color:th.ink0,lineHeight:0.95,letterSpacing:"-0.03em"}}>
            <em style={{fontStyle:"italic"}} className="gradient-primary">项目</em>
          </h1>
        </div>
        <button onClick={()=>{setEditProjectId(null);setShowProjectForm(true);}} style={{padding:"11px 18px",borderRadius:12,background:`linear-gradient(135deg,${th.accent},${th.accent3})`,color:"#fff",fontSize:13,fontWeight:600,boxShadow:`0 8px 24px ${th.accent}66`,display:"flex",alignItems:"center",gap:8}}>
          <Ic n="plus" size={13} sw={2.5}/> 新建项目
        </button>
      </div>
      {projects.length===0?<EmptyState th={th} text="还没有项目 · 点击右上角「新建项目」开始" icon="folder"/>:(
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:14}}>
          {grouped.doing.length>0&&(<>
            {groupHeader("进行中",grouped.doing.length,th.accent2)}
            {grouped.doing.map(renderCard)}
          </>)}
          {grouped.idle.length>0&&(<>
            {groupHeader("未启动",grouped.idle.length,th.ink3)}
            {grouped.idle.map(renderCard)}
          </>)}
          {grouped.done.length>0&&(<>
            <div style={{gridColumn:"1/-1",display:"flex",alignItems:"center",gap:10,marginTop:4}}>
              <button onClick={()=>setShowDone(s=>!s)} className="mono" style={{fontSize:11,letterSpacing:"0.18em",color:"#10d9a3",fontWeight:600,display:"flex",alignItems:"center",gap:6,background:"transparent",padding:0,cursor:"pointer"}}>
                <Ic n={showDone?"chevDown":"chevRight"} size={11} color="#10d9a3"/> 已完成 · {grouped.done.length}
              </button>
              <div style={{flex:1,height:1,background:th.glassBorder}}/>
            </div>
            {showDone&&grouped.done.map(renderCard)}
          </>)}
        </div>
      )}
    </div>
  );
}

// ═══ PROJECT FORM ═══
function ProjectForm({th,projects,editProjectId,onSave,onCancel}){
  const existing=editProjectId?projects.find(p=>p.id===editProjectId):null;
  const[form,setForm]=useState(existing?{...existing}:{name:"",description:"",color:"#6d5fff",glyph:"◆",startDate:"",endDate:""});
  const setF=(k,v)=>setForm({...form,[k]:v});
  const ok=form.name?.trim();
  const colors=["#6d5fff","#ec4899","#22d3ee","#10d9a3","#f5a524","#ff5d7a","#c4b5fd","#a8a2c4"];
  const glyphs=["◆","●","▲","✦","■","◈","★","◉","✧"];
  const dateOk=!form.startDate||!form.endDate||form.startDate<=form.endDate;
  return(
    <div className="fadeIn modal-overlay" onClick={onCancel}>
      <div onClick={e=>e.stopPropagation()} className="slideUp glass-strong" style={{borderRadius:20,maxWidth:460,width:"100%",padding:24,maxHeight:"90vh",overflow:"auto"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
          <div>
            <div className="mono" style={{fontSize:12,letterSpacing:"0.18em",color:th.ink3,marginBottom:4,fontWeight:600}}>{existing?"EDIT":"NEW PROJECT"}</div>
            <h2 className="display" style={{fontSize:22,color:th.ink0}}>{existing?"编辑项目":"新建项目"}</h2>
          </div>
          <button onClick={onCancel} style={{width:32,height:32,borderRadius:10,background:th.glass2,display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="close" size={14} color={th.ink2}/></button>
        </div>
        <input value={form.name} onChange={e=>setF("name",e.target.value)} placeholder="项目名称" autoFocus={typeof window!=="undefined"&&window.innerWidth>=900} className="inp" style={{marginBottom:12,fontSize:15,fontWeight:500}}/>
        <textarea value={form.description||""} onChange={e=>setF("description",e.target.value)} placeholder="简介（可选）" rows={2} className="inp" style={{marginBottom:16,resize:"vertical"}}/>
        
        {/* 项目周期 */}
        <label className="mono" style={{display:"block",fontSize:10,color:th.ink3,marginBottom:8,letterSpacing:"0.15em",fontWeight:600}}>项目周期（可选）· 用于逾期判断 + 进度展示</label>
        <div style={{display:"flex",gap:8,marginBottom:6,alignItems:"center"}}>
          <input type="date" value={form.startDate||""} onChange={e=>setF("startDate",e.target.value)} className="inp" style={{flex:1,fontSize:13,padding:"10px 12px"}}/>
          <span style={{color:th.ink3,fontSize:14}}>→</span>
          <input type="date" value={form.endDate||""} onChange={e=>setF("endDate",e.target.value)} className="inp" style={{flex:1,fontSize:13,padding:"10px 12px"}}/>
        </div>
        {!dateOk&&<div style={{fontSize:11,color:"#ff5d7a",marginBottom:6,paddingLeft:2,fontStyle:"italic"}}>结束日期不能早于开始日期</div>}
        {(form.startDate||form.endDate)&&(
          <div style={{fontSize:11,color:th.ink2,marginBottom:14,paddingLeft:2,letterSpacing:"0.02em"}}>
            💡 周期内的逾期检查会以该日期范围为准
          </div>
        )}
        {!form.startDate&&!form.endDate&&<div style={{height:14}}/>}
        
        <label className="mono" style={{display:"block",fontSize:10,color:th.ink3,marginBottom:8,letterSpacing:"0.15em",fontWeight:600}}>颜色</label>
        <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
          {colors.map(c=>(
            <button key={c} onClick={()=>setF("color",c)} style={{width:32,height:32,borderRadius:10,background:c,border:form.color===c?`2px solid ${th.ink0}`:"2px solid transparent",boxShadow:form.color===c?`0 0 0 3px ${c}40,0 0 10px ${c}80`:"none"}}/>
          ))}
        </div>
        <label className="mono" style={{display:"block",fontSize:10,color:th.ink3,marginBottom:8,letterSpacing:"0.15em",fontWeight:600}}>图标</label>
        <div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap"}}>
          {glyphs.map(g=>(
            <button key={g} onClick={()=>setF("glyph",g)} className={form.glyph===g?"":"glass"} style={{width:38,height:38,borderRadius:10,background:form.glyph===g?form.color+"25":th.glass2,border:form.glyph===g?`1px solid ${form.color}80`:`1px solid ${th.glassBorder}`,color:form.glyph===g?form.color:th.ink1,fontSize:18,textShadow:form.glyph===g?`0 0 10px ${form.color}`:"none"}}>{g}</button>
          ))}
        </div>
        <div style={{display:"flex",gap:10}}>
          <button onClick={onCancel} className="glass" style={{flex:1,padding:13,borderRadius:12,fontSize:13,color:th.ink2,fontWeight:500}}>取消</button>
          <button onClick={()=>dateOk&&onSave(form)} disabled={!ok||!dateOk} style={{flex:2,padding:13,background:ok&&dateOk?`linear-gradient(135deg,${form.color},${form.color}aa)`:th.glass2,color:ok&&dateOk?"#fff":th.ink3,borderRadius:12,fontSize:13,fontWeight:600,letterSpacing:"0.04em",boxShadow:ok&&dateOk?`0 8px 20px ${form.color}66`:"none"}}>{existing?"保 存":"创 建"}</button>
        </div>
      </div>
    </div>
  );
}

// ═══ ACTIVITY VIEW ═══
function ActivityView({th,tasks:allTasks,searchedTasks,history,catOf,today}){
  const tasks=searchedTasks||allTasks;
  const[range,setRange]=useState("today"); // today / 7 / 30
  const[filter,setFilter]=useState("all"); // all / done / create / focus

  // 从 tasks + history 派生活动流
  const entries=useMemo(()=>{
    const out=[];
    // 今日
    tasks.forEach(t=>{
      const c=catOf(t.category);
      if(t.done&&t.due===today){
        out.push({date:today,time:t.timeEnd||t.timeStart||"",type:"done",title:t.title,desc:t.actualMin>0?`用时 ${fmtMin(t.actualMin)}`:"",color:"#10d9a3",icon:"check",cat:c});
      }
      if(t.createdAt===today){
        out.push({date:today,time:"",type:"create",title:t.title,desc:`创建 · ${c.name} · ${t.priority}`,color:t.done?th.ink3:th.accent,icon:"plus",cat:c});
      }
      if(t.actualMin>0&&t.due===today){
        out.push({date:today,time:t.timeStart||"",type:"focus",title:t.title,desc:`专注 ${fmtMin(t.actualMin)}`,color:th.accent3,icon:"play",cat:c});
      }
    });
    // 历史
    history.slice(-14).reverse().forEach(h=>{
      if(h.date===today)return;
      h.tasks.forEach(t=>{
        if(t.done){
          const c=catOf(t.category);
          out.push({date:h.date,time:t.timeEnd||t.timeStart||"",type:"done",title:t.title,desc:t.actualMin>0?`用时 ${fmtMin(t.actualMin)}`:"",color:"#10d9a3",icon:"check",cat:c});
        }
      });
    });
    return out.sort((a,b)=>{
      if(a.date!==b.date)return b.date.localeCompare(a.date);
      return(b.time||"").localeCompare(a.time||"");
    });
  },[tasks,history,today,catOf,th.accent,th.accent3,th.ink3]);

  const ranges={today:e=>e.date===today,7:e=>e.date>=addDays(today,-6),30:e=>e.date>=addDays(today,-29)};
  const filters={all:()=>true,done:e=>e.type==="done",create:e=>e.type==="create",focus:e=>e.type==="focus"};
  const filtered=entries.filter(ranges[range]).filter(filters[filter]);
  const byDate={};
  filtered.forEach(e=>{byDate[e.date]=byDate[e.date]||[];byDate[e.date].push(e);});
  const dates=Object.keys(byDate).sort((a,b)=>b.localeCompare(a));

  return(
    <div className="fadeIn" style={{display:"flex",gap:18}}>
      <aside style={{width:180,flexShrink:0}} className="desktop-only">
        <div className="mono" style={{fontSize:12,letterSpacing:"0.2em",color:th.ink3,marginBottom:10,fontWeight:600,padding:"0 4px"}}>筛选</div>
        <div style={{display:"flex",flexDirection:"column",gap:3,marginBottom:16}}>
          {[["all","全部",entries.length,"layers"],["done","已完成",entries.filter(e=>e.type==="done").length,"check"],["create","新建",entries.filter(e=>e.type==="create").length,"plus"],["focus","专注",entries.filter(e=>e.type==="focus").length,"flame"]].map(([k,l,n,ic])=>(
            <button key={k} onClick={()=>setFilter(k)} className={`nav-item ${filter===k?"active":""}`} style={{padding:"8px 10px",fontSize:12}}>
              <Ic n={ic} size={12} color={filter===k?th.accent2:th.ink3}/>
              <span style={{flex:1}}>{l}</span>
              <span className="mono tnum" style={{fontSize:10,color:th.ink3}}>{n}</span>
            </button>
          ))}
        </div>
        <div className="mono" style={{fontSize:12,letterSpacing:"0.2em",color:th.ink3,marginBottom:10,fontWeight:600,padding:"0 4px"}}>时间</div>
        <div style={{display:"flex",flexDirection:"column",gap:3}}>
          {[["today","今天"],["7","最近 7 天"],["30","最近 30 天"]].map(([k,l])=>(
            <button key={k} onClick={()=>setRange(k)} className={`nav-item ${range===k?"active":""}`} style={{padding:"8px 10px",fontSize:12}}>{l}</button>
          ))}
        </div>
      </aside>
      <main style={{flex:1,minWidth:0}}>
        <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",marginBottom:18}}>
          <div>
            <div className="mono" style={{fontSize:11,letterSpacing:"0.22em",color:th.ink3,marginBottom:6,fontWeight:600}}>ACTIVITY · {filtered.length} 件</div>
            <h1 className="display" style={{fontSize:42,color:th.ink0,letterSpacing:"-0.03em",lineHeight:1}}>
              <em style={{fontStyle:"italic"}} className="gradient-primary">活动流</em>
            </h1>
          </div>
        </div>
        {/* mobile tabs */}
        <div className="mobile-only" style={{display:"flex",gap:6,marginBottom:12,overflowX:"auto"}} >
          {[["all","全部"],["done","完成"],["create","新建"],["focus","专注"]].map(([k,l])=>(
            <button key={k} onClick={()=>setFilter(k)} className={`view-tab ${filter===k?"active":""}`} style={{flexShrink:0}}>{l}</button>
          ))}
        </div>

        {dates.length===0?<EmptyState th={th} text="还没有活动记录" icon="list"/>:
          dates.map(date=>(

                </span>

                {byDate[date].map((e,i)=>(

                    <div style={{position:"absolute",left:-34,top:6,width:28,height:28,borderRadius:10,background:e.color+"22",border:`1px solid ${e.color}55`,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 0 10px ${e.color}40`}}>

// ═══ JOURNAL VIEW · 一句话日记历史 ═══
function JournalView({th,journals,today,saveJournal,removeJournal,setShowJournalModal}){
  const[viewMode,setViewMode]=useState("timeline"); // timeline / calendar
  const[editingDate,setEditingDate]=useState(null);
  const[editText,setEditText]=useState("");
  const[editMood,setEditMood]=useState("");

  const todayJournal=journals.find(j=>j.date===today);

  // 一年前的日期（自动归档分界）
  const archiveCutoff=useMemo(()=>{
    const d=new Date(today);d.setFullYear(d.getFullYear()-1);
    return d.toISOString().slice(0,10);
  },[today]);

  // 排序 + 分组
  const sortedJournals=useMemo(()=>[...journals].sort((a,b)=>b.date.localeCompare(a.date)),[journals]);
  const recent=sortedJournals.filter(j=>j.date>=archiveCutoff);
  const archived=sortedJournals.filter(j=>j.date<archiveCutoff);

  // 按月份分组
  const groupedByMonth=useMemo(()=>{
    const g={};
    recent.forEach(j=>{
      const ym=j.date.slice(0,7); // YYYY-MM
      if(!g[ym])g[ym]=[];
      g[ym].push(j);
    });
    return Object.keys(g).sort().reverse().map(ym=>({ym,items:g[ym]}));
  },[recent]);

  // 统计
  const stats=useMemo(()=>{
    // 连续天数
    let streak=0;
    for(let i=0;i<365;i++){
      const d=addDays(today,-i);
      const has=journals.some(j=>j.date===d);
      if(has)streak++;else if(i>0)break;
    }
    // 本月已写
    const thisMonth=today.slice(0,7);
    const monthCount=journals.filter(j=>j.date.startsWith(thisMonth)).length;
    return{streak,total:journals.length,monthCount};
  },[journals,today]);

  // 日历模式数据：本月每天有没有写
  const calendarData=useMemo(()=>{
    const d=new Date(today);
    const year=d.getFullYear(),month=d.getMonth();
    const firstDay=new Date(year,month,1);
    const lastDay=new Date(year,month+1,0);
    const startWd=(firstDay.getDay()+6)%7; // 周一为 0
    const days=lastDay.getDate();
    const cells=[];
    for(let i=0;i<startWd;i++)cells.push(null);
    for(let day=1;day<=days;day++){
      const dStr=`${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
      const j=journals.find(x=>x.date===dStr);
      cells.push({date:dStr,day,journal:j,isToday:dStr===today,isFuture:dStr>today});
    }
    return{cells,monthLabel:`${year} 年 ${month+1} 月`};
  },[journals,today]);

  const startEdit=(j)=>{
    setEditingDate(j.date);
    setEditText(j.wish||"");
    setEditMood(j.mood||"");
  };
  const saveEdit=()=>{
    if(!editText.trim())return;
    saveJournal(editText.trim(),editMood,editingDate);
    setEditingDate(null);
  };

  const cancelEdit=()=>{setEditingDate(null);setEditText("");setEditMood("");};

  const monthLabel=(ym)=>{
    const[y,m]=ym.split("-");
    return`${parseInt(m)} 月 ${y}`;
  };
  const dateLabel=(d)=>{
    if(d===today)return"今天";
    if(d===addDays(today,-1))return"昨天";
    if(d===addDays(today,-2))return"前天";
    const dt=new Date(d);
    return`${dt.getDate()} 日 · 周${["日","一","二","三","四","五","六"][dt.getDay()]}`;
  };

  return(
    <div className="fadeIn">
      <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",marginBottom:18,flexWrap:"wrap",gap:12}}>
        <div>
          <div className="mono" style={{fontSize:11,letterSpacing:"0.22em",color:th.ink3,marginBottom:6,fontWeight:600}}>JOURNAL · {journals.length} 篇</div>
          <h1 className="display" style={{fontSize:44,color:th.ink0,lineHeight:0.95,letterSpacing:"-0.03em"}}>
            <em style={{fontStyle:"italic"}} className="gradient-primary">一句日记</em>
          </h1>
        </div>
        <button onClick={()=>setShowJournalModal(true)} style={{padding:"11px 18px",borderRadius:12,background:`linear-gradient(135deg,${th.accent},${th.accent3})`,color:"#fff",fontSize:13,fontWeight:600,boxShadow:`0 8px 24px ${th.accent}66`,display:"flex",alignItems:"center",gap:8}}>
          <Ic n={todayJournal?"edit":"plus"} size={13} sw={2.5}/> {todayJournal?"编辑今日":"写下今日"}
        </button>
      </div>

      {/* 统计 */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:10,marginBottom:18}}>
        <StatCard th={th} label="连续" value={stats.streak} sub="天" color="#10d9a3"/>
        <StatCard th={th} label="本月" value={stats.monthCount} sub="篇" color={th.accent}/>
        <StatCard th={th} label="累计" value={stats.total} sub="篇" color={th.accent3}/>
      </div>

      {/* 模式切换 */}
      <div style={{display:"flex",gap:6,marginBottom:18}}>
        <button onClick={()=>setViewMode("timeline")} className={`view-tab ${viewMode==="timeline"?"active":""}`}>时间线</button>
        <button onClick={()=>setViewMode("calendar")} className={`view-tab ${viewMode==="calendar"?"active":""}`}>本月日历</button>
      </div>

      {viewMode==="calendar"&&(
        <div className="glass" style={{padding:18,borderRadius:14,marginBottom:18}}>
          <div className="display" style={{fontSize:18,color:th.ink0,letterSpacing:"-0.02em",marginBottom:14}}>{calendarData.monthLabel}</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:6,marginBottom:8}}>
            {["一","二","三","四","五","六","日"].map(w=>(
              <div key={w} className="mono" style={{textAlign:"center",fontSize:10,color:th.ink3,letterSpacing:"0.1em",fontWeight:600,padding:"4px 0"}}>{w}</div>
            ))}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:6}}>
            {calendarData.cells.map((c,i)=>{
              if(!c)return<div key={i}/>;
              const has=!!c.journal;
              return(
                <div key={i} onClick={()=>has&&startEdit(c.journal)} style={{aspectRatio:"1",borderRadius:9,background:has?th.accent+"30":c.isToday?th.glass3:th.glass1,border:c.isToday?`1.5px solid ${th.accent}`:`1px solid ${has?th.accent+"60":th.glassBorder}`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:has?"pointer":"default",opacity:c.isFuture?0.3:1,position:"relative",transition:"transform 0.12s"}} onMouseEnter={e=>{if(has)e.currentTarget.style.transform="scale(1.08)";}} onMouseLeave={e=>e.currentTarget.style.transform="scale(1)"}>
                  <span className="mono tnum" style={{fontSize:12,color:has?th.ink0:th.ink2,fontWeight:c.isToday?700:500}}>{c.day}</span>
                  {has&&c.journal.mood&&<span style={{fontSize:11,marginTop:1}}>{c.journal.mood}</span>}
                  {has&&!c.journal.mood&&<div style={{width:4,height:4,borderRadius:"50%",background:th.accent,marginTop:2}}/>}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {viewMode==="timeline"&&(
        <>
          {recent.length===0?(
            <EmptyState th={th} text="还没有日记 · 点击右上角写下今天的第一句" icon="book"/>
          ):(
            <div style={{display:"flex",flexDirection:"column",gap:24}}>
              {groupedByMonth.map(({ym,items})=>(
                <div key={ym}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                    <span className="display" style={{fontSize:18,color:th.ink0,letterSpacing:"-0.02em"}}>{monthLabel(ym)}</span>
                    <div style={{flex:1,height:1,background:th.glassBorder}}/>
                    <span className="mono" style={{fontSize:11,color:th.ink3}}>{items.length} 篇</span>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:8}}>
                    {items.map(j=>{
                      const isEditing=editingDate===j.date;
                      return(
                        <div key={j.date} className="glass hover-lift" style={{padding:"14px 18px",borderRadius:13,borderLeft:`3px solid ${j.date===today?th.accent:th.glassBorderStrong}`}}>
                          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                            <span className="mono" style={{fontSize:11,color:th.ink2,letterSpacing:"0.06em",fontWeight:600}}>{dateLabel(j.date)}</span>
                            <span className="mono" style={{fontSize:9,color:th.ink3,letterSpacing:"0.04em"}}>{j.date}</span>
                            {j.mood&&<span style={{fontSize:14}}>{j.mood}</span>}
                            <div style={{flex:1}}/>
                            {!isEditing&&(
                              <>
                                <button onClick={()=>startEdit(j)} title="编辑" style={{width:26,height:26,borderRadius:7,background:th.glass2,display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="edit" size={11} color={th.ink2}/></button>
                                <button onClick={()=>{if(confirm(`删除 ${j.date} 的日记？`))removeJournal(j.date);}} title="删除" style={{width:26,height:26,borderRadius:7,background:th.glass2,display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="trash" size={11} color={th.ink3}/></button>
                              </>
                            )}
                          </div>
                          {isEditing?(
                            <div>
                              <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:8}}>
                                {MOOD_OPTIONS.map(m=>(
                                  <button key={m} onClick={()=>setEditMood(editMood===m?"":m)} style={{width:32,height:32,borderRadius:8,border:`1.5px solid ${editMood===m?th.accent:th.glassBorder}`,background:editMood===m?th.accent+"25":th.glass2,fontSize:15,cursor:"pointer"}}>{m}</button>
                                ))}
                              </div>
                              <input value={editText} onChange={e=>setEditText(e.target.value)} onKeyDown={e=>{if(e.isComposing||e.keyCode===229)return;if(e.key==="Enter"&&editText.trim())saveEdit();if(e.key==="Escape")cancelEdit();}} maxLength={140} className="inp" style={{fontSize:14,padding:"10px 14px",marginBottom:8}} autoFocus/>
                              <div style={{display:"flex",gap:6}}>
                                <button onClick={cancelEdit} style={{padding:"7px 14px",borderRadius:8,background:th.glass2,color:th.ink2,fontSize:12}}>取消</button>
                                <button onClick={saveEdit} disabled={!editText.trim()} style={{flex:1,padding:"7px 14px",borderRadius:8,background:editText.trim()?`linear-gradient(135deg,${th.accent},${th.accent3})`:th.glass2,color:editText.trim()?"#fff":th.ink3,fontSize:12,fontWeight:600}}>保存</button>
                              </div>
                            </div>
                          ):(
                            <div style={{fontSize:14,color:th.ink1,lineHeight:1.65,fontWeight:500}}>{j.wish}</div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* 一年前的归档 */}
          {archived.length>0&&(
            <ArchivedJournals th={th} items={archived}/>
          )}
        </>
      )}
    </div>
  );
}

// ═══ RECENT VIEW · 近期完成 ═══
function RecentView({th,tasks,catOf,projOf,tags,tagsMap,today,history,cats}){
  const[range,setRange]=useState("30"); // 7 / 30 / 90 / all
  const[catFilter,setCatFilter]=useState("all");
  const[tagFilter,setTagFilter]=useState("all"); // 'all' or tag id

  // 收集所有已完成任务（来自当前 tasks 列表 + history 中已完成且当前已不在 tasks 的）
  const completedItems=useMemo(()=>{
    const items=[];
    // 1. 当前 tasks 列表里 done=true 的
    tasks.forEach(t=>{
      if(!t.done)return;
      // completedAt 兜底：用 due 或 today
      const ca=t.completedAt||t.due||today;
      items.push({...t,completedAt:ca,_source:"current"});
    });
    // 2. history 里每天的快照中 done=true 但当前 tasks 里已经没有（说明被重置或删除）的
    const curIds=new Set(tasks.map(t=>t.id));
    (history||[]).forEach(h=>{
      (h.tasks||[]).forEach(ht=>{
        if(!ht.done)return;
        if(curIds.has(ht.id))return; // 当前列表里已统计过
        items.push({...ht,completedAt:h.date,_source:"history"});
      });
    });
    return items;
  },[tasks,history,today]);

  // 时间范围过滤
  const cutoffDate=useMemo(()=>{
    if(range==="all")return null;
    const days=parseInt(range,10);
    return addDays(today,-days);
  },[range,today]);

  // 应用所有筛选
  const filtered=useMemo(()=>{
    let arr=completedItems;
    if(cutoffDate)arr=arr.filter(t=>(t.completedAt||"")>=cutoffDate);
    if(catFilter!=="all")arr=arr.filter(t=>t.category===catFilter);
    if(tagFilter!=="all")arr=arr.filter(t=>(t.tagIds||[]).includes(tagFilter));
    // 按完成日期降序，同一天内按 timeStart 降序
    arr=[...arr].sort((a,b)=>{
      const ad=a.completedAt||"",bd=b.completedAt||"";
      if(ad!==bd)return bd.localeCompare(ad);
      return(b.timeStart||"").localeCompare(a.timeStart||"");
    });
    return arr;
  },[completedItems,cutoffDate,catFilter,tagFilter]);

  // 按日期分组
  const grouped=useMemo(()=>{
    const g={};
    filtered.forEach(t=>{
      const d=t.completedAt||today;
      if(!g[d])g[d]=[];
      g[d].push(t);
    });
    return Object.keys(g).sort().reverse().map(d=>({date:d,tasks:g[d]}));
  },[filtered,today]);

  // 顶部成就统计
  const stats=useMemo(()=>{
    const w7=addDays(today,-7),w30=addDays(today,-30);
    const last7=completedItems.filter(t=>(t.completedAt||"")>=w7).length;
    const last30=completedItems.filter(t=>(t.completedAt||"")>=w30).length;
    // 连续天数：从 today 往回看，每天必须有完成
    let streak=0;
    for(let i=0;i<365;i++){
      const d=addDays(today,-i);
      const hasDone=completedItems.some(t=>(t.completedAt||"")===d);
      if(hasDone)streak++;else if(i>0)break;else continue; // 今天没完成也允许（可能还没到结束时间）
    }
    return{last7,last30,total:completedItems.length,streak};
  },[completedItems,today]);

  const dateLabel=(d)=>{
    if(d===today)return"今天";
    if(d===addDays(today,-1))return"昨天";
    if(d===addDays(today,-2))return"前天";
    const diff=Math.round((new Date(today)-new Date(d))/(24*3600*1000));
    if(diff>=3&&diff<=6)return`${diff} 天前`;
    return d;
  };
  const weekday=(d)=>{
    try{return["日","一","二","三","四","五","六"][new Date(d).getDay()];}catch{return"";}
  };

  return(
    <div className="fadeIn">
      <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:12}}>
        <div>
          <div className="mono" style={{fontSize:11,letterSpacing:"0.22em",color:th.ink3,marginBottom:6,fontWeight:600}}>RECENT · {filtered.length} 项</div>
          <h1 className="display" style={{fontSize:44,color:th.ink0,lineHeight:0.95,letterSpacing:"-0.03em"}}>
            <em style={{fontStyle:"italic"}} className="gradient-primary">近期完成</em>
          </h1>
        </div>
      </div>

      {/* 成就统计 */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:18}}>
        {[
          {label:"近 7 天",val:stats.last7,sub:"项",color:th.accent},
          {label:"近 30 天",val:stats.last30,sub:"项",color:th.accent2},
          {label:"累计",val:stats.total,sub:"项",color:th.accent3},
          {label:"连续",val:stats.streak,sub:"天",color:"#10d9a3"},
        ].map(s=>(
          <div key={s.label} className="glass" style={{padding:"14px 14px",borderRadius:13,borderTop:`2px solid ${s.color}`,boxShadow:`0 0 0 1px ${s.color}20`}}>
            <div className="mono" style={{fontSize:9,color:th.ink3,letterSpacing:"0.14em",fontWeight:600,marginBottom:4}}>{s.label}</div>
            <div style={{display:"flex",alignItems:"baseline",gap:4}}>
              <span className="display tnum" style={{fontSize:26,color:s.color,letterSpacing:"-0.04em",lineHeight:1}}>{s.val}</span>
              <span className="mono" style={{fontSize:10,color:th.ink3}}>{s.sub}</span>
            </div>
          </div>
        ))}
      </div>

      {/* 筛选区 */}
      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:18}}>
        <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:4}} className="slim-scroll">
          {[["7","近 7 天"],["30","近 30 天"],["90","近 90 天"],["all","全部"]].map(([k,l])=>(
            <button key={k} onClick={()=>setRange(k)} className={`view-tab ${range===k?"active":""}`} style={{flexShrink:0}}>{l}</button>
          ))}
        </div>
        {/* 分类 */}
        <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:4}} className="slim-scroll">
          <button onClick={()=>setCatFilter("all")} className={`view-tab ${catFilter==="all"?"active":""}`} style={{flexShrink:0}}>全部分类</button>
          {cats.map(c=>{
            const n=completedItems.filter(t=>t.category===c.id).length;
            if(n===0)return null;
            const act=catFilter===c.id;
            return<button key={c.id} onClick={()=>setCatFilter(c.id)} className={`view-tab ${act?"active":""}`} style={{flexShrink:0,background:act?c.color+"30":th.glass1,color:act?c.color:th.ink2,borderLeft:act?`2px solid ${c.color}`:"none"}}><span style={{color:c.color}}>{c.glyph}</span> {c.name} · {n}</button>;
          })}
        </div>
        {/* 标签筛选 */}
        {tags&&tags.length>0&&(
          <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:4}} className="slim-scroll">
            <button onClick={()=>setTagFilter("all")} className={`view-tab ${tagFilter==="all"?"active":""}`} style={{flexShrink:0}}>全部标签</button>
            {tags.map(tg=>{
              const n=completedItems.filter(t=>(t.tagIds||[]).includes(tg.id)).length;
              if(n===0)return null;
              const act=tagFilter===tg.id;
              return<button key={tg.id} onClick={()=>setTagFilter(tg.id)} className="view-tab" style={{flexShrink:0,background:act?tg.color+"35":th.glass1,color:act?tg.color:th.ink2,border:`1px solid ${act?tg.color+"80":th.glassBorder}`,boxShadow:act?`0 0 8px ${tg.color}40`:"none"}}>#{tg.name} · {n}</button>;
            })}
          </div>
        )}
      </div>

      {/* 分组列表 */}
      {grouped.length===0?(
        <EmptyState th={th} text={range==="all"?"还没有完成任何任务":"该时间范围内没有完成的任务"} icon="check"/>
      ):(
        <div style={{display:"flex",flexDirection:"column",gap:18}}>
          {grouped.map(({date,tasks:dayTasks})=>{
            const totalMin=dayTasks.reduce((s,t)=>s+(t.actualMin||0),0);
            return(
              <div key={date}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                  <span className="display" style={{fontSize:18,color:th.ink0,letterSpacing:"-0.02em"}}>{dateLabel(date)}</span>
                  <span className="mono" style={{fontSize:10,color:th.ink3,letterSpacing:"0.1em"}}>· 周{weekday(date)} · {date.slice(5).replace("-","/")}</span>
                  <div style={{flex:1,height:1,background:th.glassBorder}}/>
                  <span className="mono tnum" style={{fontSize:11,color:th.ink2,fontWeight:600}}>✓ {dayTasks.length}{totalMin>0?` · ${fmtMin(totalMin)}`:""}</span>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:5}}>
                  {dayTasks.map((t,i)=>{
                    const c=catOf(t.category);
                    const proj=t.projectId&&projOf?projOf(t.projectId):null;
                    const itemTags=(t.tagIds||[]).map(tid=>tagsMap&&tagsMap[tid]).filter(Boolean);
                    return(
                      <div key={t.id+"-"+date+"-"+i} className="glass hover-lift" style={{padding:"10px 14px",borderRadius:10,borderLeft:`2px solid ${c.color}`,display:"flex",alignItems:"center",gap:10,opacity:0.92}}>
                        <div style={{width:16,height:16,borderRadius:5,background:`linear-gradient(135deg,${c.color},${c.color}aa)`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,boxShadow:`0 0 6px ${c.color}60`}}>
                          <Ic n="check" size={9} color="#fff" sw={2.5}/>
                        </div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:13,color:th.ink1,textDecoration:"line-through",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontWeight:500}}>{t.title}</div>
                          <div style={{display:"flex",gap:6,marginTop:3,flexWrap:"wrap",alignItems:"center"}}>
                            <span className="mono" style={{fontSize:9,color:c.color,fontWeight:600}}>{c.glyph} {c.name}</span>
                            {proj&&<span className="mono" style={{fontSize:9,color:proj.color}}>· {proj.glyph} {proj.name}</span>}
                            {itemTags.map(tg=><span key={tg.id} className="mono" style={{fontSize:9,padding:"1px 6px",borderRadius:5,background:tg.color+"20",color:tg.color}}>#{tg.name}</span>)}
                            {t.actualMin>0&&<span className="mono tnum" style={{fontSize:9,color:th.ink3}}>· ⏱ {fmtMin(t.actualMin)}</span>}
                            {t.timeStart&&<span className="mono tnum" style={{fontSize:9,color:th.ink3}}>· {t.timeStart}</span>}
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ═══ REVIEW VIEW ═══

    if(aiLoading)return;
    setAiLoading(true);
    try{
      const data=await aiDailyReport({date,tasks,history,catOf,projOf:projOf||(id=>projects.find(p=>p.id===id)),journals});
      setAiReport({type:"daily",data,date});
      addToInbox({
        from:"reporter",
        type:"daily_review",

      });

  };
  const generateWeeklyReport=async(start,end)=>{
    if(aiLoading)return;
    setAiLoading(true);
    try{
      const data=await aiWeeklyReport({startDate:start,endDate:end,history,tasks,catOf,projOf:projOf||(id=>projects.find(p=>p.id===id)),journals});
      setAiReport({type:"weekly",data,startDate:start,endDate:end});
      addToInbox({
        from:"coach",
        type:"weekly_report",
        subject:`本周报告 · ${data.theme||(start+" ~ "+end)}`,
        preview:data.review?String(data.review).slice(0,120):"",
        content:data,
        rawData:{type:"weekly",data,startDate:start,endDate:end},
        tags:["weekly","report"],
      });
    }catch(e){showToast&&showToast("AI 周报告失败: "+e.message,"error");}
    setAiLoading(false);
  };
  return(
    <div className="fadeIn">
      <div style={{marginBottom:16}}>
        <div className="mono" style={{fontSize:11,letterSpacing:"0.22em",color:th.ink3,marginBottom:6,fontWeight:600}}>REVIEW · 复盘分析</div>
        <h1 className="display" style={{fontSize:38,color:th.ink0,letterSpacing:"-0.03em",lineHeight:1}}>
          <em style={{fontStyle:"italic"}} className="gradient-primary">复盘</em>
        </h1>
      </div>
      <div style={{display:"flex",gap:5,overflowX:"auto",marginBottom:18,paddingBottom:4}} className="slim-scroll">
        {tabs.map(([k,l])=>(
          <button key={k} onClick={()=>setReviewSub(k)} className={`view-tab ${reviewSub===k?"active":""}`} style={{flexShrink:0}}>{l}</button>
        ))}
      </div>
      {/* AI 报告生成区 — 仅在 today / week 标签显示 */}
      {(reviewSub==="today"||reviewSub==="week")&&(
        <div className="glass" style={{padding:"12px 16px",borderRadius:13,marginBottom:14,display:"flex",alignItems:"center",gap:12,border:`1px dashed ${th.accent}50`,background:`linear-gradient(135deg,${th.accent}08,${th.accent3}06)`}}>
          <div style={{width:36,height:36,borderRadius:9,background:`linear-gradient(135deg,${th.accent},${th.accent3})`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <span style={{fontSize:18}}>✨</span>
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:13,fontWeight:600,color:th.ink0}}>AI {reviewSub==="today"?"今日复盘":"本周报告"}</div>
            <div style={{fontSize:11,color:th.ink2,marginTop:1}}>由 DeepSeek 分析{reviewSub==="today"?"今日":"本周"}数据，生成深度洞察</div>
          </div>
          <button onClick={()=>{

            else generateWeeklyReport(addDays(today,-6),today);
