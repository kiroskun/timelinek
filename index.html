function InboxView({th,today,showToast,user}){
  const[messages,setMessages]=useState(()=>getInbox());
  const[selectedId,setSelectedId]=useState(null);
  const[filter,setFilter]=useState("all"); // all/unread/starred/coach/reporter/strategist/mentor
  const[searchQ,setSearchQ]=useState("");
  // 检测移动端宽度（< 760px 视为手机）
  const[isMobile,setIsMobile]=useState(()=>typeof window!=="undefined"&&window.innerWidth<760);
  useEffect(()=>{
    const onResize=()=>setIsMobile(window.innerWidth<760);
    window.addEventListener("resize",onResize);
    return()=>window.removeEventListener("resize",onResize);
  },[]);
  
  // 监听 inbox 变化（其他地方添加新邮件时实时刷新）
  useEffect(()=>{
    const refresh=()=>setMessages(getInbox());
    window.addEventListener("tlk_inbox_updated",refresh);
    return()=>window.removeEventListener("tlk_inbox_updated",refresh);
  },[]);
  
  // 过滤
  const filtered=useMemo(()=>{
    let arr=messages.filter(m=>!m.archived);
    if(filter==="unread")arr=arr.filter(m=>!m.read);
    else if(filter==="starred")arr=arr.filter(m=>m.starred);
    else if(["coach","reporter","strategist","mentor"].includes(filter))arr=arr.filter(m=>m.from===filter);
    if(searchQ.trim()){
      const q=searchQ.trim().toLowerCase();
      arr=arr.filter(m=>(m.subject||"").toLowerCase().includes(q)||(m.preview||"").toLowerCase().includes(q));
    }
    // 按时间倒序（最新在上）
    return[...arr].sort((a,b)=>(b.createdAt||"").localeCompare(a.createdAt||""));
  },[messages,filter,searchQ]);
  
  const selected=useMemo(()=>messages.find(m=>m.id===selectedId),[messages,selectedId]);
  
  const updateMessage=(id,patch)=>{
    const next=messages.map(m=>m.id===id?{...m,...patch}:m);
    setMessages(next);
    setInbox(next);
  };
  const markRead=(id)=>{
    const m=messages.find(x=>x.id===id);
    if(m&&!m.read)updateMessage(id,{read:true});
  };
  const toggleStar=(id)=>{
    const m=messages.find(x=>x.id===id);
    if(m)updateMessage(id,{starred:!m.starred});
  };
  const archiveMsg=(id)=>{
    updateMessage(id,{archived:true});
    if(selectedId===id)setSelectedId(null);
    showToast&&showToast("已归档","info");
  };
  const deleteMsg=(id)=>{
    if(!confirm("永久删除这封邮件？"))return;
    const next=messages.filter(m=>m.id!==id);
    setMessages(next);
    setInbox(next);
    if(selectedId===id)setSelectedId(null);
    showToast&&showToast("已删除","info");
  };
  const markAllRead=()=>{
    const next=messages.map(m=>({...m,read:true}));
    setMessages(next);
    setInbox(next);
    showToast&&showToast("已全部标为已读","success");
  };
  const exportMd=(msg)=>{
    if(!msg)return;
    const sender=senderInfo(msg.from);
    const md=renderMessageAsMarkdown(msg,sender);
    const blob=new Blob([md],{type:"text/markdown;charset=utf-8"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;
    a.download=`${msg.subject||"邮件"}.md`;
    a.click();
    URL.revokeObjectURL(url);
    showToast&&showToast("已导出 Markdown","success");
  };
  const copyContent=(msg)=>{
    if(!msg)return;
    const sender=senderInfo(msg.from);
    const md=renderMessageAsMarkdown(msg,sender);
    navigator.clipboard?.writeText(md).then(
      ()=>showToast&&showToast("已复制内容","success"),
      ()=>showToast&&showToast("复制失败","error")
    );
  };
  const mailtoLink=(msg)=>{
    if(!msg)return"#";
    const sender=senderInfo(msg.from);
    const txt=renderMessageAsPlainText(msg,sender);
    return`mailto:?subject=${encodeURIComponent("[Timelinek] "+(msg.subject||""))}&body=${encodeURIComponent(txt)}`;
  };
  
  // 计数
  const stats=useMemo(()=>{
    const active=messages.filter(m=>!m.archived);
    return{
      all:active.length,
      unread:active.filter(m=>!m.read).length,
      starred:active.filter(m=>m.starred).length,
      coach:active.filter(m=>m.from==="coach").length,
      reporter:active.filter(m=>m.from==="reporter").length,
      strategist:active.filter(m=>m.from==="strategist").length,
      mentor:active.filter(m=>m.from==="mentor").length,
    };
  },[messages]);
  
  const filterTabs=[
    {k:"all",label:"全部",count:stats.all},
    {k:"unread",label:"未读",count:stats.unread},
    {k:"starred",label:"⭐ 标星",count:stats.starred},
    {k:"coach",label:"📊 教练",count:stats.coach},
    {k:"reporter",label:"🪞 复盘官",count:stats.reporter},
    {k:"strategist",label:"🎯 策略师",count:stats.strategist},
    {k:"mentor",label:"💡 导师",count:stats.mentor},
  ];
  
  return(
    <div className="fadeIn">
      {/* 标题区 */}
      <div style={{marginBottom:18,display:"flex",alignItems:"flex-end",justifyContent:"space-between",gap:14,flexWrap:"wrap"}}>
        <div>
          <div className="mono" style={{fontSize:11,letterSpacing:"0.22em",color:th.ink3,marginBottom:6,fontWeight:600}}>INBOX · AI 收件箱</div>
          <h1 className="display" style={{fontSize:38,color:th.ink0,letterSpacing:"-0.03em",lineHeight:1}}>
            <em style={{fontStyle:"italic"}} className="gradient-primary">收件箱</em>
            {stats.unread>0&&<span style={{fontSize:14,fontWeight:600,color:th.accent2,marginLeft:14,letterSpacing:0,verticalAlign:"middle",padding:"3px 10px",background:th.accent+"20",borderRadius:9}}>{stats.unread} 未读</span>}
          </h1>
          <div style={{fontSize:12,color:th.ink2,marginTop:8,letterSpacing:"0.02em"}}>所有 AI 报告 · 洞察 · 提醒都会归档到这里</div>
        </div>
        <div style={{display:"flex",gap:6}}>
          <button onClick={async()=>{
            if(!user)return;
            showToast&&showToast("正在拉取云端...","info");
            try{
              const cloud=await cloudLoad(user.id);
              if(cloud&&Array.isArray(cloud.inbox_messages)){
                let localInbox=getInbox();
                const merged=mergeInbox(localInbox,cloud.inbox_messages);
                localStorage.setItem(INBOX_KEY,JSON.stringify(merged));
                window.dispatchEvent(new Event("tlk_inbox_updated"));
                const newCnt=merged.length-localInbox.length;
                showToast&&showToast(newCnt>0?`✓ 拉到 ${newCnt} 封新邮件`:"已是最新","success");
              }else{
                showToast&&showToast("云端无数据","info");
              }
            }catch(e){showToast&&showToast("同步失败: "+e.message,"error");}
          }} title="立即从云端拉取" className="hover-lift" style={{padding:"8px 12px",borderRadius:9,background:th.glass2,color:th.ink1,fontSize:11.5,fontWeight:500,border:`1px solid ${th.glassBorder}`,letterSpacing:"0.02em",display:"flex",alignItems:"center",gap:5}}>
            <Ic n="repeat" size={11} color={th.ink1}/> 同步
          </button>
          {stats.unread>0&&<button onClick={markAllRead} className="hover-lift" style={{padding:"8px 14px",borderRadius:9,background:th.glass2,color:th.ink1,fontSize:11.5,fontWeight:500,border:`1px solid ${th.glassBorder}`,letterSpacing:"0.02em"}}>全部标已读</button>}
        </div>
      </div>
      
      {/* 搜索栏 */}
      <div className="glass" style={{padding:"10px 14px",borderRadius:11,marginBottom:14,display:"flex",alignItems:"center",gap:10}}>
        <Ic n="search" size={14} color={th.ink3}/>
        <input value={searchQ} onChange={e=>setSearchQ(e.target.value)} placeholder="搜索邮件标题或内容..." style={{flex:1,background:"transparent",border:"none",outline:"none",fontSize:13,color:th.ink0}}/>
        {searchQ&&<button onClick={()=>setSearchQ("")} style={{padding:2,color:th.ink3}}><Ic n="close" size={12}/></button>}
      </div>
      
      {/* 筛选标签 */}
      <div style={{display:"flex",gap:5,overflowX:"auto",marginBottom:14,paddingBottom:4}} className="slim-scroll">
        {filterTabs.map(t=>(
          <button key={t.k} onClick={()=>setFilter(t.k)} className={`view-tab ${filter===t.k?"active":""}`} style={{flexShrink:0,whiteSpace:"nowrap"}}>
            {t.label} {t.count>0&&<span className="mono" style={{marginLeft:4,opacity:.7,fontSize:10}}>{t.count}</span>}
          </button>
        ))}
      </div>
      
      {/* 列表 + 详情布局：桌面端双栏 / 手机端单栏切换 */}
      <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":(selected?"minmax(300px,400px) 1fr":"1fr"),gap:14,minHeight:"60vh"}}>
        {/* 邮件列表 - 手机端选中时隐藏 */}
        {!(isMobile&&selected)&&<div style={{display:"flex",flexDirection:"column",gap:6,maxHeight:isMobile?"none":"75vh",overflowY:"auto",paddingRight:4}} className="slim-scroll">
          {filtered.length===0&&(
            <div style={{padding:"60px 20px",textAlign:"center",color:th.ink3}}>
              <div style={{fontSize:48,marginBottom:14,opacity:.4}}>📭</div>
              <div style={{fontSize:13,color:th.ink1,fontWeight:500,marginBottom:6}}>{searchQ?"没找到匹配":filter==="unread"?"全部都看过了":filter==="starred"?"还没有标星邮件":"收件箱是空的"}</div>
              <div style={{fontSize:11,color:th.ink3,lineHeight:1.6}}>{filter==="all"&&!searchQ?"AI 生成报告/洞察后会出现在这里":""}</div>
            </div>
          )}
          {filtered.map(msg=>{
            const sender=senderInfo(msg.from);
            const isActive=selectedId===msg.id;
            const dt=new Date(msg.createdAt);
            const dStr=dt.toLocaleString("zh-CN",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"});
            return(
              <div key={msg.id} onClick={()=>{setSelectedId(msg.id);markRead(msg.id);}} className="hover-lift" style={{padding:"12px 14px",borderRadius:12,background:isActive?th.accent+"14":(msg.read?th.glass1:th.card),border:`1px solid ${isActive?th.accent+"60":th.glassBorder}`,cursor:"pointer",position:"relative",borderLeft:`3px solid ${msg.read?"transparent":sender.color}`,transition:"all 0.15s"}}>
                <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                  {/* 发件人头像 */}
                  <div style={{width:32,height:32,borderRadius:"50%",background:sender.gradient,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,boxShadow:`0 2px 8px ${sender.color}40`,position:"relative"}}>
                    <span style={{fontSize:14}}>{sender.emoji}</span>
                    {!msg.read&&<span style={{position:"absolute",top:-2,right:-2,width:8,height:8,borderRadius:"50%",background:"#ec4899",border:`2px solid ${th.bg||"#fff"}`,boxShadow:"0 0 6px rgba(236,72,153,0.6)"}}/>}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    {/* 第一行：发件人 + 时间 */}
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8,marginBottom:4}}>
                      <span style={{fontSize:11.5,fontWeight:msg.read?500:700,color:msg.read?th.ink2:th.ink0,letterSpacing:"0.01em"}}>{sender.nameZh} · {sender.title}</span>
                      <span className="mono" style={{fontSize:9.5,color:th.ink3,whiteSpace:"nowrap",letterSpacing:"0.04em"}}>{dStr}</span>
                    </div>
                    {/* 标题 */}
                    <div style={{fontSize:13,fontWeight:msg.read?500:700,color:msg.read?th.ink1:th.ink0,marginBottom:5,letterSpacing:"0.01em",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                      {msg.subject}
                    </div>
                    {/* 摘要 */}
                    {msg.preview&&(
                      <div style={{fontSize:11.5,color:th.ink2,lineHeight:1.5,overflow:"hidden",textOverflow:"ellipsis",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>
                        {msg.preview}
                      </div>
                    )}
                    {/* 标签 + 操作 */}
                    <div style={{display:"flex",gap:5,marginTop:7,alignItems:"center"}}>
                      {Array.isArray(msg.tags)&&msg.tags.slice(0,3).map((tag,i)=>(
                        <span key={i} className="mono" style={{fontSize:9,padding:"1px 6px",borderRadius:5,background:th.glass2,color:th.ink3,letterSpacing:"0.04em"}}>{tag}</span>
                      ))}
                      <div style={{flex:1}}/>
                      <button onClick={e=>{e.stopPropagation();toggleStar(msg.id);}} style={{padding:3,opacity:msg.starred?1:0.4,color:msg.starred?"#f5a524":th.ink3}} title={msg.starred?"取消标星":"标星"}>
                        <Ic n={msg.starred?"starFilled":"star"} size={12}/>
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>}
        
        {/* 邮件详情 - 桌面端在右侧栏 */}
        {selected&&!isMobile&&(
          <div className="glass slideUp" style={{borderRadius:16,padding:0,maxHeight:"75vh",overflow:"hidden",display:"flex",flexDirection:"column"}}>
            <InboxMessageDetail th={th} msg={selected} sender={senderInfo(selected.from)} onClose={()=>setSelectedId(null)} onStar={()=>toggleStar(selected.id)} onArchive={()=>archiveMsg(selected.id)} onDelete={()=>deleteMsg(selected.id)} onExportMd={()=>exportMd(selected)} onCopy={()=>copyContent(selected)} mailtoLink={mailtoLink(selected)}/>
          </div>
        )}
      </div>
      
      {/* 手机端：全屏 modal 弹窗显示邮件 */}
      {selected&&isMobile&&(
        <div className="fadeIn" style={{position:"fixed",inset:0,zIndex:600,background:th.bg0||"#fff",display:"flex",flexDirection:"column"}}>
          {/* 顶部返回栏 */}
          <div style={{padding:"calc(env(safe-area-inset-top) + 10px) 14px 10px",display:"flex",alignItems:"center",gap:10,background:th.isDark?"rgba(13,11,26,0.95)":"rgba(255,255,255,0.95)",borderBottom:`1px solid ${th.glassBorder}`,backdropFilter:"blur(16px)",WebkitBackdropFilter:"blur(16px)",position:"sticky",top:0,zIndex:2}}>
            <button onClick={()=>setSelectedId(null)} className="hover-lift" style={{width:36,height:36,borderRadius:9,background:th.glass2,border:`1px solid ${th.glassBorder}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              <Ic n="chevDown" size={16} color={th.ink1} sw={2}/>
            </button>
            <span style={{fontSize:13,fontWeight:600,color:th.ink0,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{selected.subject}</span>
          </div>
          {/* 详情内容 */}
          <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column"}} className="slim-scroll">
            <InboxMessageDetail th={th} msg={selected} sender={senderInfo(selected.from)} onClose={()=>setSelectedId(null)} onStar={()=>toggleStar(selected.id)} onArchive={()=>archiveMsg(selected.id)} onDelete={()=>deleteMsg(selected.id)} onExportMd={()=>exportMd(selected)} onCopy={()=>copyContent(selected)} mailtoLink={mailtoLink(selected)} fullscreen/>
          </div>
        </div>
      )}
    </div>
  );
}

// 邮件详情组件
function InboxMessageDetail({th,msg,sender,onClose,onStar,onArchive,onDelete,onExportMd,onCopy,mailtoLink}){
  const dt=new Date(msg.createdAt);
  const fullDate=dt.toLocaleString("zh-CN",{year:"numeric",month:"long",day:"numeric",weekday:"long",hour:"2-digit",minute:"2-digit"});
  return(
    <>
      {/* 顶部 - 发件人卡片 */}
      <div style={{padding:"22px 24px 18px",background:`linear-gradient(135deg,${sender.color}18,${sender.color}05)`,borderBottom:`1px solid ${th.glassBorder}`,position:"relative",overflow:"hidden",flexShrink:0}}>
        <div style={{position:"absolute",top:-30,right:-20,width:130,height:130,borderRadius:"50%",background:`radial-gradient(circle,${sender.color}35,transparent 70%)`,filter:"blur(18px)",pointerEvents:"none"}}/>
        <div style={{display:"flex",alignItems:"flex-start",gap:14,position:"relative",marginBottom:12}}>
          <div style={{width:44,height:44,borderRadius:13,background:sender.gradient,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,boxShadow:`0 4px 14px ${sender.color}50`}}>
            <span style={{fontSize:22}}>{sender.emoji}</span>
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}>
              <span style={{fontSize:14,fontWeight:700,color:th.ink0,letterSpacing:"0.01em"}}>{sender.nameZh}</span>
              <span className="mono" style={{fontSize:9.5,color:sender.color,letterSpacing:"0.1em",fontWeight:600,textTransform:"uppercase"}}>{sender.name}</span>
            </div>
            <div style={{fontSize:11,color:th.ink2,marginBottom:6}}>{sender.title} · {sender.bio}</div>
            <div className="mono" style={{fontSize:10,color:th.ink3,letterSpacing:"0.04em"}}>{fullDate}</div>
          </div>
          <button onClick={onClose} style={{width:30,height:30,borderRadius:8,background:th.glass2,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Ic n="close" size={13} color={th.ink2}/></button>
        </div>
        <h2 className="display" style={{fontSize:22,color:th.ink0,letterSpacing:"-0.02em",lineHeight:1.3,marginTop:10}}>{msg.subject}</h2>
        {Array.isArray(msg.tags)&&msg.tags.length>0&&(
          <div style={{display:"flex",gap:5,marginTop:10}}>
            {msg.tags.map((tag,i)=>(
              <span key={i} className="mono" style={{fontSize:9.5,padding:"2px 8px",borderRadius:6,background:sender.color+"22",color:sender.color,letterSpacing:"0.06em",fontWeight:600,textTransform:"uppercase"}}>{tag}</span>
            ))}
          </div>
        )}
      </div>
      
      {/* 内容 */}
      <div className="slim-scroll" style={{flex:1,overflowY:"auto",padding:"22px 24px"}}>
        <InboxMessageContent th={th} msg={msg} sender={sender}/>
        {/* 签名 */}
        <div style={{marginTop:24,paddingTop:18,borderTop:`1px dashed ${th.glassBorder}`,fontStyle:"italic",fontSize:12,color:th.ink2,letterSpacing:"0.02em"}}>
          {sender.signature}
        </div>
      </div>
      
      {/* 底部操作 */}
      <div style={{padding:"12px 20px",borderTop:`1px solid ${th.glassBorder}`,display:"flex",alignItems:"center",gap:6,flexShrink:0,flexWrap:"wrap"}}>
        <button onClick={onStar} title={msg.starred?"取消标星":"标星"} style={{width:32,height:32,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",background:msg.starred?"#f5a52420":th.glass2,color:msg.starred?"#f5a524":th.ink2}}>
          <Ic n={msg.starred?"starFilled":"star"} size={13}/>
        </button>
        <button onClick={onArchive} title="归档" style={{width:32,height:32,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",background:th.glass2,color:th.ink2}}>
          <Ic n="archive" size={13}/>
        </button>
        <button onClick={onDelete} title="删除" style={{width:32,height:32,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",background:th.glass2,color:th.ink2}}>
          <Ic n="trash" size={13}/>
        </button>
        <div style={{flex:1}}/>
        <button onClick={onCopy} className="hover-lift" style={{padding:"7px 12px",borderRadius:8,background:th.glass2,color:th.ink1,fontSize:11,fontWeight:500,letterSpacing:"0.02em",display:"flex",alignItems:"center",gap:5,border:`1px solid ${th.glassBorder}`}}>
          <Ic n="fileText" size={11}/> 复制
        </button>
        <button onClick={onExportMd} className="hover-lift" style={{padding:"7px 12px",borderRadius:8,background:th.glass2,color:th.ink1,fontSize:11,fontWeight:500,letterSpacing:"0.02em",display:"flex",alignItems:"center",gap:5,border:`1px solid ${th.glassBorder}`}}>
          <Ic n="download" size={11}/> .md
        </button>
        <a href={mailtoLink} className="hover-lift" style={{padding:"7px 12px",borderRadius:8,background:`linear-gradient(135deg,${sender.color},${sender.color}cc)`,color:"#fff",fontSize:11,fontWeight:600,letterSpacing:"0.02em",display:"flex",alignItems:"center",gap:5,textDecoration:"none",boxShadow:`0 2px 8px ${sender.color}50`}}>
          <Ic n="mail" size={11} color="#fff"/> 转发到邮箱
        </a>
      </div>
    </>
  );
}

// 邮件内容渲染（按消息类型选择不同样式）
function InboxMessageContent({th,msg,sender}){
  const c=msg.content;
  if(!c)return<div style={{color:th.ink3,fontSize:13}}>（无内容）</div>;
  
  // 周度洞察
  if(msg.type==="weekly_insight"&&typeof c==="object"){
    return(
      <div>
        {c.greeting&&<div style={{fontSize:14,color:th.ink0,lineHeight:1.7,marginBottom:18,fontWeight:500}}>{c.greeting}</div>}
        {Array.isArray(c.observations)&&c.observations.length>0&&(
          <div style={{marginBottom:20}}>
            <SectionHead th={th} icon="📊">我注意到</SectionHead>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {c.observations.map((o,i)=>(
                <div key={i} style={{padding:"11px 14px",background:th.glass1,borderRadius:10,fontSize:13,color:th.ink1,lineHeight:1.65,display:"flex",gap:10,borderLeft:`2px solid ${sender.color}80`}}>
                  <span style={{fontSize:16,flexShrink:0}}>{o.icon||"💡"}</span>
                  <span style={{flex:1}}>{o.text}</span>
                </div>
              ))}
            </div>
          </div>
        )}
        {Array.isArray(c.suggestions)&&c.suggestions.length>0&&(
          <div style={{marginBottom:18}}>
            <SectionHead th={th} icon="🎯">建议</SectionHead>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {c.suggestions.map((s,i)=>(
                <div key={i} style={{padding:"12px 14px",background:`linear-gradient(135deg,${sender.color}13,${sender.color}06)`,borderRadius:10,border:`1px dashed ${sender.color}40`}}>
                  <div style={{fontSize:13,fontWeight:600,color:th.ink0,marginBottom:4}}>→ {s.action}</div>
                  {s.reason&&<div style={{fontSize:11.5,color:th.ink2,lineHeight:1.6}}>{s.reason}</div>}
                </div>
              ))}
            </div>
          </div>
        )}
        {c.closing&&(
          <div style={{padding:"12px 14px",background:th.glass1,borderRadius:10,fontSize:12.5,color:th.ink1,lineHeight:1.7,fontStyle:"italic",textAlign:"center"}}>
            {c.closing}
          </div>
        )}
      </div>
    );
  }
  
  // 每日复盘
  if(msg.type==="daily_review"&&typeof c==="object"){
    return(
      <div>
        {c.title&&<h3 style={{fontSize:15,color:th.ink0,marginBottom:10,letterSpacing:"-0.01em"}}>📋 {c.title}</h3>}
        {c.rating&&(
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,padding:"8px 14px",background:th.glass1,borderRadius:10}}>
            <span style={{fontSize:11,color:th.ink3}}>评分</span>
            <span style={{fontSize:14,color:"#f5a524",letterSpacing:"0.18em"}}>{"★".repeat(Math.max(1,Math.min(5,Math.round(c.rating))))+"☆".repeat(5-Math.max(1,Math.min(5,Math.round(c.rating))))}</span>
            <span className="mono" style={{fontSize:11,color:th.ink2}}>{c.rating}/5</span>
          </div>
        )}
        {c.review&&(
          <div style={{padding:"12px 16px",background:th.glass1,borderRadius:10,fontSize:13,color:th.ink1,lineHeight:1.7,marginBottom:16,borderLeft:`2px solid ${sender.color}`}}>
            {c.review}
          </div>
        )}
        {Array.isArray(c.insights)&&c.insights.length>0&&(
          <div style={{marginBottom:16}}>
            <SectionHead th={th} icon="🔍">细节洞察</SectionHead>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {c.insights.map((ins,i)=>(
                <div key={i} style={{padding:"9px 14px",background:th.glass1,borderRadius:9,fontSize:12.5,color:th.ink1,lineHeight:1.65,display:"flex",gap:10}}>
                  <span style={{color:sender.color,fontWeight:700}}>{i+1}.</span>
                  <span style={{flex:1}}>{ins}</span>
                </div>
              ))}
            </div>
          </div>
        )}
        {Array.isArray(c.tomorrow)&&c.tomorrow.length>0&&(
          <div>
            <SectionHead th={th} icon="💡">明日提醒</SectionHead>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {c.tomorrow.map((t,i)=>(
                <div key={i} style={{padding:"9px 14px",background:"rgba(245,165,36,0.08)",borderRadius:9,fontSize:12.5,color:"#f5a524",lineHeight:1.6,border:"1px solid rgba(245,165,36,0.2)",display:"flex",gap:8}}>
                  <span>→</span>
                  <span style={{flex:1,fontWeight:500}}>{t}</span>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    );
  }
  
  // 周报
  if(msg.type==="weekly_report"&&typeof c==="object"){
    return(
      <div>
        {c.theme&&<h3 style={{fontSize:16,color:th.ink0,marginBottom:10,letterSpacing:"-0.01em"}}>📊 本周主题：{c.theme}</h3>}
        {c.rating&&(
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,padding:"8px 14px",background:th.glass1,borderRadius:10}}>
            <span style={{fontSize:11,color:th.ink3}}>评分</span>
            <span style={{fontSize:14,color:"#f5a524",letterSpacing:"0.18em"}}>{"★".repeat(Math.max(1,Math.min(5,Math.round(c.rating))))+"☆".repeat(5-Math.max(1,Math.min(5,Math.round(c.rating))))}</span>
          </div>
        )}
        {c.review&&<div style={{padding:"12px 16px",background:th.glass1,borderRadius:10,fontSize:13,color:th.ink1,lineHeight:1.7,marginBottom:16,borderLeft:`2px solid ${sender.color}`}}>{c.review}</div>}
        {Array.isArray(c.insights)&&c.insights.length>0&&(
          <div style={{marginBottom:16}}>
            <SectionHead th={th} icon="🔍">关键洞察</SectionHead>
            {c.insights.map((ins,i)=>(
              <div key={i} style={{padding:"9px 14px",background:th.glass1,borderRadius:9,fontSize:12.5,color:th.ink1,lineHeight:1.65,marginBottom:6,display:"flex",gap:10}}>
                <span style={{color:sender.color,fontWeight:700}}>{i+1}.</span>
                <span style={{flex:1}}>{ins}</span>
              </div>
            ))}
          </div>
        )}
        {c.patterns&&(
          <div style={{marginBottom:16}}>
            <SectionHead th={th} icon="📈">模式分析</SectionHead>
            <div style={{padding:"12px 14px",background:`linear-gradient(135deg,${sender.color}13,${sender.color}06)`,borderRadius:10,fontSize:12.5,color:th.ink1,lineHeight:1.7,border:`1px dashed ${sender.color}40`}}>{c.patterns}</div>
          </div>
        )}
        {Array.isArray(c.nextWeek)&&c.nextWeek.length>0&&(
          <div>
            <SectionHead th={th} icon="🎯">下周建议</SectionHead>
            {c.nextWeek.map((n,i)=>(
              <div key={i} style={{padding:"9px 14px",background:"rgba(245,165,36,0.08)",borderRadius:9,fontSize:12.5,color:"#f5a524",lineHeight:1.6,border:"1px solid rgba(245,165,36,0.2)",marginBottom:6,display:"flex",gap:8}}>
                <span>→</span>
                <span style={{flex:1,fontWeight:500}}>{n}</span>
              </div>
            ))}
          </div>
        )}
      </div>
    );
  }
  
  // AI 排期
  if(msg.type==="schedule_plan"&&typeof c==="object"){
    return(
      <div>
        {c.summary&&<div style={{padding:"12px 16px",background:th.glass1,borderRadius:10,fontSize:13,color:th.ink1,lineHeight:1.7,marginBottom:14,borderLeft:`2px solid ${sender.color}`}}>{c.summary}</div>}
        {c.stats&&(
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:14}}>
            {[["逾期",c.stats.overdue||0,"#ef4444"],["今日",c.stats.today||0,sender.color],["未来",c.stats.future||0,th.ink3]].map(([label,v,color])=>(
              <div key={label} style={{padding:"10px 8px",background:th.glass1,borderRadius:9,textAlign:"center"}}>
                <div className="display tnum" style={{fontSize:20,color,fontWeight:700,letterSpacing:"-0.03em"}}>{v}</div>
                <div style={{fontSize:10,color:th.ink2,marginTop:3}}>{label}</div>
              </div>
            ))}
          </div>
        )}
        {Array.isArray(c.notes)&&c.notes.length>0&&(
          <div style={{marginBottom:14}}>
            <SectionHead th={th} icon="📝">提示</SectionHead>
            {c.notes.map((n,i)=>(
              <div key={i} style={{padding:"9px 14px",background:th.glass1,borderRadius:9,fontSize:12,color:th.ink1,lineHeight:1.6,marginBottom:5}}>· {n}</div>
            ))}
          </div>
        )}
        {Array.isArray(c.plan)&&c.plan.length>0&&(
          <div>
            <SectionHead th={th} icon="📅">排期方案</SectionHead>
            {c.plan.map((p,i)=>(
              <div key={i} style={{padding:"9px 14px",background:th.glass1,borderRadius:9,fontSize:12.5,color:th.ink1,lineHeight:1.6,marginBottom:5,display:"flex",gap:10,alignItems:"flex-start"}}>
                <span className="mono tnum" style={{color:sender.color,fontWeight:700,minWidth:42}}>{p.time||"--:--"}</span>
                <div style={{flex:1}}>
                  <div style={{fontWeight:500}}>任务 #{p.id}</div>
                  {p.reason&&<div style={{fontSize:11,color:th.ink3,marginTop:2}}>{p.reason}</div>}
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    );
  }
  
  // 画像更新
  if(msg.type==="profile_update"&&typeof c==="object"){
    return(
      <div>
        {c.identity&&(
          <div style={{padding:"14px 18px",background:`linear-gradient(135deg,${sender.color}15,${sender.color}06)`,borderRadius:11,marginBottom:14,fontStyle:"italic",fontSize:14,color:th.ink0,lineHeight:1.65,borderLeft:`2px solid ${sender.color}`}}>
            "{c.identity}"
          </div>
        )}
        <div style={{fontSize:12.5,color:th.ink1,lineHeight:1.7,marginBottom:14}}>
          根据你最近 30 天的轨迹，我重新认识了你。新版画像已存在 <strong>设置 → AI 画像</strong> 中。
        </div>
        {c.workPattern&&(
          <Section2 th={th} title="工作节奏" icon="⏰" sender={sender}>
            {c.workPattern.peakTime&&<KV2 th={th} k="高效时段" v={c.workPattern.peakTime}/>}
            {c.workPattern.lowTime&&<KV2 th={th} k="低能时段" v={c.workPattern.lowTime}/>}
            {c.workPattern.weekRhythm&&<KV2 th={th} k="一周节奏" v={c.workPattern.weekRhythm}/>}
          </Section2>
        )}
        {Array.isArray(c.strengths)&&c.strengths.length>0&&(
          <Section2 th={th} title="优势" icon="💪" sender={sender}>
            {c.strengths.map((s,i)=><Bullet2 key={i} th={th}>{s}</Bullet2>)}
          </Section2>
        )}
        {Array.isArray(c.blockers)&&c.blockers.length>0&&(
          <Section2 th={th} title="阻碍" icon="⚠️" sender={sender}>
            {c.blockers.map((s,i)=><Bullet2 key={i} th={th}>{s}</Bullet2>)}
          </Section2>
        )}
        {Array.isArray(c.goals)&&c.goals.length>0&&(
          <Section2 th={th} title="推断的目标" icon="🎯" sender={sender}>
            {c.goals.map((s,i)=><Bullet2 key={i} th={th}>{s}</Bullet2>)}
          </Section2>
        )}
      </div>
    );
  }
  
  // 默认 fallback：JSON 美化展示
  return(
    <pre style={{whiteSpace:"pre-wrap",wordBreak:"break-word",fontSize:12,color:th.ink1,lineHeight:1.6,fontFamily:"inherit"}}>
      {typeof c==="string"?c:JSON.stringify(c,null,2)}
    </pre>
  );
}

function SectionHead({th,icon,children}){
  return(
    <div className="mono" style={{fontSize:10.5,letterSpacing:"0.18em",color:th.ink3,marginBottom:8,fontWeight:600,display:"flex",alignItems:"center",gap:6}}>
      <span style={{fontSize:12}}>{icon}</span>{children}
    </div>
  );
}
function Section2({th,title,icon,sender,children}){
  return(
    <div style={{marginBottom:14}}>
      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:7}}>
        <span style={{fontSize:13}}>{icon}</span>
        <span className="mono" style={{fontSize:10,color:sender?.color||th.ink3,letterSpacing:"0.16em",fontWeight:600,textTransform:"uppercase"}}>{title}</span>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:5,paddingLeft:18}}>{children}</div>
    </div>
  );
}
function KV2({th,k,v}){
  return(
    <div style={{display:"flex",fontSize:12,gap:8,lineHeight:1.6}}>
      <span style={{color:th.ink3,minWidth:62}}>{k}</span>
      <span style={{color:th.ink1,flex:1}}>{v}</span>
    </div>
  );
}
function Bullet2({th,children}){
  return(
    <div style={{fontSize:12,color:th.ink1,lineHeight:1.7,display:"flex",gap:8}}>
      <span style={{color:th.ink3}}>·</span>
      <span style={{flex:1}}>{children}</span>
    </div>
  );
}

// 把邮件渲染为 Markdown（用于复制 / 导出 / mailto）
function renderMessageAsMarkdown(msg,sender){
  const dt=new Date(msg.createdAt);
  const dStr=dt.toLocaleString("zh-CN");
  const lines=[];
  lines.push(`# ${msg.subject||"邮件"}`);
  lines.push("");
  lines.push(`> 发件人：${sender.emoji} ${sender.nameZh}（${sender.title}）`);
  lines.push(`> 时间：${dStr}`);
  if(Array.isArray(msg.tags)&&msg.tags.length)lines.push(`> 标签：${msg.tags.map(t=>"#"+t).join(" ")}`);
  lines.push("");
  lines.push("---");
  lines.push("");
  
  const c=msg.content;
  if(!c){lines.push("（无内容）");}
  else if(typeof c==="string"){lines.push(c);}
  else if(typeof c==="object"){
    if(c.greeting)lines.push(c.greeting,"");
    if(c.title)lines.push(`## ${c.title}`,"");
    if(c.theme)lines.push(`## 本周主题：${c.theme}`,"");
    if(c.rating)lines.push(`**评分：** ${"★".repeat(Math.round(c.rating))} ${c.rating}/5`,"");
    if(c.identity)lines.push(`> "${c.identity}"`,"");
    if(c.review)lines.push(`### 评价\n\n${c.review}`,"");
    if(c.summary)lines.push(`### 概览\n\n${c.summary}`,"");
    if(Array.isArray(c.observations)&&c.observations.length){
      lines.push("### 我注意到");
      c.observations.forEach(o=>lines.push(`- ${o.icon||"·"} ${o.text}`));
      lines.push("");
    }
    if(Array.isArray(c.insights)&&c.insights.length){
      lines.push("### 洞察");
      c.insights.forEach((s,i)=>lines.push(`${i+1}. ${s}`));
      lines.push("");
    }
    if(c.patterns)lines.push(`### 模式分析\n\n${c.patterns}`,"");
    if(Array.isArray(c.suggestions)&&c.suggestions.length){
      lines.push("### 建议");
      c.suggestions.forEach(s=>{lines.push(`- **${s.action}**`);if(s.reason)lines.push(`  ${s.reason}`);});
      lines.push("");
    }
    if(Array.isArray(c.tomorrow)&&c.tomorrow.length){
      lines.push("### 明日提醒");
      c.tomorrow.forEach(t=>lines.push(`- → ${t}`));
      lines.push("");
    }
    if(Array.isArray(c.nextWeek)&&c.nextWeek.length){
      lines.push("### 下周建议");
      c.nextWeek.forEach(n=>lines.push(`- → ${n}`));
      lines.push("");
    }
    if(c.closing)lines.push(`---\n\n_${c.closing}_`,"");
  }
  
  lines.push("");
  lines.push(sender.signature);
  lines.push("");
  lines.push("---");
  lines.push("_由 Timelinek AI 收件箱生成_");
  return lines.join("\n");
}

// 邮件 HTML 版（用于真正发到邮箱，邮件客户端会解析 HTML）
function renderMessageAsHtml(msg,sender){
  const dt=new Date(msg.createdAt);
  const dStr=dt.toLocaleString("zh-CN",{year:"numeric",month:"long",day:"numeric",hour:"2-digit",minute:"2-digit"});
  const c=msg.content;
  const esc=(s)=>String(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
  
  const sections=[];
  
  if(typeof c==="object"&&c){
    if(c.greeting)sections.push(`<p style="font-size:15px;line-height:1.7;color:#333;margin:0 0 18px">${esc(c.greeting)}</p>`);
    if(c.title)sections.push(`<h2 style="font-size:18px;font-weight:700;color:#1a1530;margin:0 0 14px;letter-spacing:-0.01em">${esc(c.title)}</h2>`);
    if(c.theme)sections.push(`<h2 style="font-size:18px;font-weight:700;color:#1a1530;margin:0 0 14px;letter-spacing:-0.01em">本周主题：${esc(c.theme)}</h2>`);
    if(c.rating){
      const n=Math.max(1,Math.min(5,Math.round(c.rating)));
      const stars="★".repeat(n)+"☆".repeat(5-n);
      sections.push(`<div style="padding:10px 14px;background:#fef9e7;border-left:3px solid #f5a524;border-radius:0 8px 8px 0;margin:0 0 18px"><span style="font-size:14px;color:#7a6a3a;font-weight:600">评分 </span><span style="font-size:14px;color:#f5a524;letter-spacing:3px">${stars}</span><span style="font-size:13px;color:#aaa;margin-left:8px">${c.rating}/5</span></div>`);
    }
    if(c.identity)sections.push(`<blockquote style="margin:0 0 18px;padding:14px 18px;background:linear-gradient(135deg,${sender.color}11,${sender.color}05);border-left:3px solid ${sender.color};border-radius:0 10px 10px 0;font-style:italic;color:#1a1530;font-size:15px;line-height:1.65">"${esc(c.identity)}"</blockquote>`);
    if(c.review)sections.push(`<div style="padding:14px 18px;background:#fafaff;border-left:3px solid ${sender.color};border-radius:0 10px 10px 0;margin:0 0 18px;font-size:14.5px;color:#333;line-height:1.7">${esc(c.review)}</div>`);
    if(c.summary)sections.push(`<div style="padding:14px 18px;background:#fafaff;border-left:3px solid ${sender.color};border-radius:0 10px 10px 0;margin:0 0 18px;font-size:14.5px;color:#333;line-height:1.7">${esc(c.summary)}</div>`);
    if(Array.isArray(c.observations)&&c.observations.length){
      sections.push(`<h3 style="font-size:13px;font-weight:600;color:#7a6a90;letter-spacing:0.18em;text-transform:uppercase;margin:24px 0 10px">📊 我注意到</h3>`);
      const items=c.observations.map(o=>`<div style="padding:10px 14px;background:#f6f4ff;border-radius:8px;margin:0 0 6px;font-size:14px;color:#333;line-height:1.65;display:flex;gap:10px"><span style="font-size:16px;flex-shrink:0">${esc(o.icon||"💡")}</span><span style="flex:1">${esc(o.text)}</span></div>`).join("");
      sections.push(items);
    }
    if(Array.isArray(c.insights)&&c.insights.length){
      sections.push(`<h3 style="font-size:13px;font-weight:600;color:#7a6a90;letter-spacing:0.18em;text-transform:uppercase;margin:24px 0 10px">🔍 关键洞察</h3>`);
      const items=c.insights.map((s,i)=>`<div style="padding:10px 14px;background:#f6f4ff;border-radius:8px;margin:0 0 6px;font-size:14px;color:#333;line-height:1.65;display:flex;gap:12px"><span style="color:${sender.color};font-weight:700;flex-shrink:0">${i+1}.</span><span style="flex:1">${esc(s)}</span></div>`).join("");
      sections.push(items);
    }
    if(c.patterns){
      sections.push(`<h3 style="font-size:13px;font-weight:600;color:#7a6a90;letter-spacing:0.18em;text-transform:uppercase;margin:24px 0 10px">📈 模式分析</h3>`);
      sections.push(`<div style="padding:14px 18px;background:linear-gradient(135deg,${sender.color}10,${sender.color}03);border:1px dashed ${sender.color}50;border-radius:10px;font-size:14px;color:#333;line-height:1.7">${esc(c.patterns)}</div>`);
    }
    if(Array.isArray(c.suggestions)&&c.suggestions.length){
      sections.push(`<h3 style="font-size:13px;font-weight:600;color:#7a6a90;letter-spacing:0.18em;text-transform:uppercase;margin:24px 0 10px">🎯 建议</h3>`);
      const items=c.suggestions.map(s=>`<div style="padding:12px 16px;background:linear-gradient(135deg,${sender.color}13,${sender.color}06);border:1px dashed ${sender.color}40;border-radius:10px;margin:0 0 8px"><div style="font-size:14.5px;font-weight:600;color:#1a1530;margin:0 0 4px">→ ${esc(s.action)}</div>${s.reason?`<div style="font-size:13px;color:#666;line-height:1.6">${esc(s.reason)}</div>`:""}</div>`).join("");
      sections.push(items);
    }
    if(Array.isArray(c.tomorrow)&&c.tomorrow.length){
      sections.push(`<h3 style="font-size:13px;font-weight:600;color:#7a6a90;letter-spacing:0.18em;text-transform:uppercase;margin:24px 0 10px">💡 明日提醒</h3>`);
      const items=c.tomorrow.map(t=>`<div style="padding:10px 14px;background:#fff8e8;border:1px solid #f5a52440;border-radius:8px;margin:0 0 6px;font-size:14px;color:#a37020;line-height:1.6;font-weight:500">→ ${esc(t)}</div>`).join("");
      sections.push(items);
    }
    if(Array.isArray(c.nextWeek)&&c.nextWeek.length){
      sections.push(`<h3 style="font-size:13px;font-weight:600;color:#7a6a90;letter-spacing:0.18em;text-transform:uppercase;margin:24px 0 10px">🎯 下周建议</h3>`);
      const items=c.nextWeek.map(n=>`<div style="padding:10px 14px;background:#fff8e8;border:1px solid #f5a52440;border-radius:8px;margin:0 0 6px;font-size:14px;color:#a37020;line-height:1.6;font-weight:500">→ ${esc(n)}</div>`).join("");

// 把邮件渲染为纯文本（用于 mailto，邮件客户端不识别 markdown，所以这里完全去除符号）
function renderMessageAsPlainText(msg,sender){
  const dt=new Date(msg.createdAt);
  const dStr=dt.toLocaleString("zh-CN",{year:"numeric",month:"long",day:"numeric",hour:"2-digit",minute:"2-digit"});
  const lines=[];
  // 顶部信息（用空行 + 缩进而不是 markdown 符号）
  lines.push(msg.subject||"邮件");
  lines.push("━".repeat(28));
  lines.push("");
  lines.push(`发件人：${sender.emoji}  ${sender.nameZh}（${sender.title}）`);
  lines.push(`时间：${dStr}`);
  if(Array.isArray(msg.tags)&&msg.tags.length)lines.push(`标签：${msg.tags.join("  ")}`);
  lines.push("");
  lines.push("─".repeat(28));
  lines.push("");
  
  const c=msg.content;
  const renderRating=(r)=>{
    const n=Math.max(1,Math.min(5,Math.round(r||3)));
    return"★".repeat(n)+"☆".repeat(5-n)+`  ${r}/5`;
  };
  
  if(!c){
    lines.push("（无内容）");
  }else if(typeof c==="string"){
    lines.push(c);
  }else if(typeof c==="object"){
    if(c.greeting){lines.push(c.greeting);lines.push("");}
    if(c.title){lines.push(`【${c.title}】`);lines.push("");}
    if(c.theme){lines.push(`本周主题：${c.theme}`);lines.push("");}
    if(c.rating){lines.push(`评分：${renderRating(c.rating)}`);lines.push("");}
    if(c.identity){lines.push(`「${c.identity}」`);lines.push("");}
    if(c.review){lines.push("◆ 评价");lines.push(c.review);lines.push("");}
    if(c.summary){lines.push("◆ 概览");lines.push(c.summary);lines.push("");}
    if(Array.isArray(c.observations)&&c.observations.length){
      lines.push("◆ 我注意到");
      c.observations.forEach(o=>lines.push(`  ${o.icon||"·"}  ${o.text}`));
      lines.push("");
    }
    if(Array.isArray(c.insights)&&c.insights.length){
      lines.push("◆ 洞察");
      c.insights.forEach((s,i)=>lines.push(`  ${i+1}. ${s}`));
      lines.push("");
    }
    if(c.patterns){lines.push("◆ 模式分析");lines.push(c.patterns);lines.push("");}
    if(Array.isArray(c.suggestions)&&c.suggestions.length){
      lines.push("◆ 建议");
      c.suggestions.forEach(s=>{
        lines.push(`  → ${s.action}`);
        if(s.reason)lines.push(`     ${s.reason}`);
      });
      lines.push("");
    }
    if(Array.isArray(c.tomorrow)&&c.tomorrow.length){
      lines.push("◆ 明日提醒");
      c.tomorrow.forEach(t=>lines.push(`  → ${t}`));
      lines.push("");
    }
    if(Array.isArray(c.nextWeek)&&c.nextWeek.length){
      lines.push("◆ 下周建议");
      c.nextWeek.forEach(n=>lines.push(`  → ${n}`));
      lines.push("");
    }
    // 画像专用字段
    if(c.workPattern){
      lines.push("◆ 工作节奏");
      if(c.workPattern.peakTime)lines.push(`  高效时段：${c.workPattern.peakTime}`);
      if(c.workPattern.lowTime)lines.push(`  低能时段：${c.workPattern.lowTime}`);
      if(c.workPattern.weekRhythm)lines.push(`  一周节奏：${c.workPattern.weekRhythm}`);
      lines.push("");
    }
    if(Array.isArray(c.strengths)&&c.strengths.length){
      lines.push("◆ 优势");
      c.strengths.forEach(s=>lines.push(`  · ${s}`));
      lines.push("");
    }
    if(Array.isArray(c.blockers)&&c.blockers.length){
      lines.push("◆ 阻碍");
      c.blockers.forEach(s=>lines.push(`  · ${s}`));
      lines.push("");
    }
    if(Array.isArray(c.goals)&&c.goals.length){
      lines.push("◆ 目标");
      c.goals.forEach(s=>lines.push(`  · ${s}`));
      lines.push("");
    }
    // 排期专用字段
    if(c.stats){
      lines.push("◆ 任务统计");
      lines.push(`  逾期 ${c.stats.overdue||0}  ·  今日 ${c.stats.today||0}  ·  未来 ${c.stats.future||0}`);
      lines.push("");
    }
    if(Array.isArray(c.notes)&&c.notes.length){
      lines.push("◆ 提示");
      c.notes.forEach(n=>lines.push(`  · ${n}`));
      lines.push("");
    }
    if(Array.isArray(c.plan)&&c.plan.length){
      lines.push("◆ 排期方案");
      c.plan.forEach(p=>{
        lines.push(`  ${p.time||"--:--"}    任务 #${p.id}`);
        if(p.reason)lines.push(`           ${p.reason}`);
      });
      lines.push("");
    }
    if(c.closing){
      lines.push("─".repeat(28));
      lines.push("");
      lines.push(c.closing);
      lines.push("");
    }
  }
  
  lines.push("");
  lines.push("─".repeat(28));
  lines.push(sender.signature.replace(/——/g,"——").trim());
  lines.push("");
  lines.push("由 Timelinek AI 收件箱生成");
  lines.push(`https://timelinek.pages.dev`);
  return lines.join("\n");
}

// 极简 Markdown 渲染（处理 **粗体** *斜体* `代码` ## 标题 - 列表 1. 列表 > 引用）
function MarkdownText({text,th}){
  if(!text)return null;
  const lines=String(text).split("\n");
  const blocks=[];
  let curList=null,curOl=null,curQuote=null;
  const flushList=()=>{if(curList){blocks.push({type:"ul",items:curList});curList=null;}};
  const flushOl=()=>{if(curOl){blocks.push({type:"ol",items:curOl});curOl=null;}};
  const flushQuote=()=>{if(curQuote){blocks.push({type:"quote",text:curQuote.join("\n")});curQuote=null;}};
  const flushAll=()=>{flushList();flushOl();flushQuote();};
  
  for(let i=0;i<lines.length;i++){
    const ln=lines[i];
    const trimmed=ln.trim();
    if(!trimmed){flushAll();blocks.push({type:"space"});continue;}
    
    // 标题 ###/##/#
    let mh=trimmed.match(/^(#{1,4})\s+(.+)$/);
    if(mh){flushAll();blocks.push({type:"h",level:mh[1].length,text:mh[2]});continue;}
    
    // 引用 >
    if(/^>\s*/.test(trimmed)){
      flushList();flushOl();
      if(!curQuote)curQuote=[];
      curQuote.push(trimmed.replace(/^>\s*/,""));
      continue;
    }else{flushQuote();}
    
    // 无序列表 - 或 *
    let ml=trimmed.match(/^[-*]\s+(.+)$/);
    if(ml){flushOl();flushQuote();if(!curList)curList=[];curList.push(ml[1]);continue;}
    
    // 有序列表 1.
    let mo=trimmed.match(/^(\d+)\.\s+(.+)$/);
    if(mo){flushList();flushQuote();if(!curOl)curOl=[];curOl.push(mo[2]);continue;}
    
    // 分隔线 ---
    if(/^[-=]{3,}$/.test(trimmed)){flushAll();blocks.push({type:"hr"});continue;}
    
    // 普通段落
    flushAll();
    blocks.push({type:"p",text:trimmed});
  }
  flushAll();
  
  // 行内：**粗体** `代码`（不再处理 *斜体* 因为容易和 * 列表冲突）
  const renderInline=(s)=>{
    if(!s)return null;
    const parts=[];
    let rest=s;
    while(rest.length){
      const mb=rest.match(/\*\*([^*]+?)\*\*/);
      const mc=rest.match(/`([^`]+?)`/);
      // 找最先出现的
      let candidates=[];
      if(mb)candidates.push({m:mb,kind:"b"});
      if(mc)candidates.push({m:mc,kind:"c"});
      if(candidates.length===0){parts.push(rest);break;}
      candidates.sort((a,b)=>a.m.index-b.m.index);
      const{m,kind}=candidates[0];
      if(m.index>0)parts.push(rest.slice(0,m.index));
      if(kind==="b")parts.push({tag:"b",text:m[1]});
      else parts.push({tag:"c",text:m[1]});
      rest=rest.slice(m.index+m[0].length);
    }
    return parts.map((p,i)=>{
      if(typeof p==="string")return<span key={i}>{p}</span>;
      if(p.tag==="b")return<strong key={i} style={{fontWeight:700,color:th.ink0}}>{p.text}</strong>;
      if(p.tag==="c")return<code key={i} style={{padding:"1px 6px",borderRadius:5,background:th.glass2,fontFamily:"var(--f-mono)",fontSize:"0.9em",border:`1px solid ${th.glassBorder}`,color:th.accent2||th.accent}}>{p.text}</code>;
      return null;
    });
  };
  
  return(
    <div style={{display:"flex",flexDirection:"column",gap:8}}>
      {blocks.map((b,i)=>{
        if(b.type==="space")return<div key={i} style={{height:2}}/>;
        if(b.type==="hr")return<div key={i} style={{height:1,background:th.glassBorder,margin:"4px 0"}}/>;
        if(b.type==="h"){
          const sizes={1:18,2:16,3:15,4:14};
          return<div key={i} style={{fontSize:sizes[b.level]||15,fontWeight:700,color:th.ink0,letterSpacing:"-0.01em",marginTop:i===0?0:6,marginBottom:2,lineHeight:1.4}}>{renderInline(b.text)}</div>;
        }
        if(b.type==="quote")return<div key={i} style={{padding:"8px 12px",borderLeft:`3px solid ${th.accent}`,background:th.glass1,borderRadius:"0 8px 8px 0",fontSize:13,color:th.ink1,lineHeight:1.65,fontStyle:"italic"}}>{renderInline(b.text)}</div>;
        if(b.type==="ul")return(
          <ul key={i} style={{paddingLeft:18,margin:"2px 0",display:"flex",flexDirection:"column",gap:4,listStyle:"none"}}>
            {b.items.map((it,j)=>(
              <li key={j} style={{position:"relative",paddingLeft:14,lineHeight:1.65}}>
                <span style={{position:"absolute",left:0,top:"0.55em",width:5,height:5,borderRadius:"50%",background:th.accent,opacity:.7}}/>
                {renderInline(it)}
              </li>
            ))}
          </ul>
        );
        if(b.type==="ol")return(
          <ol key={i} style={{paddingLeft:24,margin:"2px 0",display:"flex",flexDirection:"column",gap:4}}>
            {b.items.map((it,j)=>(
              <li key={j} style={{lineHeight:1.65}}>
                {renderInline(it)}
              </li>
            ))}
          </ol>
        );
        // 段落
        return<div key={i} style={{lineHeight:1.7}}>{renderInline(b.text)}</div>;
      })}
    </div>
  );
}

// INSIGHT ENGINE — detector 函数
// ═══════════════════════════════════════════════════════════════════
function detectMorningPlan(tasks,today,_cfg){
  if(!_cfg.signals.morning)return null;
  if(isBriefTypeDisabled("morning"))return null;
  const h=new Date().getHours();
  if(h<6||h>10)return null;
  const todayMorning=getBriefings().find(b=>b.type==="morning"&&new Date(b.ts).toDateString()===new Date().toDateString());
  if(todayMorning)return null;
  const todayTasks=tasks.filter(t=>!t.done&&t.due===today);
  if(todayTasks.length===0)return null;
  const highCount=todayTasks.filter(t=>t.priority==="高").length;
  const totalMins=todayTasks.reduce((s,t)=>s+(t.duration||60),0);
  return{type:"morning",sender:"strategist",title:"早安规划",severity:"medium",data:{count:todayTasks.length,highCount,totalMins,sample:todayTasks.slice(0,3).map(t=>t.title)}};
}

function detectDelay(tasks,today,_cfg){
  if(!_cfg.signals.delay)return null;
  if(isBriefTypeDisabled("delay"))return null;
  const delayed=tasks.filter(t=>{
    if(t.done||!t.due)return false;
    const overdueDays=Math.floor((new Date(today)-new Date(t.due))/86400000);
    return overdueDays>=3;
  });
  if(delayed.length===0)return null;
  delayed.sort((a,b)=>{
    const da=Math.floor((new Date(today)-new Date(a.due))/86400000);
    const db=Math.floor((new Date(today)-new Date(b.due))/86400000);
    return db-da;
  });
  const worst=delayed[0];
  const days=Math.floor((new Date(today)-new Date(worst.due))/86400000);
  return{type:"delay",sender:"coach",title:"拖延提醒",severity:days>=7?"high":"medium",data:{taskId:worst.id,taskTitle:worst.title,days,total:delayed.length}};
}

function detectOverload(tasks,today,_cfg){
  if(!_cfg.signals.overload)return null;
  if(isBriefTypeDisabled("overload"))return null;
  const todayTasks=tasks.filter(t=>!t.done&&t.due===today);
  const totalMins=todayTasks.reduce((s,t)=>s+(t.duration||60),0);
  const totalHours=totalMins/60;
  if(todayTasks.length<8&&totalHours<8)return null;
  return{type:"overload",sender:"strategist",title:"过载预警",severity:totalHours>10?"high":"medium",data:{count:todayTasks.length,totalHours:totalHours.toFixed(1)}};
}

function runInsightDetectors(tasks,today,cfg){
  const signals=[];
  [detectMorningPlan,detectDelay,detectOverload].forEach(fn=>{
    try{const s=fn(tasks,today,cfg);if(s)signals.push(s);}catch(e){console.warn("[detector]",fn.name,e);}
  });
  return signals;
}

async function generateBriefingMessage(signal){
  const data=signal.data;
  let prompt="";
  if(signal.type==="morning"){
    prompt=`你是用户的 AI 工作伙伴 Linek。请用温柔活泼的口吻生成一段早安提醒。
今天的任务情况：
- 共 ${data.count} 项任务
- 其中 ${data.highCount} 项高优先级
- 预估总耗时 ${Math.round(data.totalMins/60)} 小时
- 示例任务：${data.sample.join("、")}
要求：30-60 字，像朋友一样自然，突出关键信息，末尾不要问问题，以"早上好"开头`;
  }else if(signal.type==="delay"){
    prompt=`你是用户的 AI 教练。用户有任务拖延了，请生成温和但直接的提醒。
拖延详情：
- 任务："${data.taskTitle}"
- 已拖延 ${data.days} 天
- 总共 ${data.total} 项任务逾期
要求：30-60 字，提示性而非批评，直接说出任务名（用引号），末尾不问问题`;
  }else if(signal.type==="overload"){
    prompt=`你是用户的 AI 策略师。今天用户安排过满，请生成温和提醒。
详情：${data.count} 项任务，总预估 ${data.totalHours} 小时
要求：30-60 字，提醒但不焦虑，暗示可调整`;
  }
  if(!prompt)return signal.title;
  try{
    const msg=await callAI([{role:"user",content:prompt}],{max_tokens:200,temperature:0.7});
    return msg.replace(/^["']|["']$/g,"").trim();
  }catch(e){
    if(signal.type==="morning")return`早上好！今天有 ${data.count} 项任务等着你${data.highCount>0?`，其中 ${data.highCount} 项是高优先级`:""}。`;
    if(signal.type==="delay")return`「${data.taskTitle}」已经拖了 ${data.days} 天了，要不要今天解决一下？`;
    if(signal.type==="overload")return`今天安排了 ${data.count} 项任务共 ${data.totalHours} 小时，节奏有点紧。`;
    return signal.title;
  }
}

function generateBriefingActions(signal){
  if(signal.type==="morning")return[{label:"AI 帮我排期",action:"smart_schedule"},{label:"我自己安排",action:"snooze"}];
  if(signal.type==="delay")return[
    {label:"今天就做",action:"set_today",payload:{taskId:signal.data.taskId}},
    {label:"AI 帮我拆解",action:"expand_task",payload:{taskId:signal.data.taskId,taskTitle:signal.data.taskTitle}},
    {label:"删除",action:"delete_task",payload:{taskId:signal.data.taskId}},
  ];
  if(signal.type==="overload")return[{label:"AI 帮我精简",action:"trim_today"},{label:"挪到明天",action:"defer_some"}];
  return[];
}

async function insightEngineTick(tasks,today){
  const cfg=getCompanionConfig();
  if(!cfg.enabled||cfg.briefFreq==="off")return;
  const signals=runInsightDetectors(tasks,today,cfg);
  if(signals.length===0)return;
  const existing=getBriefings();
  const filtered=signals.filter(s=>!existing.find(b=>b.type===s.type&&Date.now()-b.ts<30*60*1000));
  for(const sig of filtered){
    try{
      const message=await generateBriefingMessage(sig);
      const actions=generateBriefingActions(sig);
      pushBriefing({type:sig.type,sender:sig.sender,title:sig.title,message,actions,severity:sig.severity,rawData:sig.data});
      addToInbox({from:sig.sender,type:"briefing_"+sig.type,subject:`[${sig.title}] ${message.slice(0,30)}`,preview:message,content:message,rawData:sig.data});
    }catch(e){console.warn("[insight] 处理 signal 失败:",e);}
  }
}

function pushBriefing(b){
  const newBrief={
    id:"br_"+Date.now()+"_"+Math.floor(Math.random()*10000),
    ts:Date.now(),read:false,accepted:false,dismissed:false,
    type:b.type||"general",sender:b.sender||"coach",
    title:b.title||"AI 建议",message:b.message||"",
    actions:Array.isArray(b.actions)?b.actions:[],
    severity:b.severity||"medium",
    expiresAt:b.expiresAt||Date.now()+7*86400000,
    ...b,
  };
  const all=[...getBriefings(),newBrief];
  setBriefingsStorage(all);
  window.dispatchEvent(new CustomEvent("tlk-briefings-changed"));
  return newBrief;
}
